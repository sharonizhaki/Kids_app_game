<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>מרכז פעילות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css?v=29">
  <link rel="stylesheet" href="./css/bg-floaters.css?v=29">
</head>
<body>

<!-- SPLASH -->
<div id="screen-splash" class="screen active visible" style="justify-content:center;min-height:100vh;">
  <div style="text-align:center;">
    <div style="font-size:3.5rem;margin-bottom:16px;">⭐</div>
    <div class="spinner-lg" style="width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;"></div>
    <p style="font-weight:700;color:var(--muted);">טוען...</p>
  </div>
</div>
<script>if(sessionStorage.getItem('parentNav')==='1'){sessionStorage.removeItem('parentNav');document.getElementById('screen-splash').style.display='none';}</script>

<!-- ==================== SCREEN: MANAGE POINTS ==================== -->
<div id="screen-manage-points" class="screen">
  <div class="screen-header">
    <button class="back-btn" id="btn-back-to-parent">→</button>
    <h2>מרכז פעילות ⭐</h2>
  </div>

  <!-- Tabs -->
  <div id="mp-tabs" style="display:flex;gap:6px;max-width:480px;width:100%;margin-bottom:14px;border:2px solid var(--border);border-radius:14px;padding:4px;background:var(--bg);"></div>

  <!-- Tab: ממתינים -->
  <div id="tab-pending" class="mp-tab-content" style="display:none;width:100%;max-width:480px;">
    <div id="mp-pending-list"></div>
  </div>

  <!-- Tab: היסטוריה -->
  <div id="tab-history" class="mp-tab-content" style="display:none;width:100%;max-width:480px;">
    <p style="color:var(--muted);font-size:0.82rem;width:100%;margin-bottom:10px;">החלק ימינה לביטול או לחץ אשר לאישור בדיעבד </p>
    <div class="filter-scroll" id="mp-filter">
      <span class="filter-chip active" data-filter="all">📋 הכל</span>
      <span class="filter-chip" data-filter="child">👧👦 לפי ילד</span>
      <span class="filter-chip" data-filter="cat">📂 לפי קטגוריה</span>
      <span class="filter-chip" data-filter="stars">⭐ לפי כוכבים</span>
    </div>
    <div class="sub-filter-scroll" id="mp-sub-filter" style="display:none;"></div>
    <div class="etask-list" id="mp-list"></div>
  </div>

  <!-- Tab: ניקוד ידני -->
  <div id="tab-manual" class="mp-tab-content" style="display:none;width:100%;max-width:480px;">
    <div id="mp-manual-content"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<script type="module" src="./js/main-points.js?v=29"></script>
<script src="./js/bg-floaters.js?v=29"></script>
</body>
</html>
