<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 צייר ונחש</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --bg:#020617;--surface:#0f172a;--border:#1e293b;
            --emma:#FF5C7A;--rif:#4DB8FF;--gold:#F5C842;--green:#3DD68C;
            --text:#f8fafc;--dim:#64748b;--danger:#ef4444;
        }
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}

        .screen{display:none;flex-direction:column;width:100%;height:100dvh}
        .screen.active{display:flex}
        #screen-game{padding:4px 6px;gap:3px;max-width:420px;margin:0 auto}

        /* ── TOP BAR ── */
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:5px 8px;background:var(--surface);border-radius:12px;border:1px solid var(--border);flex-shrink:0}
        .home-btn{font-size:16px;cursor:pointer;padding:4px 7px;border-radius:8px;background:rgba(255,255,255,0.05);border:1px solid rgba(255,215,0,0.2);flex-shrink:0}
        .stat-box{text-align:center;min-width:0}
        .stat-label{font-size:0.5rem;color:var(--gold);font-weight:700;letter-spacing:0.3px;text-transform:uppercase;opacity:0.7;white-space:nowrap}
        .scores-row{display:flex;align-items:center;gap:4px}
        .p-score{font-size:1rem;font-weight:900;font-family:'Fredoka One',cursive;transition:all 0.3s}
        .p-score.pop{animation:statPop 0.4s ease}
        .p-score-sep{color:var(--dim);font-size:0.8rem}
        @keyframes statPop{0%{transform:scale(1)}40%{transform:scale(1.4);filter:brightness(1.5)}100%{transform:scale(1)}}
        .timer-box{text-align:center}
        .timer-num{font-size:1.6rem;font-weight:900;font-family:'Fredoka One',cursive;color:var(--gold);transition:color 0.3s}
        .timer-num.urgent{color:var(--danger);animation:pulse 0.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.4}}
        .round-label{font-size:0.55rem;color:var(--dim);font-weight:700}
        .hs-val{font-size:0.9rem;font-weight:900;color:var(--gold)}

        /* ── MULTIPLIER INDICATOR ── */
        .multiplier-badge{position:absolute;top:-2px;right:-2px;font-size:0.55rem;font-weight:900;padding:2px 5px;border-radius:8px;z-index:5;display:none;animation:multPop 0.5s ease}
        .multiplier-badge.x3{display:block;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f;box-shadow:0 0 12px rgba(251,191,36,0.5)}
        .multiplier-badge.x2{display:block;background:linear-gradient(135deg,var(--rif),#2563eb);color:white;box-shadow:0 0 12px rgba(77,184,255,0.4)}
        .multiplier-badge.x1{display:block;background:rgba(255,255,255,0.15);color:var(--dim)}
        @keyframes multPop{0%{transform:scale(0) rotate(-20deg)}60%{transform:scale(1.3) rotate(5deg)}100%{transform:scale(1) rotate(0)}}

        /* ── ROLE BAR ── */
        .role-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:4px 10px;background:var(--surface);border-radius:14px;border:1px solid var(--border);flex-shrink:0}
        .role-chip{font-size:0.62rem;font-weight:700;padding:3px 10px;border-radius:14px;white-space:nowrap;transition:all 0.3s}
        .role-chip.artist{background:rgba(255,92,122,0.15);color:var(--emma);border:1px solid rgba(255,92,122,0.3)}
        .role-chip.guesser{background:rgba(77,184,255,0.15);color:var(--rif);border:1px solid rgba(77,184,255,0.3)}
        .role-chip.me{box-shadow:0 0 8px rgba(255,255,255,0.15);font-size:0.66rem}
        .role-sep{color:var(--dim);font-size:0.65rem}

        /* ── TARGET BOX ── */
        .target-box{display:flex;align-items:center;justify-content:center;gap:8px;padding:5px 10px;background:var(--surface);border-radius:12px;border:1px solid var(--border);min-height:44px;flex-shrink:0;position:relative;overflow:hidden}
        .target-label{font-size:0.55rem;color:var(--dim);font-weight:700;text-transform:uppercase}
        .target-emoji{font-size:2.2rem;animation:targetBounce 1.5s ease-in-out infinite}
        @keyframes targetBounce{0%,100%{transform:translateY(0)}50%{transform:translateY(-4px)}}
        .target-hint{font-size:0.8rem;color:#cbd5e1;font-weight:700}
        /* Artist feedback */
        .artist-feedback{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:8px;background:rgba(2,6,23,0.9);border-radius:12px;z-index:5;animation:feedbackIn 0.4s ease}
        .artist-feedback.correct{border:2px solid var(--green)}
        .artist-feedback.fail{border:2px solid var(--danger)}
        @keyframes feedbackIn{from{opacity:0;transform:scale(0.9)}to{opacity:1;transform:scale(1)}}
        .af-emoji{font-size:2rem}
        .af-text{font-size:0.85rem;font-weight:900}

        /* ── GUESSES BAR ── */
        .guesses-bar{display:flex;align-items:center;justify-content:center;gap:6px;padding:3px 10px;flex-shrink:0}
        .guesses-label{font-size:0.6rem;color:var(--dim);font-weight:700}
        .guess-dots{display:flex;gap:5px}
        .guess-dot{width:14px;height:14px;border-radius:50%;background:var(--green);transition:all 0.3s}
        .guess-dot.used{background:var(--danger);transform:scale(0.7);opacity:0.4}
        .guess-dot.used.just{animation:dotShake 0.4s ease}
        @keyframes dotShake{0%,100%{transform:scale(0.7) translateX(0)}25%{transform:scale(0.9) translateX(-3px)}75%{transform:scale(0.9) translateX(3px)}}

        /* ── CANVAS ── */
        .canvas-wrap{position:relative;width:calc(100vw - 12px);max-width:408px;aspect-ratio:1;background:#111;border-radius:14px;border:2px solid var(--border);margin:0 auto;flex-shrink:0;overflow:hidden}
        canvas{width:100%;height:100%;border-radius:12px;touch-action:none;display:block}
        .canvas-wrap.drawing{border-color:rgba(255,92,122,0.4);box-shadow:0 0 12px rgba(255,92,122,0.1)}
        .canvas-wrap.guessing{border-color:rgba(77,184,255,0.4);box-shadow:0 0 12px rgba(77,184,255,0.1)}
        /* Drawing cursor dot for guesser */
        .draw-cursor{position:absolute;width:12px;height:12px;border-radius:50%;border:2px solid rgba(255,255,255,0.8);pointer-events:none;z-index:5;display:none;transition:left 0.08s linear,top 0.08s linear;box-shadow:0 0 8px rgba(255,255,255,0.3)}

        /* ── REVEAL OVERLAY ── */
        .reveal-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.75);border-radius:12px;z-index:10;animation:revealIn 0.5s ease}
        @keyframes revealIn{from{opacity:0}to{opacity:1}}
        .reveal-emoji{font-size:4rem;animation:revealBounce 0.6s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes revealBounce{from{transform:scale(0) rotate(-20deg)}to{transform:scale(1) rotate(0)}}
        .reveal-text{font-size:0.9rem;color:var(--dim);font-weight:700;margin-top:6px}
        .reveal-label{font-size:1.2rem;font-weight:900;color:var(--gold);margin-top:2px}

        /* ── INK BAR ── */
        .ink-bar{width:calc(100vw - 24px);max-width:396px;height:5px;background:var(--border);border-radius:10px;margin:0 auto;overflow:hidden;flex-shrink:0}
        .ink-fill{height:100%;background:linear-gradient(90deg,var(--rif),var(--green));transition:width 0.1s;border-radius:10px}
        .ink-bar.low .ink-fill{background:linear-gradient(90deg,var(--danger),#f97316)}

        /* ── ARTIST CONTROLS ── */
        .controls-artist{display:flex;flex-direction:column;gap:4px;padding:0 4px;flex-shrink:0}
        .color-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:3px}
        .cdot{aspect-ratio:1;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all 0.15s}
        .cdot.active{border-color:white;transform:scale(1.25);box-shadow:0 0 8px currentColor}
        .sizes-row{display:flex;gap:8px;align-items:center;justify-content:center}
        .sdot{border-radius:50%;background:#475569;border:2px solid transparent;cursor:pointer;flex-shrink:0;transition:all 0.15s}
        .sdot.active{background:var(--green);border-color:white}
        .tool-row{display:flex;gap:6px}
        .btn-tool{flex:1;padding:7px;border-radius:10px;border:none;font-size:0.75rem;font-weight:700;cursor:pointer;transition:all 0.15s}
        .btn-tool:active{transform:scale(0.95)}
        .btn-clear{background:#7f1d1d;color:#fca5a5}
        .btn-undo{background:#1e3a5f;color:#93c5fd}

        /* ── GUESSER CONTROLS ── */
        .controls-guesser{display:flex;flex-direction:column;gap:4px;padding:0 4px;flex-shrink:0}
        .guess-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:4px}
        .gemoji{aspect-ratio:1;background:var(--border);border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.25rem;cursor:pointer;border:2px solid transparent;transition:all 0.15s}
        .gemoji:active{transform:scale(0.9);background:#1e40af}
        .gemoji.correct{background:#14532d;border-color:var(--green);animation:correctPop 0.5s ease}
        @keyframes correctPop{0%{transform:scale(1)}50%{transform:scale(1.3)}100%{transform:scale(1)}}
        .gemoji.wrong{background:#3f1f1f;opacity:0.35;pointer-events:none}

        /* ══ MODALS ══ */
        .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.65);display:none;justify-content:center;align-items:center;z-index:1000;padding:20px;backdrop-filter:blur(4px)}
        .modal-overlay.show{display:flex}
        .modal-box{background:linear-gradient(135deg,rgba(15,23,42,0.97),rgba(2,6,23,0.97));border:2.5px solid var(--gold);border-radius:24px;padding:28px 22px;text-align:center;max-width:320px;width:100%;animation:modalPop 0.5s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes modalPop{from{transform:scale(0.7);opacity:0}to{transform:scale(1);opacity:1}}
        .modal-icon{font-size:3.5rem;margin-bottom:6px}
        .modal-title{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--gold);margin-bottom:6px}
        .modal-sub{font-size:0.85rem;opacity:0.75;margin-bottom:8px;line-height:1.5}
        .modal-countdown{font-size:2rem;font-weight:900;font-family:'Fredoka One',cursive;color:var(--gold);margin:8px 0}
        .modal-waiting{font-size:0.75rem;color:var(--dim);margin-bottom:10px}
        .modal-btns{display:flex;flex-direction:column;gap:8px}
        .btn-m{padding:11px;border-radius:14px;border:none;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.15s;width:100%}
        .btn-m:active{transform:scale(0.97)}
        .btn-m:disabled{opacity:0.5}
        .btn-m.green{background:linear-gradient(90deg,var(--green),#16a34a);color:#052e16}
        .btn-m.home{background:rgba(255,255,255,0.07);border:1px solid var(--border);color:#94a3b8}

        .score-comparison{display:flex;justify-content:center;align-items:center;gap:14px;margin:10px 0}
        .sc-player{text-align:center}
        .sc-emoji{font-size:1.8rem}
        .sc-name{font-size:0.6rem;color:var(--dim);font-weight:700;max-width:80px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .sc-pts{font-size:1.3rem;font-weight:900;font-family:'Fredoka One',cursive}
        .sc-vs{font-size:0.8rem;color:var(--dim);font-weight:900}
        .winner-crown{font-size:2.5rem;animation:crownBounce 1s ease-in-out infinite}
        @keyframes crownBounce{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-6px) rotate(-5deg)}75%{transform:translateY(-6px) rotate(5deg)}}
        .winner-name{font-size:1.1rem;font-weight:900;margin-top:4px}
        .new-hs-badge{background:var(--gold);color:#1a0a00;padding:5px 14px;border-radius:14px;font-weight:900;font-size:0.75rem;display:inline-block;margin:8px 0;animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

        /* ── POINTS FLOAT ── */
        .pts-float{position:fixed;z-index:2000;font-weight:900;font-family:'Fredoka One',cursive;pointer-events:none;animation:ptsUp 1.2s ease forwards;text-shadow:0 2px 8px rgba(0,0,0,0.5)}
        @keyframes ptsUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.3)}}

        /* COUNTDOWN */
        .countdown-modal{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:flex;justify-content:center;align-items:center;z-index:1001;backdrop-filter:blur(3px)}
        .countdown-modal.hidden{display:none}
        .countdown-text{font-size:5rem;font-weight:900;color:var(--gold);font-family:'Fredoka One',cursive;text-shadow:0 0 40px rgba(245,200,66,0.8);animation:countPulse 0.8s ease}
        .countdown-text.go{color:var(--green);text-shadow:0 0 40px rgba(61,214,140,0.8)}
        @keyframes countPulse{0%{transform:scale(0.3);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

        .hidden{display:none !important}
    </style>
</head>
<body>

<div class="countdown-modal hidden" id="countdownModal">
    <div id="countdownText" class="countdown-text">🎨</div>
</div>

<div class="modal-overlay" id="modalOverlay">
    <div class="modal-box" id="modalBox">
        <div class="modal-icon" id="modalIcon">🎨</div>
        <div class="modal-title" id="modalTitle"></div>
        <div class="modal-sub" id="modalSub"></div>
        <div id="modalScoreArea"></div>
        <div class="modal-countdown hidden" id="modalCountdown"></div>
        <div class="modal-waiting hidden" id="modalWaiting"></div>
        <div class="modal-btns" id="modalBtns"></div>
    </div>
</div>

<div id="screen-game" class="screen active">
    <div class="top-bar">
        <div class="home-btn" id="homeBtn">🏠</div>
        <div class="stat-box">
            <div class="stat-label" id="p1label">שחקן 1</div>
            <div class="p-score" id="score-p1" style="color:var(--emma)">100</div>
        </div>
        <div class="timer-box" style="position:relative">
            <div class="multiplier-badge" id="multBadge"></div>
            <div class="timer-num" id="timerNum">30</div>
            <div class="round-label" id="roundLabel">סיבוב 1/3 · תור 1</div>
        </div>
        <div class="stat-box">
            <div class="stat-label" id="p2label">שחקן 2</div>
            <div class="p-score" id="score-p2" style="color:var(--rif)">100</div>
        </div>
        <div class="stat-box">
            <div class="stat-label">🏆 שיא</div>
            <div class="hs-val" id="hsDisp">0</div>
        </div>
    </div>

    <div class="role-bar">
        <span class="role-chip artist" id="chipArtist">🎨 מצייר</span>
        <span class="role-sep">·</span>
        <span class="role-chip guesser" id="chipGuesser">🔍 מנחש</span>
    </div>

    <div class="target-box" id="targetBox">
        <div class="target-label" id="targetLabel">צייר את:</div>
        <div class="target-emoji" id="targetEmoji">🎯</div>
        <div class="target-hint hidden" id="targetHint">🔍 מה מצוייר?</div>
    </div>

    <div class="canvas-wrap" id="canvasWrap">
        <canvas id="canvas" width="400" height="400"></canvas>
        <div class="draw-cursor" id="drawCursor"></div>
    </div>

    <div class="guesses-bar hidden" id="guessesBar">
        <div class="guesses-label">ניחושים:</div>
        <div class="guess-dots" id="guessDots">
            <div class="guess-dot"></div><div class="guess-dot"></div><div class="guess-dot"></div><div class="guess-dot"></div><div class="guess-dot"></div>
        </div>
    </div>

    <div class="ink-bar hidden" id="inkBar">
        <div class="ink-fill" id="inkLevel" style="width:100%"></div>
    </div>

    <div class="controls-artist hidden" id="artistControls">
        <div class="color-grid" id="colorGrid"></div>
        <div class="sizes-row" id="sizesRow"></div>
        <div class="tool-row">
            <button class="btn-tool btn-undo" onclick="undoStroke()">↩️ בטל</button>
            <button class="btn-tool btn-clear" onclick="clearCanvas()">🗑 נקה</button>
        </div>
    </div>

    <div class="controls-guesser hidden" id="guesserControls">
        <div class="guess-grid" id="guessGrid"></div>
    </div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue,update,get,remove}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const fbApp=initializeApp({apiKey:"AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",authDomain:"kidssapp-izhaki.firebaseapp.com",databaseURL:"https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",projectId:"kidssapp-izhaki",storageBucket:"kidssapp-izhaki.firebasestorage.app",messagingSenderId:"663906163746",appId:"1:663906163746:web:a4f66772a2ae0dedc47e7b"});
const db=getDatabase(fbApp);

// ══════ USER ══════
const params=new URLSearchParams(location.search);
const displayName=params.get('player')||'משתמש';
const userData=JSON.parse(sessionStorage.getItem('myUser')||'null');
if(!userData){window.location.href='index.html';throw new Error('No user data')}
const myName=userData.id,myColor=userData.color,myEmoji=userData.emoji;

// ══════ CONSTANTS ══════
const EMOJIS=['🐼','🍕','🚀','🎸','🦁','🍦','⚽','🌵','🚗','🌈','🍩','🥑','👾','🏀','🔥','💎','🦖','🍣','🚲','🏰','🎭','🍟','🧠','🍓','🍄','🏠','👑','🍎','🎈','🚢','✈️','⏰','💡','🔑','🎁','🦢','🦋','🌻','🍉','🍔','🛹','⚓','🏹','🚜','🌋','🥨','🦒','🎨','🎤','🎯','🐉','🐸','🎀','🧲','🔔','🪁','🎪','🦜','🐙','🧁'];
const COLORS=['#ffffff','#ef4444','#f97316','#facc15','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#78716c','#000000','#94a3b8','#f43f5e','#a3e635'];
const SIZES=[3,10,22];
const TURN_TIME=30,MAX_WRONG=5,TOTAL_ROUNDS=3,GUESS_POOL=18,CANVAS_SYNC_MS=120,START_SCORE=100;

// ══════ SCORING ══════
function calcGuesserPoints(timeLeft){
    if(timeLeft>=20) return timeLeft*3;
    if(timeLeft>=10) return timeLeft*2;
    return timeLeft;
}
function calcArtistPoints(timeLeft){ return Math.ceil(calcGuesserPoints(timeLeft)/2); }
function getMultiplier(timeLeft){
    if(timeLeft>=20) return 3;
    if(timeLeft>=10) return 2;
    return 1;
}

// ══════ STATE ══════
let canvas,ctx;
let currentRound=1,currentTurn=1,timeLeft=TURN_TIME,wrongGuesses=0;
let timerInterval=null,ink=100,gameRunning=false,gameFinished=false;
let currentColor='#ffffff',currentSize=10,highScore=0,secretEmoji='';
let myRole='',turnHandled=false;
let p1Name='',p1Emoji='',p1Color='',p1Id='';
let p2Name='',p2Emoji='',p2Color='',p2Id='';
let p1Score=START_SCORE,p2Score=START_SCORE;
let amP1=false;
let multiGameId=null,roomListenerUnsub=null,heartbeatInterval=null;
let opponentCheckInterval=null,canvasSyncInterval=null,gameStateListenerUnsub=null,readyListenerUnsub=null;
let myJoinedAt=Date.now(),lastSyncKey='';
let strokeHistory=[],isDrawing=false;
let lastCursorData=null; // for live drawing cursor

// ══════ FIREBASE ══════
const roomPath=`rooms_v3/draw/${myName}`,roomRef=ref(db,'rooms_v3/draw');

function startHeartbeat(){heartbeatInterval=setInterval(()=>{set(ref(db,roomPath),{name:displayName,color:myColor,emoji:myEmoji,joinedAt:myJoinedAt,timestamp:Date.now(),active:true})},1000)}
function stopHeartbeat(){if(heartbeatInterval){clearInterval(heartbeatInterval);heartbeatInterval=null}}
function startOpponentCheck(){
    if(opponentCheckInterval)return;
    opponentCheckInterval=setInterval(async()=>{
        try{
            const snap=await get(roomRef);const players=snap.val()||{};const names=Object.keys(players);
            if(names.length===1&&names[0]===myName){handleOpponentLeft();return}
            if(names.length===2){const opp=names.find(x=>x!==myName);if(opp&&players[opp]&&Date.now()-(players[opp].timestamp||0)>5000){await remove(ref(db,`rooms_v3/draw/${opp}`));handleOpponentLeft()}}
        }catch(e){}
    },3000);
}
function stopOpponentCheck(){if(opponentCheckInterval){clearInterval(opponentCheckInterval);opponentCheckInterval=null}}

function handleOpponentLeft(){
    const oN=amP1?p2Name:p1Name,oE=amP1?p2Emoji:p1Emoji;
    stopHeartbeat();stopOpponentCheck();stopGame();cleanupListeners();
    remove(ref(db,`rooms_v3/draw/${myName}`));

}

// ══════ CANVAS ══════
function initCanvas(){
    canvas=document.getElementById('canvas');ctx=canvas.getContext('2d');ctx.lineCap='round';ctx.lineJoin='round';clearCanvasInternal();
    const getP=e=>{const r=canvas.getBoundingClientRect();const ev=e.touches?e.touches[0]:e;return{x:(ev.clientX-r.left)*(canvas.width/r.width),y:(ev.clientY-r.top)*(canvas.height/r.height)}};
    let currentStroke=[];
    const start=e=>{if(myRole!=='artist'||ink<=0||!gameRunning)return;isDrawing=true;const p=getP(e);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.strokeStyle=currentColor;ctx.lineWidth=currentSize;currentStroke=[{x:p.x,y:p.y,color:currentColor,size:currentSize}];e.preventDefault?.()};
    const move=e=>{if(!isDrawing||ink<=0)return;const p=getP(e);ctx.lineTo(p.x,p.y);ctx.stroke();currentStroke.push({x:p.x,y:p.y});ink=Math.max(0,ink-currentSize/500);updateInkBar();e.preventDefault?.()};
    const end=()=>{if(isDrawing){isDrawing=false;if(currentStroke.length>0){strokeHistory.push(currentStroke);currentStroke=[]}}};
    canvas.addEventListener('mousedown',start);canvas.addEventListener('mousemove',move);canvas.addEventListener('mouseup',end);canvas.addEventListener('mouseleave',end);
    canvas.addEventListener('touchstart',start,{passive:false});canvas.addEventListener('touchmove',move,{passive:false});canvas.addEventListener('touchend',end);
}
function clearCanvasInternal(){if(!ctx)return;ctx.fillStyle='#111';ctx.fillRect(0,0,canvas.width,canvas.height)}
window.clearCanvas=function(){clearCanvasInternal();strokeHistory=[];ink=100;updateInkBar()};
window.undoStroke=function(){if(strokeHistory.length===0||myRole!=='artist')return;strokeHistory.pop();clearCanvasInternal();for(const s of strokeHistory){if(s.length<2)continue;ctx.beginPath();ctx.strokeStyle=s[0].color;ctx.lineWidth=s[0].size;ctx.moveTo(s[0].x,s[0].y);for(let i=1;i<s.length;i++)ctx.lineTo(s[i].x,s[i].y);ctx.stroke()}ink=Math.min(100,ink+15);updateInkBar()};
function updateInkBar(){document.getElementById('inkLevel').style.width=ink+'%';document.getElementById('inkBar').classList.toggle('low',ink<20)}
function getCanvasData(){return canvas.toDataURL('image/webp',0.3)}
function loadCanvasData(url){if(!url)return;const img=new Image();img.src=url;img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height)}}

function updateDrawCursor(cx,cy){

// ══════ TIMER ══════
function startTimer(){
    stopTimer();timeLeft=TURN_TIME;turnHandled=false;
    document.getElementById('timerNum').textContent=timeLeft;
    document.getElementById('timerNum').classList.remove('urgent');
    updateMultBadge();
    timerInterval=setInterval(()=>{
        timeLeft--;document.getElementById('timerNum').textContent=timeLeft;
        updateMultBadge();
        if(timeLeft<=10)document.getElementById('timerNum').classList.add('urgent');
        if(timeLeft<=0){stopTimer();endTurn(false)}
    },1000);
}
function stopTimer(){if(timerInterval){clearInterval(timerInterval);timerInterval=null}}
function stopGame(){gameRunning=false;stopTimer();stopCanvasSync()}

// ══════ GUESS GRID ══════
function buildGuessGrid(){
    const grid=document.getElementById('guessGrid');grid.innerHTML='';
    const others=EMOJIS.filter(e=>e!==secretEmoji).sort(()=>Math.random()-0.5).slice(0,GUESS_POOL-1);
    [secretEmoji,...others].sort(()=>Math.random()-0.5).forEach(emoji=>{
        const d=document.createElement('div');d.className='gemoji';d.textContent=emoji;
        d.onclick=()=>handleGuess(d,emoji);grid.appendChild(d);
    });
}

function handleGuess(el,emoji){
    if(el.classList.contains('wrong')||el.classList.contains('correct')||!gameRunning||turnHandled)return;
    if(emoji===secretEmoji){
        // ═ CORRECT ═
        el.classList.add('correct');turnHandled=true;
        const gPts=calcGuesserPoints(timeLeft);
        const aPts=calcArtistPoints(timeLeft);
        const drawerId=getDrawerId();
        const guesserId=drawerId===p1Id?p2Id:p1Id;
        // Add to correct players
        if(guesserId===p1Id){p1Score+=gPts;p2Score+=aPts}else{p2Score+=gPts;p1Score+=aPts}
        updateScoreDisplay(true,true);
        const m=getMultiplier(timeLeft);
        showPtsFloat(`+${gPts} ${m>=2?'×'+m:''}`,var_green);
        try{confetti({particleCount:80,spread:70})}catch(e){}
        if(multiGameId)update(ref(db,`game/draw/${multiGameId}`),{guessedCorrect:true,guesserPts:gPts,artistPts:aPts,guessedBy:myName,guessTurn:`${currentRound}_${currentTurn}`,p1Score,p2Score,ts:Date.now()});
        stopTimer();stopCanvasSync();
        showReveal(secretEmoji,true);
        setTimeout(()=>endTurn(true),1500);
    }else{
        // ═ WRONG ═
        el.classList.add('wrong');wrongGuesses++;updateGuessDots();
        const dots=document.querySelectorAll('#guessDots .guess-dot');
        if(dots[wrongGuesses-1]){dots[wrongGuesses-1].classList.add('just');setTimeout(()=>dots[wrongGuesses-1].classList.remove('just'),400)}
        if(navigator.vibrate)navigator.vibrate(100);
        // Deduct from guesser
        const guesserId=getDrawerId()===p1Id?p2Id:p1Id;
        if(guesserId===p1Id)p1Score=Math.max(0,p1Score-10);else p2Score=Math.max(0,p2Score-10);
        updateScoreDisplay(guesserId===p1Id,guesserId===p2Id);
        showPtsFloat('-10','#ef4444');
        if(multiGameId)update(ref(db,`game/draw/${multiGameId}`),{p1Score,p2Score,wrongGuesses,ts:Date.now()});
        if(wrongGuesses>=MAX_WRONG){
            turnHandled=true;stopTimer();stopCanvasSync();
            showReveal(secretEmoji,false);
            if(multiGameId)update(ref(db,`game/draw/${multiGameId}`),{guessedCorrect:false,guessedBy:myName,guessTurn:`${currentRound}_${currentTurn}`,p1Score,p2Score,ts:Date.now()});
            setTimeout(()=>endTurn(false),1500);
        }
    }
}
// Color variable helper
const var_green='#3DD68C';

// ══════ CANVAS SYNC ══════
function startCanvasSync(){
    stopCanvasSync();if(!multiGameId||myRole!=='artist')return;
    canvasSyncInterval=setInterval(()=>{
        if(!gameRunning)return;
        const data={canvasData:getCanvasData()};
        // Send last drawn position for cursor
        if(strokeHistory.length>0){const last=strokeHistory[strokeHistory.length-1];if(last.length>0){const lp=last[last.length-1];data.cursorX=Math.round(lp.x);data.cursorY=Math.round(lp.y)}}
        update(ref(db,`game/draw/${multiGameId}`),data);
    },CANVAS_SYNC_MS);
}
function stopCanvasSync(){if(canvasSyncInterval){clearInterval(canvasSyncInterval);canvasSyncInterval=null}}

// ══════ FIREBASE GAME LISTENER ══════
function setupGameListener(){
    if(!multiGameId)return;
    if(gameStateListenerUnsub)gameStateListenerUnsub();
    gameStateListenerUnsub=onValue(ref(db,`game/draw/${multiGameId}`),snap=>{
        const s=snap.val();if(!s)return;
        if(myRole==='guesser'){
            if(s.canvasData)loadCanvasData(s.canvasData);
            // Live cursor
            if(s.cursorX!==undefined)updateDrawCursor(s.cursorX,s.cursorY);
            // New turn from artist
            if(s.turnKey&&s.turnKey!==lastSyncKey){
                lastSyncKey=s.turnKey;
                currentRound=s.round||currentRound;currentTurn=s.turn||currentTurn;
                secretEmoji=s.secretEmoji||secretEmoji;
                wrongGuesses=0;turnHandled=false;
                updateGuessDots();updateRoleUI();clearCanvasInternal();clearReveal();
                buildGuessGrid();startTimer();
            }
        }
        if(myRole==='artist'){
            const key=`${currentRound}_${currentTurn}`;
            if(s.guessedBy&&s.guessedBy!==myName&&s.guessTurn===key&&!turnHandled){
                turnHandled=true;
                if(s.p1Score!==undefined)p1Score=s.p1Score;
                if(s.p2Score!==undefined)p2Score=s.p2Score;
                updateScoreDisplay(true,true);
                if(s.guessedCorrect){
                    showArtistFeedback(true,secretEmoji);
                    try{confetti({particleCount:60,spread:50})}catch(e){}
                    showPtsFloat(`+${s.artistPts||0}`,var_green);
                }else{
                    showArtistFeedback(false,secretEmoji);
                }
                stopTimer();stopCanvasSync();
                setTimeout(()=>endTurn(s.guessedCorrect),1500);
            }
            // Sync wrong guesses count for display
            if(s.wrongGuesses!==undefined&&s.wrongGuesses!==wrongGuesses){wrongGuesses=s.wrongGuesses}
        }
    });
}

// ══════ END TURN ══════
function endTurn(guessedCorrect){
    if(!turnHandled&&!gameRunning)return;
    gameRunning=false;stopTimer();stopCanvasSync();updateDrawCursor();
    const isRoundEnd=currentTurn===2;
    const sub=guessedCorrect?'✅ ניחוש נכון!':'❌ לא הצליח לנחש';
    if(!isRoundEnd){
        currentTurn=2;computeMyRole();
        showModal('🔄','מחליפים תפקידים!',sub,scoreComparisonHtml(),3);
        setTimeout(()=>{hideModal();clearReveal();clearArtistFeedback();startTurn()},3000);
    }else{
        if(currentRound<TOTAL_ROUNDS){
            currentRound++;currentTurn=1;computeMyRole();
            showModal('🎨',`סיבוב ${currentRound-1} הסתיים!`,sub,scoreComparisonHtml(),3);
            setTimeout(()=>{hideModal();clearReveal();clearArtistFeedback();startTurn()},3000);
        }else{
            clearReveal();clearArtistFeedback();
            showSeriesEnd();
        }
    }
}

// ══════ SERIES END ══════
async function showSeriesEnd(){
    gameFinished=true;
    const winner=p1Score>p2Score?'p1':p2Score>p1Score?'p2':'tie';
    const wN=winner==='p1'?p1Name:winner==='p2'?p2Name:'';
    const wE=winner==='p1'?p1Emoji:winner==='p2'?p2Emoji:'';
    const wC=winner==='p1'?p1Color:winner==='p2'?p2Color:'var(--gold)';
    const maxS=Math.max(p1Score,p2Score);
    const isNew=await saveHighScore(maxS);
    let titleText=winner==='tie'?'🤝 תיקו!':`${wE} ${wN} ניצח/ה!`;
    let iconText=winner==='tie'?'🤝':'🏆';
    const winHtml=winner!=='tie'?`<div style="margin:8px 0"><div class="winner-crown">👑</div><div class="winner-name" style="color:${wC}">${wE} ${wN}</div></div>`:'';
    const hsHtml=`<div style="font-size:0.8rem;color:var(--gold);font-weight:700;margin:6px 0">שיא: ${highScore}</div>`+(isNew?'<div class="new-hs-badge">🏆 שיא חדש!</div>':'');
    if(isNew){try{confetti({particleCount:150,spread:100})}catch(e){}}
    else if(winner!=='tie'){try{confetti({particleCount:80,spread:70})}catch(e){}}
    showModal(iconText,titleText,'',winHtml+scoreComparisonHtml()+hsHtml,null,[
        {text:'🎮 משחק חדש',cls:'green',id:'btnNewGame',fn:()=>requestNewGame()},
        {text:'🏠 דף הבית',cls:'home',fn:()=>goHome()}
    ]);
    if(multiGameId)await set(ref(db,`game/draw/${multiGameId}/status_${myName}`),'done');
}

// ══════ NEW GAME ══════
function requestNewGame(){
    if(!multiGameId){resetAll();return}
    set(ref(db,`game/draw/${multiGameId}/ready_${myName}`),true);
    const btn=document.getElementById('btnNewGame');if(btn){btn.textContent='⏳ ממתין...';btn.disabled=true}
    const oN=amP1?p2Name:p1Name,oE=amP1?p2Emoji:p1Emoji;
    document.getElementById('modalWaiting').classList.remove('hidden');
    document.getElementById('modalWaiting').textContent=`⏳ ממתין ל-${oE} ${oN}...`;
    const oppId=amP1?p2Id:p1Id;
    listenForReady(oppId);
}
function listenForReady(oppId){
    if(readyListenerUnsub)readyListenerUnsub();
    readyListenerUnsub=onValue(ref(db,`game/draw/${multiGameId}/ready_${oppId}`),snap=>{
        if(!snap.val())return;
        get(ref(db,`game/draw/${multiGameId}/ready_${myName}`)).then(mySnap=>{
            if(!mySnap.val())return;
            if(readyListenerUnsub){readyListenerUnsub();readyListenerUnsub=null}
            remove(ref(db,`game/draw/${multiGameId}/ready_${myName}`));
            remove(ref(db,`game/draw/${multiGameId}/ready_${oppId}`));
            remove(ref(db,`game/draw/${multiGameId}/status_${myName}`));
            remove(ref(db,`game/draw/${multiGameId}/status_${oppId}`));
            resetAll();
        });
    });
}

function resetAll(){
    hideModal();
    p1Score=START_SCORE;p2Score=START_SCORE;currentRound=1;currentTurn=1;
    wrongGuesses=0;gameFinished=false;turnHandled=false;
    strokeHistory=[];ink=100;lastSyncKey='';
    window._mpStarted=false;
    updateScoreDisplay();updateGuessDots();updateInkBar();clearCanvasInternal();clearReveal();clearArtistFeedback();
    computeMyRole();startCountdown(()=>startTurn());
}

// ══════ HIGH SCORE ══════
async function loadHighScore(){try{const s=await get(ref(db,'highscores/draw'));highScore=s.val()||0;document.getElementById('hsDisp').textContent=highScore}catch(e){}}
async function saveHighScore(s){if(s>highScore){highScore=s;try{await set(ref(db,'highscores/draw'),highScore)}catch(e){}return true}return false}

// ══════ START TURN ══════
function startTurn(){
    gameRunning=true;turnHandled=false;wrongGuesses=0;ink=100;strokeHistory=[];
    clearCanvasInternal();clearReveal();clearArtistFeedback();
    updateGuessDots();updateInkBar();computeMyRole();updateRoleUI();updateScoreDisplay();
    setupGameListener();
    secretEmoji=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    document.getElementById('targetEmoji').textContent=secretEmoji;
    if(myRole==='artist'){
        const turnKey=`${currentRound}_${currentTurn}_${Date.now()}`;lastSyncKey=turnKey;
        if(multiGameId)set(ref(db,`game/draw/${multiGameId}`),{round:currentRound,turn:currentTurn,secretEmoji,canvasData:'',guessedCorrect:false,guessedBy:'',guessTurn:'',guesserPts:0,artistPts:0,wrongGuesses:0,p1Score,p2Score,turnKey,ts:Date.now()});
        startCanvasSync();startTimer();
    }else{
        buildGuessGrid();startTimer();
    }
}

// ══════ COUNTDOWN ══════
function startCountdown(cb){
    const modal=document.getElementById('countdownModal'),text=document.getElementById('countdownText');
    modal.classList.remove('hidden');text.textContent='🎨';text.className='countdown-text';
    let count=3;
    const iv=setInterval(()=>{
        if(count>0){text.textContent=count;text.className='countdown-text';text.style.animation='none';text.offsetHeight;text.style.animation='';count--}
        else if(count===0){text.textContent='🖌️ ציירו!';text.className='countdown-text go';count--}
        else{clearInterval(iv);modal.classList.add('hidden');cb()}
    },800);
}

// ══════ COLOR/SIZE ══════
function buildColorGrid(){const g=document.getElementById('colorGrid');g.innerHTML='';COLORS.forEach(c=>{const d=document.createElement('div');d.className='cdot'+(c===currentColor?' active':'');d.style.background=c;d.onclick=()=>{currentColor=c;g.querySelectorAll('.cdot').forEach(x=>x.classList.remove('active'));d.classList.add('active');if(ctx)ctx.strokeStyle=c};g.appendChild(d)})}
function buildSizeRow(){const r=document.getElementById('sizesRow');r.innerHTML='';SIZES.forEach(s=>{const d=document.createElement('div');d.className='sdot'+(s===currentSize?' active':'');d.style.width=d.style.height=(s*1.5)+'px';d.onclick=()=>{currentSize=s;r.querySelectorAll('.sdot').forEach(x=>x.classList.remove('active'));d.classList.add('active')};r.appendChild(d)})}

// ══════ INIT ══════
async function init(){
    const existingSnap=await get(ref(db,roomPath));const existingData=existingSnap?.val();
    myJoinedAt=existingData?.joinedAt||Date.now();
    await set(ref(db,roomPath),{name:displayName,color:myColor,emoji:myEmoji,joinedAt:myJoinedAt,timestamp:Date.now(),active:true});
    startHeartbeat();
    let lastCount=0;window._ls={};
    roomListenerUnsub=onValue(roomRef,async snap=>{
        const players=snap.val()||{};const names=Object.keys(players).sort((a,b)=>(players[a].joinedAt||0)-(players[b].joinedAt||0));
        if(lastCount===2&&names.length<2&&!gameFinished){let n='',e='';for(const[id,p]of Object.entries(window._ls)){if(!players[id]){n=p.name||'';e=p.emoji||'';break}}handleOpponentLeft();return}
        window._ls=players;lastCount=names.length;
        if(names.length===2&&!gameRunning&&!gameFinished){
            if(window._mpStarted)return;window._mpStarted=true;
            amP1=names[0]===myName;multiGameId=`${names[0]}_${names[1]}`;
            p1Id=names[0];p2Id=names[1];
            p1Name=players[p1Id].name;p1Emoji=players[p1Id].emoji;p1Color=players[p1Id].color;
            p2Name=players[p2Id].name;p2Emoji=players[p2Id].emoji;p2Color=players[p2Id].color;
            if(amP1){await remove(ref(db,`game/draw/${multiGameId}`));await remove(ref(db,`game/draw/${names[1]}_${names[0]}`))}
            else await new Promise(r=>setTimeout(r,300));
            loadHighScore();initCanvas();buildColorGrid();buildSizeRow();updateScoreDisplay();
            startOpponentCheck();startCountdown(()=>startTurn());
        }
    });
}
init();
</script>
