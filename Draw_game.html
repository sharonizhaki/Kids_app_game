<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🎨 צייר ונחש</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
    <style>
        :root{--bg:#020617;--surface:#0f172a;--surface2:#131c2e;--border:#1e293b;--border2:#293548;--emma:#FF5C7A;--rif:#4DB8FF;--gold:#F5C842;--green:#3DD68C;--text:#f8fafc;--dim:#64748b;--danger:#ef4444}
        *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
        body{background:var(--bg);color:var(--text);font-family:'Heebo',sans-serif;height:100dvh;overflow:hidden;display:flex;flex-direction:column;user-select:none;-webkit-user-select:none}

        .screen{display:none;flex-direction:column;width:100%;height:100dvh}
        .screen.active{display:flex}
        #screen-game{padding:6px 8px;gap:5px;max-width:420px;margin:0 auto;width:100%}

        /* ══ TOP BAR ══ */
        .top-bar{display:flex;justify-content:space-between;align-items:center;padding:8px 10px;background:linear-gradient(135deg,var(--surface),var(--surface2));border-radius:16px;border:1px solid var(--border);flex-shrink:0}
        .home-btn{font-size:18px;cursor:pointer;padding:5px 8px;border-radius:10px;background:rgba(255,255,255,0.04);border:1px solid var(--border);flex-shrink:0;transition:all 0.2s}
        .home-btn:active{transform:scale(0.9);background:rgba(255,255,255,0.1)}
        .player-score{display:flex;flex-direction:column;align-items:center;gap:2px;min-width:60px}
        .ps-emoji{font-size:1.4rem}
        .ps-name{font-size:0.5rem;color:var(--dim);font-weight:700;max-width:60px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
        .ps-pts{font-size:1.3rem;font-weight:900;font-family:'Fredoka One',cursive;transition:all 0.3s}
        .ps-pts.pop{animation:statPop 0.4s ease}
        @keyframes statPop{0%{transform:scale(1)}40%{transform:scale(1.5);filter:brightness(1.5)}100%{transform:scale(1)}}
        .timer-center{display:flex;flex-direction:column;align-items:center;position:relative}
        .timer-num{font-size:2rem;font-weight:900;font-family:'Fredoka One',cursive;color:var(--gold);transition:color 0.3s;line-height:1}
        .timer-num.urgent{color:var(--danger);animation:pulse 0.5s infinite}
        @keyframes pulse{0%,100%{opacity:1}50%{opacity:0.3}}
        .round-label{font-size:0.5rem;color:var(--dim);font-weight:700}
        .mult-badge{position:absolute;top:-4px;left:-8px;font-size:0.6rem;font-weight:900;padding:2px 6px;border-radius:8px;display:none;animation:multPop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
        .mult-badge.x3{display:block;background:linear-gradient(135deg,#fbbf24,#f59e0b);color:#78350f;box-shadow:0 0 14px rgba(251,191,36,0.6)}
        .mult-badge.x2{display:block;background:linear-gradient(135deg,#60a5fa,#2563eb);color:#fff;box-shadow:0 0 12px rgba(96,165,250,0.5)}
        .mult-badge.x1{display:block;background:var(--border);color:var(--dim)}
        @keyframes multPop{0%{transform:scale(0) rotate(-15deg)}to{transform:scale(1) rotate(0)}}

        /* ══ MY ROLE BAR ══ */
        .my-role-bar{display:flex;align-items:center;justify-content:center;gap:8px;padding:8px 14px;border-radius:14px;flex-shrink:0;transition:all 0.4s;position:relative;overflow:hidden}
        .my-role-bar.artist{background:linear-gradient(135deg,rgba(255,92,122,0.12),rgba(255,92,122,0.04));border:1.5px solid rgba(255,92,122,0.25)}
        .my-role-bar.guesser{background:linear-gradient(135deg,rgba(77,184,255,0.12),rgba(77,184,255,0.04));border:1.5px solid rgba(77,184,255,0.25)}
        .my-role-emoji{font-size:1.6rem}
        .my-role-text{font-size:0.9rem;font-weight:900}
        .my-role-bar.artist .my-role-text{color:var(--emma)}
        .my-role-bar.guesser .my-role-text{color:var(--rif)}
        /* shimmer */
        .my-role-bar::after{content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;background:linear-gradient(90deg,transparent,rgba(255,255,255,0.06),transparent);animation:shimmer 3s infinite}
        @keyframes shimmer{0%{left:-100%}100%{left:200%}}

        /* ══ TARGET + GUESS DOTS ══ */
        .target-row{display:flex;align-items:center;gap:8px;padding:6px 10px;background:var(--surface);border-radius:12px;border:1px solid var(--border);flex-shrink:0;min-height:42px;position:relative}
        .target-main{display:flex;align-items:center;gap:8px;flex:1;justify-content:center}
        .target-label{font-size:0.6rem;color:var(--dim);font-weight:700}
        .target-emoji{font-size:2rem;animation:emojiFloat 2s ease-in-out infinite}
        @keyframes emojiFloat{0%,100%{transform:translateY(0) scale(1)}50%{transform:translateY(-3px) scale(1.05)}}
        .target-hint{font-size:0.8rem;color:#cbd5e1;font-weight:700}
        .guess-lives{display:flex;gap:4px;align-items:center;flex-shrink:0}
        .gl-dot{width:10px;height:10px;border-radius:50%;background:var(--green);transition:all 0.3s;box-shadow:0 0 4px rgba(61,214,140,0.3)}
        .gl-dot.used{background:var(--danger);transform:scale(0.6);opacity:0.35;box-shadow:none}
        .gl-dot.used.just{animation:dotShake 0.4s ease}
        @keyframes dotShake{0%,100%{transform:scale(0.6) translateX(0)}25%{transform:scale(0.85) translateX(-3px)}75%{transform:scale(0.85) translateX(3px)}}
        /* artist feedback overlay */
        .artist-fb{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;gap:8px;border-radius:12px;z-index:5;animation:fbIn 0.35s ease}
        .artist-fb.ok{background:rgba(61,214,140,0.15);border:1.5px solid var(--green)}
        .artist-fb.fail{background:rgba(239,68,68,0.15);border:1.5px solid var(--danger)}
        @keyframes fbIn{from{opacity:0;transform:scale(0.95)}to{opacity:1;transform:scale(1)}}
        .af-icon{font-size:1.6rem}
        .af-msg{font-size:0.8rem;font-weight:900}

        /* ══ CANVAS ══ */
        .canvas-wrap{position:relative;width:min(calc(100vw - 16px),340px);aspect-ratio:1;background:#0a0a0f;border-radius:16px;border:2.5px solid var(--border);margin:0 auto;flex-shrink:0;overflow:hidden;transition:border-color 0.4s,box-shadow 0.4s}
        .canvas-wrap.artist-mode{border-color:rgba(255,92,122,0.35);box-shadow:0 0 20px rgba(255,92,122,0.08),inset 0 0 30px rgba(255,92,122,0.03)}
        .canvas-wrap.guesser-mode{border-color:rgba(77,184,255,0.35);box-shadow:0 0 20px rgba(77,184,255,0.08),inset 0 0 30px rgba(77,184,255,0.03)}
        canvas{width:100%;height:100%;border-radius:14px;touch-action:none;display:block}
        .draw-cursor{position:absolute;width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,0.7);pointer-events:none;z-index:5;display:none;transition:left 0.06s linear,top 0.06s linear;box-shadow:0 0 10px rgba(255,255,255,0.25)}
        .reveal-overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,0.8);border-radius:14px;z-index:10;backdrop-filter:blur(3px);animation:revealIn 0.5s ease}
        @keyframes revealIn{from{opacity:0}to{opacity:1}}
        .reveal-emoji{font-size:5rem;animation:revealPop 0.6s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes revealPop{from{transform:scale(0) rotate(-30deg)}to{transform:scale(1) rotate(0)}}
        .reveal-msg{font-size:1rem;font-weight:900;margin-top:8px}
        .reveal-msg.ok{color:var(--green)}
        .reveal-msg.fail{color:var(--danger)}

        /* ══ INK BAR ══ */
        .ink-bar{width:min(calc(100vw - 28px),330px);height:5px;background:var(--border);border-radius:10px;margin:0 auto;overflow:hidden;flex-shrink:0;transition:opacity 0.3s}
        .ink-fill{height:100%;background:linear-gradient(90deg,var(--rif),var(--green));transition:width 0.1s;border-radius:10px}
        .ink-bar.low .ink-fill{background:linear-gradient(90deg,var(--danger),#f97316)}

        /* ══ ARTIST TOOLS ══ */
        .tools-artist{display:flex;flex-direction:column;gap:6px;padding:0 4px;flex-shrink:0}
        .palette{display:flex;gap:4px;justify-content:center;flex-wrap:wrap;padding:6px 8px;background:var(--surface);border-radius:12px;border:1px solid var(--border)}
        .pal-dot{width:28px;height:28px;border-radius:50%;border:2.5px solid transparent;cursor:pointer;transition:all 0.2s;flex-shrink:0}
        .pal-dot:active{transform:scale(0.85)}
        .pal-dot.active{border-color:white;transform:scale(1.2);box-shadow:0 0 12px var(--glow,rgba(255,255,255,0.4))}
        .brush-row{display:flex;gap:10px;align-items:center;justify-content:center}
        .brush-dot{border-radius:50%;background:#475569;border:2.5px solid transparent;cursor:pointer;flex-shrink:0;transition:all 0.2s}
        .brush-dot:active{transform:scale(0.85)}
        .brush-dot.active{background:var(--green);border-color:white;box-shadow:0 0 8px rgba(61,214,140,0.4)}
        .btns-row{display:flex;gap:6px}
        .btn-t{flex:1;padding:9px;border-radius:12px;border:none;font-size:0.8rem;font-weight:800;cursor:pointer;transition:all 0.15s;letter-spacing:0.3px}
        .btn-t:active{transform:scale(0.95)}
        .btn-t.undo{background:rgba(96,165,250,0.12);color:#93c5fd;border:1px solid rgba(96,165,250,0.2)}
        .btn-t.clear{background:rgba(239,68,68,0.12);color:#fca5a5;border:1px solid rgba(239,68,68,0.2)}

        /* ══ GUESSER GRID ══ */
        .grid-guesser{display:grid;grid-template-columns:repeat(6,1fr);gap:5px;padding:0 2px;flex-shrink:0}
        .g-cell{aspect-ratio:1;background:linear-gradient(135deg,var(--surface),var(--surface2));border-radius:12px;display:flex;align-items:center;justify-content:center;font-size:1.6rem;cursor:pointer;border:2px solid var(--border);transition:all 0.15s;position:relative}
        .g-cell:active{transform:scale(0.88);background:rgba(77,184,255,0.15)}
        .g-cell.correct{background:rgba(61,214,140,0.2);border-color:var(--green);animation:cellCorrect 0.5s ease;pointer-events:none}
        @keyframes cellCorrect{0%{transform:scale(1)}50%{transform:scale(1.25) rotate(-5deg)}100%{transform:scale(1)}}
        .g-cell.wrong{background:rgba(239,68,68,0.1);border-color:rgba(239,68,68,0.2);opacity:0.3;pointer-events:none}

        /* ══ MODALS ══ */
        .modal-bg{position:fixed;inset:0;background:rgba(0,0,0,0.7);display:none;justify-content:center;align-items:center;z-index:1000;padding:20px;backdrop-filter:blur(5px)}
        .modal-bg.show{display:flex}
        .modal-card{background:linear-gradient(135deg,rgba(15,23,42,0.98),rgba(2,6,23,0.98));border:2px solid var(--gold);border-radius:24px;padding:28px 22px;text-align:center;max-width:320px;width:100%;animation:cardIn 0.5s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes cardIn{from{transform:scale(0.7) translateY(20px);opacity:0}to{transform:scale(1) translateY(0);opacity:1}}
        .m-icon{font-size:3.5rem;margin-bottom:6px}
        .m-title{font-family:'Fredoka One',cursive;font-size:1.4rem;color:var(--gold);margin-bottom:6px}
        .m-sub{font-size:0.85rem;opacity:0.7;margin-bottom:8px;line-height:1.5}
        .m-cd{font-size:2.2rem;font-weight:900;font-family:'Fredoka One',cursive;color:var(--gold);margin:8px 0;animation:cdPulse 0.8s ease infinite}
        @keyframes cdPulse{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
        .m-wait{font-size:0.7rem;color:var(--dim);margin-bottom:10px}
        .m-btns{display:flex;flex-direction:column;gap:8px}
        .btn-m{padding:12px;border-radius:14px;border:none;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.15s;width:100%}
        .btn-m:active{transform:scale(0.97)}
        .btn-m:disabled{opacity:0.5}
        .btn-m.green{background:linear-gradient(135deg,var(--green),#16a34a);color:#052e16}
        .btn-m.home{background:rgba(255,255,255,0.06);border:1px solid var(--border);color:#94a3b8}

        .sc-row{display:flex;justify-content:center;align-items:center;gap:16px;margin:12px 0}
        .sc-p{text-align:center}
        .sc-p .e{font-size:2rem}
        .sc-p .n{font-size:0.6rem;color:var(--dim);font-weight:700}
        .sc-p .v{font-size:1.5rem;font-weight:900;font-family:'Fredoka One',cursive}
        .sc-p .v.lead{text-shadow:0 0 12px currentColor}
        .sc-vs{color:var(--dim);font-weight:900;font-size:0.8rem}
        .crown{font-size:2.8rem;animation:crownFloat 1s ease-in-out infinite}
        @keyframes crownFloat{0%,100%{transform:translateY(0) rotate(0)}25%{transform:translateY(-5px) rotate(-4deg)}75%{transform:translateY(-5px) rotate(4deg)}}
        .w-name{font-size:1rem;font-weight:900;margin-top:2px}
        .hs-badge{background:var(--gold);color:#1a0a00;padding:4px 12px;border-radius:12px;font-weight:900;font-size:0.7rem;display:inline-block;margin:6px 0;animation:pop 0.4s cubic-bezier(0.34,1.56,0.64,1)}
        @keyframes pop{from{transform:scale(0)}to{transform:scale(1)}}

        /* ── FLOAT PTS ── */
        .pts-fly{position:fixed;z-index:2000;font-weight:900;font-family:'Fredoka One',cursive;pointer-events:none;text-shadow:0 2px 8px rgba(0,0,0,0.6);animation:flyUp 1.2s ease forwards}
        @keyframes flyUp{0%{opacity:1;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-60px) scale(1.2)}}

        /* ── COUNTDOWN ── */
        .cd-modal{position:fixed;inset:0;background:rgba(0,0,0,0.55);display:flex;justify-content:center;align-items:center;z-index:1001;backdrop-filter:blur(4px)}
        .cd-modal.hidden{display:none}
        .cd-text{font-size:5rem;font-weight:900;color:var(--gold);font-family:'Fredoka One',cursive;text-shadow:0 0 40px rgba(245,200,66,0.7);animation:cdIn 0.7s ease}
        .cd-text.go{color:var(--green);text-shadow:0 0 40px rgba(61,214,140,0.7)}
        @keyframes cdIn{0%{transform:scale(0.2) rotate(-10deg);opacity:0}60%{transform:scale(1.15)}100%{transform:scale(1);opacity:1}}

        .hidden{display:none !important}
    </style>
</head>
<body>

<div class="cd-modal hidden" id="cdModal"><div id="cdText" class="cd-text">🎨</div></div>

<div class="modal-bg" id="modalBg">
    <div class="modal-card">
        <div class="m-icon" id="mIcon">🎨</div>
        <div class="m-title" id="mTitle"></div>
        <div class="m-sub" id="mSub"></div>
        <div id="mScore"></div>
        <div class="m-cd hidden" id="mCd"></div>
        <div class="m-wait hidden" id="mWait"></div>
        <div class="m-btns" id="mBtns"></div>
    </div>
</div>

<div id="screen-game" class="screen active">
    <!-- TOP BAR -->
    <div class="top-bar">
        <div class="home-btn" id="homeBtn">🏠</div>
        <div class="player-score" id="ps1">
            <div class="ps-emoji" id="p1e"></div>
            <div class="ps-name" id="p1n"></div>
            <div class="ps-pts" id="p1v" style="color:var(--emma)">100</div>
        </div>
        <div class="timer-center">
            <div class="mult-badge" id="multB"></div>
            <div class="timer-num" id="timerNum">30</div>
            <div class="round-label" id="roundLbl">סיבוב 1/3 · תור 1</div>
        </div>
        <div class="player-score" id="ps2">
            <div class="ps-emoji" id="p2e"></div>
            <div class="ps-name" id="p2n"></div>
            <div class="ps-pts" id="p2v" style="color:var(--rif)">100</div>
        </div>
    </div>

    <!-- MY ROLE -->
    <div class="my-role-bar artist" id="roleBar">
        <div class="my-role-emoji" id="roleEmoji">👧</div>
        <div class="my-role-text" id="roleText">תורך לצייר!</div>
    </div>

    <!-- TARGET + GUESS DOTS -->
    <div class="target-row" id="targetRow">
        <div class="target-main">
            <div class="target-label" id="tLabel">צייר את:</div>
            <div class="target-emoji" id="tEmoji">🎯</div>
            <div class="target-hint hidden" id="tHint">🔍 מה מצוייר?</div>
        </div>
        <div class="guess-lives hidden" id="gLives">
            <div class="gl-dot"></div><div class="gl-dot"></div><div class="gl-dot"></div><div class="gl-dot"></div><div class="gl-dot"></div>
        </div>
    </div>

    <!-- CANVAS -->
    <div class="canvas-wrap" id="cWrap">
        <canvas id="canvas" width="400" height="400"></canvas>
        <div class="draw-cursor" id="dCursor"></div>
    </div>

    <!-- INK -->
    <div class="ink-bar hidden" id="inkBar"><div class="ink-fill" id="inkFill" style="width:100%"></div></div>

    <!-- ARTIST TOOLS -->
    <div class="tools-artist hidden" id="toolsArtist">
        <div class="palette" id="palette"></div>
        <div class="brush-row" id="brushRow"></div>
        <div class="btns-row">
            <button class="btn-t undo" onclick="undoStroke()">↩️ בטל</button>
            <button class="btn-t clear" onclick="clearCanvas()">🗑 נקה</button>
        </div>
    </div>

    <!-- GUESSER GRID -->
    <div class="grid-guesser hidden" id="guessGrid"></div>
</div>

<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,set,onValue,update,get,remove}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
const fbApp=initializeApp({apiKey:"AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",authDomain:"kidssapp-izhaki.firebaseapp.com",databaseURL:"https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",projectId:"kidssapp-izhaki",storageBucket:"kidssapp-izhaki.firebasestorage.app",messagingSenderId:"663906163746",appId:"1:663906163746:web:a4f66772a2ae0dedc47e7b"});
const db=getDatabase(fbApp);

const params=new URLSearchParams(location.search);
const displayName=params.get('player')||'משתמש';
const userData=JSON.parse(sessionStorage.getItem('myUser')||'null');
if(!userData){window.location.href='index.html';throw new Error('x')}
const myName=userData.id,myColor=userData.color,myEmoji=userData.emoji;

const EMOJIS=['🐼','🍕','🚀','🎸','🦁','🍦','⚽','🌵','🚗','🌈','🍩','🥑','👾','🏀','🔥','💎','🦖','🍣','🚲','🏰','🎭','🍟','🧠','🍓','🍄','🏠','👑','🍎','🎈','🚢','✈️','⏰','💡','🔑','🎁','🦢','🦋','🌻','🍉','🍔','🛹','⚓','🏹','🚜','🌋','🥨','🦒','🎨','🎤','🎯','🐉','🐸','🎀','🧲','🔔','🪁','🎪','🦜','🐙','🧁'];
const COLORS=['#ffffff','#ef4444','#f97316','#facc15','#22c55e','#3b82f6','#8b5cf6','#ec4899','#06b6d4','#78716c','#000000','#94a3b8','#f43f5e','#a3e635'];
const SIZES=[3,12,24];
const TURN_TIME=30,MAX_WRONG=5,TOTAL_ROUNDS=3,GUESS_POOL=18,SYNC_MS=120,START_PTS=100;

function calcGuesserPts(t){return t>=20?t*3:t>=10?t*2:t}
function calcArtistPts(t){return Math.ceil(calcGuesserPts(t)/2)}
function getMult(t){return t>=20?3:t>=10?2:1}

let canvas,ctx,currentRound=1,currentTurn=1,timeLeft=TURN_TIME,wrongGuesses=0;
let timerIv=null,ink=100,gameRunning=false,gameFinished=false;
let currentColor='#ffffff',currentSize=12,secretEmoji='',myRole='',turnHandled=false;
let p1Name='',p1Emoji='',p1Color='',p1Id='',p2Name='',p2Emoji='',p2Color='',p2Id='';
let p1Score=START_PTS,p2Score=START_PTS,amP1=false;
let multiGameId=null,roomUnsub=null,hbIv=null,oppCheckIv=null,syncIv=null,gameUnsub=null,readyUnsub=null;
let myJoinedAt=Date.now(),lastSyncKey='',strokeHistory=[],isDrawing=false;

const roomPath=`rooms_v3/draw/${myName}`,roomRef=ref(db,'rooms_v3/draw');

// ═══ HEARTBEAT ═══
function startHB(){hbIv=setInterval(()=>set(ref(db,roomPath),{name:displayName,color:myColor,emoji:myEmoji,joinedAt:myJoinedAt,timestamp:Date.now(),active:true}),1000)}
function stopHB(){if(hbIv){clearInterval(hbIv);hbIv=null}}
function startOppCheck(){if(oppCheckIv)return;oppCheckIv=setInterval(async()=>{try{const s=await get(roomRef);const p=s.val()||{};const n=Object.keys(p);if(n.length===1&&n[0]===myName){oppLeft();return}if(n.length===2){const o=n.find(x=>x!==myName);if(o&&p[o]&&Date.now()-(p[o].timestamp||0)>5000){await remove(ref(db,`rooms_v3/draw/${o}`));oppLeft()}}}catch(e){}},3000)}
function stopOppCheck(){if(oppCheckIv){clearInterval(oppCheckIv);oppCheckIv=null}}
function oppLeft(){const oN=amP1?p2Name:p1Name,oE=amP1?p2Emoji:p1Emoji;stopHB();stopOppCheck();stopGame();cleanup();remove(ref(db,`rooms_v3/draw/${myName}`));showModal('😢',oN?`${oE} ${oN} עזב/ה`:'השחקן השני עזב/ה','','',[{t:'🏠 דף הבית',c:'home',fn:()=>goHome()}])}
function cleanup(){[roomUnsub,gameUnsub,readyUnsub].forEach(u=>{if(u)u()});roomUnsub=gameUnsub=readyUnsub=null;if(syncIv){clearInterval(syncIv);syncIv=null}}

window.goHome=async function(){stopHB();stopOppCheck();stopGame();cleanup();await remove(ref(db,`rooms_v3/draw/${myName}`));if(multiGameId){await remove(ref(db,`game/draw/${multiGameId}`));const p=multiGameId.split('_');if(p.length===2)await remove(ref(db,`game/draw/${p[1]}_${p[0]}`))}setTimeout(()=>location.href='index.html',150)};
document.getElementById('homeBtn').onclick=()=>goHome();
window.addEventListener('beforeunload',()=>{stopHB();remove(ref(db,`rooms_v3/draw/${myName}`))});

// ═══ MODAL ═══
let cdIv=null;
function showModal(icon,title,sub,scoreHtml,buttons,waitTxt,cdSec){
    if(cdIv){clearInterval(cdIv);cdIv=null}
    document.getElementById('mIcon').textContent=icon;
    document.getElementById('mTitle').textContent=title;
    document.getElementById('mSub').innerHTML=sub;
    document.getElementById('mScore').innerHTML=scoreHtml||'';
    const cd=document.getElementById('mCd'),w=document.getElementById('mWait'),b=document.getElementById('mBtns');
    cd.classList.add('hidden');w.classList.add('hidden');b.innerHTML='';
    if(waitTxt){w.classList.remove('hidden');w.textContent=waitTxt}
    if(buttons)buttons.forEach(x=>{const btn=document.createElement('button');btn.className=`btn-m ${x.c||'green'}`;btn.textContent=x.t;btn.id=x.id||'';if(x.dis)btn.disabled=true;btn.onclick=x.fn;b.appendChild(btn)});
    document.getElementById('modalBg').classList.add('show');
    if(cdSec>0){cd.classList.remove('hidden');let c=cdSec;cd.textContent=c;cdIv=setInterval(()=>{c--;if(c>0)cd.textContent=c;else{clearInterval(cdIv);cdIv=null;document.getElementById('modalBg').classList.remove('show')}},1000)}
}
function hideModal(){if(cdIv){clearInterval(cdIv);cdIv=null}document.getElementById('modalBg').classList.remove('show')}

function showPts(text,color){const el=document.createElement('div');el.className='pts-fly';el.textContent=text;el.style.color=color;el.style.left=window.innerWidth/2-30+'px';el.style.top=window.innerHeight/2+'px';el.style.fontSize='1.5rem';document.body.appendChild(el);setTimeout(()=>el.remove(),1200)}

function updateMult(){const b=document.getElementById('multB');const m=getMult(timeLeft);b.className='mult-badge';b.classList.add(m===3?'x3':m===2?'x2':'x1');b.textContent='×'+m}

// ═══ ROLES & UI ═══
function getDrawerId(){return currentTurn===1?p1Id:p2Id}
function computeMyRole(){myRole=myName===getDrawerId()?'artist':'guesser'}

function updateUI(){
    // Player scores
    document.getElementById('p1e').textContent=p1Emoji;
    document.getElementById('p1n').textContent=p1Name;
    document.getElementById('p1v').textContent=p1Score;document.getElementById('p1v').style.color=p1Color;
    document.getElementById('p2e').textContent=p2Emoji;
    document.getElementById('p2n').textContent=p2Name;
    document.getElementById('p2v').textContent=p2Score;document.getElementById('p2v').style.color=p2Color;
    // Round
    document.getElementById('roundLbl').textContent=`סיבוב ${currentRound}/${TOTAL_ROUNDS} · תור ${currentTurn}`;
    // My role bar
    const rb=document.getElementById('roleBar');
    rb.className='my-role-bar '+(myRole==='artist'?'artist':'guesser');
    document.getElementById('roleEmoji').textContent=myEmoji;
    document.getElementById('roleText').textContent=myRole==='artist'?'תורך לצייר! 🎨':'תורך לנחש! 🔍';
    // Target
    const isA=myRole==='artist';
    document.getElementById('tLabel').classList.toggle('hidden',!isA);
    document.getElementById('tEmoji').classList.toggle('hidden',!isA);
    document.getElementById('tHint').classList.toggle('hidden',isA);
    if(!isA)document.getElementById('tHint').textContent='🔍 מה מצוייר?';
    document.getElementById('gLives').classList.toggle('hidden',isA);
    // Controls
    document.getElementById('toolsArtist').classList.toggle('hidden',!isA);
    document.getElementById('inkBar').classList.toggle('hidden',!isA);
    document.getElementById('guessGrid').classList.toggle('hidden',isA);
    // Canvas border
    const cw=document.getElementById('cWrap');
    cw.classList.toggle('artist-mode',isA);cw.classList.toggle('guesser-mode',!isA);
}

function animScore(who){const el=document.getElementById(who==='p1'?'p1v':'p2v');el.classList.remove('pop');void el.offsetHeight;el.classList.add('pop')}
function updateScores(a1,a2){document.getElementById('p1v').textContent=p1Score;document.getElementById('p2v').textContent=p2Score;if(a1)animScore('p1');if(a2)animScore('p2')}
function updateDots(){document.querySelectorAll('#gLives .gl-dot').forEach((d,i)=>d.classList.toggle('used',i<wrongGuesses))}

function scHtml(){
    const lead=p1Score>p2Score?'p1':p2Score>p1Score?'p2':'tie';
    return `<div class="sc-row"><div class="sc-p"><div class="e">${p1Emoji}</div><div class="n">${p1Name}</div><div class="v ${lead==='p1'?'lead':''}" style="color:${p1Color}">${p1Score}</div></div><div class="sc-vs">VS</div><div class="sc-p"><div class="e">${p2Emoji}</div><div class="n">${p2Name}</div><div class="v ${lead==='p2'?'lead':''}" style="color:${p2Color}">${p2Score}</div></div></div>`;
}

// ═══ CANVAS ═══
function initCanvas(){
    canvas=document.getElementById('canvas');ctx=canvas.getContext('2d');ctx.lineCap='round';ctx.lineJoin='round';clrCanvas();
    const gp=e=>{const r=canvas.getBoundingClientRect();const v=e.touches?e.touches[0]:e;return{x:(v.clientX-r.left)*(canvas.width/r.width),y:(v.clientY-r.top)*(canvas.height/r.height)}};
    let cur=[];
    const s=e=>{if(myRole!=='artist'||ink<=0||!gameRunning)return;isDrawing=true;const p=gp(e);ctx.beginPath();ctx.moveTo(p.x,p.y);ctx.strokeStyle=currentColor;ctx.lineWidth=currentSize;cur=[{x:p.x,y:p.y,color:currentColor,size:currentSize}];e.preventDefault?.()};
    const m=e=>{if(!isDrawing||ink<=0)return;const p=gp(e);ctx.lineTo(p.x,p.y);ctx.stroke();cur.push({x:p.x,y:p.y});ink=Math.max(0,ink-currentSize/500);updInk();e.preventDefault?.()};
    const en=()=>{if(isDrawing){isDrawing=false;if(cur.length>0){strokeHistory.push(cur);cur=[]}}};
    canvas.addEventListener('mousedown',s);canvas.addEventListener('mousemove',m);canvas.addEventListener('mouseup',en);canvas.addEventListener('mouseleave',en);
    canvas.addEventListener('touchstart',s,{passive:false});canvas.addEventListener('touchmove',m,{passive:false});canvas.addEventListener('touchend',en);
}
function clrCanvas(){if(!ctx)return;ctx.fillStyle='#0a0a0f';ctx.fillRect(0,0,canvas.width,canvas.height)}
window.clearCanvas=function(){clrCanvas();strokeHistory=[];ink=100;updInk()};
window.undoStroke=function(){if(!strokeHistory.length||myRole!=='artist')return;strokeHistory.pop();clrCanvas();for(const s of strokeHistory){if(s.length<2)continue;ctx.beginPath();ctx.strokeStyle=s[0].color;ctx.lineWidth=s[0].size;ctx.moveTo(s[0].x,s[0].y);for(let i=1;i<s.length;i++)ctx.lineTo(s[i].x,s[i].y);ctx.stroke()}ink=Math.min(100,ink+15);updInk()};
function updInk(){document.getElementById('inkFill').style.width=ink+'%';document.getElementById('inkBar').classList.toggle('low',ink<20)}
function getCData(){return canvas.toDataURL('image/webp',0.3)}
function loadCData(u){if(!u)return;const img=new Image();img.src=u;img.onload=()=>{ctx.clearRect(0,0,canvas.width,canvas.height);ctx.drawImage(img,0,0,canvas.width,canvas.height)}}

function showReveal(emoji,ok){
    const w=document.getElementById('cWrap');const old=w.querySelector('.reveal-overlay');if(old)old.remove();
    const d=document.createElement('div');d.className='reveal-overlay';
    d.innerHTML=`<div class="reveal-emoji">${emoji}</div><div class="reveal-msg ${ok?'ok':'fail'}">${ok?'✅ ניחוש נכון!':'❌ התשובה: '+emoji}</div>`;
    w.appendChild(d);
}
function clrReveal(){const e=document.getElementById('cWrap').querySelector('.reveal-overlay');if(e)e.remove()}
function showAF(ok,emoji){
    const r=document.getElementById('targetRow');const old=r.querySelector('.artist-fb');if(old)old.remove();
    const d=document.createElement('div');d.className=`artist-fb ${ok?'ok':'fail'}`;
    d.innerHTML=`<div class="af-icon">${ok?'🎉':'😕'}</div><div class="af-msg" style="color:${ok?'var(--green)':'var(--danger)'}">${ok?'ניחשו! '+emoji:'לא ניחשו '+emoji}</div>`;
    r.appendChild(d);
}
function clrAF(){const e=document.getElementById('targetRow').querySelector('.artist-fb');if(e)e.remove()}
function updCursor(cx,cy){const c=document.getElementById('dCursor');if(cx===undefined){c.style.display='none';return};const r=canvas.getBoundingClientRect();const w=document.getElementById('cWrap').getBoundingClientRect();c.style.display='block';c.style.left=(r.left-w.left+cx*(r.width/canvas.width)-7)+'px';c.style.top=(r.top-w.top+cy*(r.height/canvas.height)-7)+'px'}

// ═══ TIMER ═══
function startTimer(){stopTimer();timeLeft=TURN_TIME;turnHandled=false;document.getElementById('timerNum').textContent=timeLeft;document.getElementById('timerNum').classList.remove('urgent');updateMult();timerIv=setInterval(()=>{timeLeft--;document.getElementById('timerNum').textContent=timeLeft;updateMult();if(timeLeft<=10)document.getElementById('timerNum').classList.add('urgent');if(timeLeft<=0){stopTimer();endTurn(false)}},1000)}
function stopTimer(){if(timerIv){clearInterval(timerIv);timerIv=null}}
function stopGame(){gameRunning=false;stopTimer();stopSync()}

// ═══ GUESS GRID ═══
function buildGrid(){
    const g=document.getElementById('guessGrid');g.innerHTML='';
    const pool=[secretEmoji,...EMOJIS.filter(e=>e!==secretEmoji).sort(()=>Math.random()-0.5).slice(0,GUESS_POOL-1)].sort(()=>Math.random()-0.5);
    pool.forEach(emoji=>{const d=document.createElement('div');d.className='g-cell';d.textContent=emoji;d.onclick=()=>guess(d,emoji);g.appendChild(d)});
}

function guess(el,emoji){
    if(el.classList.contains('wrong')||el.classList.contains('correct')||!gameRunning||turnHandled)return;
    if(emoji===secretEmoji){
        el.classList.add('correct');turnHandled=true;
        const gP=calcGuesserPts(timeLeft),aP=calcArtistPts(timeLeft),dId=getDrawerId(),gId=dId===p1Id?p2Id:p1Id;
        if(gId===p1Id){p1Score+=gP;p2Score+=aP}else{p2Score+=gP;p1Score+=aP}
        updateScores(true,true);showPts(`+${gP}${getMult(timeLeft)>=2?' ×'+getMult(timeLeft):''}`,`var(--green)`);
        try{confetti({particleCount:80,spread:70})}catch(e){}
        if(multiGameId)update(ref(db,`game/draw/${multiGameId}`),{guessedCorrect:true,guesserPts:gP,artistPts:aP,guessedBy:myName,guessTurn:`${currentRound}_${currentTurn}`,p1Score,p2Score,ts:Date.now()});
        stopTimer();stopSync();showReveal(secretEmoji,true);
        setTimeout(()=>endTurn(true),1500);
    }else{
        el.classList.add('wrong');wrongGuesses++;updateDots();
        const dots=document.querySelectorAll('#gLives .gl-dot');if(dots[wrongGuesses-1]){dots[wrongGuesses-1].classList.add('just');setTimeout(()=>dots[wrongGuesses-1].classList.remove('just'),400)}
        if(navigator.vibrate)navigator.vibrate(100);
        const gId=getDrawerId()===p1Id?p2Id:p1Id;
        if(gId===p1Id)p1Score=Math.max(0,p1Score-10);else p2Score=Math.max(0,p2Score-10);
        updateScores(gId===p1Id,gId===p2Id);showPts('-10','#ef4444');
        if(multiGameId)update(ref(db,`game/draw/${multiGameId}`),{p1Score,p2Score,wrongGuesses,ts:Date.now()});
        if(wrongGuesses>=MAX_WRONG){turnHandled=true;stopTimer();stopSync();showReveal(secretEmoji,false);
            if(multiGameId)update(ref(db,`game/draw/${multiGameId}`),{guessedCorrect:false,guessedBy:myName,guessTurn:`${currentRound}_${currentTurn}`,p1Score,p2Score,ts:Date.now()});
            setTimeout(()=>endTurn(false),1500)}
    }
}

// ═══ SYNC ═══
function startSync(){stopSync();if(!multiGameId||myRole!=='artist')return;syncIv=setInterval(()=>{if(!gameRunning)return;const d={canvasData:getCData()};if(strokeHistory.length>0){const l=strokeHistory[strokeHistory.length-1];if(l.length>0){const p=l[l.length-1];d.cursorX=Math.round(p.x);d.cursorY=Math.round(p.y)}}update(ref(db,`game/draw/${multiGameId}`),d)},SYNC_MS)}
function stopSync(){if(syncIv){clearInterval(syncIv);syncIv=null}}

function setupGameListener(){
    if(!multiGameId)return;if(gameUnsub)gameUnsub();
    gameUnsub=onValue(ref(db,`game/draw/${multiGameId}`),snap=>{
        const s=snap.val();if(!s)return;
        if(myRole==='guesser'){
            if(s.canvasData)loadCData(s.canvasData);
            if(s.cursorX!==undefined)updCursor(s.cursorX,s.cursorY);
            if(s.turnKey&&s.turnKey!==lastSyncKey){lastSyncKey=s.turnKey;currentRound=s.round||currentRound;currentTurn=s.turn||currentTurn;secretEmoji=s.secretEmoji||secretEmoji;wrongGuesses=0;turnHandled=false;updateDots();updateUI();clrCanvas();clrReveal();buildGrid();startTimer()}
        }
        if(myRole==='artist'){
            const key=`${currentRound}_${currentTurn}`;
            if(s.guessedBy&&s.guessedBy!==myName&&s.guessTurn===key&&!turnHandled){
                turnHandled=true;if(s.p1Score!==undefined)p1Score=s.p1Score;if(s.p2Score!==undefined)p2Score=s.p2Score;updateScores(true,true);
                if(s.guessedCorrect){showAF(true,secretEmoji);try{confetti({particleCount:60,spread:50})}catch(e){};showPts(`+${s.artistPts||0}`,'#3DD68C')}
                else showAF(false,secretEmoji);
                stopTimer();stopSync();setTimeout(()=>endTurn(s.guessedCorrect),1500);
            }
            if(s.wrongGuesses!==undefined&&s.wrongGuesses!==wrongGuesses)wrongGuesses=s.wrongGuesses;
        }
    });
}

// ═══ END TURN ═══
function endTurn(ok){
    if(!turnHandled&&!gameRunning)return;gameRunning=false;stopTimer();stopSync();updCursor();
    const sub=ok?'✅ ניחוש נכון!':'❌ לא הצליח לנחש';
    if(currentTurn===1){
        currentTurn=2;computeMyRole();
        showModal('🔄','מחליפים!',sub,scHtml(),null,null,3);
        setTimeout(()=>{hideModal();clrReveal();clrAF();startTurn()},3000);
    }else if(currentRound<TOTAL_ROUNDS){
        currentRound++;currentTurn=1;computeMyRole();
        showModal('🎨',`סיבוב ${currentRound-1} הסתיים!`,sub,scHtml(),null,null,3);
        setTimeout(()=>{hideModal();clrReveal();clrAF();startTurn()},3000);
    }else{clrReveal();clrAF();showEnd()}
}

async function showEnd(){
    gameFinished=true;
    const w=p1Score>p2Score?'p1':p2Score>p1Score?'p2':'tie';
    const wN=w==='p1'?p1Name:w==='p2'?p2Name:'';
    const wE=w==='p1'?p1Emoji:w==='p2'?p2Emoji:'';
    const wC=w==='p1'?p1Color:w==='p2'?p2Color:'var(--gold)';
    const tit=w==='tie'?'🤝 תיקו!':`${wE} ${wN} ניצח/ה!`;
    const ico=w==='tie'?'🤝':'🏆';
    const winH=w!=='tie'?`<div style="margin:8px 0"><div class="crown">👑</div><div class="w-name" style="color:${wC}">${wE} ${wN}</div></div>`:'';
    if(w!=='tie')try{confetti({particleCount:100,spread:80})}catch(e){}
    showModal(ico,tit,'',winH+scHtml(),[
        {t:'🎮 משחק חדש',c:'green',id:'btnNew',fn:()=>reqNew()},
        {t:'🏠 דף הבית',c:'home',fn:()=>goHome()}
    ]);
    if(multiGameId)await set(ref(db,`game/draw/${multiGameId}/status_${myName}`),'done');
}

function reqNew(){
    if(!multiGameId){resetAll();return}
    set(ref(db,`game/draw/${multiGameId}/ready_${myName}`),true);
    const btn=document.getElementById('btnNew');if(btn){btn.textContent='⏳ ממתין...';btn.disabled=true}
    const oN=amP1?p2Name:p1Name,oE=amP1?p2Emoji:p1Emoji;
    document.getElementById('mWait').classList.remove('hidden');
    document.getElementById('mWait').textContent=`⏳ ממתין ל-${oE} ${oN}...`;
    listenReady(amP1?p2Id:p1Id);
}
function listenReady(oId){
    if(readyUnsub)readyUnsub();
    readyUnsub=onValue(ref(db,`game/draw/${multiGameId}/ready_${oId}`),snap=>{
        if(!snap.val())return;
        get(ref(db,`game/draw/${multiGameId}/ready_${myName}`)).then(my=>{
            if(!my.val())return;if(readyUnsub){readyUnsub();readyUnsub=null}
            remove(ref(db,`game/draw/${multiGameId}/ready_${myName}`));remove(ref(db,`game/draw/${multiGameId}/ready_${oId}`));
            remove(ref(db,`game/draw/${multiGameId}/status_${myName}`));remove(ref(db,`game/draw/${multiGameId}/status_${oId}`));
            resetAll();
        });
    });
}

function resetAll(){hideModal();p1Score=START_PTS;p2Score=START_PTS;currentRound=1;currentTurn=1;wrongGuesses=0;gameFinished=false;turnHandled=false;strokeHistory=[];ink=100;lastSyncKey='';window._mpStarted=false;updateScores();updateDots();updInk();clrCanvas();clrReveal();clrAF();computeMyRole();startCD(()=>startTurn())}

// ═══ START TURN ═══
function startTurn(){
    gameRunning=true;turnHandled=false;wrongGuesses=0;ink=100;strokeHistory=[];
    clrCanvas();clrReveal();clrAF();updateDots();updInk();computeMyRole();updateUI();updateScores();
    setupGameListener();
    secretEmoji=EMOJIS[Math.floor(Math.random()*EMOJIS.length)];
    document.getElementById('tEmoji').textContent=secretEmoji;
    if(myRole==='artist'){
        const tk=`${currentRound}_${currentTurn}_${Date.now()}`;lastSyncKey=tk;
        if(multiGameId)set(ref(db,`game/draw/${multiGameId}`),{round:currentRound,turn:currentTurn,secretEmoji,canvasData:'',guessedCorrect:false,guessedBy:'',guessTurn:'',guesserPts:0,artistPts:0,wrongGuesses:0,p1Score,p2Score,turnKey:tk,ts:Date.now()});
        startSync();startTimer();
    }else{buildGrid();startTimer()}
}

// ═══ COUNTDOWN ═══
function startCD(cb){
    const m=document.getElementById('cdModal'),t=document.getElementById('cdText');
    m.classList.remove('hidden');t.textContent='🎨';t.className='cd-text';
    let c=3;const iv=setInterval(()=>{
        if(c>0){t.textContent=c;t.className='cd-text';t.style.animation='none';t.offsetHeight;t.style.animation='';c--}
        else if(c===0){t.textContent='🖌️ התחילו!';t.className='cd-text go';c--}
        else{clearInterval(iv);m.classList.add('hidden');cb()}
    },800);
}

// ═══ PALETTE ═══
function buildPalette(){
    const g=document.getElementById('palette');g.innerHTML='';
    COLORS.forEach(c=>{const d=document.createElement('div');d.className='pal-dot'+(c===currentColor?' active':'');d.style.background=c;d.style.setProperty('--glow',c+'80');d.onclick=()=>{currentColor=c;g.querySelectorAll('.pal-dot').forEach(x=>x.classList.remove('active'));d.classList.add('active');if(ctx)ctx.strokeStyle=c};g.appendChild(d)});
}
function buildBrush(){
    const r=document.getElementById('brushRow');r.innerHTML='';
    SIZES.forEach(s=>{const d=document.createElement('div');d.className='brush-dot'+(s===currentSize?' active':'');d.style.width=d.style.height=Math.max(14,s*1.4)+'px';d.onclick=()=>{currentSize=s;r.querySelectorAll('.brush-dot').forEach(x=>x.classList.remove('active'));d.classList.add('active')};r.appendChild(d)});
}

// ═══ INIT ═══
async function init(){
    const es=await get(ref(db,roomPath));const ed=es?.val();myJoinedAt=ed?.joinedAt||Date.now();
    await set(ref(db,roomPath),{name:displayName,color:myColor,emoji:myEmoji,joinedAt:myJoinedAt,timestamp:Date.now(),active:true});
    startHB();let lc=0;window._ls={};
    roomUnsub=onValue(roomRef,async snap=>{
        const pl=snap.val()||{};const ns=Object.keys(pl).sort((a,b)=>(pl[a].joinedAt||0)-(pl[b].joinedAt||0));
        if(lc===2&&ns.length<2&&!gameFinished){oppLeft();return}
        window._ls=pl;lc=ns.length;
        if(ns.length===2&&!gameRunning&&!gameFinished){
            if(window._mpStarted)return;window._mpStarted=true;
            amP1=ns[0]===myName;multiGameId=`${ns[0]}_${ns[1]}`;
            p1Id=ns[0];p2Id=ns[1];
            p1Name=pl[p1Id].name;p1Emoji=pl[p1Id].emoji;p1Color=pl[p1Id].color;
            p2Name=pl[p2Id].name;p2Emoji=pl[p2Id].emoji;p2Color=pl[p2Id].color;
            if(amP1){await remove(ref(db,`game/draw/${multiGameId}`));await remove(ref(db,`game/draw/${ns[1]}_${ns[0]}`))}
            else await new Promise(r=>setTimeout(r,300));
            initCanvas();buildPalette();buildBrush();updateScores();
            startOppCheck();startCD(()=>startTurn());
        }
    });
}
init();
</script>
