<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>איקס עיגול - אמה וריף</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
  <style>
    /* עיצוב רקע ואווירה */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    
    body { 
        font-family: 'Heebo', sans-serif; 
        background: #0F1320; 
        min-height: 100vh; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        color: white; 
        overflow: hidden; 
        position: relative; 
    }

    /* שכבות צבע ברקע */
    body::before { 
        content: ''; 
        position: fixed; 
        inset: 0; 
        background: 
            radial-gradient(circle at 15% 15%, rgba(255, 92, 122, 0.15) 0%, transparent 40%),
            radial-gradient(circle at 85% 85%, rgba(77, 184, 255, 0.15) 0%, transparent 40%);
        z-index: -1;
    }

    .container { 
        position: relative; 
        z-index: 10; 
        text-align: center; 
        width: 100%; 
        max-width: 420px; 
        padding: 25px; 
        background: rgba(255, 255, 255, 0.03);
        backdrop-filter: blur(15px);
        -webkit-backdrop-filter: blur(15px);
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 40px;
        box-shadow: 0 25px 50px rgba(0,0,0,0.3);
    }

    .badge { 
        padding: 8px 20px; 
        border-radius: 30px; 
        background: rgba(255, 255, 255, 0.08); 
        border: 1px solid rgba(255, 255, 255, 0.15); 
        margin-bottom: 25px; 
        display: inline-block; 
        font-size: 0.95rem; 
        font-weight: 600;
        letter-spacing: 0.5px;
    }

    /* לוח תוצאות מעוצב */
    .scoreboard { 
        display: grid; 
        grid-template-columns: 1fr auto 1fr; 
        gap: 15px; 
        margin-bottom: 25px; 
        align-items: center;
    }

    .score-card { 
        background: rgba(0, 0, 0, 0.2); 
        padding: 18px 10px; 
        border-radius: 24px; 
        border: 2px solid transparent; 
        transition: all 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); 
    }

    .score-card.active { 
        transform: scale(1.08); 
        background: rgba(255, 255, 255, 0.05);
        box-shadow: 0 0 20px rgba(245, 200, 66, 0.2);
    }

    #card-X.active { border-color: #FF5C7A; }
    #card-O.active { border-color: #4DB8FF; }

    .score-name { font-size: 1.1rem; font-weight: 900; margin-bottom: 5px; }
    .score-num { font-family: 'Fredoka One', cursive; font-size: 2.2rem; }

    /* לוח המשחק */
    .board { 
        display: grid; 
        grid-template-columns: repeat(3, 1fr); 
        gap: 12px; 
        margin: 25px 0; 
        perspective: 1000px;
    }

    .cell { 
        background: rgba(255, 255, 255, 0.05); 
        border: 1px solid rgba(255, 255, 255, 0.1);
        border-radius: 20px; 
        height: 105px; 
        display: flex; 
        align-items: center; 
        justify-content: center; 
        font-family: 'Fredoka One', cursive;
        font-size: 3.8rem; 
        cursor: pointer; 
        transition: all 0.2s ease; 
        box-shadow: inset 0 0 15px rgba(255,255,255,0.02);
    }

    .cell:hover { background: rgba(255, 255, 255, 0.08); }
    .cell:active { transform: scale(0.92); }

    .x-color { 
        color: #FF5C7A; 
        text-shadow: 0 0 15px rgba(255, 92, 122, 0.5); 
    }
    .o-color { 
        color: #4DB8FF; 
        text-shadow: 0 0 15px rgba(77, 184, 255, 0.5); 
    }

    /* כפתורים */
    .controls { display: flex; gap: 10px; justify-content: center; margin-top: 10px; }
    
    .btn { 
        flex: 1;
        padding: 16px; 
        border-radius: 20px; 
        border: none; 
        font-weight: 900; 
        font-size: 1.1rem;
        cursor: pointer; 
        transition: 0.3s;
        box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    }

    .btn-reset { background: #EEF0FF; color: #0F1320; }
    .btn-home { background: rgba(255, 255, 255, 0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

    .btn:active { transform: translateY(2px); box-shadow: 0 4px 10px rgba(0,0,0,0.2); }

    #status { 
        color: #F5C842; 
        font-weight: 800; 
        height: 30px; 
        margin-bottom: 10px; 
        font-size: 1.3rem; 
        text-shadow: 0 0 10px rgba(245, 200, 66, 0.3);
    }
  </style>
</head>
<body>

<div class="container">
  <div class="badge" id="my-role">מתחבר למשחק...</div>

  <div class="scoreboard">
    <div class="score-card" id="card-X">
        <div class="score-name x-color">אמה</div>
        <div class="score-num" id="score-X">0</div>
    </div>
    <div style="font-family: 'Fredoka One'; opacity: 0.3; font-size: 1.5rem;">VS</div>
    <div class="score-card" id="card-O">
        <div class="score-name o-color">ריף</div>
        <div class="score-num" id="score-O">0</div>
    </div>
  </div>

  <div id="status"></div>

  <div class="board" id="board">
    <div class="cell" data-idx="0"></div><div class="cell" data-idx="1"></div><div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div><div class="cell" data-idx="4"></div><div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div><div class="cell" data-idx="7"></div><div class="cell" data-idx="8"></div>
  </div>

  <div class="controls">
    <button class="btn btn-reset" onclick="resetGame()">סיבוב חדש</button>
    <button class="btn btn-home" onclick="location.href='index.html'">בית</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db, 'game/xo');

const params = new URLSearchParams(location.search);
const myId = params.get('player') || "";
let mySymbol = null;

if (myId.includes('emma')) mySymbol = 'X';
else if (myId.includes('rif')) mySymbol = 'O';

// ניקוי חדר ההמתנה
if (myId) remove(ref(db, `rooms_v3/xo/${myId}`));

onValue(gameRef, (snap) => {
    const data = snap.val() || {};
    const board = data.board || Array(9).fill('');
    const turn = data.currentPlayer || 'X';
    const gameOver = data.gameOver || false;

    document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.textContent = board[i];
        cell.className = `cell ${board[i] === 'X' ? 'x-color' : 'o-color'}`;
    });

    document.getElementById('score-X').textContent = data.scores?.X || 0;
    document.getElementById('score-O').textContent = data.scores?.O || 0;
    document.getElementById('card-X').classList.toggle('active', turn === 'X' && !gameOver);
    document.getElementById('card-O').classList.toggle('active', turn === 'O' && !gameOver);
    
    const roleEl = document.getElementById('my-role');
    if (mySymbol) {
        roleEl.textContent = `אתה משחק בתור: ${mySymbol === 'X' ? 'אמה' : 'ריף'}`;
        roleEl.style.color = mySymbol === 'X' ? '#FF5C7A' : '#4DB8FF';
    } else {
        roleEl.textContent = "אתה צופה במשחק";
    }

    const statusEl = document.getElementById('status');
    if (gameOver) {
        if (!board.includes('')) statusEl.textContent = "תיקו! אין מנצח";
        else statusEl.textContent = `כל הכבוד ל${turn === 'X' ? 'אמה' : 'ריף'}!`;
    } else {
        statusEl.textContent = (mySymbol === turn) ? "תורך לשחק!" : `תור של ${turn === 'X' ? 'אמה' : 'ריף'}`;
    }
});

document.querySelectorAll('.cell').forEach(cell => {
    cell.onclick = async () => {
        const idx = cell.dataset.idx;
        const snap = await get(gameRef);
        const data = snap.val() || {};
        const board = data.board || Array(9).fill('');
        
        if (data.gameOver || board[idx] !== '' || data.currentPlayer !== mySymbol) return;

        board[idx] = mySymbol;
        const win = checkWin(board);
        const isDraw = !win && !board.includes('');
        const scores = data.scores || { X: 0, O: 0 };
        
        if (win) scores[mySymbol]++;

        update(gameRef, {
            board: board,
            currentPlayer: (win || isDraw) ? mySymbol : (mySymbol === 'X' ? 'O' : 'X'),
            gameOver: win || isDraw,
            scores: scores
        });
    };
});

function checkWin(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (let l of lines) {
        if (b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]) return true;
    }
    return false;
}

window.resetGame = () => {
    update(gameRef, { board: Array(9).fill(''), currentPlayer: 'X', gameOver: false });
};
</script>
</body>
</html>
