<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>איקס עיגול - קרב משתתפים</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0F1320; --surface: rgba(255, 255, 255, 0.05); --x-color: #FF5C7A; --o-color: #4DB8FF; --gold: #F5C842; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        .header { display: flex; justify-content: space-around; width: 100%; max-width: 500px; padding: 20px; margin-top: 10px; }
        .score-box { background: var(--surface); padding: 15px; border-radius: 20px; text-align: center; min-width: 100px; border: 2px solid transparent; transition: 0.3s; }
        .score-box.active { border-color: var(--gold); transform: scale(1.05); box-shadow: 0 0 15px rgba(245, 200, 66, 0.2); }
        .name { font-weight: 900; font-size: 1.1rem; margin-bottom: 5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .score { font-family: 'Fredoka One', cursive; font-size: 2rem; }
        #status-bar { margin: 15px 0; font-weight: 800; color: var(--gold); font-size: 1.2rem; height: 30px; }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; width: 90vw; max-width: 350px; aspect-ratio: 1; }
        .cell { background: var(--surface); border-radius: 15px; display: flex; align-items: center; justify-content: center; font-size: 4rem; font-family: 'Fredoka One', cursive; cursor: pointer; transition: 0.2s; border: 1px solid rgba(255,255,255,0.1); }
        .cell.x { color: var(--x-color); }
        .cell.o { color: var(--o-color); }
        .controls { display: flex; gap: 10px; margin-top: 25px; width: 90vw; max-width: 350px; }
        .btn { flex: 1; padding: 15px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; transition: 0.2s; text-align: center; }
        .btn-reset { background: #EEF0FF; color: var(--bg); }
        .btn-home { background: rgba(255,255,255,0.1); color: white; }
        #alert-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: white; color: var(--bg); padding: 30px; border-radius: 25px; text-align: center; width: 100%; max-width: 300px; }
    </style>
</head>
<body>

<div id="alert-modal">
    <div class="modal-content">
        <h2 id="modal-msg">השחקן השני עזב</h2>
        <button class="btn btn-reset" onclick="goHome()">חזרה לתפריט</button>
    </div>
</div>

<div class="header">
    <div id="card-X" class="score-box">
        <div id="name-X" class="name">ממתין...</div>
        <div id="wins-X" class="score">0</div>
    </div>
    <div class="score-box">
        <div class="name">תיקו</div>
        <div id="draws" class="score">0</div>
    </div>
    <div id="card-O" class="score-box">
        <div id="name-O" class="name">ממתין...</div>
        <div id="wins-O" class="score">0</div>
    </div>
</div>

<div id="status-bar">מתחבר...</div>

<div class="board" id="board">
    <div class="cell" data-idx="0"></div><div class="cell" data-idx="1"></div><div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div><div class="cell" data-idx="4"></div><div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div><div class="cell" data-idx="7"></div><div class="cell" data-idx="8"></div>
</div>

<div class="controls">
    <button class="btn btn-reset" onclick="handleForfeit()">ויתור</button>
    <button class="btn btn-home" onclick="goHome()">בית</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, onDisconnect, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
    authDomain: "kidssapp-izhaki.firebaseapp.com",
    databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kidssapp-izhaki",
    storageBucket: "kidssapp-izhaki.firebasestorage.app",
    messagingSenderId: "663906163746",
    appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const params = new URLSearchParams(location.search);
const myName = params.get('player') || "אורח";

const roomRef = ref(db, 'rooms_v3/xo');
const gameStateRef = ref(db, 'game/xo_dynamic');

let mySymbol = null; 
let currentGameState = null;
let gameStartTime = Date.now(); // משתנה למניעת הודעות שווא בהתחלה

async function initSession() {
    const snap = await get(roomRef);
    const playersMap = snap.val() || {};
    
    // רישום המשתמש בחדר
    await set(ref(db, `rooms_v3/xo/${myName}`), { name: myName, active: true });
    onDisconnect(ref(db, `rooms_v3/xo/${myName}`)).remove();

    // קביעת סמל
    const updatedSnap = await get(roomRef);
    const names = Object.keys(updatedSnap.val() || {});
    mySymbol = (names.indexOf(myName) === 0) ? 'X' : 'O';

    if (mySymbol === 'X' && names.length === 1) {
        resetFirebaseGame(true);
    }

    startListeners();
}

function startListeners() {
    onValue(gameStateRef, (snap) => {
        const data = snap.val();
        if (data) { currentGameState = data; render(); }
    });

    onValue(roomRef, (snap) => {
        const players = snap.val() || {};
        const names = Object.keys(players);
        
        document.getElementById('name-X').textContent = names[0] || "ממתין...";
        document.getElementById('name-O').textContent = names[1] || "ממתין...";

        // התיקון הקריטי: הודעת עזיבה רק אם עברו 5 שניות מתחילת החיבור ואין 2 שחקנים
        if (mySymbol && names.length < 2 && (Date.now() - gameStartTime > 5000)) {
            if (!currentGameState?.gameOver) {
                 document.getElementById('alert-modal').style.display = 'flex';
            }
        }
    });
}

function resetFirebaseGame(fullReset = false) {
    const newState = {
        board: Array(9).fill(''),
        currentPlayer: 'X',
        starter: 'X',
        gameOver: false,
        scores: fullReset ? { X: 0, O: 0, draws: 0 } : (currentGameState?.scores || { X: 0, O: 0, draws: 0 })
    };
    set(gameStateRef, newState);
}

function render() {
    if (!currentGameState) return;
    const { board, currentPlayer, scores, gameOver } = currentGameState;

    document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.textContent = board[i];
        cell.className = `cell ${board[i] ? board[i].toLowerCase() : ''}`;
    });

    document.getElementById('wins-X').textContent = scores.X;
    document.getElementById('wins-O').textContent = scores.O;
    document.getElementById('draws').textContent = scores.draws;
    
    document.getElementById('card-X').classList.toggle('active', currentPlayer === 'X' && !gameOver);
    document.getElementById('card-O').classList.toggle('active', currentPlayer === 'O' && !gameOver);

    const status = document.getElementById('status-bar');
    if (gameOver) status.textContent = "סיבוב הסתיים!";
    else status.textContent = (mySymbol === currentPlayer) ? "תורך!" : "ממתין...";
}

document.querySelectorAll('.cell').forEach(cell => {
    cell.onclick = () => {
        const idx = cell.dataset.idx;
        if (!mySymbol || mySymbol !== currentGameState.currentPlayer || currentGameState.board[idx] !== '' || currentGameState.gameOver) return;

        const newBoard = [...currentGameState.board];
        newBoard[idx] = mySymbol;
        const win = checkWinner(newBoard);
        const draw = !win && !newBoard.includes('');
        
        const updates = { board: newBoard };
        if (win || draw) {
            updates.gameOver = true;
            const newScores = {...currentGameState.scores};
            if (win) newScores[mySymbol]++;
            else newScores.draws++;
            updates.scores = newScores;
            if (mySymbol === 'X') setTimeout(autoNextRound, 2500);
        } else {
            updates.currentPlayer = mySymbol === 'X' ? 'O' : 'X';
        }
        update(gameStateRef, updates);
    };
});

function checkWinner(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return lines.some(l => b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]);
}

async function autoNextRound() {
    const snap = await get(gameStateRef);
    const data = snap.val();
    if (!data || !data.gameOver) return;
    const nextStarter = data.starter === 'X' ? 'O' : 'X';
    update(gameStateRef, { board: Array(9).fill(''), currentPlayer: nextStarter, starter: nextStarter, gameOver: false });
}

window.goHome = async () => {
    await remove(ref(db, `rooms_v3/xo/${myName}`));
    location.href = 'index.html';
};

window.handleForfeit = () => {
    if (currentGameState && !currentGameState.gameOver) {
        const other = mySymbol === 'X' ? 'O' : 'X';
        const s = {...currentGameState.scores};
        s[other]++;
        update(gameStateRef, { scores: s, gameOver: true });
        if (mySymbol === 'X') setTimeout(autoNextRound, 2000);
    }
};

initSession();
</script>
</body>
</html>
