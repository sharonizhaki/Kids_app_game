<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>איקס עיגול - קרב משתתפים</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0F1320; --surface: rgba(255, 255, 255, 0.05); --x-color: #FF5C7A; --o-color: #4DB8FF; --gold: #F5C842; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #0F1320 0%, #1a2942 100%); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow: hidden; }
        
        .header { display: flex; justify-content: space-around; width: 100%; max-width: 500px; padding: 20px; margin-top: 10px; gap: 10px; }
        .score-box { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            padding: 18px 15px 16px; 
            border-radius: 25px; 
            text-align: center; 
            min-width: 100px;
            height: 135px;
            border: 2.5px solid transparent; 
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .score-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .score-box.active { 
            border-color: var(--gold);
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(245, 200, 66, 0.4), inset 0 0 15px rgba(245, 200, 66, 0.1);
            animation: borderGlow 0.8s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { 
                border-color: var(--gold);
                box-shadow: 0 0 15px rgba(245, 200, 66, 0.3), inset 0 0 10px rgba(245, 200, 66, 0.05);
            }
            50% { 
                border-color: var(--gold);
                box-shadow: 0 0 50px rgba(245, 200, 66, 1), inset 0 0 30px rgba(245, 200, 66, 0.4);
            }
        }
        
        .name { font-weight: 900; font-size: 0.95rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-height: 25px; }
        .score { font-family: 'Fredoka One', cursive; font-size: 2.5rem; font-weight: 900; line-height: 1; margin: 5px 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .role-label { 
            font-size: 1.1rem; 
            color: var(--gold); 
            font-weight: 900; 
            margin-top: 0;
            text-shadow: 0 0 10px rgba(245, 200, 66, 0.3);
            min-height: 20px;
        }
        
        #status-bar { margin: 15px 0; font-weight: 800; color: var(--gold); font-size: 1.1rem; height: 30px; text-shadow: 0 0 10px rgba(245, 200, 66, 0.3); animation: fadeInOut 0.4s ease; }
        @keyframes fadeInOut {
            0% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 90vw; max-width: 350px; aspect-ratio: 1; margin: 15px 0; }
        .cell { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3.8rem; 
            font-family: 'Fredoka One', cursive; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border: 2px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            font-weight: 900;
            line-height: 1;
            aspect-ratio: 1;
            min-height: auto;
        }
        .cell:active { transform: scale(0.95); }
        .cell.x { color: var(--x-color); text-shadow: 0 0 15px rgba(255, 92, 122, 0.5); }
        .cell.o { color: var(--o-color); text-shadow: 0 0 15px rgba(77, 184, 255, 0.5); }
        
        .controls { display: flex; gap: 12px; margin-top: 20px; width: 90vw; max-width: 350px; }
        .btn { flex: 1; padding: 16px; border-radius: 20px; border: none; font-weight: 900; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 1rem; }
        .btn-home { background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%); color: white; border: 1.5px solid rgba(255,255,255,0.2); box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3); }
        .btn-home:active { transform: scale(0.95); }
        
        #alert-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: linear-gradient(135deg, #1a2942 0%, #0F1320 100%); color: white; padding: 40px 30px; border-radius: 30px; text-align: center; width: 100%; max-width: 320px; border: 2px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        
        #win-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 1001; align-items: center; justify-content: center; padding: 20px; }
        #win-modal.show { animation: winBounce 0.6s cubic-bezier(0.34, 1.56, 0.64, 1); }
        @keyframes winBounce {
            0% { opacity: 0; transform: scale(0.5); }
            100% { opacity: 1; transform: scale(1); }
        }
        .win-content { 
            background: linear-gradient(135deg, rgba(245,200,66,0.1) 0%, rgba(77,184,255,0.1) 100%);
            color: white; 
            padding: 50px 30px; 
            border-radius: 30px; 
            text-align: center; 
            width: 100%; 
            max-width: 350px; 
            border: 3px solid var(--gold);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 50px rgba(245, 200, 66, 0.3);
        }
        .win-trophy { font-size: 4rem; margin-bottom: 15px; animation: trophy-float 2s ease-in-out infinite; }
        @keyframes trophy-float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
        .win-title { font-size: 2rem; font-weight: 900; margin: 15px 0; color: var(--gold); text-shadow: 0 0 20px rgba(245, 200, 66, 0.5); }
        .win-name { font-size: 1.5rem; margin: 10px 0; }
        .glow-circle { 
            position: absolute; 
            width: 150px; 
            height: 150px; 
            border: 3px solid; 
            border-radius: 50%; 
            animation: glow-pulse 1.5s ease-in-out infinite;
            pointer-events: none;
        }
        @keyframes glow-pulse {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.1); opacity: 1; }
        }
    </style>
</head>
<body>

<div id="alert-modal">
    <div class="modal-content">
        <div style="font-size: 3rem; margin-bottom: 10px;">😢</div>
        <p id="modal-msg" style="font-size: 1.1rem; font-weight: 600; margin: 0;">אמה עזבה את המשחק</p>
        <button class="btn btn-reset" onclick="goHome()" style="margin-top: 20px;">חזרה לתפריט</button>
    </div>
</div>

<div id="win-modal">
    <div class="win-content">
        <div class="win-trophy">🏅</div>
        <div class="win-title" id="win-title">ניצחון!</div>
        <div class="win-name" id="win-name">🏅 אמה ניצחה!</div>
    </div>
</div>

<div class="header">
    <div id="card-X" class="score-box">
        <div id="name-X" class="name">ממתין...</div>
        <div id="wins-X" class="score">0</div>
        <div class="role-label" id="label-X">X</div>
    </div>
    <div class="score-box">
        <div class="name">תיקו</div>
        <div id="draws" class="score">0</div>
        <div class="role-label">—</div>
    </div>
    <div id="card-O" class="score-box">
        <div id="name-O" class="name">ממתין...</div>
        <div id="wins-O" class="score">0</div>
        <div class="role-label" id="label-O">O</div>
    </div>
</div>

<div id="status-bar">מתחבר...</div>

<div class="board" id="board">
    <div class="cell" data-idx="0"></div><div class="cell" data-idx="1"></div><div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div><div class="cell" data-idx="4"></div><div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div><div class="cell" data-idx="7"></div><div class="cell" data-idx="8"></div>
</div>

<div class="controls">
    <button class="btn btn-home" onclick="goHome()">🏠 בית</button>
    <button class="btn btn-home" id="reset-btn" onclick="resetGameAndScores()" style="background: linear-gradient(135deg, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.05) 100%); border: 1.5px solid rgba(255,215,0,0.3);">🔄 איפוס משחק ותוצאה</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
    authDomain: "kidssapp-izhaki.firebaseapp.com",
    databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kidssapp-izhaki",
    storageBucket: "kidssapp-izhaki.firebasestorage.app",
    messagingSenderId: "663906163746",
    appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const params = new URLSearchParams(location.search);

// קבל את myName מ-URL וקבל את ID מ-sessionStorage
const displayName = params.get('player') || "אורח";
const userDataStr = sessionStorage.getItem('myUser');
const userData = userDataStr ? JSON.parse(userDataStr) : null;
const myName = userData?.id || displayName;  // ID מ-sessionStorage או displayName
const isAIMode = params.get('ai') === 'true';  // בדוק אם זה משחק מול AI

// קבל gameId מ-URL (למשחקי צפייה)
const gameIdParam = params.get('game');

// הסתר את כפתור איפוס אם זה לא AI mode
if (!isAIMode) {
    document.getElementById('reset-btn').style.display = 'none';
}

// בחר room בהתאם לmode
const roomRef = ref(db, isAIMode ? 'rooms_v3/xo_ai' : 'rooms_v3/xo');

// gameStateRef יוגדר בהמשך כשנדע את gameId
let gameStateRef = null;
let currentGameId = gameIdParam || null;  // אם צפייה - יהיה gameId, אחרת null

// ב-AI mode - כל משתמש יהיה לו משחק משלו
// אורחים יקבלו משחק זמני (ephemeral) שימחק כשהם יוצאים
if (isAIMode) {
    gameStateRef = ref(db, `game/xo_ai/${myName}`);  // per-user game state
} else {
    // Non-AI - gameStateRef יוגדר אחרי שנדע את gameId
    // כרגע קבע לערך זמני
    gameStateRef = ref(db, 'game/xo');
}

let mySymbol = null; 
let currentGameState = null;
let gameStartTime = Date.now();
let myColor = userData?.color || '#EEF0FF';
let myEmoji = userData?.emoji || '👤';
let isViewer = false;
let playerCountHistory = [];
let playerColors = { X: '#FF5C7A', O: '#4DB8FF' };  // צבעי X ו-O
let playerNames = { X: '', O: '', X_emoji: '', O_emoji: '' };  // שמות ואימוג'יים

async function initSession() {
    try {
        console.log('🎮 initSession started, myName:', myName, 'AI Mode:', isAIMode);
        
        // 2. רישום בחדר עם נתונים מלאים
        const roomPath = isAIMode ? `rooms_v3/xo_ai/${myName}` : `rooms_v3/xo/${myName}`;
        await set(ref(db, roomPath), { 
            name: displayName,  // שם דיספליי בעברית
            color: myColor,
            emoji: myEmoji,
            timestamp: Date.now(),
            active: true 
        });

        // 3. שמור heartbeat כל שנייה
        setInterval(() => {
            set(ref(db, roomPath), { 
                name: displayName,  // שם דיספליי בעברית
                color: myColor,
                emoji: myEmoji,
                timestamp: Date.now(),
                active: true 
            });
        }, 1000);

        // 4. קביעת תפקיד
        const snapAfter = await get(roomRef);
        const playersAfter = snapAfter.val() || {};
        const playerNamesAfter = Object.keys(playersAfter).sort();

        if (isAIMode) {
            // במצב AI - תמיד יש AI כ-O וכמשחקן כ-X
            mySymbol = 'X';
            playerNames.X = displayName;
            playerNames.X_emoji = myEmoji;
            playerNames.O = 'מחשב';  // שם ל-AI בעברית
            playerNames.O_emoji = '🤖';
            playerColors.O = '#FFB347';  // צבע כתום ל-AI
            
            // אם זה אורח - הסתר את כפתור reset (אורח משחק זמני בלבד)
            if (userData?.id === undefined || userData?.color === '#FFFFFF') {
                document.getElementById('reset-btn').style.display = 'none';
            } else {
                document.getElementById('reset-btn').style.display = 'block';
            }
            
            // בדוק אם כבר יש משחק - אם כן, אל תאתחל אותו מחדש
            const gameSnap = await get(gameStateRef);
            if (!gameSnap.val()) {
                // רק אם אין משחק - אתחל
                resetFirebaseGame(true);
            }
        } else {
            // Non-AI mode - טפל בgameId וצפייה
            
            // אם כבר יש gameId - זה צפייה
            if (currentGameId) {
                isViewer = true;
                mySymbol = null;
                gameStateRef = ref(db, `game/xo/${currentGameId}`);
                // הסתר את reset button
                document.getElementById('reset-btn').style.display = 'none';
            } else if (playerNamesAfter.length > 2) {
                // יותר מ-2 שחקנים - זה צפייה
                isViewer = true;
                mySymbol = null;
                // גנרט gameId מהראשונים שניים (בסדר א-לפבתי)
                currentGameId = playerNamesAfter.slice(0, 2).join('_');
                gameStateRef = ref(db, `game/xo/${currentGameId}`);
                // הסתר את reset button
                document.getElementById('reset-btn').style.display = 'none';
            } else if (playerNamesAfter.length === 1) {
                // משחקן ראשון
                mySymbol = 'X';
                // gameId יהיה בסדר א-לפבתי כשמשחקן שני יצטרף
                // כרגע, אנחנו לא יודעים את שמו, אז נשמור gameId זמני
                // זה יעדכן כשמשחקן שני יצטרף
                currentGameId = null;  // ינוסה בעדכון roomListener
                gameStateRef = ref(db, 'game/xo/pending');  // זמני
                resetFirebaseGame(true);
            } else if (playerNamesAfter.length === 2) {
                // משחקן שני - עדכן gameId בסדר א-לפבתי
                mySymbol = playerNamesAfter[0] === myName ? 'X' : 'O';
                // גנרט gameId מהשניים בסדר א-לפבתי
                currentGameId = playerNamesAfter.slice(0, 2).join('_');
                gameStateRef = ref(db, `game/xo/${currentGameId}`);
                
                // בדוק אם משחק קיים
                const gameSnap = await get(gameStateRef);
                const gameExists = gameSnap.val() !== null;
                
                // אם אין משחק - אתחל
                if (!gameExists) {
                    resetFirebaseGame(true);
                }
            }
        }

        // 5. הפעל listeners
        startListeners();
    } catch (error) {
        console.error('Error in initSession:', error);
    }
}

function startListeners() {
    console.log('🎧 startListeners called');
    onValue(gameStateRef, (snap) => {
        const data = snap.val();
        console.log('📊 gameState:', data);
        // עדכן currentGameState תמיד, גם אם null
        if (data) { 
            currentGameState = data; 
        } else {
            currentGameState = null;
        }
        
        // עדכן תוצאות גם כשאין משחק פעיל (כל משחק שעבר)
        if (data && data.scores) {
            document.getElementById('wins-X').textContent = data.scores.X;
            document.getElementById('wins-O').textContent = data.scores.O;
            document.getElementById('draws').textContent = data.scores.draws;
        }
        
        render(); 
    });

    // עדכון רשימת משחקנים
    onValue(roomRef, (snap) => {
        const players = snap.val() || {};
        const names = Object.keys(players).sort();

        // אל תמחק צופים! הם חלק חוקי מהמשחק
        // (הערה: Non-AI mode תמיד יהיה עד 2 שחקנים + צופים)

        // אם אין שחקנים כלל - נקה את המשחק (רק Non-AI)
        if (names.length === 0 && !isAIMode) {
            if (gameStateRef) {
                set(gameStateRef, null);
            }
        }

        // בדוק אם משחקן עזב (רק בNon-AI ויש משחק פעיל)
        if (!isAIMode && !isViewer) {
            const lastCount = playerCountHistory[playerCountHistory.length - 1];
            
            if (lastCount === 2 && names.length < 2) {
                // משחקן עזב! מחק את הלוח מיד
                if (gameStateRef) {
                    set(gameStateRef, null);
                }
                
                // מצא את השם של השחקן שעזב
                let leftPlayerName = '';
                let leftPlayerEmoji = '';
                
                if (window.lastPlayersSnapshot) {
                    const oldPlayers = window.lastPlayersSnapshot || {};
                    for (const [name, player] of Object.entries(oldPlayers)) {
                        if (!players[name]) {
                            leftPlayerName = player.name;
                            leftPlayerEmoji = player.emoji;
                            break;
                        }
                    }
                }
                
                // הצג הודעה - לכל אחד (משחקן או צופה)
                document.getElementById('alert-modal').style.display = 'flex';
                document.getElementById('modal-msg').innerHTML = `${leftPlayerEmoji} ${leftPlayerName} עזב את המשחק`;
                document.getElementById('alert-modal').querySelector('.btn-reset').onclick = () => goHome();
            }
        }

        // שמור את המצב הנוכחי
        window.lastPlayersSnapshot = players;

        // עדכן את gameStateRef אם משחקן שני הצטרף (Non-AI mode)
        if (!isAIMode && !isViewer && names.length === 2 && !currentGameId) {
            // משחקן שני הצטרף - עדכן את gameId
            currentGameId = names.slice(0, 2).join('_');
            gameStateRef = ref(db, `game/xo/${currentGameId}`);
            
            // בדוק אם משחק קיים (אם לא, יוצרים חדש)
            get(gameStateRef).then(snap => {
                if (!snap.val()) {
                    resetFirebaseGame(true);
                }
            });
        }

        // עדכן את רשימת השחקנים בהכותרת עם אימוג'י וצבעים
        if (isAIMode) {
            // במצב AI - עדכן X בלבד מה-room, O הוא תמיד AI
            if (players[names[0]]) {
                const p1 = players[names[0]];
                playerNames.X = p1.name;  // עדכן שם של X
                playerNames.X_emoji = p1.emoji;  // עדכן אימוג'י של X
                playerColors.X = p1.color;  // עדכן צבע של X
                document.getElementById('name-X').innerHTML = `${p1.emoji || '❌'} ${p1.name}`;
                document.getElementById('name-X').style.color = p1.color || 'white';
                document.getElementById('card-X').style.borderColor = p1.color || 'white';
            } else {
                document.getElementById('name-X').innerHTML = `${myEmoji} ${displayName}`;
                document.getElementById('name-X').style.color = myColor;
                document.getElementById('card-X').style.borderColor = myColor;
            }
            
            // O תמיד AI
            document.getElementById('name-O').innerHTML = `${playerNames.O_emoji} ${playerNames.O}`;
            document.getElementById('name-O').style.color = playerColors.O;
            document.getElementById('card-O').style.borderColor = playerColors.O;
        } else {
            // עדכון רגיל - שני שחקנים אנושיים
            if (players[names[0]]) {
                const p1 = players[names[0]];
                playerColors.X = p1.color || '#FF5C7A';  // שמור צבע של X
                playerNames.X = p1.name;  // שמור שם של X
                playerNames.X_emoji = p1.emoji;  // שמור אימוג'י של X
                document.getElementById('name-X').innerHTML = `${p1.emoji || '❌'} ${p1.name}`;
                document.getElementById('name-X').style.color = p1.color || 'white';
                document.getElementById('card-X').style.borderColor = p1.color || 'white';
            } else {
                document.getElementById('name-X').textContent = "ממתין...";
                document.getElementById('name-X').style.color = 'white';
            }
            
            if (players[names[1]]) {
                const p2 = players[names[1]];
                playerColors.O = p2.color || '#4DB8FF';  // שמור צבע של O
                playerNames.O = p2.name;  // שמור שם של O
                playerNames.O_emoji = p2.emoji;  // שמור אימוג'י של O
                document.getElementById('name-O').innerHTML = `${p2.emoji || '⭕'} ${p2.name}`;
                document.getElementById('name-O').style.color = p2.color || 'white';
                document.getElementById('card-O').style.borderColor = p2.color || 'white';
            } else {
                document.getElementById('name-O').textContent = "ממתין...";
                document.getElementById('name-O').style.color = 'white';
            }
        }

        // עדכן את מספר השחקנים בהיסטוריה
        playerCountHistory.push(names.length);

        // בדוק אם אני צריך להיות צופה
        if (!isViewer && names.length > 2) {
            isViewer = true;
            document.getElementById('status-bar').textContent = "👁️ אתה צופה בלבד";
        }
        
        // עדכן את ה-UI
        render();
    });
}

function resetFirebaseGame(fullReset = false) {
    const newState = {
        board: Array(9).fill(''),
        currentPlayer: 'X',
        starter: 'X',
        gameOver: false,
        scores: fullReset ? { X: 0, O: 0, draws: 0 } : (currentGameState?.scores || { X: 0, O: 0, draws: 0 })
    };
    set(gameStateRef, newState);
}

function render() {
    // אם אין משחק - הצג תוצאות וחכה למשחק חדש
    if (!currentGameState) {
        // נקה את הלוח
        document.querySelectorAll('.cell').forEach((cell) => {
            cell.textContent = '';
            cell.className = 'cell';
        });
        
        // הצג את התוצאות שנשמרו (אם יש)
        // זה יעדכן בזמן שה-render קורא מ-startListeners
        return;
    }
    
    const { board, currentPlayer, scores, gameOver } = currentGameState;

    document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.textContent = board[i];
        cell.className = `cell ${board[i] ? board[i].toLowerCase() : ''}`;
        
        // עדכן צבע דינמי
        if (board[i] === 'X') {
            cell.style.color = playerColors.X;
        } else if (board[i] === 'O') {
            cell.style.color = playerColors.O;
        }
    });

    document.getElementById('wins-X').textContent = scores.X;
    document.getElementById('wins-O').textContent = scores.O;
    document.getElementById('draws').textContent = scores.draws;
    
    document.getElementById('card-X').classList.toggle('active', currentPlayer === 'X' && !gameOver);
    document.getElementById('card-O').classList.toggle('active', currentPlayer === 'O' && !gameOver);

    const status = document.getElementById('status-bar');
    
    // בדוק אם יש ניצחון או תיקו
    if (gameOver) {
        // חשב את המנצח
        const xWins = board.every((cell, i) => {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return !lines.some(l => board[l[0]] === 'X' && board[l[0]] === board[l[1]] && board[l[0]] === board[l[2]]);
        });
        
        const oWins = board.every((cell, i) => {
            const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
            return !lines.some(l => board[l[0]] === 'O' && board[l[0]] === board[l[1]] && board[l[0]] === board[l[2]]);
        });
        
        // בדוק מי ניצח
        let winner = null;
        if (!xWins) winner = 'X';
        else if (!oWins) winner = 'O';
        
        // אם יש ניצח - הצג modal
        if (winner) {
            const winnerName = playerNames[winner];
            const winnerEmoji = playerNames[winner + '_emoji'];
            const winnerColor = playerColors[winner];
            
            document.getElementById('win-modal').classList.add('show');
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-name').textContent = `🏅 ${winnerEmoji} ${winnerName} ניצחה!`;
            document.getElementById('win-name').style.color = winnerColor;
            
            // הסתר ב-2 שניות והתחל משחק חדש
            setTimeout(() => {
                document.getElementById('win-modal').style.display = 'none';
                document.getElementById('win-modal').classList.remove('show');
                autoNextRound();
            }, 2000);
        } else {
            // אין מנצח - זה תיקו!
            document.getElementById('win-modal').classList.add('show');
            document.getElementById('win-modal').style.display = 'flex';
            document.getElementById('win-title').textContent = 'תיקו!';
            document.getElementById('win-title').style.color = '#F5C842';
            document.getElementById('win-name').textContent = '🤝 כולם אתם כמלכים!';
            document.getElementById('win-name').style.color = '#F5C842';
            
            // הסתר ב-2 שניות והתחל משחק חדש
            setTimeout(() => {
                document.getElementById('win-modal').style.display = 'none';
                document.getElementById('win-modal').classList.remove('show');
                autoNextRound();
            }, 2000);
        }
        
        status.textContent = "סיבוב הסתיים!";
    } else if (isViewer) {
        status.textContent = "👁️ אתה צופה בלבד";
    } else {
        // אם תורך - הצג "תורך!" + שם + אימוג'י
        if (mySymbol === currentPlayer) {
            const myName = playerNames[mySymbol];
            const myEmoji = playerNames[mySymbol + '_emoji'];
            status.textContent = `🎮 תורך! ${myEmoji} ${myName}`;
            
            // אם זה AI mode וזה תור של AI - עשה מהלך אוטומטי
            if (isAIMode && mySymbol === 'X' && currentPlayer === 'O') {
                setTimeout(makeAIMove, 1000);
            }
        } else {
            const otherSymbol = mySymbol === 'X' ? 'O' : 'X';
            const otherName = playerNames[otherSymbol];
            const otherEmoji = playerNames[otherSymbol + '_emoji'];
            status.textContent = `⏳ ממתין ל-${otherEmoji} ${otherName}`;
            
            // אם זה AI mode וזה תור של AI - עשה מהלך אוטומטי
            if (isAIMode && otherSymbol === 'O' && currentPlayer === 'O') {
                setTimeout(makeAIMove, 1000);
            }
        }
    }
}

document.querySelectorAll('.cell').forEach(cell => {
    cell.onclick = () => {
        // צופים לא יכולים לשחק
        if (isViewer) return;
        
        const idx = cell.dataset.idx;
        if (!mySymbol || mySymbol !== currentGameState.currentPlayer || currentGameState.board[idx] !== '' || currentGameState.gameOver) return;

        const newBoard = [...currentGameState.board];
        newBoard[idx] = mySymbol;
        const win = checkWinner(newBoard);
        const draw = !win && !newBoard.includes('');
        
        const updates = { board: newBoard };
        if (win || draw) {
            updates.gameOver = true;
            const newScores = {...currentGameState.scores};
            if (win) newScores[mySymbol]++;
            else newScores.draws++;
            updates.scores = newScores;
            if (mySymbol === 'X') setTimeout(autoNextRound, 2500);
        } else {
            updates.currentPlayer = mySymbol === 'X' ? 'O' : 'X';
            // אם זה משחק מול AI והתור של AI - עשה מהלך
            if (isAIMode && updates.currentPlayer === 'O') {
                setTimeout(makeAIMove, 1000);  // עיכוב של שנייה
            }
        }
        update(gameStateRef, updates);
    };
});

function checkWinner(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return lines.some(l => b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]);
}

async function makeAIMove() {
    if (!currentGameState || currentGameState.currentPlayer !== 'O' || currentGameState.gameOver) return;
    
    const board = [...currentGameState.board];
    
    // 1. בדוק אם AI יכולה לנצח
    for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
            board[i] = 'O';
            if (checkWinner(board)) {
                // AI יכולה לנצח! תשחק כאן
                const newScores = {...currentGameState.scores};
                newScores['O']++;
                await update(gameStateRef, { board, gameOver: true, scores: newScores });
                setTimeout(autoNextRound, 2500);
                return;
            }
            board[i] = '';
        }
    }
    
    // 2. בדוק אם צריך לחסום את המשחקן
    for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
            board[i] = 'X';
            if (checkWinner(board)) {
                // צריך לחסום! תשחק כאן
                board[i] = 'O';
                // בדוק אם יש תיקו
                const isDraw = !checkWinner(board) && !board.includes('');
                if (isDraw) {
                    const newScores = {...currentGameState.scores};
                    newScores.draws++;
                    await update(gameStateRef, { board, gameOver: true, scores: newScores });
                    setTimeout(autoNextRound, 2500);
                } else {
                    await update(gameStateRef, { board, currentPlayer: 'X' });
                }
                return;
            }
            board[i] = '';
        }
    }
    
    // 3. שחק במרכז אם זה פנוי
    if (board[4] === '') {
        board[4] = 'O';
        // בדוק אם יש תיקו
        const isDraw = !checkWinner(board) && !board.includes('');
        if (isDraw) {
            const newScores = {...currentGameState.scores};
            newScores.draws++;
            await update(gameStateRef, { board, gameOver: true, scores: newScores });
            setTimeout(autoNextRound, 2500);
        } else {
            await update(gameStateRef, { board, currentPlayer: 'X' });
        }
        return;
    }
    
    // 4. שחק בפינה רנדומאלית
    const corners = [0, 2, 6, 8].filter(i => board[i] === '');
    if (corners.length > 0) {
        const move = corners[Math.floor(Math.random() * corners.length)];
        board[move] = 'O';
        // בדוק אם יש תיקו
        const isDraw = !checkWinner(board) && !board.includes('');
        if (isDraw) {
            const newScores = {...currentGameState.scores};
            newScores.draws++;
            await update(gameStateRef, { board, gameOver: true, scores: newScores });
            setTimeout(autoNextRound, 2500);
        } else {
            await update(gameStateRef, { board, currentPlayer: 'X' });
        }
        return;
    }
    
    // 5. שחק בכל מקום שנותר
    for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
            board[i] = 'O';
            // בדוק אם יש תיקו
            const isDraw = !checkWinner(board) && !board.includes('');
            if (isDraw) {
                const newScores = {...currentGameState.scores};
                newScores.draws++;
                await update(gameStateRef, { board, gameOver: true, scores: newScores });
                setTimeout(autoNextRound, 2500);
            } else {
                await update(gameStateRef, { board, currentPlayer: 'X' });
            }
            return;
        }
    }
}

async function autoNextRound() {
    const snap = await get(gameStateRef);
    const data = snap.val();
    if (!data || !data.gameOver) return;
    
    // חשב מי צריך להתחיל את הסיבוב הבא
    const nextStarter = data.starter === 'X' ? 'O' : 'X';
    
    // חדש את הלוח וקבע מי מתחיל
    const nextRound = {
        board: Array(9).fill(''),
        currentPlayer: nextStarter,
        starter: nextStarter,
        gameOver: false,
        scores: data.scores  // שמור את התוצאות
    };
    
    await update(gameStateRef, nextRound);
    
    // אם ה-AI מתחיל במשחק הבא - תן לו זמן להשחק
    if (isAIMode && nextStarter === 'O') {
        setTimeout(makeAIMove, 1000);
    }
}

window.goHome = async () => {
    try {
        // אם זה לא AI mode - מחק את החדר כולו (משחק + room)
        if (!isAIMode && currentGameId) {
            // מחק את המשחק
            await remove(ref(db, `game/xo/${currentGameId}`));
            // מחק את כל החדר (כל השחקנים)
            await remove(ref(db, `rooms_v3/xo`));
        }
        // AI mode - אל תמחק כלום, רק חזור לindex
    } catch (error) {
        console.error('Error in goHome:', error);
    }
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 200);
};

window.resetGameAndScores = async () => {
    try {
        // אפס את הלוח והתוצאה - מתחיל משחק מחדש ללא ניקוד
        const newState = {
            board: Array(9).fill(''),
            currentPlayer: 'X',
            starter: 'X',
            gameOver: false,
            scores: { X: 0, O: 0, draws: 0 }  // אפס הניקוד
        };
        await set(gameStateRef, newState);
    } catch (error) {
        console.error('Error resetting game:', error);
    }
};

window.handleForfeit = () => {
    if (currentGameState && !currentGameState.gameOver) {
        const other = mySymbol === 'X' ? 'O' : 'X';
        const s = {...currentGameState.scores};
        s[other]++;
        update(gameStateRef, { scores: s, gameOver: true });
        if (mySymbol === 'X') setTimeout(autoNextRound, 2000);
    }
};

initSession();
