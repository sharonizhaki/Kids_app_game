<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>איקס עיגול - אמה וריף</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Heebo', sans-serif; background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; color: white; overflow: hidden; position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,92,122,0.1) 0%, transparent 60%), radial-gradient(ellipse 80% 60% at 80% 80%, rgba(77,184,255,0.1) 0%, transparent 60%); pointer-events: none; }
    .container { position: relative; z-index: 10; text-align: center; width: 100%; max-width: 400px; padding: 20px; }
    .badge { padding: 6px 15px; border-radius: 20px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); margin-bottom: 20px; display: inline-block; font-size: 0.9rem; }
    .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 10px; margin-bottom: 20px; }
    .score-card { background: rgba(255,255,255,0.05); padding: 15px; border-radius: 15px; border: 2px solid transparent; transition: 0.3s; }
    .score-card.active { border-color: #ffd700; background: rgba(255,255,255,0.12); transform: scale(1.05); }
    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 10px; margin: 20px 0; }
    .cell { background: rgba(255,255,255,0.05); border-radius: 15px; height: 100px; display: flex; align-items: center; justify-content: center; font-size: 3.5rem; cursor: pointer; transition: 0.2s; }
    .cell:active { transform: scale(0.95); }
    .btn { padding: 15px 25px; border-radius: 15px; border: none; font-weight: 800; cursor: pointer; background: #5c6bc0; color: white; margin: 5px; box-shadow: 0 4px 10px rgba(0,0,0,0.3); }
    .x-color { color: #FF5C7A; font-weight: 900; } .o-color { color: #4DB8FF; font-weight: 900; }
  </style>
</head>
<body>
<div class="container">
  <div class="badge" id="my-role">מתחבר...</div>
  <div class="scoreboard">
    <div class="score-card" id="card-X"><div class="x-color">אמה (X)</div><div id="score-X" style="font-size:1.8rem">0</div></div>
    <div style="align-self:center; opacity:0.5; font-weight:bold;">נגד</div>
    <div class="score-card" id="card-O"><div class="o-color">ריף (O)</div><div id="score-O" style="font-size:1.8rem">0</div></div>
  </div>
  <div id="status" style="color:#ffd700; font-weight:bold; height:24px; margin-bottom:10px; font-size:1.2rem;"></div>
  <div class="board" id="board">
    <div class="cell" data-idx="0"></div><div class="cell" data-idx="1"></div><div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div><div class="cell" data-idx="4"></div><div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div><div class="cell" data-idx="7"></div><div class="cell" data-idx="8"></div>
  </div>
  <button class="btn" onclick="resetGame()">משחק חדש</button>
  <button class="btn" style="background:rgba(255,255,255,0.1)" onclick="location.href='index.html'">בית</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db, 'game/xo');

const params = new URLSearchParams(location.search);
const myId = params.get('player') || "";
let mySymbol = null;

if (myId.includes('emma')) mySymbol = 'X';
else if (myId.includes('rif')) mySymbol = 'O';

// ניקוי חדר ההמתנה ברגע שנכנסנו למשחק
if (myId) remove(ref(db, `rooms_v3/xo/${myId}`));

onValue(gameRef, (snap) => {
    const data = snap.val() || {};
    const board = data.board || Array(9).fill('');
    const turn = data.currentPlayer || 'X';
    const gameOver = data.gameOver || false;

    document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.textContent = board[i];
        cell.className = `cell ${board[i] === 'X' ? 'x-color' : 'o-color'}`;
    });

    document.getElementById('score-X').textContent = data.scores?.X || 0;
    document.getElementById('score-O').textContent = data.scores?.O || 0;
    document.getElementById('card-X').classList.toggle('active', turn === 'X' && !gameOver);
    document.getElementById('card-O').classList.toggle('active', turn === 'O' && !gameOver);
    document.getElementById('my-role').textContent = mySymbol ? `אתה משחק בתור: ${mySymbol === 'X' ? 'אמה' : 'ריף'}` : "צופה";

    const statusEl = document.getElementById('status');
    if (gameOver) {
        statusEl.textContent = board.includes('') ? `המנצח: ${turn === 'X' ? 'אמה' : 'ריף'}` : "תיקו!";
    } else {
        statusEl.textContent = (mySymbol === turn) ? "תורך!" : `תור ${turn === 'X' ? 'אמה' : 'ריף'}`;
    }
});

document.querySelectorAll('.cell').forEach(cell => {
    cell.onclick = async () => {
        const idx = cell.dataset.idx;
        const snap = await get(gameRef);
        const data = snap.val() || {};
        const board = data.board || Array(9).fill('');
        
        if (data.gameOver || board[idx] !== '' || data.currentPlayer !== mySymbol) return;

        board[idx] = mySymbol;
        const win = checkWin(board);
        const isDraw = !win && !board.includes('');
        const scores = data.scores || { X: 0, O: 0 };
        
        if (win) scores[mySymbol]++;

        update(gameRef, {
            board: board,
            currentPlayer: (win || isDraw) ? mySymbol : (mySymbol === 'X' ? 'O' : 'X'),
            gameOver: win || isDraw,
            scores: scores
        });
    };
});

function checkWin(b) {
    const lines = [
        [0, 1, 2], [3, 4, 5], [6, 7, 8], // שורות
        [0, 3, 6], [1, 4, 7], [2, 5, 8], // עמודות
        [0, 4, 8], [2, 4, 6]             // אלכסונים
    ];
    for (let l of lines) {
        if (b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]) return true;
    }
    return false;
}

window.resetGame = () => {
    update(gameRef, { 
        board: Array(9).fill(''), 
        currentPlayer: 'X', 
        gameOver: false 
    });
};
</script>
</body>
</html>
