<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>איקס עיגול - אמה וריף</title>
  <script src="https://unpkg.com/vconsole@latest/dist/vconsole.min.js"></script>
  <script>var vConsole = new window.VConsole();</script>
  
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; color: white; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,107,107,0.12) 0%, transparent 60%), radial-gradient(ellipse 80% 60% at 80% 80%, rgba(78,205,196,0.12) 0%, transparent 60%); pointer-events: none; z-index: 0; }
    
    .container { position: relative; z-index: 1; text-align: center; padding: 1.5rem; max-width: 420px; width: 100%; }
    h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: 3px; background: linear-gradient(135deg, #ff6b6b, #ffd700, #4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; margin-bottom: 0.5rem; filter: drop-shadow(0 0 20px rgba(255,215,0,0.3)); }
    
    .my-role-badge { display: inline-block; padding: 6px 16px; border-radius: 20px; background: rgba(255,255,255,0.08); font-size: 0.9rem; margin-bottom: 15px; border: 1.5px solid rgba(255,255,255,0.1); transition: 0.3s; }

    .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.8rem; margin-bottom: 1.4rem; align-items: stretch; }
    .score-card { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 0.8rem 0.6rem; transition: all 0.35s ease; }
    .score-card.active { border-color: #ffd700; transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); background: rgba(255,255,255,0.08); }
    .player-name { font-size: 0.9rem; font-weight: 700; margin-bottom: 5px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .x-text { color: #ff6b6b; }
    .o-text { color: #4ecdc4; }
    .score-value { font-size: 2.2rem; font-weight: 900; }
    
    .draw-card { display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 0.5rem; color: #718096; }

    .turn-bar { height: 2.4rem; margin-bottom: 1.2rem; font-size: 1.2rem; font-weight: 700; color: #ffd700; }

    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 312px; height: 312px; margin: 0 auto 1.4rem; }
    .cell { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: 0.2s; height: 100px; -webkit-tap-highlight-color: transparent; }
    .cell svg { width: 52px; height: 52px; }
    
    .x-path { stroke: #ff6b6b; stroke-width: 6; stroke-linecap: round; fill: none; stroke-dasharray: 60; stroke-dashoffset: 60; animation: draw 0.3s forwards; }
    .o-circle { stroke: #4ecdc4; stroke-width: 6; stroke-linecap: round; fill: none; stroke-dasharray: 126; stroke-dashoffset: 126; animation: draw 0.3s forwards; }
    @keyframes draw { to { stroke-dashoffset: 0; } }
    .cell.winning { background: rgba(255,215,0,0.15); animation: winPulse 0.6s infinite alternate; }
    @keyframes winPulse { from { transform: scale(1); } to { transform: scale(1.05); } }

    .buttons { display: flex; gap: 0.8rem; justify-content: center; }
    .btn { padding: 0.8rem 1.5rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; -webkit-tap-highlight-color: transparent; }
    .btn-restart { background: linear-gradient(135deg, #667eea, #764ba2); color: white; flex: 1; }
    .btn-home { background: rgba(255,255,255,0.1); color: white; }
  </style>
</head>
<body>

<div class="container">
  <div class="my-role-badge" id="my-role">מזהה שחקן...</div>
  <h1>✕ ◯</h1>

  <div class="scoreboard">
    <div class="score-card" id="card-X">
      <div class="player-name x-text" id="name-X">אמה</div>
      <div class="score-value" id="score-X">0</div>
    </div>
    <div class="draw-card">
      <div style="font-size:0.7rem">תיקו</div>
      <div id="score-draw" style="font-size:1.2rem; font-weight:bold">0</div>
    </div>
    <div class="score-card" id="card-O">
      <div class="player-name o-text" id="name-O">ריף</div>
      <div class="score-value" id="score-O">0</div>
    </div>
  </div>

  <div class="turn-bar" id="status-text">מתחבר...</div>

  <div class="board" id="board">
    <div class="cell" data-idx="0"></div><div class="cell" data-idx="1"></div><div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div><div class="cell" data-idx="4"></div><div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div><div class="cell" data-idx="7"></div><div class="cell" data-idx="8"></div>
  </div>

  <div class="buttons">
    <button class="btn btn-restart" onclick="resetGame()">משחק חדש</button>
    <button class="btn btn-home" onclick="location.href='index.html'">🏠</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, update, get, set } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db, 'game/xo');
const roomRef = ref(db, 'rooms_v3/xo');

const params = new URLSearchParams(location.search);
const myId = params.get('player') || "";

let mySymbol = null;
let currentPlayersNames = { X: 'אמה', O: 'ריף' };

// זיהוי מיידי לפי ה-ID בכתובת
if (myId.toLowerCase().includes('emma')) {
    mySymbol = 'X';
} else if (myId.toLowerCase().includes('rif')) {
    mySymbol = 'O';
}

// עדכון Firebase שאני כאן (כדי למנוע את המערך הריק)
if (myId) {
    set(ref(db, `rooms_v3/xo/${myId}`), {
        name: mySymbol === 'X' ? 'אמה' : (mySymbol === 'O' ? 'ריף' : 'אורח'),
        active: true
    });
}

// האזנה לשחקנים בחדר לעדכון ה-UI
onValue(roomRef, (snap) => {
    const data = snap.val() || {};
    const ids = Object.keys(data);
    
    console.log("Current IDs in room:", ids);

    const badge = document.getElementById('my-role');
    if (mySymbol) {
        badge.textContent = `אתה: ${mySymbol === 'X' ? 'אמה' : 'ריף'} (${mySymbol})`;
        badge.style.borderColor = mySymbol === 'X' ? '#ff6b6b' : '#4ecdc4';
    } else {
        badge.textContent = "מצב צפייה";
    }
});

// לוגיקה של המשחק
onValue(gameRef, (snap) => {
    const data = snap.val() || {};
    const board = data.board || Array(9).fill('');
    const turn = data.currentPlayer || 'X';
    const gameOver = data.gameOver || false;

    document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.classList.remove('winning');
        if (board[i] === 'X') {
            cell.innerHTML = `<svg viewBox="0 0 60 60"><line class="x-path" x1="15" y1="15" x2="45" y2="45"/><line class="x-path" x1="45" y1="15" x2="15" y2="45"/></svg>`;
        } else if (board[i] === 'O') {
            cell.innerHTML = `<svg viewBox="0 0 60 60"><circle class="o-circle" cx="30" cy="30" r="20"/></svg>`;
        } else {
            cell.innerHTML = '';
        }
    });

    if (data.winCombo) {
        data.winCombo.forEach(idx => document.querySelectorAll('.cell')[idx].classList.add('winning'));
    }

    document.getElementById('score-X').textContent = data.scores?.X || 0;
    document.getElementById('score-O').textContent = data.scores?.O || 0;
    document.getElementById('score-draw').textContent = data.scores?.draw || 0;
    
    document.getElementById('card-X').classList.toggle('active', turn === 'X' && !gameOver);
    document.getElementById('card-O').classList.toggle('active', turn === 'O' && !gameOver);

    const statusEl = document.getElementById('status-text');
    if (gameOver) {
        const winnerName = board.includes('') ? (turn === 'X' ? 'אמה' : 'ריף') : "";
        statusEl.textContent = board.includes('') ? `🏆 המנצח: ${winnerName}` : "🤝 תיקו!";
    } else {
        const turnName = turn === 'X' ? 'אמה' : 'ריף';
        statusEl.textContent = (mySymbol === turn) ? "תורך לשחק!" : `תור ${turnName}...`;
    }
});

document.querySelectorAll('.cell').forEach(cell => {
    cell.onclick = async () => {
        const idx = cell.dataset.idx;
        const snap = await get(gameRef);
        const data = snap.val() || {};
        const board = data.board || Array(9).fill('');
        const turn = data.currentPlayer || 'X';

        if (data.gameOver || board[idx] !== '' || turn !== mySymbol) return;

        board[idx] = mySymbol;
        const win = checkWin(board);
        const isDraw = !win && !board.includes('');
        const scores = data.scores || { X: 0, O: 0, draw: 0 };

        if (win) scores[mySymbol]++;
        if (isDraw) scores.draw++;

        update(gameRef, {
            board: board,
            currentPlayer: (win || isDraw) ? mySymbol : (mySymbol === 'X' ? 'O' : 'X'),
            gameOver: win || isDraw,
            winCombo: win || null,
            scores: scores
        });
    };
});

function checkWin(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (let l of lines) {
        if (b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]) return l;
    }
    return null;
}

window.resetGame = () => {
    update(gameRef, {
        board: Array(9).fill(''),
        currentPlayer: 'X',
        gameOver: false,
        winCombo: null
    });
};
</script>
</body>
</html>
