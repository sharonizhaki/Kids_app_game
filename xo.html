<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>איקס עיגול - קרב משתתפים</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root { --bg: #0F1320; --surface: rgba(255, 255, 255, 0.05); --x-color: #FF5C7A; --o-color: #4DB8FF; --gold: #F5C842; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Heebo', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background: linear-gradient(135deg, #0F1320 0%, #1a2942 100%); color: white; min-height: 100vh; display: flex; flex-direction: column; align-items: center; overflow-x: hidden; overflow-y: auto; }
        
        /* רקע אנימציה */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -2;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255, 92, 122, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(77, 184, 255, 0.1) 0%, transparent 50%);
        }

        /* כוכבים */
        .stars {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: radial-gradient(white 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.08;
            pointer-events: none;
        }

        /* אלמנטים זזים */
        .floating-emoji {
            position: fixed;
            font-size: 5rem;
            opacity: 0.25;
            pointer-events: none;
            z-index: 0;
            filter: blur(2px);
            user-select: none;
            -webkit-user-select: none;
            animation: float-all 26s infinite ease-in-out;
        }
        @keyframes float-all {
            0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
            12.5% { transform: translate(110px, -95px) rotate(35deg) scale(1.05); }
            25% { transform: translate(85px, 75px) rotate(15deg) scale(0.98); }
            37.5% { transform: translate(-95px, 110px) rotate(-30deg) scale(0.95); }
            50% { transform: translate(-110px, -80px) rotate(-20deg) scale(1.02); }
            62.5% { transform: translate(-70px, -120px) rotate(40deg) scale(1.08); }
            75% { transform: translate(100px, -65px) rotate(-10deg) scale(0.97); }
            87.5% { transform: translate(75px, 90px) rotate(25deg) scale(1.03); }
        }
        
        .header { display: flex; justify-content: space-around; width: 100%; max-width: 500px; padding: 20px; margin-top: 10px; gap: 10px; }
        .score-box { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            padding: 18px 15px 16px; 
            border-radius: 25px; 
            text-align: center; 
            min-width: 100px;
            height: 135px;
            border: 2.5px solid transparent; 
            transition: all 0.3s ease;
            backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
        }
        .score-box::before {
            content: '';
            position: absolute;
            inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
            pointer-events: none;
        }
        .score-box.active { 
            border-color: var(--gold);
            transform: scale(1.08);
            box-shadow: 0 0 25px rgba(245, 200, 66, 0.4), inset 0 0 15px rgba(245, 200, 66, 0.1);
            animation: borderGlow 0.8s ease-in-out infinite;
        }
        
        @keyframes borderGlow {
            0%, 100% { 
                border-color: var(--gold);
                box-shadow: 0 0 15px rgba(245, 200, 66, 0.3), inset 0 0 10px rgba(245, 200, 66, 0.05);
            }
            50% { 
                border-color: var(--gold);
                box-shadow: 0 0 50px rgba(245, 200, 66, 1), inset 0 0 30px rgba(245, 200, 66, 0.4);
            }
        }
        
        .name { font-weight: 900; font-size: 0.95rem; margin-bottom: 3px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; min-height: 25px; }
        .score { font-family: 'Fredoka One', cursive; font-size: 2.5rem; font-weight: 900; line-height: 1; margin: 5px 0; flex-grow: 1; display: flex; align-items: center; justify-content: center; }
        .role-label { 
            font-size: 1.1rem; 
            color: var(--gold); 
            font-weight: 900; 
            margin-top: 0;
            text-shadow: 0 0 10px rgba(245, 200, 66, 0.3);
            min-height: 20px;
        }
        
        #status-bar { margin: 15px 0; font-weight: 800; color: var(--gold); font-size: 1.1rem; height: 30px; text-shadow: 0 0 10px rgba(245, 200, 66, 0.3); animation: fadeInOut 0.4s ease; }
        @keyframes fadeInOut {
            0% { opacity: 0.7; transform: scale(0.95); }
            100% { opacity: 1; transform: scale(1); }
        }
        .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; width: 90vw; max-width: 350px; aspect-ratio: 1; margin: 15px 0; }
        .cell { 
            background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
            border-radius: 20px; 
            display: flex; 
            align-items: center; 
            justify-content: center; 
            font-size: 3.8rem; 
            font-family: 'Fredoka One', cursive; 
            cursor: pointer; 
            transition: all 0.2s ease; 
            border: 2px solid rgba(255,255,255,0.1);
            backdrop-filter: blur(10px);
            font-weight: 900;
            line-height: 1;
            aspect-ratio: 1;
            min-height: auto;
        }
        .cell:active { transform: scale(0.95); }
        .cell.x { color: var(--x-color); text-shadow: 0 0 15px rgba(255, 92, 122, 0.5); }
        .cell.o { color: var(--o-color); text-shadow: 0 0 15px rgba(77, 184, 255, 0.5); }
        
        /* אנימציית pop-in כשמניחים סימן */
        .cell.just-placed {
            animation: popIn 0.35s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes popIn {
            0% { transform: scale(0); opacity: 0; }
            60% { transform: scale(1.2); opacity: 1; }
            100% { transform: scale(1); }
        }
        
        /* סימון קו מנצח */
        .cell.winner-cell {
            animation: winnerPulse 0.8s ease-in-out infinite;
            border-color: var(--gold) !important;
            box-shadow: 0 0 25px rgba(245, 200, 66, 0.6);
            z-index: 1;
        }
        @keyframes winnerPulse {
            0%, 100% { 
                box-shadow: 0 0 15px rgba(245, 200, 66, 0.4);
                transform: scale(1);
            }
            50% { 
                box-shadow: 0 0 35px rgba(245, 200, 66, 0.8);
                transform: scale(1.05);
            }
        }
        
        /* confetti */
        .confetti-container {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1002;
            overflow: hidden;
        }
        .confetti-piece {
            position: absolute;
            width: 10px;
            height: 10px;
            top: -10px;
            border-radius: 2px;
            animation: confettiFall linear forwards;
        }
        @keyframes confettiFall {
            0% { transform: translateY(0) rotate(0deg); opacity: 1; }
            80% { opacity: 1; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        .controls { display: flex; gap: 12px; margin-top: 20px; width: 90vw; max-width: 350px; }
        .btn { flex: 1; padding: 16px; border-radius: 20px; border: none; font-weight: 900; cursor: pointer; transition: all 0.2s; text-align: center; font-size: 1rem; }
        .btn-home { background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%); color: white; border: 1.5px solid rgba(255,255,255,0.2); box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3); }
        .btn-home:active { transform: scale(0.95); }
        
        #alert-modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.9); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: linear-gradient(135deg, #1a2942 0%, #0F1320 100%); color: white; padding: 40px 30px; border-radius: 30px; text-align: center; width: 100%; max-width: 320px; border: 2px solid rgba(255,255,255,0.1); backdrop-filter: blur(10px); }
        
        /* באנר ניצחון/תיקו - בין הכותרת ללוח */
        #win-banner {
            width: 90vw;
            max-width: 350px;
            text-align: center;
            padding: 14px 20px;
            border-radius: 20px;
            font-weight: 900;
            font-size: 1.3rem;
            margin: 0;
            border: 2.5px solid var(--gold);
            background: linear-gradient(135deg, rgba(245,200,66,0.12) 0%, rgba(245,200,66,0.04) 100%);
            backdrop-filter: blur(10px);
            box-shadow: 0 0 30px rgba(245, 200, 66, 0.25);
            animation: bannerIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
        }
        @keyframes bannerIn {
            0% { transform: scale(0.5); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>

<div class="stars"></div>
<div class="floating-emoji" style="top: 15%; left: 5%; animation-delay: 0s;">❌</div>
<div class="floating-emoji" style="top: 50%; right: 8%; animation-delay: -6.7s;">⭕</div>
<div class="floating-emoji" style="bottom: 20%; left: 10%; animation-delay: -13.3s;">🏆</div>

<div id="alert-modal">
    <div class="modal-content">
        <div style="font-size: 3rem; margin-bottom: 10px;">😢</div>
        <p id="modal-msg" style="font-size: 1.1rem; font-weight: 600; margin: 0;">אמה עזבה את המשחק</p>
        <button class="btn btn-reset" onclick="goHome()" style="margin-top: 20px;">חזרה לתפריט</button>
    </div>
</div>

<div class="header">
    <div id="card-X" class="score-box">
        <div id="name-X" class="name">ממתין...</div>
        <div id="wins-X" class="score">0</div>
        <div class="role-label" id="label-X">X</div>
    </div>
    <div class="score-box">
        <div class="name">תיקו</div>
        <div id="draws" class="score">0</div>
        <div class="role-label">—</div>
    </div>
    <div id="card-O" class="score-box">
        <div id="name-O" class="name">ממתין...</div>
        <div id="wins-O" class="score">0</div>
        <div class="role-label" id="label-O">O</div>
    </div>
</div>

<div id="status-bar">מתחבר...</div>

<div id="win-banner" style="display:none;"></div>

<div class="board" id="board">
    <div class="cell" data-idx="0"></div><div class="cell" data-idx="1"></div><div class="cell" data-idx="2"></div>
    <div class="cell" data-idx="3"></div><div class="cell" data-idx="4"></div><div class="cell" data-idx="5"></div>
    <div class="cell" data-idx="6"></div><div class="cell" data-idx="7"></div><div class="cell" data-idx="8"></div>
</div>

<div class="controls">
    <button class="btn btn-home" onclick="goHome()">🏠 בית</button>
    <button class="btn btn-home" id="reset-btn" onclick="resetGameAndScores()" style="background: linear-gradient(135deg, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.05) 100%); border: 1.5px solid rgba(255,215,0,0.3);">🔄 איפוס תוצאה</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue, set, update, get, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
    authDomain: "kidssapp-izhaki.firebaseapp.com",
    databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kidssapp-izhaki",
    storageBucket: "kidssapp-izhaki.firebasestorage.app",
    messagingSenderId: "663906163746",
    appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const params = new URLSearchParams(location.search);

// קבל את myName מ-URL וקבל את ID מ-sessionStorage
const displayName = params.get('player') || "משתמש";
const userDataStr = sessionStorage.getItem('myUser');
const userData = userDataStr ? JSON.parse(userDataStr) : null;

// אם אין userData - יוצר userData זמני עם צבע אדום (משתמש רגיל, לא אורח)
const finalUserData = userData || {
    id: `user_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`,
    name: displayName,
    color: '#FF5C7A',  // אדום = משתמש רגיל (לא לבן שזה אורח!)
    emoji: '👤'
};

const myName = finalUserData.id;
const isAIMode = params.get('ai') === 'true';  // בדוק אם זה משחק מול AI

// הסתר את כפתור איפוס אם זה לא AI mode
if (!isAIMode) {
    document.getElementById('reset-btn').style.display = 'none';
}

// בחר room בהתאם לmode
const roomRef = ref(db, isAIMode ? 'rooms_v3/xo_ai' : 'rooms_v3/xo');

// gameStateRef יוגדר בהמשך כשנדע את gameId
let gameStateRef = null;
let currentGameId = null;

// ב-AI mode - כל משתמש יהיה לו משחק משלו
// אורחים יקבלו משחק זמני (ephemeral) שימחק כשהם יוצאים
if (isAIMode) {
    gameStateRef = ref(db, `game/xo_ai/${myName}`);  // per-user game state
} else {
    // Non-AI - gameStateRef יוגדר ב-initSession כשנדע את gameId
    gameStateRef = null;
}

let mySymbol = null; 
let currentGameState = null;
let myColor = finalUserData.color;
let myEmoji = finalUserData.emoji;
let lastPlayerCount = 0;
let playerColors = { X: '#FF5C7A', O: '#4DB8FF' };  // צבעי X ו-O
let playerNames = { X: '', O: '', X_emoji: '', O_emoji: '' };  // שמות ואימוג'יים
let aiMoveScheduled = false;  // guard נגד קריאות כפולות ל-makeAIMove
let winModalShown = false;  // guard נגד פתיחה כפולה של win-modal

async function initSession() {
    try {
        console.log('🎮 initSession started, myName:', myName, 'AI Mode:', isAIMode);
        
        const roomPath = isAIMode ? `rooms_v3/xo_ai/${myName}` : `rooms_v3/xo/${myName}`;
        const myJoinedAt = Date.now();

        if (isAIMode) {
            // במצב AI - תמיד נרשם ומתחילים
            await set(ref(db, roomPath), { 
                name: displayName, color: myColor, emoji: myEmoji,
                joinedAt: myJoinedAt, timestamp: myJoinedAt, active: true 
            });
            startHeartbeat(roomPath, myJoinedAt);
            
            mySymbol = 'X';
            playerNames.X = displayName;
            playerNames.X_emoji = myEmoji;
            playerNames.O = 'מחשב';
            playerNames.O_emoji = '🤖';
            playerColors.O = '#FFB347';
            
            document.getElementById('reset-btn').style.display = 'block';
            
            const gameSnap = await get(gameStateRef);
            if (!gameSnap.val()) {
                resetFirebaseGame(true);
            }
        } else {
            // שחקן רגיל - בדוק אם כבר רשום ב-room (מגיע מ-index waiting)
            const existingSnap = await get(ref(db, roomPath));
            const existingData = existingSnap.val();
            const myJoinedAtFinal = existingData?.joinedAt || myJoinedAt;
            
            // נרשם/עדכן ב-room עם joinedAt המקורי
            await set(ref(db, roomPath), { 
                name: displayName, color: myColor, emoji: myEmoji,
                joinedAt: myJoinedAtFinal, timestamp: Date.now(), active: true 
            });
            startHeartbeat(roomPath, myJoinedAtFinal);
            
            // קרא אחרי רישום
            const snapAfter = await get(roomRef);
            const playersAfter = snapAfter.val() || {};
            const playerNamesAfter = Object.keys(playersAfter)
                .sort((a, b) => (playersAfter[a].joinedAt || playersAfter[a].timestamp || 0) - (playersAfter[b].joinedAt || playersAfter[b].timestamp || 0));
            
            if (playerNamesAfter.length <= 2) {
                // 1 או 2 שחקנים - אני שחקן פעיל
                if (playerNamesAfter.length === 1) {
                    mySymbol = 'X';
                    currentGameId = null;
                    gameStateRef = ref(db, 'game/xo/pending');
                    resetFirebaseGame(true);
                } else {
                    const firstPlayer = playerNamesAfter[0];
                    const secondPlayer = playerNamesAfter[1];
                    
                    mySymbol = myName === firstPlayer ? 'X' : 'O';
                    currentGameId = `${firstPlayer}_${secondPlayer}`;
                    gameStateRef = ref(db, `game/xo/${currentGameId}`);
                    
                    // מחק pending אם קיים
                    remove(ref(db, 'game/xo/pending'));
                    
                    const gameSnap = await get(gameStateRef);
                    if (!gameSnap.val()) {
                        resetFirebaseGame(true);
                    }
                }
            } else {
                // 3+ שחקנים - אני שלישי, המשחק מלא
                stopHeartbeat();
                await remove(ref(db, roomPath));
                showFullGameMessage();
                return;
            }
        }

        // הפעל listeners
        startListeners();
        
        // הפעל בדיקת heartbeat של היריב (non-AI בלבד)
        startOpponentCheck();
    } catch (error) {
        console.error('Error in initSession:', error);
    }
}

function startHeartbeat(roomPath, joinedAt) {
    window.heartbeatInterval = setInterval(() => {
        set(ref(db, roomPath), { 
            name: displayName, color: myColor, emoji: myEmoji,
            joinedAt: joinedAt, timestamp: Date.now(), active: true 
        });
    }, 1000);
}

function stopHeartbeat() {
    if (window.heartbeatInterval) {
        clearInterval(window.heartbeatInterval);
        window.heartbeatInterval = null;
    }
}

function showFullGameMessage() {
    document.getElementById('alert-modal').style.display = 'flex';
    document.getElementById('alert-modal').querySelector('div[style*="font-size: 3rem"]').textContent = '🚫';
    document.getElementById('modal-msg').textContent = 'המשחק מלא! כבר משחקים כאן שני שחקנים';
    document.getElementById('alert-modal').querySelector('.btn-reset').textContent = 'חזרה לתפריט';
    document.getElementById('alert-modal').querySelector('.btn-reset').onclick = () => {
        window.location.href = 'index.html';
    };
}

let gameStateUnsubscribe = null;

function startGameStateListener() {
    // הסר listener קודם אם קיים
    if (gameStateUnsubscribe) {
        gameStateUnsubscribe();
        gameStateUnsubscribe = null;
    }
    
    gameStateUnsubscribe = onValue(gameStateRef, (snap) => {
        const data = snap.val();
        console.log('📊 gameState:', data);
        if (data) { 
            currentGameState = data; 
        } else {
            currentGameState = null;
        }
        
        if (data && data.scores) {
            document.getElementById('wins-X').textContent = data.scores.X;
            document.getElementById('wins-O').textContent = data.scores.O;
            document.getElementById('draws').textContent = data.scores.draws;
        }
        
        render(); 
    });
}

let roomListenerUnsubscribe = null;

let opponentCheckInterval = null;

function handleOpponentLeft(leftPlayerName, leftPlayerEmoji) {
    // עצור הכל
    stopHeartbeat();
    stopOpponentCheck();
    if (roomListenerUnsubscribe) { roomListenerUnsubscribe(); roomListenerUnsubscribe = null; }
    if (gameStateUnsubscribe) { gameStateUnsubscribe(); gameStateUnsubscribe = null; }
    remove(ref(db, `rooms_v3/xo/${myName}`));
    
    // מחק את הלוח
    if (gameStateRef && currentGameId) {
        set(gameStateRef, null);
    }
    
    // הצג הודעה
    document.getElementById('alert-modal').style.display = 'flex';
    document.getElementById('modal-msg').innerHTML = `${leftPlayerEmoji} ${leftPlayerName} עזב את המשחק`;
    document.getElementById('alert-modal').querySelector('.btn-reset').onclick = () => goHome();
}

function startOpponentCheck() {
    if (isAIMode || opponentCheckInterval) return;
    
    opponentCheckInterval = setInterval(async () => {
        try {
            const snap = await get(roomRef);
            const players = snap.val() || {};
            const names = Object.keys(players);
            
            // אם אני לבד ב-room והיה משחק פעיל - היריב עזב
            if (names.length === 1 && names[0] === myName && currentGameId) {
                // מצא את שם היריב מ-snapshot האחרון
                let leftName = '';
                let leftEmoji = '';
                if (window.lastPlayersSnapshot) {
                    for (const [id, player] of Object.entries(window.lastPlayersSnapshot)) {
                        if (id !== myName) {
                            leftName = player.name;
                            leftEmoji = player.emoji;
                            break;
                        }
                    }
                }
                handleOpponentLeft(leftName, leftEmoji);
                return;
            }
            
            // אם יש 2 שחקנים - בדוק timestamp של היריב
            if (names.length === 2 && currentGameId) {
                const opponentId = names.find(n => n !== myName);
                if (opponentId && players[opponentId]) {
                    const timeSinceLastBeat = Date.now() - (players[opponentId].timestamp || 0);
                    if (timeSinceLastBeat > 5000) {
                        // היריב לא שלח heartbeat כבר 5 שניות - כנראה עזב
                        // מחק אותו מה-room
                        await remove(ref(db, `rooms_v3/xo/${opponentId}`));
                        handleOpponentLeft(
                            players[opponentId].name || '',
                            players[opponentId].emoji || ''
                        );
                    }
                }
            }
        } catch (error) {
            console.error('Error in opponent check:', error);
        }
    }, 3000);
}

function stopOpponentCheck() {
    if (opponentCheckInterval) {
        clearInterval(opponentCheckInterval);
        opponentCheckInterval = null;
    }
}

function startListeners() {
    console.log('🎧 startListeners called');
    startGameStateListener();

    // עדכון רשימת משחקנים
    roomListenerUnsubscribe = onValue(roomRef, (snap) => {
        const players = snap.val() || {};
        
        // מיין לפי joinedAt (קבוע) - מי שנכנס ראשון נשאר ראשון
        const names = Object.keys(players)
            .sort((a, b) => (players[a].joinedAt || players[a].timestamp || 0) - (players[b].joinedAt || players[b].timestamp || 0));

        // אם אין שחקנים כלל - נקה את המשחק (רק Non-AI, רק אם יש gameStateRef ו-gameId)
        if (names.length === 0 && !isAIMode && gameStateRef && currentGameId) {
            set(gameStateRef, null);
        }

        // בדוק אם משחקן עזב (רק בNon-AI ויש משחק פעיל)
        if (!isAIMode) {
            if (lastPlayerCount === 2 && names.length < 2) {
                // מצא את השם של השחקן שעזב
                let leftPlayerName = '';
                let leftPlayerEmoji = '';
                
                if (window.lastPlayersSnapshot) {
                    const oldPlayers = window.lastPlayersSnapshot || {};
                    for (const [name, player] of Object.entries(oldPlayers)) {
                        if (!players[name]) {
                            leftPlayerName = player.name;
                            leftPlayerEmoji = player.emoji;
                            break;
                        }
                    }
                }
                
                handleOpponentLeft(leftPlayerName, leftPlayerEmoji);
            }
        }

        // שמור את המצב הנוכחי
        window.lastPlayersSnapshot = players;

        // עדכן את gameStateRef אם משחקן שני הצטרף (Non-AI mode)
        if (!isAIMode && names.length === 2 && !currentGameId) {
            // משחקן שני הצטרף - עדכן את gameId לפי סדר כניסה
            const firstPlayer = names[0];
            const secondPlayer = names[1];
            currentGameId = `${firstPlayer}_${secondPlayer}`;
            gameStateRef = ref(db, `game/xo/${currentGameId}`);
            
            // מחק pending
            remove(ref(db, 'game/xo/pending'));
            
            // הפעל listener חדש על ה-ref החדש
            startGameStateListener();
            
            // בדוק אם משחק קיים (אם לא, יוצרים חדש)
            get(gameStateRef).then(snap => {
                if (!snap.val()) {
                    resetFirebaseGame(true);
                }
            });
            
            // הפעל בדיקת heartbeat של היריב
            startOpponentCheck();
        }

        // עדכן את רשימת השחקנים בהכותרת עם אימוג'י וצבעים
        if (isAIMode) {
            // במצב AI - עדכן X בלבד מה-room, O הוא תמיד AI
            if (players[names[0]]) {
                const p1 = players[names[0]];
                playerNames.X = p1.name;  // עדכן שם של X
                playerNames.X_emoji = p1.emoji;  // עדכן אימוג'י של X
                playerColors.X = p1.color;  // עדכן צבע של X
                document.getElementById('name-X').innerHTML = `${p1.emoji || '❌'} ${p1.name}`;
                document.getElementById('name-X').style.color = p1.color || 'white';
                document.getElementById('card-X').style.borderColor = p1.color || 'white';
            } else {
                document.getElementById('name-X').innerHTML = `${myEmoji} ${displayName}`;
                document.getElementById('name-X').style.color = myColor;
                document.getElementById('card-X').style.borderColor = myColor;
            }
            
            // O תמיד AI
            document.getElementById('name-O').innerHTML = `${playerNames.O_emoji} ${playerNames.O}`;
            document.getElementById('name-O').style.color = playerColors.O;
            document.getElementById('card-O').style.borderColor = playerColors.O;
        } else {
            // עדכון רגיל - שני שחקנים אנושיים
            if (players[names[0]]) {
                const p1 = players[names[0]];
                playerColors.X = p1.color || '#FF5C7A';  // שמור צבע של X
                playerNames.X = p1.name;  // שמור שם של X
                playerNames.X_emoji = p1.emoji;  // שמור אימוג'י של X
                document.getElementById('name-X').innerHTML = `${p1.emoji || '❌'} ${p1.name}`;
                document.getElementById('name-X').style.color = p1.color || 'white';
                document.getElementById('card-X').style.borderColor = p1.color || 'white';
            } else {
                document.getElementById('name-X').textContent = "ממתין...";
                document.getElementById('name-X').style.color = 'white';
            }
            
            if (players[names[1]]) {
                const p2 = players[names[1]];
                playerColors.O = p2.color || '#4DB8FF';  // שמור צבע של O
                playerNames.O = p2.name;  // שמור שם של O
                playerNames.O_emoji = p2.emoji;  // שמור אימוג'י של O
                document.getElementById('name-O').innerHTML = `${p2.emoji || '⭕'} ${p2.name}`;
                document.getElementById('name-O').style.color = p2.color || 'white';
                document.getElementById('card-O').style.borderColor = p2.color || 'white';
            } else {
                document.getElementById('name-O').textContent = "ממתין...";
                document.getElementById('name-O').style.color = 'white';
            }
        }

        // עדכן את מספר השחקנים
        lastPlayerCount = names.length;

        // עדכן את ה-UI
        render();
    });
}

function resetFirebaseGame(fullReset = false) {
    const newState = {
        board: Array(9).fill(''),
        currentPlayer: 'X',
        starter: 'X',
        gameOver: false,
        scores: fullReset ? { X: 0, O: 0, draws: 0 } : (currentGameState?.scores || { X: 0, O: 0, draws: 0 })
    };
    set(gameStateRef, newState);
}

let lastRenderedBoard = Array(9).fill('');

function render() {
    // אם אין משחק - הצג תוצאות וחכה למשחק חדש
    if (!currentGameState) {
        document.querySelectorAll('.cell').forEach((cell) => {
            cell.textContent = '';
            cell.className = 'cell';
            cell.style.color = '';
        });
        lastRenderedBoard = Array(9).fill('');
        return;
    }
    
    const { board, currentPlayer, scores, gameOver } = currentGameState;
    
    // מצא קו מנצח אם יש
    let winningCells = [];
    if (gameOver && checkWinner(board)) {
        const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
        for (const l of lines) {
            if (board[l[0]] && board[l[0]] === board[l[1]] && board[l[0]] === board[l[2]]) {
                winningCells = l;
                break;
            }
        }
    }

    document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.textContent = board[i];
        let classes = 'cell';
        if (board[i]) classes += ` ${board[i].toLowerCase()}`;
        
        // אנימציית pop-in רק לסימן חדש
        if (board[i] && board[i] !== lastRenderedBoard[i]) {
            classes += ' just-placed';
        }
        
        // סימון קו מנצח
        if (winningCells.includes(i)) {
            classes += ' winner-cell';
        }
        
        cell.className = classes;
        
        // עדכן צבע דינמי
        if (board[i] === 'X') {
            cell.style.color = playerColors.X;
        } else if (board[i] === 'O') {
            cell.style.color = playerColors.O;
        } else {
            cell.style.color = '';
        }
    });
    
    lastRenderedBoard = [...board];

    document.getElementById('wins-X').textContent = scores.X;
    document.getElementById('wins-O').textContent = scores.O;
    document.getElementById('draws').textContent = scores.draws;
    
    document.getElementById('card-X').classList.toggle('active', currentPlayer === 'X' && !gameOver);
    document.getElementById('card-O').classList.toggle('active', currentPlayer === 'O' && !gameOver);

    const status = document.getElementById('status-bar');
    const winBanner = document.getElementById('win-banner');
    
    if (gameOver) {
        if (winModalShown) {
            status.textContent = "סיבוב הסתיים!";
            return;
        }
        winModalShown = true;
        
        const winner = winningCells.length > 0 ? board[winningCells[0]] : null;
        
        if (winner) {
            const winnerName = playerNames[winner];
            const winnerEmoji = playerNames[winner + '_emoji'];
            const winnerColor = playerColors[winner];
            
            launchConfetti(winnerColor);
            
            // הצג באנר אחרי השהייה לראות את הקו המנצח
            setTimeout(() => {
                winBanner.style.display = 'block';
                winBanner.style.borderColor = winnerColor;
                winBanner.style.color = winnerColor;
                winBanner.style.boxShadow = `0 0 30px ${winnerColor}40`;
                winBanner.innerHTML = `🏅 ${winnerEmoji} ${winnerName}`;
            }, 700);
            
            setTimeout(() => {
                winBanner.style.display = 'none';
            }, 4000);
        } else {
            winBanner.style.display = 'block';
            winBanner.style.borderColor = 'var(--gold)';
            winBanner.style.color = 'var(--gold)';
            winBanner.style.boxShadow = '0 0 30px rgba(245, 200, 66, 0.25)';
            winBanner.innerHTML = '🤝 תיקו!';
            
            setTimeout(() => {
                winBanner.style.display = 'none';
            }, 2500);
        }
        
        status.textContent = "סיבוב הסתיים!";
    } else {
        winModalShown = false;
        winBanner.style.display = 'none';
        
        if (mySymbol === currentPlayer) {
            const myName = playerNames[mySymbol];
            const myEmoji = playerNames[mySymbol + '_emoji'];
            status.textContent = `🎮 תורך! ${myEmoji} ${myName}`;
        } else {
            const otherSymbol = mySymbol === 'X' ? 'O' : 'X';
            const otherName = playerNames[otherSymbol];
            const otherEmoji = playerNames[otherSymbol + '_emoji'];
            status.textContent = `⏳ ממתין ל-${otherEmoji} ${otherName}`;
            
            // אם זה AI mode וזה תור של AI - עשה מהלך אוטומטי (עם guard)
            if (isAIMode && currentPlayer === 'O' && !aiMoveScheduled) {
                aiMoveScheduled = true;
                setTimeout(() => {
                    makeAIMove();
                    aiMoveScheduled = false;
                }, 1000);
            }
        }
    }
}

document.querySelectorAll('.cell').forEach(cell => {
    cell.onclick = () => {
        const idx = cell.dataset.idx;
        if (!mySymbol || mySymbol !== currentGameState.currentPlayer || currentGameState.board[idx] !== '' || currentGameState.gameOver) return;

        const newBoard = [...currentGameState.board];
        newBoard[idx] = mySymbol;
        const win = checkWinner(newBoard);
        const draw = !win && !newBoard.includes('');
        
        const updates = { board: newBoard };
        if (win || draw) {
            updates.gameOver = true;
            const newScores = {...currentGameState.scores};
            if (win) newScores[mySymbol]++;
            else newScores.draws++;
            updates.scores = newScores;
            if (mySymbol === 'X') setTimeout(autoNextRound, 4300);
        } else {
            updates.currentPlayer = mySymbol === 'X' ? 'O' : 'X';
            // אם זה משחק מול AI והתור של AI - עשה מהלך
            if (isAIMode && updates.currentPlayer === 'O' && !aiMoveScheduled) {
                aiMoveScheduled = true;
                setTimeout(() => {
                    makeAIMove();
                    aiMoveScheduled = false;
                }, 1000);
            }
        }
        update(gameStateRef, updates);
    };
});

function checkWinner(b) {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    return lines.some(l => b[l[0]] && b[l[0]] === b[l[1]] && b[l[0]] === b[l[2]]);
}

async function makeAIMove() {
    if (!currentGameState || currentGameState.currentPlayer !== 'O' || currentGameState.gameOver) return;
    
    const board = [...currentGameState.board];
    
    // 1. בדוק אם AI יכולה לנצח
    for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
            board[i] = 'O';
            if (checkWinner(board)) {
                // AI יכולה לנצח! תשחק כאן
                const newScores = {...currentGameState.scores};
                newScores['O']++;
                await update(gameStateRef, { board, gameOver: true, scores: newScores });
                setTimeout(autoNextRound, 4300);
                return;
            }
            board[i] = '';
        }
    }
    
    // 2. בדוק אם צריך לחסום את המשחקן
    for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
            board[i] = 'X';
            if (checkWinner(board)) {
                // צריך לחסום! תשחק כאן
                board[i] = 'O';
                // בדוק אם יש תיקו
                const isDraw = !checkWinner(board) && !board.includes('');
                if (isDraw) {
                    const newScores = {...currentGameState.scores};
                    newScores.draws++;
                    await update(gameStateRef, { board, gameOver: true, scores: newScores });
                    setTimeout(autoNextRound, 4300);
                } else {
                    await update(gameStateRef, { board, currentPlayer: 'X' });
                }
                return;
            }
            board[i] = '';
        }
    }
    
    // 3. שחק במרכז אם זה פנוי
    if (board[4] === '') {
        board[4] = 'O';
        // בדוק אם יש תיקו
        const isDraw = !checkWinner(board) && !board.includes('');
        if (isDraw) {
            const newScores = {...currentGameState.scores};
            newScores.draws++;
            await update(gameStateRef, { board, gameOver: true, scores: newScores });
            setTimeout(autoNextRound, 4300);
        } else {
            await update(gameStateRef, { board, currentPlayer: 'X' });
        }
        return;
    }
    
    // 4. שחק בפינה רנדומאלית
    const corners = [0, 2, 6, 8].filter(i => board[i] === '');
    if (corners.length > 0) {
        const move = corners[Math.floor(Math.random() * corners.length)];
        board[move] = 'O';
        // בדוק אם יש תיקו
        const isDraw = !checkWinner(board) && !board.includes('');
        if (isDraw) {
            const newScores = {...currentGameState.scores};
            newScores.draws++;
            await update(gameStateRef, { board, gameOver: true, scores: newScores });
            setTimeout(autoNextRound, 4300);
        } else {
            await update(gameStateRef, { board, currentPlayer: 'X' });
        }
        return;
    }
    
    // 5. שחק בכל מקום שנותר
    for (let i = 0; i < 9; i++) {
        if (board[i] === '') {
            board[i] = 'O';
            // בדוק אם יש תיקו
            const isDraw = !checkWinner(board) && !board.includes('');
            if (isDraw) {
                const newScores = {...currentGameState.scores};
                newScores.draws++;
                await update(gameStateRef, { board, gameOver: true, scores: newScores });
                setTimeout(autoNextRound, 4300);
            } else {
                await update(gameStateRef, { board, currentPlayer: 'X' });
            }
            return;
        }
    }
}

async function autoNextRound() {
    const snap = await get(gameStateRef);
    const data = snap.val();
    if (!data || !data.gameOver) return;
    
    // חשב מי צריך להתחיל את הסיבוב הבא
    const nextStarter = data.starter === 'X' ? 'O' : 'X';
    
    // חדש את הלוח וקבע מי מתחיל
    const nextRound = {
        board: Array(9).fill(''),
        currentPlayer: nextStarter,
        starter: nextStarter,
        gameOver: false,
        scores: data.scores  // שמור את התוצאות
    };
    
    await update(gameStateRef, nextRound);
    
    // אם ה-AI מתחיל במשחק הבא - תן לו זמן להשחק
    if (isAIMode && nextStarter === 'O' && !aiMoveScheduled) {
        aiMoveScheduled = true;
        setTimeout(() => {
            makeAIMove();
            aiMoveScheduled = false;
        }, 1000);
    }
}

window.goHome = async () => {
    try {
        stopHeartbeat();
        stopOpponentCheck();
        
        if (!isAIMode) {
            // Non-AI mode - מחק רק את עצמך מה-room
            await remove(ref(db, `rooms_v3/xo/${myName}`));
            if (currentGameId) {
                await remove(ref(db, `game/xo/${currentGameId}`));
            }
            // נקה pending אם קיים
            remove(ref(db, 'game/xo/pending'));
        } else if (isAIMode && myName) {
            // AI mode - מחק את עצמך מ-rooms בלבד (המשחק נשמר)
            await remove(ref(db, `rooms_v3/xo_ai/${myName}`));
        }
    } catch (error) {
        console.error('Error in goHome:', error);
    }
    setTimeout(() => {
        window.location.href = 'index.html';
    }, 200);
};

window.resetGameAndScores = async () => {
    try {
        // אפס את הלוח והתוצאה
        const newState = {
            board: Array(9).fill(''),
            currentPlayer: 'X',
            starter: 'X',
            gameOver: false,
            scores: { X: 0, O: 0, draws: 0 }  // אפס הניקוד
        };
        await set(gameStateRef, newState);
    } catch (error) {
        console.error('Error resetting game and scores:', error);
    }
};

function launchConfetti(color) {
    const container = document.createElement('div');
    container.className = 'confetti-container';
    document.body.appendChild(container);
    
    const colors = [color, '#F5C842', '#3DD68C', '#FF5C7A', '#4DB8FF', '#FFB347', '#E879F9'];
    
    for (let i = 0; i < 50; i++) {
        const piece = document.createElement('div');
        piece.className = 'confetti-piece';
        piece.style.left = `${Math.random() * 100}%`;
        piece.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
        piece.style.animationDuration = `${1.5 + Math.random() * 2}s`;
        piece.style.animationDelay = `${Math.random() * 0.5}s`;
        piece.style.width = `${6 + Math.random() * 8}px`;
        piece.style.height = `${6 + Math.random() * 8}px`;
        piece.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
        container.appendChild(piece);
    }
    
    // הסר אחרי 4 שניות
    setTimeout(() => container.remove(), 4000);
}

// ניקוי כשסוגרים טאב/דפדפן
window.addEventListener('beforeunload', () => {
    stopHeartbeat();
    stopOpponentCheck();
    // שלח מחיקה מיד - navigator.sendBeacon לא עובד עם Firebase,
    // אז נסמך על ה-heartbeat cleanup ב-index.html כ-fallback
    if (!isAIMode) {
        remove(ref(db, `rooms_v3/xo/${myName}`));
    } else {
        remove(ref(db, `rooms_v3/xo_ai/${myName}`));
    }
});

initSession();
</script>
