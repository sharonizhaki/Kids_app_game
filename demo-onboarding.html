<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>דמו אונבורדינג</title>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    font-family: 'Heebo', sans-serif;
    background: #7C3AED;
    height: 100dvh;
    display: flex;
    flex-direction: column;
    align-items: center;
    overflow: hidden;
  }

  /* ── חלק עליון סגול ── */
  .top-section {
    flex: 1;
    width: 100%;
    background: linear-gradient(160deg, #7C3AED 0%, #6D28D9 60%, #5B21B6 100%);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px 24px;
    gap: 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
  }

  /* קישוטי רקע עדינים */
  .top-section::before {
    content: '';
    position: absolute;
    top: -60px; right: -60px;
    width: 220px; height: 220px;
    border-radius: 50%;
    background: rgba(255,255,255,0.06);
    pointer-events: none;
  }
  .top-section::after {
    content: '';
    position: absolute;
    bottom: 20px; left: -40px;
    width: 140px; height: 140px;
    border-radius: 50%;
    background: rgba(255,255,255,0.05);
    pointer-events: none;
  }

  .app-icon {
    width: 80px; height: 80px;
    background: rgba(255,255,255,0.15);
    border: 2px solid rgba(255,255,255,0.25);
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 2.4rem;
    backdrop-filter: blur(4px);
  }

  .top-title {
    font-size: 1.75rem;
    font-weight: 900;
    color: white;
    line-height: 1.25;
  }

  .top-sub {
    font-size: 0.9rem;
    color: rgba(255,255,255,0.72);
    font-weight: 600;
    max-width: 260px;
    line-height: 1.5;
  }

  /* תגיות תכונות */
  .feature-tags {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 4px;
  }
  .tag {
    background: rgba(255,255,255,0.15);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 20px;
    padding: 5px 12px;
    font-size: 0.75rem;
    font-weight: 700;
    color: rgba(255,255,255,0.9);
    backdrop-filter: blur(4px);
  }

  /* ── חלק תחתון בהיר ── */
  .bottom-sheet {
    width: 100%;
    background: #F8FAFF;
    border-radius: 28px 28px 0 0;
    padding: 28px 20px max(24px, env(safe-area-inset-bottom, 24px));
    display: flex;
    flex-direction: column;
    gap: 10px;
    box-shadow: 0 -8px 32px rgba(109,40,217,0.10);
  }

  .sheet-label {
    font-size: 0.75rem;
    font-weight: 700;
    color: #94A3B8;
    text-align: center;
    letter-spacing: 0.04em;
    margin-bottom: 2px;
  }

  /* כפתור ראשי — בהיר עם גבול סגול */
  .btn-primary {
    width: 100%;
    padding: 16px;
    border: 2px solid #7C3AED;
    border-radius: 16px;
    background: white;
    color: #6D28D9;
    font-size: 1.05rem;
    font-weight: 800;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-primary:hover { background: #F5F3FF; }
  .btn-primary:active { transform: scale(0.98); }

  /* כפתור משני — אפור בהיר */
  .btn-secondary {
    width: 100%;
    padding: 16px;
    border: none;
    border-radius: 16px;
    background: #EDE9FE;
    color: #6D28D9;
    font-size: 1.05rem;
    font-weight: 800;
    font-family: 'Heebo', sans-serif;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-secondary:hover { background: #DDD6FE; }
  .btn-secondary:active { transform: scale(0.98); }
</style>
</head>
<body>

<div class="top-section">
  <div class="app-icon">⭐</div>
  <div>
    <div class="top-title">ברוכים הבאים<br>לכוכבים שלנו</div>
  </div>
  <div class="top-sub">מערכת משימות וכוכבים לניהול המשפחה — פשוט, כיף ומתגמל</div>
  <div class="feature-tags">
    <span class="tag">✅ משימות יומיות</span>
    <span class="tag">⭐ כוכבים ופרסים</span>
    <span class="tag">👨‍👩‍👧‍👦 כל המשפחה</span>
  </div>
</div>

<div class="bottom-sheet">
  <div class="sheet-label">כניסה למערכת</div>
  <button class="btn-primary" onclick="this.style.background='#F5F3FF'">
    👨‍👩‍👧 אני הורה
  </button>
  <button class="btn-secondary">
    👧👦 אני ילד/ה
  </button>
</div>

</body>
</html>
