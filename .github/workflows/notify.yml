name: Scheduled Parent Notifications

on:
  schedule:
    # הודעת ערב — 20:00 שעון ירושלים (17:00 UTC בקיץ)
    - cron: '0 17 * * *'
    # הודעות בדיקה — 10:00-13:00 שעון ירושלים (07:00-10:00 UTC בקיץ)
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Install dependencies
        run: npm install google-auth-library @google-cloud/firestore

      - name: Send FCM Notifications
        run: |
          node << 'EOF'
          const { GoogleAuth } = require('google-auth-library');
          const { Firestore } = require('@google-cloud/firestore');
          const https = require('https');

          async function main() {
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            const projectId = serviceAccount.project_id;

            // Access token
            const auth = new GoogleAuth({
              credentials: serviceAccount,
              scopes: ['https://www.googleapis.com/auth/firebase.messaging'],
            });
            const client = await auth.getClient();
            const { token: accessToken } = await client.getAccessToken();

            // שעה נוכחית בישראל
            const israelHour = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Jerusalem' })).getHours();

            let title, body;
            if (israelHour === 20) {
              title = '🌙 זמן משפחה!';
              body  = 'בדוק מה הילדים עשו היום ואשר משימות ופרסים';
            } else {
              title = '🔔 הודעת בדיקה';
              body  = `בדיקה — ${israelHour}:00`;
            }

            console.log(`Hour: ${israelHour}, Title: ${title}`);

            // שלוף tokens מ-Firestore
            const firestore = new Firestore({ projectId, credentials: serviceAccount });
            const familiesSnap = await firestore.collection('families').get();
            const allTokens = [];
            familiesSnap.forEach(doc => {
              const tokens = doc.data().fcmTokens || [];
              allTokens.push(...tokens);
            });

            const unique = [...new Set(allTokens.filter(Boolean))];
            console.log(`Sending to ${unique.length} tokens`);

            if (unique.length === 0) {
              console.log('No tokens found');
              return;
            }

            const FCM_URL = `https://fcm.googleapis.com/v1/projects/${projectId}/messages:send`;

            for (const token of unique) {
              const payload = JSON.stringify({
                message: {
                  token,
                  notification: { title, body },
                  webpush: {
                    notification: { icon: '/icons/icon-192.png', dir: 'rtl' },
                    fcm_options: { link: '/parent.html' },
                  },
                },
              });

              await new Promise((resolve, reject) => {
                const req = https.request(FCM_URL, {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json',
                  },
                }, res => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => {
                    console.log(`Token ${token.slice(0,20)}...: ${res.statusCode} ${data}`);
                    resolve();
                  });
                });
                req.on('error', reject);
                req.write(payload);
                req.end();
              });
            }

            console.log('Done!');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
