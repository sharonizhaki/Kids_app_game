name: Scheduled Parent Notifications

on:
  schedule:
    # הורה — ערב 20:00 ישראל (17:00 UTC קיץ)
    - cron: '0 17 * * *'
    # ילד — בוקר 7:30 ישראל (04:30 UTC קיץ)
    - cron: '30 4 * * *'
    # ילד — אחה"צ 15:00 ישראל (12:00 UTC קיץ)
    - cron: '0 12 * * *'
    # ילד — ערב 20:00 ישראל (17:00 UTC קיץ)
    - cron: '0 17 * * *'
    # בדיקות — 10:00-13:00 ישראל (07:00-10:00 UTC קיץ)
    - cron: '0 7 * * *'
    - cron: '0 8 * * *'
    - cron: '0 9 * * *'
    - cron: '0 10 * * *'
  workflow_dispatch:

jobs:
  send-notification:
    runs-on: ubuntu-latest
    steps:
      - name: Setup and Send FCM Notifications
        run: |
          mkdir -p /tmp/notifier && cd /tmp/notifier
          npm init -y
          npm install google-auth-library @google-cloud/firestore

          cat > send.js << 'EOF'
          const { GoogleAuth } = require('google-auth-library');
          const { Firestore } = require('@google-cloud/firestore');
          const https = require('https');

          async function sendPush(accessToken, projectId, token, title, body, url) {
            const payload = JSON.stringify({
              message: {
                token,
                notification: { title, body },
                webpush: {
                  notification: { icon: '/icons/icon-192.png', dir: 'rtl' },
                  fcm_options: { link: url },
                },
              },
            });

            return new Promise((resolve, reject) => {
              const req = https.request(
                `https://fcm.googleapis.com/v1/projects/${projectId}/messages:send`,
                {
                  method: 'POST',
                  headers: {
                    'Authorization': `Bearer ${accessToken}`,
                    'Content-Type': 'application/json',
                  },
                },
                res => {
                  let data = '';
                  res.on('data', chunk => data += chunk);
                  res.on('end', () => {
                    console.log(`${token.slice(0,20)}...: ${res.statusCode}`);
                    resolve();
                  });
                }
              );
              req.on('error', reject);
              req.write(payload);
              req.end();
            });
          }

          async function main() {
            const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
            const projectId = serviceAccount.project_id;

            const auth = new GoogleAuth({
              credentials: serviceAccount,
              scopes: ['https://www.googleapis.com/auth/firebase.messaging'],
            });
            const client = await auth.getClient();
            const { token: accessToken } = await client.getAccessToken();

            const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Jerusalem' }));
            const hour = now.getHours();
            const minute = now.getMinutes();
            console.log(`Israel time: ${hour}:${String(minute).padStart(2,'0')}`);

            const firestore = new Firestore({ projectId, credentials: serviceAccount });

            // =========== הורים — ערב 20:00 ===========
            if (hour === 20) {
              const familiesSnap = await firestore.collection('families').get();
              const parentTokens = [];
              familiesSnap.forEach(doc => {
                const tokens = doc.data().fcmTokens || [];
                parentTokens.push(...tokens);
              });
              const unique = [...new Set(parentTokens.filter(Boolean))];
              console.log(`Parents: sending to ${unique.length} tokens`);
              for (const token of unique) {
                await sendPush(accessToken, projectId, token,
                  '🌙 זמן משפחה!',
                  'בדוק מה הילדים עשו היום ואשר משימות ופרסים',
                  '/parent.html'
                );
              }
            }

            // =========== ילדים — 3 הודעות ===========
            let childTitle = null, childBody = null;

            if (hour === 7 && minute >= 30 && minute < 45) {
              childTitle = '🌅 בוקר טוב!';
              childBody  = 'אל תשכח את משימות הבוקר שלך — כוכבים מחכים לך ⭐';
            } else if (hour === 15) {
              childTitle = '⭐ יש לך משימות שממתינות!';
              childBody  = 'כל משימה = כוכבים = פרסים 🎁';
            } else if (hour === 20) {
              childTitle = '🌙 עוד יום נגמר!';
              childBody  = 'כנס ותראה כמה כוכבים צברת היום 🏆';
            }

            if (childTitle) {
              const familiesSnap = await firestore.collection('families').get();
              const childTokens = [];
              for (const familyDoc of familiesSnap.docs) {
                const childrenSnap = await firestore
                  .collection('families').doc(familyDoc.id)
                  .collection('children').get();
                childrenSnap.forEach(childDoc => {
                  const tokens = childDoc.data().fcmTokens || [];
                  childTokens.push(...tokens);
                });
              }
              const unique = [...new Set(childTokens.filter(Boolean))];
              console.log(`Children: sending to ${unique.length} tokens`);
              for (const token of unique) {
                await sendPush(accessToken, projectId, token,
                  childTitle, childBody, '/child.html'
                );
              }
            }

            // =========== בדיקות — 10:00-13:00 ===========
            if (hour >= 10 && hour <= 13 && (hour !== 7) && (hour !== 15) && (hour !== 20)) {
              const familiesSnap = await firestore.collection('families').get();
              const testTokens = [];
              familiesSnap.forEach(doc => {
                const tokens = doc.data().fcmTokens || [];
                testTokens.push(...tokens);
              });
              const unique = [...new Set(testTokens.filter(Boolean))];
              console.log(`Test: sending to ${unique.length} tokens`);
              for (const token of unique) {
                await sendPush(accessToken, projectId, token,
                  '🔔 הודעת בדיקה',
                  `בדיקה — ${hour}:00`,
                  '/parent.html'
                );
              }
            }

            console.log('Done!');
          }

          main().catch(e => { console.error(e); process.exit(1); });
          EOF

          node send.js
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
