            name: Scheduled Parent Notifications

            on:
              schedule:
                # כל 5 דקות — לבדיקת משימות ממתינות
                - cron: '*/5 * * * *'
                # הורה — ערב 20:00 ישראל (17:00 UTC קיץ / 18:00 UTC חורף)
                - cron: '0 17 * * *'
                - cron: '0 18 * * *'
                # ילד — בוקר 7:30 ישראל (04:30 UTC קיץ / 05:30 UTC חורף)
                - cron: '30 4 * * *'
                - cron: '30 5 * * *'
                # ילד — אחה"צ 15:00 ישראל (12:00 UTC קיץ / 13:00 UTC חורף)
                - cron: '0 12 * * *'
                - cron: '0 13 * * *'
              workflow_dispatch:

            jobs:
              send-notification:
                runs-on: ubuntu-latest
                steps:
                  - name: Setup and Send FCM Notifications
                    run: |
                      mkdir -p /tmp/notifier && cd /tmp/notifier
                      npm init -y
                      npm install google-auth-library @google-cloud/firestore

                      cat > send.js << 'EOF'
                      const { GoogleAuth } = require('google-auth-library');
                      const { Firestore } = require('@google-cloud/firestore');
                      const https = require('https');

                      async function sendPush(accessToken, projectId, token, title, body, url) {
                        const payload = JSON.stringify({
                          message: {
                            token,
                            notification: { title, body },
                            webpush: {
                              notification: { icon: '/icons/icon-192.png', dir: 'rtl' },
                              fcm_options: { link: url },
                            },
                          },
                        });

                        return new Promise((resolve, reject) => {
                          const req = https.request(
                            `https://fcm.googleapis.com/v1/projects/${projectId}/messages:send`,
                            {
                              method: 'POST',
                              headers: {
                                'Authorization': `Bearer ${accessToken}`,
                                'Content-Type': 'application/json',
                              },
                            },
                            res => {
                              let data = '';
                              res.on('data', chunk => data += chunk);
                              res.on('end', () => {
                                console.log(`${token.slice(0,20)}...: ${res.statusCode}`);
                                resolve();
                              });
                            }
                          );
                          req.on('error', reject);
                          req.write(payload);
                          req.end();
                        });
                      }

                      async function main() {
                        const serviceAccount = JSON.parse(process.env.FIREBASE_SERVICE_ACCOUNT);
                        const projectId = serviceAccount.project_id;

                        const auth = new GoogleAuth({
                          credentials: serviceAccount,
                          scopes: ['https://www.googleapis.com/auth/firebase.messaging'],
                        });
                        const client = await auth.getClient();
                        const { token: accessToken } = await client.getAccessToken();

                        const now = new Date(new Date().toLocaleString('en-US', { timeZone: 'Asia/Jerusalem' }));
                        const hour = now.getHours();
                        const minute = now.getMinutes();
                        console.log(`Israel time: ${hour}:${String(minute).padStart(2,'0')}`);

                        const firestore = new Firestore({ projectId, credentials: serviceAccount });
                        const familiesSnap = await firestore.collection('families').get();

                        // =========== משימות ממתינות לאישור — כל 5 דקות ===========
                        // שדה ts (לא createdAt) — מרווח של 6 דקות לפצות על עיכובי GitHub
                        const cutoff = Date.now() - 6 * 60 * 1000;

                        for (const familyDoc of familiesSnap.docs) {
                          const familyId = familyDoc.id;
                          const parentTokens = (familyDoc.data().fcmTokens || []).filter(Boolean);
                          if (parentTokens.length === 0) continue;

                          // משימות ממתינות
                          const pendingSnap = await firestore
                            .collection('families').doc(familyId)
                            .collection('pendingApprovals')
                            .where('status', '==', 'pending')
                            .get();

                          const recentPending = pendingSnap.docs.filter(d => (d.data().ts || 0) >= cutoff);

                          if (recentPending.length > 0) {
                            const byChild = {};
                            recentPending.forEach(d => {
                              const data = d.data();
                              const childId = data.childId || 'unknown';
                              if (!byChild[childId]) byChild[childId] = [];
                              byChild[childId].push(data);
                            });

                            for (const [childId, tasks] of Object.entries(byChild)) {
                              const childName = tasks[0].childName || 'הילד';
                              let title, body;
                              if (tasks.length === 1) {
                                const t = tasks[0];
                                title = `${t.emoji || '✅'} ${childName} סיים משימה!`;
                                body  = `"${t.task || 'משימה'}" ממתינה לאישורך`;
                              } else {
                                title = `✅ ${childName} סיים ${tasks.length} משימות!`;
                                body  = 'ממתינות לאישורך';
                              }
                              console.log(`Pending tasks → family ${familyId}, child ${childId}: ${tasks.length}`);
                              for (const token of parentTokens) {
                                await sendPush(accessToken, projectId, token, title, body, '/parent.html');
                              }
                            }
                          }

                          // פרסים ממתינים
                          const prizeSnap = await firestore
                            .collection('families').doc(familyId)
                            .collection('prizeRequests')
                            .where('status', '==', 'pending')
                            .get();

                          const recentPrizes = prizeSnap.docs.filter(d => {
                            const data = d.data();
                            const ts = data.requestedAt?.toMillis ? data.requestedAt.toMillis() : (data.requestedAt || 0);
                            return ts >= cutoff;
                          });

                          if (recentPrizes.length > 0) {
                            const byChild = {};
                            recentPrizes.forEach(d => {
                              const data = d.data();
                              const childId = data.childId || 'unknown';
                              if (!byChild[childId]) byChild[childId] = [];
                              byChild[childId].push(data);
                            });

                            for (const [childId, prizes] of Object.entries(byChild)) {
                              const childName = prizes[0].childName || 'הילד';
                              let title, body;
                              if (prizes.length === 1) {
                                const p = prizes[0];
                                title = `🎁 ${childName} מבקש פרס!`;
                                body  = `"${p.prizeName || p.name || 'פרס'}" ממתין לאישורך`;
                              } else {
                                title = `🎁 ${childName} מבקש ${prizes.length} פרסים!`;
                                body  = 'ממתינים לאישורך';
                              }
                              console.log(`Pending prizes → family ${familyId}, child ${childId}: ${prizes.length}`);
                              for (const token of parentTokens) {
                                await sendPush(accessToken, projectId, token, title, body, '/parent.html');
                              }
                            }
                          }
                        }

                        // =========== הורים — ערב 20:00 ===========
                        if (hour === 20 && minute < 10) {
                          const parentTokens = [];
                          familiesSnap.forEach(doc => {
                            parentTokens.push(...(doc.data().fcmTokens || []));
                          });
                          const unique = [...new Set(parentTokens.filter(Boolean))];
                          console.log(`Parents evening: ${unique.length} tokens`);
                          for (const token of unique) {
                            await sendPush(accessToken, projectId, token,
                              '🌙 זמן משפחה!',
                              'בדוק מה הילדים עשו היום ואשר משימות ופרסים',
                              '/parent.html'
                            );
                          }
                        }

                        // =========== ילדים — 3 הודעות ===========
                        let childTitle = null, childBody = null;

                        if (hour === 7 && minute >= 30) {
                          childTitle = '🌅 בוקר טוב!';
                          childBody  = 'אל תשכח את משימות הבוקר שלך — כוכבים מחכים לך ⭐';
                        } else if (hour === 15 && minute < 10) {
                          childTitle = '⭐ יש לך משימות שממתינות!';
                          childBody  = 'כל משימה = כוכבים = פרסים 🎁';
                        } else if (hour === 20 && minute < 10) {
                          childTitle = '🌙 עוד יום נגמר!';
                          childBody  = 'כנס ותראה כמה כוכבים צברת היום 🏆';
                        }

                        if (childTitle) {
                          const childTokens = [];
                          for (const familyDoc of familiesSnap.docs) {
                            const childrenSnap = await firestore
                              .collection('families').doc(familyDoc.id)
                              .collection('children').get();
                            childrenSnap.forEach(childDoc => {
                              childTokens.push(...(childDoc.data().fcmTokens || []));
                            });
                          }
                          const unique = [...new Set(childTokens.filter(Boolean))];
                          console.log(`Children: ${unique.length} tokens — ${childTitle}`);
                          for (const token of unique) {
                            await sendPush(accessToken, projectId, token,
                              childTitle, childBody, '/child.html'
                            );
                          }
                        }

                        console.log('Done!');
                      }

                      main().catch(e => { console.error(e); process.exit(1); });
                      EOF

                      node send.js
                    env:
                      FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}