<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>מבוך פרו</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap');
    
    body {
      font-family: 'Press Start 2P', system-ui;
      background: linear-gradient(to bottom, #0a0a0a, #000);
      color: #e0e0e0;
      margin: 0;
      padding: 0;
      height: 100vh;
      overflow: hidden;
    }
    
    .hidden { display: none !important; }
    
    .maze-container {
      display: grid;
      grid-template-columns: repeat(13, 27px);
      grid-template-rows: repeat(13, 27px);
      gap: 3px;
      background: #111;
      padding: 10px;
      border: 5px solid #22c55e;
      border-radius: 12px;
      box-shadow: 0 0 40px rgba(34,197,94,0.5), inset 0 0 20px #000;
    }
    
    .cell {
      width: 27px;
      height: 27px;
      background: #18181b;
      position: relative;
      border-radius: 4px;
      box-shadow: inset 0 2px 4px rgba(0,0,0,0.7);
    }
    
    .wall {
      background: linear-gradient(135deg, #334155, #1e293b);
      box-shadow: 0 0 10px #475569;
    }
    
    .path {
      background: #27272a;
    }
    
    .gift {
      font-size: 22px;
      line-height: 27px;
      text-align: center;
      filter: drop-shadow(0 0 12px #eab308);
    }
    
    .player {
      position: absolute;
      inset: 0;
      font-size: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s cubic-bezier(0.34,1.56,0.64,1);
      z-index: 10;
    }
    
    .player.jump {
      transform: scale(1.45) translateY(-8px);
      filter: drop-shadow(0 0 12px #a78bfa);
    }
    
    #timer {
      font-size: 3rem;
      font-weight: bold;
      color: #22c55e;
      text-shadow: 0 0 20px #22c55e;
      letter-spacing: 3px;
    }
    
    .neon-btn {
      background: linear-gradient(90deg, #22c55e, #84cc16);
      color: #0f0f0f;
      font-weight: bold;
      box-shadow: 0 0 20px #22c55e;
      transition: all 0.2s;
    }
    
    .neon-btn:hover {
      transform: scale(1.06);
      box-shadow: 0 0 30px #84cc16;
    }
    
    .arrow-btn {
      width: 80px;
      height: 80px;
      font-size: 44px;
      background: #1f2937;
      border: 4px solid #22c55e;
      border-radius: 16px;
      color: #22c55e;
      transition: all 0.15s;
    }
    
    .arrow-btn:active {
      transform: scale(0.88);
      background: #22c55e;
      color: #111;
    }
  </style>
</head>
<body class="flex items-center justify-center p-4">

  <!-- מסך לובי -->
  <div id="lobby" class="flex flex-col items-center gap-8 text-center max-w-md w-full">
    <div class="text-6xl mb-2">🌀</div>
    <h1 class="text-5xl font-bold tracking-wider text-lime-400">מבוך פרו</h1>
    <p class="text-zinc-400 text-base">13×13 • מבוך אמיתי • נגישות מלאה</p>
    
    <button onclick="startVsAI()"
            class="neon-btn w-full max-w-xs py-6 text-2xl rounded-2xl shadow-2xl">
      שחק נגד מחשב
    </button>
  </div>

  <!-- מסך משחק -->
  <div id="game" class="hidden flex flex-col items-center gap-6 w-full max-w-[420px]">
    <div id="timer" class="font-mono">00:00</div>
    
    <div id="maze" class="maze-container"></div>
    
    <div class="grid grid-cols-3 gap-4 mt-6">
      <div></div>
      <button onclick="moveDir('up')" class="arrow-btn">↑</button>
      <div></div>
      <button onclick="moveDir('left')" class="arrow-btn">←</button>
      <button onclick="moveDir('down')" class="arrow-btn">↓</button>
      <button onclick="moveDir('right')" class="arrow-btn">→</button>
    </div>
    
    <div class="flex gap-4 w-full mt-4">
      <button onclick="resetGame()" class="neon-btn flex-1 py-5 text-xl rounded-2xl">
        משחק חדש
      </button>
      <button onclick="window.location.href='index.html'" class="neon-btn flex-1 py-5 text-xl rounded-2xl" style="background:linear-gradient(90deg,#334155,#1e293b);color:#e0e0e0;box-shadow:none;">
        🏠 דף הבית
      </button>
    </div>
  </div>

  <!-- מסך ניצחון -->
  <div id="win" class="hidden flex flex-col items-center gap-10 bg-black/80 backdrop-blur-lg p-12 rounded-3xl border border-lime-500/30">
    <div id="winEmoji" class="text-9xl animate-bounce"></div>
    <h1 id="winText" class="text-6xl font-bold text-lime-400 tracking-widest"></h1>
    <button onclick="restartAfterWin()" class="neon-btn px-16 py-6 text-3xl rounded-3xl">
      משחק חדש
    </button>
    <button onclick="window.location.href='index.html'" class="neon-btn px-16 py-6 text-3xl rounded-3xl" style="background:linear-gradient(90deg,#334155,#1e293b);color:#e0e0e0;box-shadow:none;">
      🏠 דף הבית
    </button>
  </div>

<script>
// ==================== משתנים גלובליים ====================
let isVsAI = false;
let mazeData = [];
let p1 = {x: 1, y: 1};
let p2 = {x: 11, y: 11};
let startTime = null;
let timerInterval = null;

// ==================== יצירת מבוך ====================
function generateComplexMaze() {
  let maze = Array(13).fill().map(() => Array(13).fill(1));
  
  function shuffle(arr) {
    for (let i = arr.length - 1; i > 0; i--) {
      let j = Math.floor(Math.random() * (i + 1));
      [arr[i], arr[j]] = [arr[j], arr[i]];
    }
  }
  
  function carve(cx, cy) {
    maze[cy][cx] = 0;
    
    let dirs = [[0, -2], [2, 0], [0, 2], [-2, 0]];
    shuffle(dirs);
    
    for (let [dx, dy] of dirs) {
      let nx = cx + dx;
      let ny = cy + dy;
      if (nx <= 0 || nx >= 12 || ny <= 0 || ny >= 12) continue;
      if (maze[ny][nx] === 1) {
        maze[cy + dy/2][cx + dx/2] = 0;
        carve(nx, ny);
      }
    }
  }
  
  carve(1, 1);
  
  // מבטיח שהמרכז פתוח ולעולם לא חסום
  maze[6][6] = 0;
  maze[5][6] = 0;
  maze[6][5] = 0;
  maze[6][7] = 0;
  maze[7][6] = 0;
  
  return maze;
}

// ==================== רינדור ====================
function renderMaze() {
  const container = document.getElementById("maze");
  container.innerHTML = "";
  
  for (let y = 0; y < 13; y++) {
    for (let x = 0; x < 13; x++) {
      const cell = document.createElement("div");
      cell.className = mazeData[y][x] === 1 ? "cell wall" : "cell path";
      
      if (x === 6 && y === 6) {
        cell.innerHTML = '<span class="gift">🎁</span>';
      }
      
      if (x === p1.x && y === p1.y) {
        const player = document.createElement("span");
        player.className = "player jump";
        player.textContent = "👧";
        cell.appendChild(player);
      }
      
      if (x === p2.x && y === p2.y) {
        const ai = document.createElement("span");
        ai.className = "player";
        ai.textContent = "🤖";
        cell.appendChild(ai);
      }
      
      container.appendChild(cell);
    }
  }
}

// ==================== תזוזה ====================
function moveDir(dir) {
  let nx = p1.x;
  let ny = p1.y;
  
  if (dir === "up")    ny--;
  if (dir === "down")  ny++;
  if (dir === "left")  nx--;
  if (dir === "right") nx++;
  
  if (nx < 0 || nx > 12 || ny < 0 || ny > 12 || mazeData[ny][nx] === 1) return;
  
  p1.x = nx;
  p1.y = ny;
  
  renderMaze();
  
  if (nx === 6 && ny === 6) {
    showWin("👧");
  }
  
  if (isVsAI) {
    setTimeout(aiMove, 600);
  }
}

// ==================== AI ====================
function aiMove() {
  if (!isVsAI) return;
  
  const dirs = [[0,-1], [0,1], [-1,0], [1,0]];
  let best = null;
  let bestDist = Infinity;
  
  for (let [dx, dy] of dirs) {
    let nx = p2.x + dx;
    let ny = p2.y + dy;
    if (nx < 0 || nx > 12 || ny < 0 || ny > 12 || mazeData[ny][nx] === 1) continue;
    let dist = Math.abs(nx - 6) + Math.abs(ny - 6);
    if (dist < bestDist) {
      bestDist = dist;
      best = [nx, ny];
    }
  }
  
  if (best) {
    p2.x = best[0];
    p2.y = best[1];
  }
  
  renderMaze();
  
  if (p2.x === 6 && p2.y === 6) {
    showWin("🤖");
  }
}

// ==================== ניצחון ====================
function showWin(winner) {
  clearInterval(timerInterval);
  document.getElementById("game").classList.add("hidden");
  const winScreen = document.getElementById("win");
  winScreen.classList.remove("hidden");
  document.getElementById("winEmoji").textContent = winner;
  document.getElementById("winText").textContent = "ניצח!";
}

// ==================== אתחול / משחק חדש ====================
function resetGame() {
  mazeData = generateComplexMaze();
  p1 = {x: 1, y: 1};
  p2 = {x: 11, y: 11};
  startTime = Date.now();
  
  document.getElementById("win").classList.add("hidden");
  
  renderMaze();
  updateTimer();
  
  if (isVsAI) {
    setTimeout(aiMove, 800);
  }
}

function updateTimer() {
  if (timerInterval) clearInterval(timerInterval);
  
  timerInterval = setInterval(() => {
    let elapsed = Math.floor((Date.now() - startTime) / 1000);
    let m = String(Math.floor(elapsed / 60)).padStart(2, '0');
    let s = String(elapsed % 60).padStart(2, '0');
    document.getElementById("timer").textContent = `\( {m}: \){s}`;
  }, 200);
}

function startVsAI() {
  isVsAI = true;
  document.getElementById("lobby").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  resetGame();
}

function restartAfterWin() {
  document.getElementById("win").classList.add("hidden");
  document.getElementById("game").classList.remove("hidden");
  resetGame();
}

// ==================== swipe ====================
let touchStartX = 0;
let touchStartY = 0;

document.addEventListener("touchstart", e => {
  touchStartX = e.touches[0].clientX;
  touchStartY = e.touches[0].clientY;
}, { passive: false });

document.addEventListener("touchmove", e => {
  if (e.touches.length !== 1) return;
  const dx = e.touches[0].clientX - touchStartX;
  const dy = e.touches[0].clientY - touchStartY;
  
  if (Math.abs(dx) > 50 || Math.abs(dy) > 50) {
    let dir = "";
    if (Math.abs(dx) > Math.abs(dy)) {
      dir = dx > 0 ? "right" : "left";
    } else {
      dir = dy > 0 ? "down" : "up";
    }
    moveDir(dir);
    touchStartX = e.touches[0].clientX;
    touchStartY = e.touches[0].clientY;
  }
}, { passive: false });

// ==================== אתחול ====================
document.getElementById("lobby").classList.remove("hidden");
</script>
</body>
</html>
