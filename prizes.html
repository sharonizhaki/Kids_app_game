<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>ניהול פרסים</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css">
</head>
<body>

<div id="screen-prizes" class="screen active visible">
  <div class="screen-header">
    <button class="back-btn" onclick="window.location.href='parent.html'">→</button>
    <h2>ניהול פרסים 🎁</h2>
  </div>

  <!-- Tabs -->
  <div id="prize-tabs" style="display:flex;gap:8px;max-width:420px;width:100%;margin-bottom:16px;"></div>

  <!-- Content -->
  <div id="prizes-list" style="max-width:420px;width:100%;"></div>
</div>

<div class="toast" id="toast"></div>
<div id="loading-overlay" style="display:none;position:fixed;inset:0;background:rgba(15,23,42,0.55);z-index:5000;align-items:center;justify-content:center;flex-direction:column;gap:12px;">
  <div class="spinner-lg"></div>
  <div id="loading-text" style="color:white;font-weight:700;font-size:1rem;font-family:'Heebo',sans-serif;">טוען...</div>
</div>

<script type="module">
import { auth, db } from './js/firebase.js';
import { onAuthStateChanged } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js';
import { getDocs, query, collection, where } from 'https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js';
import { initPrizesScreen } from './js/prizes.js';

// showLoading / hideLoading globals
window.showLoading = (msg = 'טוען...') => {
  const ov = document.getElementById('loading-overlay');
  document.getElementById('loading-text').textContent = msg;
  ov.style.display = 'flex';
};
window.hideLoading = () => { document.getElementById('loading-overlay').style.display = 'none'; };

// Toast global
window.showToast = (msg) => {
  const t = document.getElementById('toast');
  t.textContent = msg; t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
};

// Auth guard
onAuthStateChanged(auth, async user => {
  if (!user || user.isAnonymous) { window.location.href = 'index.html'; return; }
  try {
    let fSnap = await getDocs(query(collection(db, 'families'), where('parentUid', '==', user.uid)));
    if (fSnap.empty) fSnap = await getDocs(query(collection(db, 'families'), where('secondaryParentUid', '==', user.uid)));
    if (fSnap.empty) { window.location.href = 'index.html'; return; }
    const familyId = fSnap.docs[0].id;
    initPrizesScreen(familyId);
  } catch (e) { window.location.href = 'index.html'; }
});
</script>
</body>
</html>
