<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>איקס עיגול - אמה וריף</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', Tahoma, sans-serif; background: #0d1117; min-height: 100vh; display: flex; align-items: center; justify-content: center; overflow: hidden; position: relative; }
    body::before { content: ''; position: fixed; inset: 0; background: radial-gradient(ellipse 80% 60% at 20% 20%, rgba(255,107,107,0.12) 0%, transparent 60%), radial-gradient(ellipse 80% 60% at 80% 80%, rgba(78,205,196,0.12) 0%, transparent 60%); pointer-events: none; z-index: 0; }
    .container { position: relative; z-index: 1; text-align: center; padding: 1.5rem; max-width: 420px; width: 100%; }
    h1 { font-size: 2.8rem; font-weight: 900; letter-spacing: 3px; background: linear-gradient(135deg, #ff6b6b, #ffd700, #4ecdc4); -webkit-background-clip: text; -webkit-text-fill-color: transparent; background-clip: text; margin-bottom: 0.2rem; filter: drop-shadow(0 0 20px rgba(255,215,0,0.3)); }
    
    .scoreboard { display: grid; grid-template-columns: 1fr auto 1fr; gap: 0.8rem; margin-bottom: 1.4rem; align-items: stretch; }
    .score-card { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 14px; padding: 0.8rem 0.6rem; transition: all 0.35s ease; position: relative; }
    .score-card.active { border-color: rgba(255,255,255,0.22); transform: translateY(-3px); box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
    .score-card.x-card.active { border-color: rgba(255,107,107,0.5); }
    .score-card.o-card.active { border-color: rgba(78,205,196,0.5); }
    .player-name { font-size: 0.9rem; font-weight: 700; color: #fff; text-align: center; min-height: 1.2rem; }
    .x-card .player-name { color: #ff6b6b; }
    .o-card .player-name { color: #4ecdc4; }
    .score-value { font-size: 2.2rem; font-weight: 900; color: #e2e8f0; margin-top: 0.3rem; }
    
    .draw-card { display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); border: 1.5px solid rgba(255,255,255,0.06); border-radius: 14px; padding: 0.5rem; }
    .draw-label { font-size: 0.7rem; color: #4a5568; }
    .draw-value { font-size: 1.5rem; font-weight: 700; color: #718096; }

    .turn-bar { display: flex; align-items: center; justify-content: center; gap: 10px; height: 2.4rem; margin-bottom: 1.2rem; }
    .turn-text { font-size: 1.1rem; font-weight: 700; color: #e2e8f0; }

    .board { display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; width: 312px; height: 312px; margin: 0 auto 1.4rem; }
    .cell { background: rgba(255,255,255,0.04); border: 1.5px solid rgba(255,255,255,0.08); border-radius: 14px; cursor: pointer; display: flex; align-items: center; justify-content: center; transition: all 0.2s; height: 100px; -webkit-tap-highlight-color: transparent; }
    .cell:active { transform: scale(0.95); background: rgba(255,255,255,0.1); }
    .cell svg { width: 52px; height: 52px; pointer-events: none; }
    .x-path { stroke: #ff6b6b; stroke-width: 5; stroke-linecap: round; fill: none; stroke-dasharray: 60; stroke-dashoffset: 60; animation: drawStroke 0.25s ease-out forwards; }
    .o-circle { stroke: #4ecdc4; stroke-width: 5; stroke-linecap: round; fill: none; stroke-dasharray: 163; stroke-dashoffset: 163; animation: drawStroke 0.35s ease-out forwards; }
    @keyframes drawStroke { to { stroke-dashoffset: 0; } }
    .cell.winning { animation: winPulse 0.7s ease-in-out infinite alternate; }
    @keyframes winPulse { from { background: rgba(255,215,0,0.08); transform: scale(1); } to { background: rgba(255,215,0,0.18); transform: scale(1.05); } }

    .buttons { display: flex; gap: 0.8rem; justify-content: center; }
    .btn { padding: 0.6rem 1.4rem; border-radius: 10px; border: none; font-weight: 700; cursor: pointer; transition: 0.2s; font-size: 1rem; -webkit-tap-highlight-color: transparent; }
    .btn-restart { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
    .btn-reset { background: rgba(255,255,255,0.07); color: #a0aec0; border: 1.5px solid rgba(255,255,255,0.12); }

    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.85); display: none; align-items: center; justify-content: center; z-index: 1000; backdrop-filter: blur(5px); }
    .modal-content { background: #1a1f26; border: 2px solid #ffd700; padding: 2.5rem 2rem; border-radius: 20px; text-align: center; max-width: 300px; width: 90%; box-shadow: 0 0 30px rgba(255,215,0,0.2); }
    .modal-overlay.active { display: flex; }
    .btn-modal { background: #ffd700; color: #000; width: 100%; padding: 0.8rem; border-radius: 12px; border: none; font-weight: 800; cursor: pointer; font-size: 1.1rem; }
  </style>
</head>
<body>

<div class="modal-overlay" id="exit-modal">
  <div class="modal-content">
    <h2 style="color: #ffd700; margin-bottom: 1rem;">המשחק הסתיים</h2>
    <p id="exit-msg" style="color: #e2e8f0; margin-bottom: 2rem;">השחקן השני עזב את החדר.</p>
    <button class="btn-modal" onclick="location.href='index.html?screen=games'">חזרה ללובי</button>
  </div>
</div>

<div class="container">
  <h1>✕ ◯</h1>
  <div class="scoreboard">
    <div class="score-card x-card" id="card-x">
      <div class="player-name" id="name-x">ממתין...</div>
      <div class="score-value" id="score-x">0</div>
    </div>
    <div class="draw-card">
      <div class="draw-label">תיקו</div>
      <div class="draw-value" id="score-draw">0</div>
    </div>
    <div class="score-card o-card" id="card-o">
      <div class="player-name" id="name-o">ממתין...</div>
      <div class="score-value" id="score-o">0</div>
    </div>
  </div>
  <div class="turn-bar">
    <div id="turn-text" class="turn-text">מתחבר...</div>
  </div>
  <div class="board" id="board">
    <div class="cell" data-index="0"></div><div class="cell" data-index="1"></div><div class="cell" data-index="2"></div>
    <div class="cell" data-index="3"></div><div class="cell" data-index="4"></div><div class="cell" data-index="5"></div>
    <div class="cell" data-index="6"></div><div class="cell" data-index="7"></div><div class="cell" data-index="8"></div>
  </div>
  <div class="buttons">
    <button class="btn btn-restart" onclick="restartGame()">▶ משחק חדש</button>
    <button class="btn btn-reset" onclick="goHome()">🏠 לבית</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, get, update, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
const gameRef = ref(db, 'game/xo');
const roomRef = ref(db, 'rooms_v3/xo');

const params = new URLSearchParams(location.search);
const myId = params.get('player') || 'guest_' + Math.floor(Math.random()*1000);

let mySymbol = null;
let board = Array(9).fill('');
let currentPlayer = 'X';
let scores = { X: 0, O: 0, draw: 0 };
let gameOver = false;
let players = { X: 'ממתין...', O: 'ממתין...' };
let gameStarted = false;

// 1. ניקוי ראשוני של מצב עזיבה במידה וקיים (רק אם אני הראשון בחדר)
async function checkInit() {
    const roomSnap = await get(roomRef);
    if (!roomSnap.exists()) {
        await update(gameRef, { exitToHome: false });
    }
}
checkInit();

// 2. האזנה לשחקנים
onValue(roomRef, (snap) => {
    const data = snap.val() || {};
    const ids = Object.keys(data);
    
    if (!mySymbol) {
        if (ids[0] === myId) mySymbol = 'X';
        else if (ids[1] === myId) mySymbol = 'O';
    }

    players.X = ids[0] ? (data[ids[0]].name || 'שחקן 1') : 'ממתין...';
    players.O = ids[1] ? (data[ids[1]].name || 'שחקן 2') : 'ממתין...';
    
    if (ids.length >= 2) gameStarted = true;
    updateUI();
});

// 3. האזנה למצב לוח המשחק
onValue(gameRef, (snap) => {
    const data = snap.val();
    if (!data) return;

    // הצגת הודעת עזיבה רק אם המשחק כבר התחיל פעם אחת
    if (data.exitToHome && gameStarted) {
        document.getElementById('exit-modal').classList.add('active');
        return;
    }

    board = data.board || Array(9).fill('');
    currentPlayer = data.currentPlayer || 'X';
    gameOver = !!data.gameOver;
    scores = data.scores || { X: 0, O: 0, draw: 0 };

    updateUI();
    if (data.winCombo) {
        data.winCombo.forEach(i => {
            const cell = document.querySelectorAll('.cell')[i];
            if(cell) cell.classList.add('winning');
        });
    }
});

function updateUI() {
    document.getElementById('name-x').textContent = players.X;
    document.getElementById('name-o').textContent = players.O;
    document.getElementById('score-x').textContent = scores.X;
    document.getElementById('score-o').textContent = scores.O;
    document.getElementById('score-draw').textContent = scores.draw;

    document.getElementById('card-x').classList.toggle('active', currentPlayer === 'X');
    document.getElementById('card-o').classList.toggle('active', currentPlayer === 'O');

    const turnEl = document.getElementById('turn-text');
    if (gameOver) {
        turnEl.textContent = board.includes('') ? `🏆 ${players[currentPlayer]} ניצח/ה!` : `🤝 תיקו!`;
    } else {
        if (players.X === 'ממתין...' || players.O === 'ממתין...') {
            turnEl.textContent = "מחכים לשחקן נוסף...";
        } else {
            turnEl.textContent = (mySymbol === currentPlayer) ? "תורך לשחק!" : `תור ${players[currentPlayer]}...`;
        }
    }

    document.querySelectorAll('.cell').forEach((cell, i) => {
        cell.classList.remove('winning');
        if (board[i] === 'X') {
            cell.innerHTML = `<svg viewBox="0 0 60 60"><line class="x-path" x1="14" y1="14" x2="46" y2="46"/><line class="x-path" x1="46" y1="14" x2="14" y2="46"/></svg>`;
        } else if (board[i] === 'O') {
            cell.innerHTML = `<svg viewBox="0 0 60 60"><circle class="o-circle" cx="30" cy="30" r="18"/></svg>`;
        } else {
            cell.innerHTML = '';
        }
    });
}

async function handleCellClick(e) {
    const idx = e.currentTarget.dataset.index;
    if (gameOver || board[idx] !== '' || currentPlayer !== mySymbol || !gameStarted) return;

    board[idx] = mySymbol;
    const win = checkWin();
    const isDraw = !win && !board.includes('');
    
    const newScores = {...scores};
    if (win) newScores[mySymbol]++;
    if (isDraw) newScores.draw++;

    await update(gameRef, {
        board: board,
        currentPlayer: (win || isDraw) ? mySymbol : (mySymbol === 'X' ? 'O' : 'X'),
        gameOver: win || isDraw,
        winCombo: win || null,
        scores: newScores,
        ts: Date.now()
    });
}

function checkWin() {
    const lines = [[0,1,2],[3,4,5],[6,7,8],[0,3,6],[1,4,7],[2,5,8],[0,4,8],[2,4,6]];
    for (let l of lines) {
        if (board[l[0]] && board[l[0]] === board[l[1]] && board[l[0]] === board[l[2]]) return l;
    }
    return null;
}

window.restartGame = () => {
    if (!mySymbol) return;
    update(gameRef, {
        board: Array(9).fill(''),
        currentPlayer: 'X',
        gameOver: false,
        winCombo: null,
        exitToHome: false, // מוודא שמתחילים נקי
        ts: Date.now()
    });
};

window.goHome = async () => {
    await update(gameRef, { exitToHome: true });
    // נותן ל-Firebase רגע לעדכן לפני המעבר
    setTimeout(() => {
        location.href = 'index.html?screen=games';
    }, 100);
};

document.querySelectorAll('.cell').forEach(c => c.addEventListener('click', handleCellClick));
</script>
</body>
</html>
