<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מרוץ קליקים - 3 שלבים</title>
    <style>
        body { 
            margin: 0; background: #111; font-family: sans-serif; 
            overflow: hidden; touch-action: none; color: white;
        }
        
        /* תצוגת מסך מלא למסלול */
        #game-viewport {
            width: 100vw; height: 100vh;
            background: #333; position: relative;
            display: flex; justify-content: center;
        }

        .track-full {
            width: 90%; max-width: 400px; height: 100%;
            background: #444; position: relative;
            border-left: 5px solid #666; border-right: 5px solid #666;
            box-shadow: inset 0 0 100px #000;
        }

        /* חצים למעבר שלב */
        .next-level-arrows {
            position: absolute; top: 5%; width: 100%; height: 50px;
            display: flex; flex-direction: column; align-items: center;
            opacity: 0.8; animation: moveArrows 1s infinite;
        }
        @keyframes moveArrows {
            0% { transform: translateY(0); opacity: 0; }
            50% { opacity: 1; }
            100% { transform: translateY(-20px); opacity: 0; }
        }

        .finish-line { 
            position: absolute; top: 5%; width: 100%; height: 40px;
            background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px);
            display: none; /* יופעל רק בשלב 3 */
        }

        .lane-line {
            position: absolute; height: 100%; width: 2px;
            background: rgba(255,255,255,0.1); border-left: 2px dashed rgba(255,255,255,0.3);
        }

        .car { 
            position: absolute; width: 80px; height: 80px; font-size: 60px;
            transition: left 0.2s ease, bottom 0.1s linear; transform: translateX(-50%);
            z-index: 10; display: flex; align-items: center; justify-content: center;
        }

        /* מיני-מפה ליריב */
        #opponent-mini {
            position: fixed; top: 10px; left: 10px; width: 60px; height: 150px;
            background: rgba(0,0,0,0.5); border: 1px solid #555; z-index: 100;
        }
        #opp-dot {
            position: absolute; width: 10px; height: 10px; background: red;
            border-radius: 50%; left: 25px; transition: bottom 0.3s;
        }

        #ui-overlay {
            position: fixed; top: 10px; right: 10px; text-align: left; z-index: 100;
            background: rgba(0,0,0,0.5); padding: 5px 10px; border-radius: 5px;
        }

        #controls {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            display: grid; grid-template-columns: 1fr 2fr 1fr; z-index: 50;
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="level-text" style="color: yellow; font-weight: bold;">STAGE 1/3</div>
        <div id="room-id"></div>
    </div>

    <div id="opponent-mini">
        <div style="font-size: 10px; text-align: center;">יריב</div>
        <div id="opp-dot" style="bottom: 0;"></div>
    </div>

    <div id="game-viewport">
        <div class="track-full">
            <div id="arrows" class="next-level-arrows">
                <span style="font-size: 30px;">▲</span>
                <span style="font-size: 30px;">▲</span>
            </div>
            <div id="finish" class="finish-line"></div>
            
            <div class="lane-line" style="left: 33%"></div>
            <div class="lane-line" style="left: 66%"></div>
            
            <div id="my-car" class="car">🏎️</div>
        </div>
    </div>

    <div id="controls">
        <div onclick="moveLane(-1)"></div>
        <div onclick="drive()"></div>
        <div onclick="moveLane(1)"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
            authDomain: "kidssapp-izhaki.firebaseapp.com",
            databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kidssapp-izhaki",
            storageBucket: "kidssapp-izhaki.firebasestorage.app",
            messagingSenderId: "663906163746",
            appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || 'race1';
        const gameRef = ref(db, `race_v2/${roomId}`);

        let myId = null;
        let gameState = {};
        const lanes = [16, 50, 83];

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val();
            if (!myId) {
                myId = (!data || !data.p1) ? 'p1' : (data.p2 ? 'p1' : 'p2');
                if (!data || !data[myId]) {
                    update(gameRef, { [myId]: { pos: 5, lane: 1, stage: 1 } });
                }
            }
            gameState = data || {};
            render();
        });

        function render() {
            const me = gameState[myId];
            const oppId = myId === 'p1' ? 'p2' : 'p1';
            const opp = gameState[oppId];

            if (me) {
                // עדכון המכונית שלי
                const myCarEl = document.getElementById('my-car');
                myCarEl.style.bottom = me.pos + "%";
                myCarEl.style.left = lanes[me.lane] + "%";
                myCarEl.style.filter = myId === 'p2' ? 'hue-rotate(150deg)' : '';

                // עדכון שלב
                document.getElementById('level-text').innerText = `STAGE ${me.stage}/3`;
                document.getElementById('arrows').style.display = me.stage < 3 ? 'flex' : 'none';
                document.getElementById('finish').style.display = me.stage === 3 ? 'block' : 'none';
            }

            if (opp) {
                // עדכון מיני מפה (יחס של שלב + מיקום)
                const totalProgress = ((opp.stage - 1) * 100 + opp.pos) / 3;
                document.getElementById('opp-dot').style.bottom = totalProgress + "%";
            }
        }

        window.drive = () => {
            if (!meValid()) return;
            let { pos, stage } = gameState[myId];
            
            pos += 4; // קצב התקדמות

            if (pos >= 95) {
                if (stage < 3) {
                    stage++;
                    pos = 5; // חזרה לתחתית בשלב הבא
                } else {
                    alert("נצחון סופי!");
                    stage = 1; pos = 5; // איפוס
                }
            }
            update(gameRef, { [`${myId}/pos`]: pos, [`${myId}/stage`]: stage });
        };

        window.moveLane = (dir) => {
            if (!meValid()) return;
            let newLane = Math.max(0, Math.min(2, gameState[myId].lane + dir));
            update(gameRef, { [`${myId}/lane`]: newLane });
        };

        function meValid() { return myId && gameState[myId]; }

    </script>
</body>
</html>
