<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מרוץ קליקים - רטט ומכשולים</title>
    <style>
        body { margin: 0; background: #111; font-family: sans-serif; overflow: hidden; touch-action: none; color: white; user-select: none; }
        #game-viewport { width: 100vw; height: 100vh; background: #222; position: relative; display: flex; justify-content: center; transition: transform 0.1s; }
        .track-full { width: 90%; max-width: 400px; height: 100%; background: #333; position: relative; border-left: 4px solid #555; border-right: 4px solid #555; box-shadow: inset 0 0 80px #000; }
        
        /* חפצים */
        .game-obj { position: absolute; font-size: 35px; transform: translateX(-50%); z-index: 8; }
        
        .car { position: absolute; width: 60px; height: 80px; font-size: 50px; transition: left 0.2s ease, bottom 0.1s linear; transform: translateX(-50%) rotate(-90deg); z-index: 10; display: flex; align-items: center; justify-content: center; }
        
        /* UI */
        #ui-overlay { position: fixed; top: 15px; right: 15px; z-index: 100; background: rgba(0,0,0,0.8); padding: 10px; border-radius: 10px; border: 1px solid #444; min-width: 120px; }
        .stat { display: flex; justify-content: space-between; margin-bottom: 5px; }
        .speed-val { font-weight: bold; }
        .speed-1 { color: #fff; } .speed-2 { color: #0f0; } .speed-3 { color: #0ff; text-shadow: 0 0 8px #0ff; }
        
        #controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: grid; grid-template-columns: 1fr 2fr 1fr; z-index: 50; }
        
        /* אפקט רעידה למסך */
        .shake { animation: shakeAnim 0.3s; }
        @keyframes shakeAnim {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            20% { transform: translate(-3px, 0px) rotate(-1deg); }
            40% { transform: translate(3px, 2px) rotate(1deg); }
            60% { transform: translate(-3px, 1px) rotate(-1deg); }
            80% { transform: translate(3px, -1px) rotate(1deg); }
            100% { transform: translate(0, 0) rotate(0deg); }
        }

        .finish-line { position: absolute; top: 5%; width: 100%; height: 40px; background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px); display: none; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div id="level-text" style="color: gold; text-align: center; font-size: 18px; margin-bottom: 5px;">STAGE 1</div>
        <div class="stat"><span>💎 יהלומים:</span> <span id="score-val">0</span></div>
        <div class="stat"><span>🚀 מהירות:</span> <span id="speed-val" class="speed-1">x1</span></div>
    </div>

    <div id="game-viewport">
        <div class="track-full" id="main-track">
            <div id="finish" class="finish-line"></div>
            <div style="position:absolute; height:100%; width:1px; left:33.3%; border-left:1px dashed #555;"></div>
            <div style="position:absolute; height:100%; width:1px; left:66.6%; border-left:1px dashed #555;"></div>
            <div id="my-car" class="car">🏎️</div>
            <div id="objects-layer"></div>
        </div>
    </div>

    <div id="controls">
        <div id="touch-left" onclick="moveLane(-1)"></div>
        <div id="touch-center" onclick="drive()"></div>
        <div id="touch-right" onclick="moveLane(1)"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
            authDomain: "kidssapp-izhaki.firebaseapp.com",
            databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kidssapp-izhaki",
            storageBucket: "kidssapp-izhaki.firebasestorage.app",
            messagingSenderId: "663906163746",
            appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || 'race_pro';
        const gameRef = ref(db, `race_v5/${roomId}`);
        const objsRef = ref(db, `race_v5/${roomId}/objects`);

        let myId = null;
        let gameState = {};
        const lanesX = [16.6, 50, 83.3];
        const objTypes = [{char:'💎', type:'coin'}, {char:'⚡', type:'boost'}, {char:'💥', type:'trap'}];

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val() || {};
            if (!myId) {
                myId = (!data.p1) ? 'p1' : (data.p2 ? 'p1' : 'p2');
                update(gameRef, { [myId]: { pos: 5, lane: 1, stage: 1, score: 0, speed: 1 } });
                onDisconnect(ref(db, `race_v5/${roomId}/${myId}`)).remove();
                if (myId === 'p1') startObjectSpawner();
            }
            gameState = data;
            render();
        });

        function render() {
            const me = gameState[myId];
            if (!me) return;

            const car = document.getElementById('my-car');
            car.style.bottom = me.pos + "%";
            car.style.left = lanesX[me.lane] + "%";
            car.style.filter = myId === 'p2' ? 'hue-rotate(150deg)' : '';

            document.getElementById('score-val').innerText = me.score || 0;
            document.getElementById('speed-val').innerText = 'x' + me.speed;
            document.getElementById('speed-val').className = 'speed-val speed-' + me.speed;
            document.getElementById('level-text').innerText = `STAGE ${me.stage}`;
            document.getElementById('finish').style.display = me.stage === 3 ? 'block' : 'none';

            const objLayer = document.getElementById('objects-layer');
            objLayer.innerHTML = '';
            if (gameState.objects) {
                Object.keys(gameState.objects).forEach(id => {
                    const obj = gameState.objects[id];
                    if (obj.stage === me.stage) {
                        const div = document.createElement('div');
                        div.className = 'game-obj';
                        div.innerText = obj.char;
                        div.style.bottom = obj.pos + "%";
                        div.style.left = lanesX[obj.lane] + "%";
                        objLayer.appendChild(div);
                    }
                });
            }
        }

        window.drive = () => {
            if (!myId || !gameState[myId]) return;
            let { pos, stage, score, speed, lane } = gameState[myId];
            
            const moveStep = speed === 1 ? 4 : (speed === 2 ? 7 : 12);
            pos += moveStep;

            // בדיקת התנגשות
            if (gameState.objects) {
                Object.keys(gameState.objects).forEach(id => {
                    const obj = gameState.objects[id];
                    if (obj.stage === stage && obj.lane === lane && Math.abs(obj.pos - pos) < 8) {
                        if (obj.type === 'coin') score += 10;
                        if (obj.type === 'boost') speed = Math.min(3, speed + 1);
                        if (obj.type === 'trap') { 
                            // --- אפקטים של התנגשות ---
                            triggerCollision();
                            speed = 1; 
                            pos = 5; // חזרה לתחילת השלב
                        }
                        update(ref(db, `race_v5/${roomId}/objects`), { [id]: null });
                    }
                });
            }

            if (pos >= 95) {
                if (stage < 3) { stage++; pos = 5; } 
                else { alert("מקום ראשון! אלוף!"); stage = 1; pos = 5; score = 0; speed = 1; }
            }
            update(gameRef, { [myId]: { pos, stage, score, speed, lane } });
        };

        function triggerCollision() {
            // רטט בטלפון
            if ("vibrate" in navigator) {
                navigator.vibrate(200); 
            }
            // רעידת מסך ויזואלית
            const viewport = document.getElementById('game-viewport');
            viewport.classList.add('shake');
            setTimeout(() => viewport.classList.remove('shake'), 300);
        }

        window.moveLane = (dir) => {
            if (!myId || !gameState[myId]) return;
            let newLane = Math.max(0, Math.min(2, gameState[myId].lane + dir));
            update(gameRef, { [`${myId}/lane`]: newLane });
        };

        function startObjectSpawner() {
            setInterval(() => {
                const id = 'obj_' + Date.now();
                const randomObj = objTypes[Math.floor(Math.random() * objTypes.length)];
                update(objsRef, { [id]: {
                    ...randomObj,
                    lane: Math.floor(Math.random() * 3),
                    pos: Math.floor(Math.random() * 60) + 20,
                    stage: Math.floor(Math.random() * 3) + 1
                }});
                setTimeout(() => update(objsRef, { [id]: null }), 8000);
            }, 1500);
        }

        // שיפור מהירות התגובה באנדרואיד
        document.getElementById('touch-center').addEventListener('pointerdown', (e) => { e.preventDefault(); window.drive(); });
        document.getElementById('touch-left').addEventListener('pointerdown', (e) => { e.preventDefault(); window.moveLane(-1); });
        document.getElementById('touch-right').addEventListener('pointerdown', (e) => { e.preventDefault(); window.moveLane(1); });

    </script>
</body>
</html>
