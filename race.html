<!DOCTYPE html>
<html lang="he" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מרוץ אקסטרים v16.6 - שליטה אינטואיטיבית</title>
    <style>
        body { margin: 0; background: #000; font-family: sans-serif; overflow: hidden; touch-action: none; color: white; user-select: none; direction: ltr; }
        #game-viewport { width: 100vw; height: 100vh; position: relative; display: flex; justify-content: center; overflow: hidden; background: #222; }
        
        .track-5-lanes { 
            width: 90%; max-width: 450px; height: 100%; background: #333; position: relative; 
            border-left: 15px solid; border-right: 15px solid;
            border-image: repeating-linear-gradient(-45deg, #f00, #f00 15px, #fff 15px, #fff 30px) 1;
        }

        .start-line {
            position: absolute; bottom: 10%; width: 100%; height: 40px;
            background: repeating-linear-gradient(45deg, #eee 25%, #222 25%, #222 50%, #eee 50%, #eee 75%, #222 75%, #222 100%);
            background-size: 20px 20px; border-top: 3px solid gold; border-bottom: 3px solid gold; z-index: 5;
        }

        .car { 
            position: absolute; width: 55px; height: 75px; font-size: 50px; z-index: 200;
            transition: left 0.12s ease-out; transform: translateX(-50%) rotate(90deg);
            display: flex; align-items: center; justify-content: center;
        }
        
        .game-obj { position: absolute; font-size: 35px; transform: translate(-50%, 50%); z-index: 100; text-shadow: 0 0 10px #000; }

        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.85); padding: 8px 12px; border-radius: 12px; border: 2px solid #555; text-align: center; min-width: 80px; }
        
        #overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 3000;
        }

        /* הגדרת אזורי לחיצה פיזיים */
        #touch-left-side { position: fixed; top: 0; left: 0; width: 50%; height: 100%; z-index: 500; }
        #touch-right-side { position: fixed; top: 0; right: 0; width: 50%; height: 100%; z-index: 500; }
    </style>
</head>
<body>

    <div id="overlay">
        <button id="ready-btn" style="padding:20px 40px; font-size:25px; border-radius:30px; background:lime; font-weight:bold; border:none; cursor:pointer;">START!</button>
        <div id="countdown-txt" style="font-size:100px; color:gold;"></div>
    </div>

    <div id="ui">
        <div class="stat-box" style="border-color: #00ff00;">P1<br><span id="p1-s">💎 0</span></div>
        <div id="stage-txt" style="font-size: 22px; font-weight: bold; color: gold;">STAGE 1</div>
        <div class="stat-box" style="border-color: #cc00ff;">P2<br><span id="p2-s">💎 0</span></div>
    </div>

    <div id="game-viewport">
        <div class="track-5-lanes">
            <div id="start-line-el" class="start-line"></div>
            <div id="p1-car" class="car" style="display:none; color: #00ff00;">🏎️</div>
            <div id="p2-car" class="car" style="display:none; color: #cc00ff;">🏎️</div>
            <div id="obj-layer"></div>
        </div>
    </div>

    <div id="touch-left-side"></div>
    <div id="touch-right-side"></div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, onDisconnect, set, get } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
            authDomain: "kidssapp-izhaki.firebaseapp.com",
            databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kidssapp-izhaki",
            storageBucket: "kidssapp-izhaki.firebasestorage.app",
            messagingSenderId: "663906163746",
            appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomId = new URLSearchParams(window.location.search).get('room') || 'race_fix_v16_6';
        const gameRef = ref(db, `race_v16_6/${roomId}`);

        let myId = null;
        let localData = { pos: 5, lane: 2, stage: 1, score: 0, speed: 1, isRacing: false };
        const lanesX = [10, 30, 50, 70, 90]; 

        async function joinGame() {
            const snap = await get(gameRef);
            const data = snap.val() || {};
            myId = (!data.p1) ? 'p1' : 'p2';
            await set(ref(db, `race_v16_6/${roomId}/${myId}`), localData);
            onDisconnect(ref(db, `race_v16_6/${roomId}/${myId}`)).remove();
            if (myId === 'p1') setupGlobalMap();
            onValue(gameRef, (s) => render(s.val() || {}));
            startEngine();
        }

        function render(data) {
            ['p1', 'p2'].forEach(p => {
                const el = document.getElementById(`${p}-car`);
                if (data[p]) {
                    el.style.display = 'flex';
                    el.style.bottom = data[p].pos + "%";
                    el.style.left = lanesX[data[p].lane] + "%";
                    document.getElementById(`${p}-s`).innerText = `💎 ${data[p].score}`;
                }
            });
            document.getElementById('stage-txt').innerText = `STAGE ${localData.stage}`;
            document.getElementById('start-line-el').style.display = (localData.stage === 1) ? 'block' : 'none';
            const layer = document.getElementById('obj-layer');
            layer.innerHTML = '';
            if (data.objects) {
                Object.entries(data.objects).forEach(([id, o]) => {
                    if (o.stage === localData.stage) {
                        const d = document.createElement('div');
                        d.className = 'game-obj'; d.innerText = o.char;
                        d.style.bottom = o.pos + "%"; d.style.left = lanesX[o.lane] + "%";
                        layer.appendChild(d);
                    }
                });
            }
        }

        function startEngine() {
            setInterval(() => {
                if (!localData.isRacing) return;
                localData.pos += (0.5 * localData.speed); 
                if (localData.pos >= 98) {
                    if (localData.stage < 5) { localData.stage++; localData.pos = 5; } 
                    else { alert("🏁 FINISH!"); localData.stage = 1; localData.pos = 5; localData.isRacing = false; }
                }
                checkCollisions();
                update(ref(db, `race_v16_6/${roomId}/${myId}`), localData);
            }, 40);
        }

        async function checkCollisions() {
            const snap = await get(ref(db, `race_v16_6/${roomId}/objects`));
            const objs = snap.val(); if (!objs) return;
            Object.entries(objs).forEach(([id, o]) => {
                if (o.stage === localData.stage && o.lane === localData.lane && Math.abs(o.pos - localData.pos) < 3.5) {
                    if (o.type === 'coin') localData.score += 10;
                    if (o.type === 'boost') localData.speed = Math.min(3.0, localData.speed + 0.3);
                    if (o.type === 'trap') { localData.stage = 1; localData.pos = 5; localData.speed = 1; }
                    update(ref(db, `race_v16_6/${roomId}/objects`), { [id]: null });
                }
            });
        }

        // לוגיקת כפתורי START
        document.getElementById('ready-btn').addEventListener('click', () => {
            document.getElementById('ready-btn').style.display = 'none';
            let c = 3;
            const t = document.getElementById('countdown-txt');
            const iv = setInterval(() => {
                if (c > 0) { t.innerText = c; c--; }
                else { t.innerText = "GO!"; clearInterval(iv);
                    setTimeout(() => { document.getElementById('overlay').style.display = 'none'; localData.isRacing = true; }, 500);
                }
            }, 800);
        });

        // --- תיקון השליטה: לכיוון האצבע ---

        // צד שמאל של המסך מושך שמאלה (נתיב קטן יותר)
        document.getElementById('touch-left-side').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (localData.lane > 0) localData.lane--;
            update(ref(db, `race_v16_6/${roomId}/${myId}`), { lane: localData.lane });
        });

        // צד ימין של המסך מושך ימינה (נתיב גדול יותר)
        document.getElementById('touch-right-side').addEventListener('pointerdown', (e) => {
            e.preventDefault();
            if (localData.lane < 4) localData.lane++;
            update(ref(db, `race_v16_6/${roomId}/${myId}`), { lane: localData.lane });
        });

        function setupGlobalMap() {
            const obs = {};
            for(let s=1; s<=5; s++) {
                for(let i=0; i<4; i++) {
                    obs[`s${s}_c${i}`] = { char:'💎', type:'coin', stage:s, lane:Math.floor(Math.random()*5), pos:Math.floor(Math.random()*65)+20 };
                    obs[`s${s}_t${i}`] = { char:'💥', type:'trap', stage:s, lane:Math.floor(Math.random()*5), pos:Math.floor(Math.random()*65)+20 };
                }
                for(let i=0; i<8; i++) {
                    obs[`s${s}_b${i}`] = { char:'⚡', type:'boost', stage:s, lane:Math.floor(Math.random()*5), pos:Math.floor(Math.random()*65)+20 };
                }
            }
            set(ref(db, `race_v16_6/${roomId}/objects`), obs);
        }
        joinGame();
    </script>
</body>
</html>
