<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מרוץ אקסטרים 20-20-20</title>
    <style>
        body { margin: 0; background: #050505; font-family: sans-serif; overflow: hidden; touch-action: none; color: white; user-select: none; }
        #game-viewport { width: 100vw; height: 100vh; position: relative; display: flex; justify-content: center; overflow: hidden; background: #222; }
        
        .track-5-lanes { 
            width: 95%; max-width: 500px; height: 100%; background: #333; position: relative; 
            border-left: 12px solid; border-right: 12px solid;
            border-image: repeating-linear-gradient(-45deg, #f00, #f00 10px, #fff 10px, #fff 20px) 1;
        }

        .lane-mark { 
            position: absolute; height: 100%; width: 4px; 
            background: repeating-linear-gradient(to bottom, #fff, #fff 20px, transparent 20px, transparent 40px);
            transform: translateX(-50%);
        }

        .car { 
            position: absolute; width: 50px; height: 70px; font-size: 45px; z-index: 100;
            transition: left 0.15s ease-out, bottom 0.1s linear, transform 0.2s; 
            transform: translateX(-50%) rotate(90deg);
            display: flex; align-items: center; justify-content: center;
        }
        
        .tilt-right { transform: translateX(-50%) rotate(110deg) !important; }
        .tilt-left { transform: translateX(-50%) rotate(70deg) !important; }

        .game-obj { position: absolute; font-size: 30px; transform: translateX(-50%); z-index: 80; }

        #ui { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 1000; pointer-events: none; }
        .stat-box { background: rgba(0,0,0,0.8); padding: 5px 15px; border-radius: 10px; border: 1px solid #444; text-align: center; }

        #controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 999; }
        .btn-zone { height: 100%; width: 50%; cursor: pointer; -webkit-tap-highlight-color: transparent; }
    </style>
</head>
<body>

    <div id="ui">
        <div class="stat-box" style="color: #00ff00;">שחקן 1<br><span id="p1-s">💎 0</span></div>
        <div id="stage-txt" style="font-size: 20px; font-weight: bold; color: gold;">STAGE 1/5</div>
        <div class="stat-box" style="color: #cc00ff;">שחקן 2<br><span id="p2-s">💎 0</span></div>
    </div>

    <div id="game-viewport">
        <div class="track-5-lanes">
            <div class="lane-mark" style="left: 20%;"></div>
            <div class="lane-mark" style="left: 40%;"></div>
            <div class="lane-mark" style="left: 60%;"></div>
            <div class="lane-mark" style="left: 80%;"></div>
            
            <div id="p1-car" class="car" style="display:none; color: #00ff00;">🏎️</div>
            <div id="p2-car" class="car" style="display:none; color: #cc00ff; filter: hue-rotate(150deg);">🏎️</div>
            
            <div id="obj-layer"></div>
        </div>
    </div>

    <div id="controls">
        <div class="btn-zone" id="btn-l"></div>
        <div class="btn-zone" id="btn-r"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
            authDomain: "kidssapp-izhaki.firebaseapp.com",
            databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kidssapp-izhaki",
            storageBucket: "kidssapp-izhaki.firebasestorage.app",
            messagingSenderId: "663906163746",
            appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const roomId = new URLSearchParams(window.location.search).get('room') || 'balanced_v15';
        const gameRef = ref(db, `race_v15/${roomId}`);

        let myId = null;
        let localData = { pos: 10, lane: 2, stage: 1, score: 0, speed: 1 };
        const lanesX = [10, 30, 50, 70, 90]; 

        onValue(gameRef, (snap) => {
            const data = snap.val() || {};
            if (!myId) {
                myId = (!data.p1) ? 'p1' : (data.p2 ? 'p1' : 'p2');
                update(gameRef, { [myId]: localData });
                onDisconnect(ref(db, `race_v15/${roomId}/${myId}`)).remove();
                if (myId === 'p1') setupGlobalMap();
                startAutoDrive();
            }
            render(data);
        });

        function render(data) {
            ['p1', 'p2'].forEach(p => {
                const el = document.getElementById(`${p}-car`);
                if (data[p]) {
                    el.style.display = 'flex';
                    el.style.bottom = data[p].pos + "%";
                    el.style.left = lanesX[data[p].lane] + "%";
                    document.getElementById(`${p}-s`).innerText = `💎 ${data[p].score}`;
                }
            });
            if (data[myId]) {
                document.getElementById('stage-txt').innerText = `STAGE ${data[myId].stage}/5`;
                localData = data[myId];
            }

            const layer = document.getElementById('obj-layer');
            layer.innerHTML = '';
            if (data.objects) {
                Object.entries(data.objects).forEach(([id, o]) => {
                    if (o.stage === localData.stage) {
                        const d = document.createElement('div');
                        d.className = 'game-obj';
                        d.innerText = o.char;
                        d.style.bottom = o.pos + "%";
                        d.style.left = lanesX[o.lane] + "%";
                        layer.appendChild(d);
                    }
                });
            }
        }

        function startAutoDrive() {
            setInterval(() => {
                if (!myId) return;
                let speedFactor = 0.3 * localData.speed; 
                localData.pos += speedFactor;

                checkCollisions();

                if (localData.pos >= 96) {
                    if (localData.stage < 5) {
                        localData.stage++;
                        localData.pos = 10;
                    } else {
                        alert("ניצחת!");
                        localData.stage = 1; localData.pos = 10; localData.score = 0; localData.speed = 1;
                    }
                }
                update(ref(db, `race_v15/${roomId}/${myId}`), localData);
            }, 50);
        }

        function checkCollisions() {
            onValue(ref(db, `race_v15/${roomId}/objects`), (snap) => {
                const objs = snap.val();
                if (!objs) return;
                Object.entries(objs).forEach(([id, o]) => {
                    if (o.stage === localData.stage && o.lane === localData.lane && Math.abs(o.pos - localData.pos) < 6) {
                        if (o.type === 'coin') localData.score += 10;
                        if (o.type === 'boost') localData.speed = Math.min(3, localData.speed + 0.5);
                        if (o.type === 'trap') { 
                            localData.stage = 1;
                            localData.pos = 10; 
                            localData.speed = 1; 
                            if(navigator.vibrate) navigator.vibrate([100, 50, 100]); 
                        }
                        update(ref(db, `race_v15/${roomId}/objects`), { [id]: null });
                    }
                });
            }, { onlyOnce: true });
        }

        // תיקון היגוי סופי בהחלט
        function changeLane(dir) {
            if (dir === 'left') { 
                if (localData.lane > 0) localData.lane -= 1; 
                tilt('l'); 
            } else { 
                if (localData.lane < 4) localData.lane += 1; 
                tilt('r'); 
            }
            update(ref(db, `race_v15/${roomId}/${myId}`), localData);
        }

        function tilt(dir) {
            const el = document.getElementById(`${myId}-car`);
            el.classList.add(dir === 'l' ? 'tilt-left' : 'tilt-right');
            setTimeout(() => el.classList.remove('tilt-left', 'tilt-right'), 200);
        }

        // צד ימין של הקוד (btn-l) מפעיל פקודת שמאלה, וצד שמאל (btn-r) ימינה
        document.getElementById('btn-l').addEventListener('pointerdown', (e) => { e.preventDefault(); changeLane('left'); });
        document.getElementById('btn-r').addEventListener('pointerdown', (e) => { e.preventDefault(); changeLane('right'); });

        function setupGlobalMap() {
            const obs = {};
            // חלוקה מאוזנת: 4 מכל סוג לכל אחד מ-5 השלבים (סה"כ 20 מכל סוג)
            for(let s=1; s<=5; s++) {
                for(let i=0; i<4; i++) addObj(obs, '💎', 'coin', `s${s}_c${i}`, s);
                for(let i=0; i<4; i++) addObj(obs, '⚡', 'boost', `s${s}_b${i}`, s);
                for(let i=0; i<4; i++) addObj(obs, '💥', 'trap', `s${s}_t${i}`, s);
            }
            update(gameRef, { objects: obs });
        }

        function addObj(target, char, type, id, s) {
            target[id] = { 
                char, 
                type, 
                lane: Math.floor(Math.random() * 5), 
                // מניעת הופעה ב-10% הראשונים (מתחיל מ-15% גובה)
                pos: Math.floor(Math.random() * 75) + 15, 
                stage: s 
            };
        }
    </script>
</body>
</html>
