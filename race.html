<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מרוץ 5 נתיבים - ניהול נתיבים והחלקות</title>
    <style>
        body { margin: 0; background: #111; font-family: sans-serif; overflow: hidden; touch-action: none; color: white; user-select: none; }
        #game-viewport { width: 100vw; height: 100vh; background: #222; position: relative; display: flex; justify-content: center; overflow: hidden; }
        
        .track-5-lanes { 
            width: 95%; max-width: 500px; height: 100%; background: #333; position: relative; 
            border-left: 5px solid #ffcc00; border-right: 5px solid #ffcc00; 
            box-shadow: inset 0 0 100px #000;
        }

        .lane-mark { position: absolute; height: 100%; width: 1px; border-left: 1px dashed rgba(255,255,255,0.1); }

        .game-obj { position: absolute; font-size: 30px; transform: translateX(-50%); z-index: 8; transition: bottom 0.1s linear; }
        
        /* המכונית עם אנימציות חלקות */
        .car { 
            position: absolute; width: 50px; height: 70px; font-size: 45px; 
            transition: left 0.2s cubic-bezier(0.175, 0.885, 0.32, 1.275), bottom 0.1s linear, transform 0.2s; 
            transform: translateX(-50%) rotate(-90deg); /* ברירת מחדל: ישר */
            z-index: 10; 
            display: flex; align-items: center; justify-content: center; 
        }

        /* סגנונות הטייה (Tilt) להחלקות */
        .tilt-right { transform: translateX(-50%) rotate(-80deg) !important; }
        .tilt-left { transform: translateX(-50%) rotate(-100deg) !important; }

        #ui-overlay { position: fixed; top: 10px; width: 100%; display: flex; justify-content: space-around; z-index: 100; pointer-events: none; }
        .player-box { background: rgba(0,0,0,0.7); padding: 5px 15px; border-radius: 15px; border: 1px solid #555; text-align: center; }

        /* אזורי לחיצה שקופים */
        #controls { position: fixed; top: 0; left: 0; width: 100%; height: 100%; display: flex; z-index: 50; }
        .control-area { height: 100%; }
        #area-left { width: 30%; }
        #area-center { width: 40%; }
        #area-right { width: 30%; }

        .finish-line { position: absolute; top: 5%; width: 100%; height: 40px; background: repeating-linear-gradient(45deg, #fff, #fff 10px, #000 10px, #000 20px); display: none; }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div class="player-box" id="p1-ui" style="border-color: #00ff00;">
            <div style="font-size: 12px;">שחקן 1</div>
            <div id="p1-score">💎 0</div>
        </div>
        <div id="stage-info" style="font-weight: bold; font-size: 20px; color: gold; padding-top: 10px;">STAGE 1</div>
        <div class="player-box" id="p2-ui" style="border-color: #cc00ff;">
            <div style="font-size: 12px;">שחקן 2</div>
            <div id="p2-score">💎 0</div>
        </div>
    </div>

    <div id="game-viewport">
        <div class="track-5-lanes" id="track">
            <div id="finish" class="finish-line"></div>
            <div class="lane-mark" style="left: 20%;"></div>
            <div class="lane-mark" style="left: 40%;"></div>
            <div class="lane-mark" style="left: 60%;"></div>
            <div class="lane-mark" style="left: 80%;"></div>
            
            <div id="car-p1" class="car" style="display:none;">🏎️</div>
            <div id="car-p2" class="car" style="display:none; filter: hue-rotate(150deg);">🏎️</div>
            
            <div id="objects-layer"></div>
        </div>
    </div>

    <div id="controls">
        <div class="control-area" id="area-left"></div>
        <div class="control-area" id="area-center"></div>
        <div class="control-area" id="area-right"></div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, onValue, update, onDisconnect } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
            authDomain: "kidssapp-izhaki.firebaseapp.com",
            databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "kidssapp-izhaki",
            storageBucket: "kidssapp-izhaki.firebasestorage.app",
            messagingSenderId: "663906163746",
            appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const urlParams = new URLSearchParams(window.location.search);
        let roomId = urlParams.get('room') || 'multi_lane_manager';
        const gameRef = ref(db, `race_v7/${roomId}`);

        let myId = null;
        let gameState = {};
        const lanesX = [10, 30, 50, 70, 90]; 

        onValue(gameRef, (snapshot) => {
            const data = snapshot.val() || {};
            if (!myId) {
                myId = (!data.p1) ? 'p1' : (data.p2 ? 'p1' : 'p2');
                update(gameRef, { [myId]: { pos: 10, lane: 2, stage: 1, score: 0, speed: 1 } });
                onDisconnect(ref(db, `race_v7/${roomId}/${myId}`)).remove();
                if (myId === 'p1') startSpawner(); // רק שחקן 1 מייצר
            }
            gameState = data;
            render();
        });

        function render() {
            // עדכון שחקן 1
            if (gameState.p1) {
                const p1El = document.getElementById('car-p1');
                p1El.style.display = 'flex';
                p1El.style.bottom = gameState.p1.pos + "%";
                p1El.style.left = lanesX[gameState.p1.lane] + "%";
                document.getElementById('p1-score').innerText = `💎 ${gameState.p1.score || 0}`;
            }
            // עדכון שחקן 2
            if (gameState.p2) {
                const p2El = document.getElementById('car-p2');
                p2El.style.display = 'flex';
                p2El.style.bottom = gameState.p2.pos + "%";
                p2El.style.left = lanesX[gameState.p2.lane] + "%";
                document.getElementById('p2-score').innerText = `💎 ${gameState.p2.score || 0}`;
            }

            const me = gameState[myId];
            if (me) {
                document.getElementById('stage-info').innerText = `STAGE ${me.stage}`;
                document.getElementById('finish').style.display = me.stage === 3 ? 'block' : 'none';
            }

            const objLayer = document.getElementById('objects-layer');
            objLayer.innerHTML = '';
            if (gameState.objects) {
                Object.entries(gameState.objects).forEach(([id, obj]) => {
                    if (me && obj.stage === me.stage) {
                        const d = document.createElement('div');
                        d.className = 'game-obj';
                        d.innerText = obj.char;
                        d.style.bottom = obj.pos + "%";
                        d.style.left = lanesX[obj.lane] + "%";
                        objLayer.appendChild(d);
                    }
                });
            }
        }

        function handleAction(type) {
            if (!myId || !gameState[myId]) return;
            let { pos, stage, score, speed, lane } = gameState[myId];

            if (type === 'drive') {
                pos += (speed === 1 ? 4 : (speed === 2 ? 7 : 12));
                // בדיקת פגיעה בחפצים
                if (gameState.objects) {
                    Object.entries(gameState.objects).forEach(([id, obj]) => {
                        if (obj.stage === stage && obj.lane === lane && Math.abs(obj.pos - pos) < 8) {
                            if (obj.type === 'coin') score += 10;
                            if (obj.type === 'boost') speed = Math.min(3, speed + 1);
                            if (obj.type === 'trap') {
                                if ("vibrate" in navigator) navigator.vibrate(200);
                                pos = 10; speed = 1; 
                            }
                            update(ref(db, `race_v7/${roomId}/objects`), { [id]: null });
                        }
                    });
                }
            } else if (type === 'left') {
                lane = Math.max(0, lane - 1);
                applyTilt('left');
            } else if (type === 'right') {
                lane = Math.min(4, lane + 1);
                applyTilt('right');
            }

            if (pos >= 95) {
                if (stage < 3) { stage++; pos = 10; }
                else { alert("ניצחון!"); stage = 1; pos = 10; score = 0; speed = 1; }
            }
            update(gameRef, { [myId]: { pos, stage, score, speed, lane } });
        }

        // --- פונקציית הטייה (Tilt) להחלקות ---
        function applyTilt(dir) {
            const carEl = document.getElementById(`car-${myId}`);
            carEl.classList.remove('tilt-left', 'tilt-right');
            if (dir === 'left') carEl.classList.add('tilt-left');
            if (dir === 'right') carEl.classList.add('tilt-right');
            
            // החזרה למצב ישר אחרי 200ms
            setTimeout(() => carEl.classList.remove('tilt-left', 'tilt-right'), 200);
        }

        document.getElementById('area-left').addEventListener('pointerdown', (e) => { e.preventDefault(); handleAction('left'); });
        document.getElementById('area-center').addEventListener('pointerdown', (e) => { e.preventDefault(); handleAction('drive'); });
        document.getElementById('area-right').addEventListener('pointerdown', (e) => { e.preventDefault(); handleAction('right'); });

        // --- מנוע ייצור חפצים משופר (ניהול נתיבים) ---
        function startSpawner() {
            const types = [{char:'💎',type:'coin'}, {char:'⚡',type:'boost'}, {char:'💥',type:'trap'}];
            
            // זיכרון מתי הופיע חפץ לאחרונה בכל נתיב
            let lastSpawnTime = [0, 0, 0, 0, 0];
            const minSpawnInterval = 1500; // לפחות 1.5 שניות בין חפצים באותו נתיב

            setInterval(() => {
                const now = Date.now();
                // מנסים לייצר חפץ בנתיב אקראי
                const lane = Math.floor(Math.random() * 5);
                
                // בודקים אם עבר מספיק זמן מאז החפץ האחרון בנתיב הזה
                if (now - lastSpawnTime[lane] > minSpawnInterval) {
                    const id = 'o' + now;
                    update(ref(db, `race_v7/${roomId}/objects`), { [id]: {
                        ...types[Math.floor(Math.random() * types.length)],
                        lane: lane,
                        pos: Math.floor(Math.random() * 60) + 20,
                        stage: Math.floor(Math.random() * 3) + 1
                    }});
                    lastSpawnTime[lane] = now; // עדכון זמן הייצור האחרון
                    setTimeout(() => update(ref(db, `race_v7/${roomId}/objects`), { [id]: null }), 7000);
                }
            }, 500); // הלולאה רצה כל 0.5 שניות, אבל הייצור מוגבל לפי נתיב
        }
    </script>
</body>
</html>
