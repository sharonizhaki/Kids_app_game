<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1320">
<title>משחקי אמה וריף</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

:root {
  --bg:       #0F1320;
  --surface:  rgba(24, 29, 46, 0.6);
  --surface2: rgba(33, 40, 64, 0.7);
  --border:   rgba(46, 52, 80, 0.5);
  --emma:     #FF5C7A;
  --rif:      #4DB8FF;
  --guest:    #3DD68C;
  --gold:     #F5C842;
  --text:     #EEF0FF;
  --dim:      #6B7299;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  font-family: 'Heebo', sans-serif;
  color: var(--text);
  overflow: hidden;
}

#bg-canvas {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  z-index: 0; pointer-events: none;
}

.screen { 
  display:none; min-height:100dvh; flex-direction:column; 
  position: relative; z-index: 1; 
}
.screen.active { display:flex; }

.glass {
  backdrop-filter: blur(12px);
  -webkit-backdrop-filter: blur(12px);
  border: 1.5px solid var(--border);
}

/* ===== PLAYER SELECT ===== */
#screen-player { align-items: center; justify-content: center; padding: 20px; }
.platform-header { text-align: center; margin-bottom: 40px; }
.platform-title { 
  font-family: 'Fredoka One', cursive; font-size: 2.8rem; 
  background: linear-gradient(135deg, var(--emma), var(--rif)); 
  -webkit-background-clip: text; -webkit-text-fill-color: transparent; 
}

.player-buttons { display: flex; flex-direction: column; gap: 16px; width: 100%; max-width: 280px; align-items: center; }
.btn-player {
  display: flex; align-items: center; justify-content: center; gap: 14px; 
  padding: 18px; width: 100%; border-radius: 20px; 
  background: var(--surface); cursor: pointer; color: var(--text); 
  transition: 0.2s;
}

/* ===== GUEST MODAL ===== */
#modal-guest { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); align-items: center; justify-content: center; z-index: 100; padding: 20px; }
.modal-content { background: var(--surface); border-radius: 24px; padding: 24px; width: 100%; max-width: 320px; display: flex; flex-direction: column; gap: 16px; }
.guest-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; padding: 12px; color: var(--text); font-size: 1rem; text-align: center; width: 100%; }
.btn-confirm { background: var(--gold); color: var(--bg); border: none; padding: 14px; border-radius: 12px; font-weight: 900; cursor: pointer; }

/* ===== GAME LIST ===== */
.games-list { padding: 16px; display: flex; flex-direction: column; gap: 12px; flex: 1; overflow-y: auto; }
.game-card { 
    background: var(--surface); border-radius: 20px; 
    padding: 16px; display: flex; align-items: center; gap: 12px; cursor: pointer; 
    transition: 0.3s; position: relative;
    border: 1.5px solid var(--border);
}
.game-card.someone-waiting { border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(245, 200, 66, 0.2); }
.game-icon { font-size: 1.8rem; width: 50px; height: 50px; background: var(--surface2); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
.game-name { font-family: 'Fredoka One'; font-size: 1.1rem; }
.game-desc { font-size: 0.75rem; color: var(--dim); }
.presence-tag {
    position: absolute; left: 15px; top: 50%; transform: translateY(-50%);
    background: rgba(245, 200, 66, 0.2); padding: 5px 12px; border-radius: 20px;
    display: flex; align-items: center; gap: 6px; border: 1px solid var(--gold);
    font-size: 0.75rem; font-weight: 800; color: var(--gold);
}

/* ===== WAITING ROOM ===== */
.waiting-card { background: var(--surface); border-radius: 24px; padding: 24px; width: 100%; max-width: 360px; display: flex; flex-direction: column; gap: 20px; }
.p-slot { flex: 1; border-radius: 16px; border: 1.5px solid var(--border); background: var(--surface2); padding: 15px 5px; text-align: center; min-height: 100px; }
.p-slot.active { border-color: var(--gold); }
.spinner { width: 18px; height: 18px; border: 2px solid var(--border); border-top-color: var(--gold); border-radius: 50%; animation: spin 0.8s linear infinite; }
@keyframes spin { to { transform: rotate(360deg); } }
</style>
</head>
<body>

<canvas id="bg-canvas"></canvas>

<div id="screen-player" class="screen active">
  <div class="platform-header">
    <div class="platform-title">משחקי אמה וריף</div>
    <div style="color:var(--dim); font-size: 1.1rem; margin-top: 5px;">מי משחק עכשיו?</div>
  </div>
  <div class="player-buttons">
    <button class="btn-player glass" onclick="selectFixedPlayer('emma')" style="color: var(--emma);">👧 אמה</button>
    <button class="btn-player glass" onclick="selectFixedPlayer('rif')" style="color: var(--rif);">👦 ריף</button>
    <button class="btn-player glass" onclick="openGuestModal()" style="color: var(--guest); border-style: dashed; margin-top: 10px;">✨ אורח</button>
  </div>
</div>

<div id="modal-guest">
  <div class="modal-content glass">
    <h3 style="text-align:center; font-family:'Fredoka One'">שחקן אורח</h3>
    <input type="text" id="guest-name-input" class="guest-input" placeholder="איך קוראים לך?">
    <div style="display:grid; grid-template-columns: repeat(4, 1fr); gap:10px; margin: 10px 0;">
        <button class="btn-player glass" style="padding:10px; font-size:1.5rem" onclick="selectGuestEmoji('🐱', this)">🐱</button>
        <button class="btn-player glass" style="padding:10px; font-size:1.5rem" onclick="selectGuestEmoji('🦊', this)">🦊</button>
        <button class="btn-player glass" style="padding:10px; font-size:1.5rem" onclick="selectGuestEmoji('🦁', this)">🦁</button>
        <button class="btn-player glass" style="padding:10px; font-size:1.5rem" onclick="selectGuestEmoji('🦖', this)">🦖</button>
    </div>
    <button class="btn-confirm" onclick="confirmGuest()">כניסה למשחקים</button>
    <button onclick="closeGuestModal()" style="background:none; border:none; color:var(--dim); font-size:0.8rem; cursor:pointer;">ביטול</button>
  </div>
</div>

<div id="screen-games" class="screen">
  <div style="padding: 15px; border-bottom: 1px solid var(--border); display:flex; align-items:center; justify-content: space-between;">
    <button onclick="location.reload()" style="background:var(--surface2); border:1px solid var(--border); color:white; border-radius:50%; width:35px; height:35px;">→</button>
    <div id="active-user-chip" class="glass" style="padding:5px 12px; border-radius:20px; font-size:0.9rem; border:1.5px solid var(--gold);"></div>
  </div>
  <div class="games-list" id="games-container"></div>
</div>

<div id="screen-waiting" class="screen">
  <div style="text-align:center; margin-top: 40px;">
    <div id="wait-game-icon" style="font-size:4rem"></div>
    <div id="wait-game-name" style="font-family:'Fredoka One'; font-size:1.8rem; color:var(--gold)"></div>
  </div>
  <div style="flex:1; display:flex; align-items:center; justify-content:center;">
    <div class="waiting-card glass">
        <div style="display:flex; align-items:center; gap:10px;">
          <div class="p-slot" id="slot-0">❓</div>
          <div style="font-family:'Fredoka One'; color:var(--dim)">VS</div>
          <div class="p-slot" id="slot-1">❓</div>
        </div>
        <div id="wait-status-msg" style="display:flex; align-items:center; justify-content:center; gap:10px; font-size:0.9rem; color:var(--dim);">
          <div class="spinner"></div>
          <span>מחפש שותף למשחק...</span>
        </div>
    </div>
  </div>
  <button onclick="cancelWaiting()" style="margin-bottom:40px; background:none; border:1px solid var(--border); color:var(--dim); padding:12px 30px; border-radius:25px; align-self:center; cursor:pointer;">ביטול</button>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myUser = { id: '', name: '', emoji: '', color: '', isGuest: false };
let currentGame = null;
let roomListener = null;
let selectedEmoji = '🐱';

const GAMES = [
  { id: 'car-race', name: 'מרוץ מכוניות', icon: '🏎️', url: 'car-race.html' },
  { id: 'draw-guess', name: 'ניחוש ציורים', icon: '🎨', url: 'draw-guess.html' },
  { id: 'xo', name: 'איקס עיגול', icon: '✖️', url: 'X_O.html' },
  { id: 'tasks', name: 'מטלות בית', icon: '🏠', url: 'tasks.html', restricted: true }
];

// --- רקע חי ---
const canvas = document.getElementById('bg-canvas');
const ctx = canvas.getContext('2d');
let particles = [];
function initCanvas() {
    canvas.width = window.innerWidth; canvas.height = window.innerHeight;
    particles = Array.from({length:35}, () => ({
        x: Math.random()*canvas.width, y: Math.random()*canvas.height, 
        size: Math.random()*2, speedX: (Math.random()-0.5)*0.3, speedY: (Math.random()-0.5)*0.3, opacity: Math.random()
    }));
}
function animate() {
    ctx.clearRect(0,0,canvas.width, canvas.height);
    particles.forEach(p => {
        p.x+=p.speedX; p.y+=p.speedY;
        if(p.x<0||p.x>canvas.width) p.speedX*=-1; if(p.y<0||p.y>canvas.height) p.speedY*=-1;
        ctx.fillStyle=`rgba(150,160,255,${p.opacity})`; ctx.beginPath(); ctx.arc(p.x,p.y,p.size,0,Math.PI*2); ctx.fill();
    });
    requestAnimationFrame(animate);
}
initCanvas(); animate();

// --- לוגיקת משתמשים ---
window.selectFixedPlayer = (type) => {
    myUser = type === 'emma' ? {id:'emma', name:'אמה', emoji:'👧', color:'#FF5C7A'} : {id:'rif', name:'ריף', emoji:'👦', color:'#4DB8FF'};
    startApp();
};

window.openGuestModal = () => document.getElementById('modal-guest').style.display = 'flex';
window.closeGuestModal = () => document.getElementById('modal-guest').style.display = 'none';
window.selectGuestEmoji = (emoji, el) => {
    selectedEmoji = emoji;
    document.querySelectorAll('#modal-guest .btn-player').forEach(b => b.style.borderColor = '');
    el.style.borderColor = 'var(--gold)';
};

window.confirmGuest = () => {
    const name = document.getElementById('guest-name-input').value.trim();
    if (!name) return alert("איך קוראים לך?");
    myUser = { id: 'guest_'+Date.now(), name: name, emoji: selectedEmoji, color: '#3DD68C', isGuest: true };
    startApp();
};

function startApp() {
    closeGuestModal();
    document.getElementById('active-user-chip').innerHTML = `${myUser.emoji} ${myUser.name}`;
    document.getElementById('active-user-chip').style.borderColor = myUser.color;
    renderGames();
    listenToPresence();
    document.getElementById('screen-player').classList.remove('active');
    document.getElementById('screen-games').classList.add('active');
}

function renderGames() {
    const container = document.getElementById('games-container');
    container.innerHTML = GAMES.filter(g => !g.restricted || !myUser.isGuest).map(g => `
        <div class="game-card glass" id="card-${g.id}" onclick="handleGameEntry('${g.id}')">
            <div class="game-icon">${g.icon}</div>
            <div style="flex:1">
                <div class="game-name">${g.name}</div>
                <div class="game-desc" id="desc-${g.id}">לחץ לשחק</div>
            </div>
            <div id="presence-${g.id}"></div>
        </div>
    `).join('');
}

function listenToPresence() {
    onValue(ref(db, `rooms_v3`), (snap) => {
        const rooms = snap.val() || {};
        GAMES.forEach(game => {
            const players = Object.values(rooms[game.id] || {});
            const badge = document.getElementById(`presence-${game.id}`);
            const card = document.getElementById(`card-${game.id}`);
            const desc = document.getElementById(`desc-${game.id}`);
            if (!badge || !card) return;

            const someoneElse = players.find(p => p.name !== myUser.name);
            if (someoneElse) {
                badge.innerHTML = `<div class="presence-tag"><span>${someoneElse.emoji}</span><span>מחכה לך!</span></div>`;
                card.classList.add('someone-waiting');
                desc.textContent = "הצטרף למשחק";
            } else {
                badge.innerHTML = '';
                card.classList.remove('someone-waiting');
                desc.textContent = "לחץ לשחק";
            }
        });
    });
}

window.handleGameEntry = (gameId) => {
    currentGame = GAMES.find(g => g.id === gameId);
    if (gameId === 'tasks') {
        window.location.href = `tasks.html?player=${myUser.id}`;
        return;
    }
    enterWaitingRoom(gameId);
};

function enterWaitingRoom(gameId) {
    document.getElementById('wait-game-icon').textContent = currentGame.icon;
    document.getElementById('wait-game-name').textContent = currentGame.name;
    document.getElementById('screen-games').classList.remove('active');
    document.getElementById('screen-waiting').classList.add('active');

    const roomRef = ref(db, `rooms_v3/${gameId}/${myUser.id}`);
    set(roomRef, { name: myUser.name, emoji: myUser.emoji, color: myUser.color });
    onDisconnect(roomRef).remove();

    roomListener = onValue(ref(db, `rooms_v3/${gameId}`), (snap) => {
        const players = Object.values(snap.val() || {});
        players.forEach((p, i) => {
            if(i > 1) return;
            const slot = document.getElementById(`slot-${i}`);
            slot.className = 'p-slot active'; slot.style.borderColor = p.color;
            slot.innerHTML = `<div style="font-size:2rem">${p.emoji}</div><div>${p.name}</div>`;
        });
        if (players.length >= 2) {
            setTimeout(() => { 
                window.location.href = `${currentGame.url}?player=${myUser.id}&name=${encodeURIComponent(myUser.name)}`; 
            }, 1000);
        }
    });
}

window.cancelWaiting = () => {
    if (roomListener) roomListener();
    remove(ref(db, `rooms_v3/${currentGame.id}/${myUser.id}`));
    document.getElementById('screen-waiting').classList.remove('active');
    document.getElementById('screen-games').classList.add('active');
};
</script>
</body>
</html>
