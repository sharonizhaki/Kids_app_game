<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="theme-color" content="#0F1320">
    <title>משחקי אמה וריף</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0F1320;
            --surface: rgba(24, 29, 46, 0.6);
            --surface-bright: rgba(33, 40, 64, 0.8);
            --border: rgba(255, 255, 255, 0.15);
            --emma: #FF5C7A;
            --rif: #4DB8FF;
            --guest: #3DD68C;
            --text: #EEF0FF;
            --dim: #6B7299;
            --gold: #F5C842;
        }

        * { 
            margin: 0; 
            padding: 0; 
            box-sizing: border-box; 
            -webkit-tap-highlight-color: transparent; 
        }

        html, body {
            height: 100%;
            width: 100%;
            overflow-x: hidden;
        }

        body { 
            min-height: 100vh; 
            width: 100vw;
            background: var(--bg); 
            color: var(--text); 
            font-family: 'Heebo', sans-serif; 
            position: relative;
        }

        /* ========== רקע אנימציה ========== */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            z-index: -1;
            pointer-events: none;
            background:
                radial-gradient(ellipse at 20% 30%, rgba(255, 92, 122, 0.15) 0%, transparent 50%),
                radial-gradient(ellipse at 80% 70%, rgba(77, 184, 255, 0.12) 0%, transparent 50%);
        }

        /* כוכבים */
        .stars {
            position: fixed;
            inset: 0;
            z-index: -1;
            background-image: 
                radial-gradient(white 1px, transparent 1px);
            background-size: 60px 60px;
            opacity: 0.08;
            pointer-events: none;
        }

        /* ========== תוכן ========== */
        .content-wrapper { 
            position: relative; 
            z-index: 10; 
            min-height: 100vh; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            padding: 20px;
            width: 100%;
        }

        /* ========== מסכים ========== */
        .screen { 
            display: none; 
            width: 100%; 
            flex-direction: column; 
            align-items: center;
            animation: fadeIn 0.4s ease-out;
        }

        .screen.active { 
            display: flex; 
        }

        @keyframes fadeIn { 
            from { 
                opacity: 0; 
                transform: scale(0.98); 
            } 
            to { 
                opacity: 1; 
                transform: scale(1); 
            } 
        }

        /* ========== כותרות ========== */
        h1 { 
            font-family: 'Fredoka One', cursive; 
            font-size: 3.2rem; 
            margin-bottom: 30px; 
            background: linear-gradient(135deg, var(--emma), var(--rif)); 
            -webkit-background-clip: text; 
            -webkit-text-fill-color: transparent;
            text-align: center;
            letter-spacing: 1px;
        }

        h2 {
            font-family: 'Fredoka One', cursive;
            font-size: 2.2rem;
            background: linear-gradient(135deg, var(--emma), var(--rif));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
            text-align: center;
        }

        /* ========== בחירת משתמש - מסך ראשי ========== */
        .user-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 15px; 
            width: 100%; 
            max-width: 360px;
            margin-bottom: 20px;
        }

        .user-btn { 
            background: var(--surface); 
            border: 2px solid var(--border);
            border-radius: 24px; 
            padding: 20px 10px; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 12px; 
            color: white;
            backdrop-filter: blur(10px); 
            -webkit-backdrop-filter: blur(10px); 
            cursor: pointer; 
            transition: all 0.3s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .user-btn:active {
            transform: scale(0.95);
        }

        .user-btn:hover {
            background: var(--surface-bright);
        }

        .user-btn.emma { 
            border-color: var(--emma);
            box-shadow: 0 0 15px rgba(255, 92, 122, 0.2);
        }

        .user-btn.emma:hover {
            border-color: var(--emma);
            box-shadow: 0 0 25px rgba(255, 92, 122, 0.4);
        }

        .user-btn.rif { 
            border-color: var(--rif);
            box-shadow: 0 0 15px rgba(77, 184, 255, 0.2);
        }

        .user-btn.rif:hover {
            border-color: var(--rif);
            box-shadow: 0 0 25px rgba(77, 184, 255, 0.4);
        }

        .user-btn i { 
            font-size: 3rem; 
            font-style: normal; 
        }

        .user-btn span { 
            font-weight: 900; 
            font-size: 1.1rem; 
        }

        /* ========== הזנת פרטי אורח ========== */
        #guest-setup { 
            width: 100%; 
            max-width: 360px; 
            text-align: center;
            display: none;
        }

        .guest-title {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 20px;
            color: var(--text);
        }

        input { 
            width: 100%; 
            padding: 14px; 
            border-radius: 16px; 
            border: 1.5px solid var(--border); 
            background: rgba(0, 0, 0, 0.3); 
            color: white; 
            margin-bottom: 16px; 
            text-align: center; 
            font-size: 1rem;
            font-weight: 600;
            transition: all 0.3s ease;
            font-family: 'Heebo', sans-serif;
        }

        input::placeholder {
            color: var(--dim);
        }

        input:focus { 
            outline: none; 
            border-color: var(--guest); 
            background: rgba(0, 0, 0, 0.5);
            box-shadow: 0 0 0 3px rgba(61, 214, 140, 0.2);
        }

        input.error {
            border-color: #EF4444;
            animation: shake 0.4s ease-in-out;
            background: rgba(239, 68, 68, 0.1);
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-8px); }
            75% { transform: translateX(8px); }
        }

        .emoji-section {
            margin: 20px 0;
        }

        .emoji-label {
            font-size: 0.85rem; 
            color: var(--dim); 
            margin-bottom: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .emoji-picker { 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 10px; 
            padding: 12px; 
            border-radius: 16px;
            border: 1px solid transparent;
            transition: all 0.3s ease;
        }

        .emoji-picker.error {
            border-color: #EF4444;
            background: rgba(239, 68, 68, 0.05);
        }

        .emoji-opt { 
            font-size: 2.2rem; 
            padding: 12px; 
            cursor: pointer; 
            border-radius: 14px; 
            transition: all 0.2s ease;
            border: 1.5px solid transparent;
            user-select: none;
            -webkit-user-select: none;
        }

        .emoji-opt:active {
            transform: scale(0.9);
        }

        .emoji-opt.selected { 
            background: rgba(61, 214, 140, 0.15);
            transform: scale(1.15);
            border-color: var(--guest);
            box-shadow: 0 0 15px rgba(61, 214, 140, 0.3);
        }

        /* ========== כפתורים ========== */
        .btn-main { 
            background: var(--guest); 
            color: #0F1320; 
            padding: 14px 32px; 
            border-radius: 16px; 
            border: none; 
            font-weight: 900; 
            cursor: pointer; 
            width: 100%; 
            font-size: 1rem;
            box-shadow: 0 4px 15px rgba(61, 214, 140, 0.3);
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
            margin-bottom: 10px;
        }

        .btn-main:active {
            transform: scale(0.98);
        }

        .btn-main:hover {
            box-shadow: 0 6px 20px rgba(61, 214, 140, 0.4);
        }

        .btn-cancel { 
            background: none; 
            border: none; 
            color: var(--text); 
            opacity: 0.6; 
            margin-top: 12px; 
            text-decoration: underline; 
            font-size: 0.9rem; 
            cursor: pointer;
            transition: opacity 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .btn-cancel:active {
            opacity: 0.8;
        }

        /* ========== מסך בחירת משחק ========== */
        #greeting { 
            margin-bottom: 25px; 
            font-weight: 900; 
            display: flex; 
            align-items: center; 
            gap: 12px; 
            justify-content: center; 
            font-size: 1.8rem;
            flex-wrap: wrap;
            animation: fadeIn 0.5s ease-out;
        }

        .game-grid { 
            display: grid; 
            grid-template-columns: repeat(2, 1fr); 
            gap: 12px; 
            width: 100%; 
            max-width: 450px;
            margin-bottom: 24px;
        }

        .game-card { 
            background: var(--surface); 
            border: 1px solid var(--border); 
            border-radius: 20px; 
            padding: 16px 8px;
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            gap: 8px; 
            cursor: pointer;
            opacity: 0;
            transform: translateY(10px);
            animation: slideUp 0.4s ease forwards;
            transition: all 0.2s ease;
            user-select: none;
            -webkit-user-select: none;
        }

        .game-card:nth-child(1) { animation-delay: 0.05s; }
        .game-card:nth-child(2) { animation-delay: 0.1s; }
        .game-card:nth-child(3) { animation-delay: 0.15s; }
        .game-card:nth-child(4) { animation-delay: 0.2s; }
        .game-card:nth-child(5) { animation-delay: 0.25s; }
        .game-card:nth-child(6) { animation-delay: 0.3s; }

        @keyframes slideUp {
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .game-card:hover {
            border-color: var(--gold);
            background: var(--surface-bright);
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(245, 200, 66, 0.2);
        }

        .game-card:active {
            transform: scale(0.97);
        }

        .game-card i { 
            font-size: 2.2rem; 
            font-style: normal; 
        }

        .game-card span { 
            font-weight: 700; 
            font-size: 0.95rem;
            text-align: center;
        }

        .game-status { 
            font-size: 0.65rem; 
            color: var(--gold); 
            font-weight: 600; 
            height: 14px; 
            text-align: center; 
            opacity: 0.9;
        }

        /* ========== מסך המתנה ========== */
        #screen-waiting {
            justify-content: center;
        }

        .waiting-box { 
            background: var(--surface-bright); 
            border: 2px solid var(--border); 
            border-radius: 28px; 
            padding: 40px 24px; 
            width: 100%; 
            max-width: 380px; 
            text-align: center; 
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }

        .waiting-icon {
            font-size: 3.5rem;
            margin-bottom: 16px;
            animation: bounce 1.5s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .waiting-title {
            font-size: 1.4rem;
            font-weight: 900;
            margin-bottom: 10px;
            background: linear-gradient(135deg, var(--emma), var(--rif));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .waiting-subtitle {
            font-size: 0.95rem;
            color: var(--dim);
            margin-bottom: 25px;
        }

        .slots { 
            display: flex; 
            justify-content: center; 
            gap: 20px; 
            margin: 25px 0;
        }

        .p-slot { 
            width: 85px; 
            height: 85px; 
            border-radius: 50%; 
            border: 3px dashed var(--dim); 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            justify-content: center; 
            transition: all 0.3s ease;
            background: rgba(0, 0, 0, 0.2);
        }

        .p-slot.active { 
            border-style: solid; 
            background: rgba(255, 255, 255, 0.08);
            transform: scale(1.08);
        }

        .p-slot.active.emma {
            border-color: var(--emma);
            box-shadow: 0 0 20px rgba(255, 92, 122, 0.3);
        }

        .p-slot.active.rif {
            border-color: var(--rif);
            box-shadow: 0 0 20px rgba(77, 184, 255, 0.3);
        }

        /* ========== עזיבה =============*/
        .logout-btn {
            margin-top: 16px;
            padding: 10px 24px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: none;
            color: var(--dim);
            cursor: pointer;
            transition: all 0.2s ease;
            font-weight: 600;
            font-size: 0.9rem;
            user-select: none;
            -webkit-user-select: none;
        }

        .logout-btn:hover {
            color: var(--text);
            border-color: var(--text);
        }

        .logout-btn:active {
            transform: scale(0.97);
        }

        /* ========== טוען =============*/
        .loader {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(255, 255, 255, 0.2);
            border-top-color: var(--gold);
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="stars"></div>

<div class="content-wrapper">

    <!-- ============= מסך ראשון: בחירת משתמש ============= -->
    <div id="screen-login" class="screen active">
        <h1>🎮 מי משחק?</h1>
        
        <div class="user-grid" id="main-user-grid">
            <div class="user-btn emma" onclick="selectUser('emma', 'אמה', '👧', '#FF5C7A')">
                <i>👧</i>
                <span>אמה</span>
            </div>
            <div class="user-btn rif" onclick="selectUser('rif', 'ריף', '👦', '#4DB8FF')">
                <i>👦</i>
                <span>ריף</span>
            </div>
            <div class="user-btn" style="grid-column: span 2; border-color: var(--guest); box-shadow: 0 0 15px rgba(61, 214, 140, 0.2);" onclick="showGuestSetup()">
                <i>👤</i>
                <span>שחקן אורח</span>
            </div>
        </div>

        <!-- הזנת פרטי אורח -->
        <div id="guest-setup">
            <div class="guest-title">👋 ברוכים הבאים!</div>
            
            <input type="text" id="guest-name-input" placeholder="איך קוראים לך?" maxlength="14">
            
            <div class="emoji-section">
                <div class="emoji-label">בחר דמות שתייצג אותך</div>
                <div class="emoji-picker" id="emoji-picker"></div>
            </div>
            
            <button class="btn-main" onclick="confirmGuest()">✨ הצטרף למשחק</button>
            <button class="btn-cancel" onclick="cancelGuestSetup()">← חזור</button>
        </div>
    </div>

    <!-- ============= מסך שני: בחירת משחק ============= -->
    <div id="screen-games" class="screen">
        <h2 id="greeting">
            <span id="greeting-emoji"></span>
            <span id="greeting-name"></span>
            <span id="greeting-question">מה נשחק?</span>
        </h2>
        
        <div class="game-grid" id="game-list"></div>
        
        <button class="logout-btn" onclick="logout()">🔄 החלף משתמש</button>
    </div>

    <!-- ============= מסך שלישי: ממתין לשחקן שני ============= -->
    <div id="screen-waiting" class="screen">
        <div class="waiting-box">
            <div class="waiting-icon" id="wait-game-icon">⏳</div>
            <div class="waiting-title" id="wait-game-name">משחק</div>
            <div class="waiting-subtitle">ממתין לשחקן שני...</div>
            
            <div class="slots">
                <div id="slot-0" class="p-slot"></div>
                <div id="slot-1" class="p-slot"></div>
            </div>
            
            <button class="btn-main" onclick="cancelWaiting()">ביטול</button>
        </div>
    </div>

</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
    apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
    authDomain: "kidssapp-izhaki.firebaseapp.com",
    databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "kidssapp-izhaki",
    storageBucket: "kidssapp-izhaki.firebasestorage.app",
    messagingSenderId: "663906163746",
    appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ========== משתנים גלובליים ==========
let myUser = null;              // המשתמש הנוכחי { id, name, emoji, color }
let currentGame = null;         // המשחק הנוכחי
let roomListener = null;        // listener של המתנה
let selectedGuestEmoji = null;  // emoji שנבחר עבור אורח

// ========== רשימת משחקים ==========
const games = [
    { id: 'xo', name: 'איקס עיגול', url: 'xo.html', icon: '❌' },
    { id: 'draw', name: 'צייר ונחש', url: 'Draw_game.html', icon: '🎨' },
    { id: 'race', name: 'מרוץ מכוניות', url: 'Race.html', icon: '🏎️' },
    { id: 'memory', name: 'משחק זיכרון', url: 'Memory.html', icon: '🧩' },
    { id: 'bingo', name: 'בינגו', url: 'Bingo.html', icon: '🔢' },
    { id: 'snakes', name: 'סולמות ונחשים', url: 'Snakes.html', icon: '🐍' }
];

// ========== צפייה בחדרים (מי משחק עם מי) ==========
function watchAllRooms() {
    onValue(ref(db, 'rooms_v3'), (snap) => {
        const allRooms = snap.val() || {};
        games.forEach(game => {
            const statusDiv = document.getElementById(`status-${game.id}`);
            if (!statusDiv) return;
            
            const players = allRooms[game.id] ? Object.values(allRooms[game.id]) : [];
            
            if (players.length === 0) {
                statusDiv.textContent = '';
            } else if (players.length === 1) {
                statusDiv.textContent = `${players[0].name} ${players[0].emoji} ממתין...`;
                statusDiv.style.color = 'var(--gold)';
            } else {
                statusDiv.textContent = `🎮 ${players[0].name} ו-${players[1].name}`;
                statusDiv.style.color = 'var(--guest)';
            }
        });
    });
}

// ========== התחלת האפליקציה ==========
function startApp() {
    showScreen('screen-games');
    
    const ge = document.getElementById('greeting-emoji');
    const gn = document.getElementById('greeting-name');
    const gq = document.getElementById('greeting-question');
    
    ge.textContent = myUser.emoji;
    gn.textContent = `היי ${myUser.name}`;
    gn.style.color = myUser.color;
    gq.style.color = myUser.color;

    // בנה את רשימת המשחקים
    const list = document.getElementById('game-list');
    list.innerHTML = '';
    games.forEach((game, index) => {
        const card = document.createElement('div');
        card.className = 'game-card';
        card.onclick = () => joinGame(game.id);
        card.innerHTML = `
            <i>${game.icon}</i>
            <span>${game.name}</span>
            <div class="game-status" id="status-${game.id}"></div>
        `;
        list.appendChild(card);
    });
    
    watchAllRooms();
}

// ========== בחירת משתמש ==========
window.selectUser = (id, name, emoji, color) => {
    // יצור ID ייחודי לאורחים
    const finalId = (id === 'emma' || id === 'rif') 
        ? id 
        : `guest_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
    
    myUser = { 
        id: finalId, 
        name: name, 
        emoji: emoji, 
        color: color,
        rawId: id 
    };
    
    // שמור ב-sessionStorage (לא localStorage!)
    sessionStorage.setItem('myUser', JSON.stringify(myUser));
    
    startApp();
};

// ========== אורח - הראה טופס הזנה ==========
window.showGuestSetup = () => {
    document.getElementById('main-user-grid').style.display = 'none';
    document.getElementById('guest-setup').style.display = 'block';
    
    const input = document.getElementById('guest-name-input');
    input.focus();
    input.oninput = () => input.classList.remove('error');

    // בנה בורר emoji
    const picker = document.getElementById('emoji-picker');
    picker.innerHTML = '';
    const guestEmojis = ['🦊', '🐯', '🐸', '🐼', '🤖', '👾', '🦄', '🐲'];
    
    guestEmojis.forEach((emoji, index) => {
        const div = document.createElement('div');
        div.className = 'emoji-opt';
        if (index === 0) div.classList.add('selected'); // emoji ראשון נבחר כברירת מחדל
        div.textContent = emoji;
        div.onclick = () => {
            Array.from(picker.children).forEach(c => c.classList.remove('selected'));
            div.classList.add('selected');
            selectedGuestEmoji = emoji;
            picker.classList.remove('error');
        };
        picker.appendChild(div);
    });
    
    selectedGuestEmoji = guestEmojis[0]; // בחר ברירת מחדל
};

// ========== אורח - בטל ==========
window.cancelGuestSetup = () => {
    document.getElementById('main-user-grid').style.display = 'grid';
    document.getElementById('guest-setup').style.display = 'none';
    document.getElementById('guest-name-input').classList.remove('error');
    document.getElementById('emoji-picker').classList.remove('error');
};

// ========== אורח - אישור ==========
window.confirmGuest = () => {
    const input = document.getElementById('guest-name-input');
    const picker = document.getElementById('emoji-picker');
    const name = input.value.trim();
    let hasError = false;

    input.classList.remove('error');
    picker.classList.remove('error');

    if (!name) { 
        input.classList.add('error'); 
        input.placeholder = "חובה לכתוב שם!";
        if (navigator.vibrate) navigator.vibrate(150);
        hasError = true; 
    }
    
    if (!selectedGuestEmoji) { 
        picker.classList.add('error'); 
        if (navigator.vibrate) navigator.vibrate(150);
        hasError = true; 
    }
    
    if (!hasError) {
        window.selectUser('guest', name, selectedGuestEmoji, '#3DD68C');
    }
};

// ========== כניסה למשחק ==========
window.joinGame = (gameId) => {
    currentGame = games.find(g => g.id === gameId);
    onValue(ref(db, `rooms_v3/${gameId}`), (snap) => {
        const players = Object.values(snap.val() || {});
        
        // אם יש כבר 2 משחקנים, אתה צופה
        if (players.length >= 2) {
            window.location.href = `${currentGame.url}?player=${encodeURIComponent(myUser.name)}&view=true`;
        } else {
            // אחרת, המתן לשחקן שני
            startWaiting(gameId);
        }
    }, { onlyOnce: true });
};

// ========== המתנה לשחקן שני ==========
function startWaiting(gameId) {
    document.getElementById('wait-game-icon').textContent = currentGame.icon;
    document.getElementById('wait-game-name').textContent = currentGame.name;
    showScreen('screen-waiting');
    
    // רשום עצמך בחדר
    const myPlayerRef = ref(db, `rooms_v3/${gameId}/${myUser.id}`);
    set(myPlayerRef, { 
        name: myUser.name, 
        emoji: myUser.emoji, 
        color: myUser.color,
        timestamp: Date.now()
    });
    onDisconnect(myPlayerRef).remove();
    
    // תראה משחקנים מחכים
    roomListener = onValue(ref(db, `rooms_v3/${gameId}`), (snap) => {
        const players = Object.values(snap.val() || {});
        
        // עדכן את שתי התאים
        for (let i = 0; i < 2; i++) {
            const slot = document.getElementById(`slot-${i}`);
            if (players[i]) {
                slot.classList.add('active');
                slot.classList.toggle('emma', players[i].color === '#FF5C7A');
                slot.classList.toggle('rif', players[i].color === '#4DB8FF');
                slot.innerHTML = `
                    <div style="font-size:2rem">${players[i].emoji}</div>
                    <div style="font-size:0.7rem;font-weight:900;margin-top:4px">${players[i].name}</div>
                `;
            } else {
                slot.classList.remove('active', 'emma', 'rif');
                slot.innerHTML = '';
            }
        }

        // כשיש 2 משחקנים, התחל את המשחק
        if (players.length >= 2) {
            setTimeout(() => { 
                if (roomListener) roomListener(); 
                window.location.href = `${currentGame.url}?player=${encodeURIComponent(myUser.name)}`; 
            }, 800);
        }
    });
}

// ========== ביטול המתנה ==========
window.cancelWaiting = () => {
    if (roomListener) roomListener();
    remove(ref(db, `rooms_v3/${currentGame.id}/${myUser.id}`));
    showScreen('screen-games');
};

// ========== עזיבה וחזרה למסך בחירה ==========
window.logout = () => { 
    sessionStorage.removeItem('myUser'); 
    location.reload(); 
};

// ========== עזיבה וחזרה לדף הבית ==========
window.goHome = () => {
    location.href = 'index.html';
};

// ========== תצוגת מסך ==========
function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

// ========== טעינה בעת כניסה ==========
window.addEventListener('load', () => {
    const saved = sessionStorage.getItem('myUser');
    if (saved) { 
        try {
            myUser = JSON.parse(saved);
            startApp();
        } catch (error) {
            console.error('Error loading user:', error);
            sessionStorage.removeItem('myUser');
        }
    }
});
</script>
