<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>משחקי אמה וריף - v2.3</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  :root {
    --bg: #0F1320; --surface: #181D2E; --surface2: #212840; --border: #2E3450;
    --emma: #FF5C7A; --emma-dim: rgba(255,92,122,0.12);
    --rif: #4DB8FF; --rif-dim: rgba(77,184,255,0.12);
    --gold: #F5C842; --green: #3DD68C; --text: #EEF0FF; --dim: #6B7299;
  }
  body { font-family: 'Heebo', sans-serif; background-color: var(--bg); color: var(--text); overflow-x: hidden; }
  .app-container { max-width: 500px; margin: 0 auto; padding: 20px; }
  header { padding: 20px 0 40px; text-align: center; }
  .logo-text { font-family: 'Fredoka One', cursive; font-size: 42px; background: linear-gradient(135deg, var(--emma), var(--rif)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
  
  .player-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-bottom: 40px; }
  .player-card { background: var(--surface); border: 2px solid var(--border); border-radius: 20px; padding: 20px; text-align: center; cursor: pointer; transition: 0.3s; }
  .player-card.selected-emma { border-color: var(--emma); background: var(--emma-dim); transform: translateY(-5px); }
  .player-card.selected-rif { border-color: var(--rif); background: var(--rif-dim); transform: translateY(-5px); }
  
  .games-grid { display: grid; gap: 15px; }
  .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: 18px; padding: 16px; display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
  .game-card:active { transform: scale(0.98); background: var(--surface2); }
  .game-icon { width: 50px; height: 50px; background: var(--surface2); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 28px; }

  .modal-overlay { position: fixed; inset:0; background: rgba(0,0,0,0.85); display:none; align-items:center; justify-content:center; z-index:1000; backdrop-filter: blur(5px); }
  .modal-overlay.active { display: flex; }
  .waiting-modal { background: var(--surface); width: 90%; max-width: 350px; border-radius: 24px; padding: 30px; text-align: center; border: 1px solid var(--border); }
  .vs-container { display: flex; align-items: center; justify-content: space-around; margin: 30px 0; }
  .psc-avatar { width: 60px; height: 60px; background: var(--surface2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 28px; border: 2px solid transparent; }
  .psc-card.joined .psc-avatar { border-color: var(--green); box-shadow: 0 0 15px var(--green); }
  .waiting-msg { font-weight: 700; color: var(--gold); }
</style>
</head>
<body>

<div class="app-container">
  <header><div class="logo-text">Emma & Rif</div></header>

  <div class="player-selector">
    <div class="player-card" id="card-emma" onclick="selectPlayer('emma')"><span>👧</span><div style="font-weight:800">אמה</div></div>
    <div class="player-card" id="card-rif" onclick="selectPlayer('rif')"><span>👦</span><div style="font-weight:800">ריף</div></div>
  </div>

  <div class="games-grid">
    <div class="game-card" onclick="openGame('xo')">
      <div class="game-icon">✕</div>
      <div><div style="font-weight:800">איקס עיגול</div><div style="font-size:12px;color:var(--dim)">קרב אסטרטגי בזמן אמת</div></div>
    </div>

    <div class="game-card" onclick="openGame('racing')">
      <div class="game-icon">🏎️</div>
      <div><div style="font-weight:800">מרוץ אקסטרים</div><div style="font-size:12px;color:var(--dim)">מי יגיע ראשון לקו הסיום?</div></div>
    </div>

    <div class="game-card" onclick="openGame('memory')">
      <div class="game-icon">🧠</div>
      <div><div style="font-weight:800">משחק הזיכרון</div><div style="font-size:12px;color:var(--dim)">מצאו את כל הזוגות ביחד</div></div>
    </div>
  </div>
</div>

<div class="modal-overlay" id="modal-overlay">
  <div class="waiting-modal">
    <h2 id="waiting-game-name">טוען...</h2>
    <div class="vs-container">
      <div class="psc-card" id="psc-emma"><div class="psc-avatar">👧</div><div id="psc-emma-status" style="font-size:11px">ממתין...</div></div>
      <div style="font-family:cursive;color:var(--dim)">VS</div>
      <div class="psc-card" id="psc-rif"><div class="psc-avatar">👦</div><div id="psc-rif-status" style="font-size:11px">ממתין...</div></div>
    </div>
    <div class="waiting-msg" id="waiting-msg">מחכים לשחקן השני...</div>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, onDisconnect, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);
let currentPlayer = null;
let roomListener = null;

const GAMES = {
  'xo': { name: 'איקס עיגול', url: 'X_O.html' },
  'racing': { name: 'מרוץ אקסטרים', url: 'racing.html' },
  'memory': { name: 'משחק הזיכרון', url: 'memory.html' }
};

window.selectPlayer = (p) => {
  currentPlayer = p;
  document.getElementById('card-emma').className = 'player-card' + (p === 'emma' ? ' selected-emma' : '');
  document.getElementById('card-rif').className = 'player-card' + (p === 'rif' ? ' selected-rif' : '');
};

window.openGame = (gameId) => {
  if (!currentPlayer) return alert('בחרו שחקן קודם!');
  const game = GAMES[gameId];
  
  // עדכון נוכחות
  set(ref(db, `rooms/${gameId}/${currentPlayer}`), true);
  onDisconnect(ref(db, `rooms/${gameId}/${currentPlayer}`)).remove();
  set(ref(db, `presence/${gameId}/${currentPlayer}`), true);
  onDisconnect(ref(db, `presence/${gameId}/${currentPlayer}`)).remove();

  document.getElementById('modal-overlay').classList.add('active');
  document.getElementById('waiting-game-name').textContent = game.name;

  if (roomListener) roomListener();
  roomListener = onValue(ref(db, `rooms/${gameId}`), (snap) => {
    const room = snap.val() || {};
    updateStatus('emma', !!room.emma);
    updateStatus('rif', !!room.rif);

    if (room.emma && room.rif) {
      document.getElementById('waiting-msg').textContent = '🎮 שניהם כאן! מתחילים...';
      setTimeout(() => {
        if (currentPlayer === 'emma') remove(ref(db, `rooms/${gameId}`));
        window.location.href = `${game.url}?player=${currentPlayer}`;
      }, 1500);
    }
  });
};

function updateStatus(id, ready) {
  const card = document.getElementById(`psc-${id}`);
  const status = document.getElementById(`psc-${id}-status`);
  card.classList.toggle('joined', ready);
  status.textContent = ready ? '✓ מוכן' : 'ממתין...';
  status.style.color = ready ? '#3DD68C' : '#6B7299';
}
</script>
</body>
</html>
