<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1320">
<title>משחקי אמה וריף</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg: #0F1320;
      --surface: rgba(24, 29, 46, 0.6);
      --surface2: rgba(33, 40, 64, 0.7);
      --border: rgba(46, 52, 80, 0.5);
      --emma: #FF5C7A;
      --rif: #4DB8FF;
      --guest: #3DD68C;
      --gold: #F5C842;
      --text: #EEF0FF;
      --dim: #6B7299;
    }
    html, body { height:100%; background: var(--bg); color: var(--text); font-family: 'Heebo', sans-serif; overflow:hidden; }
    
    /* רקע מדורג זז */
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(circle at 15% 15%, rgba(255, 92, 122, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 85% 85%, rgba(77, 184, 255, 0.08) 0%, transparent 40%);
      z-index: -1;
    }

    .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .screen.active { display:flex; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    h1 { font-family: 'Fredoka One', cursive; font-size: 2.5rem; margin-bottom: 30px; background: linear-gradient(135deg, #FF5C7A, #4DB8FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* מסך בחירת משתמש */
    .user-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 400px; }
    .user-btn { background: var(--surface); border: 2px solid var(--border); border-radius: 24px; padding: 25px 15px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px; color: white; }
    .user-btn:active { transform: scale(0.95); }
    .user-btn.emma { border-color: var(--emma); box-shadow: 0 0 15px rgba(255, 92, 122, 0.1); }
    .user-btn.rif { border-color: var(--rif); box-shadow: 0 0 15px rgba(77, 184, 255, 0.1); }
    .user-btn i { font-size: 3rem; font-style: normal; }
    .user-btn span { font-weight: 800; font-size: 1.2rem; }

    /* מסך משחקים */
    .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; }
    .game-card { background: var(--surface); border: 2px solid var(--border); border-radius: 20px; padding: 20px; display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; transition: 0.3s; }
    .game-card:active { transform: scale(0.95); background: var(--surface2); }
    .game-card i { font-size: 2.5rem; font-style: normal; }

    /* מסך המתנה */
    .waiting-box { background: var(--surface2); border: 2px solid var(--border); border-radius: 30px; padding: 40px 20px; width: 100%; max-width: 400px; text-align: center; }
    .slots { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
    .p-slot { width: 80px; height: 80px; border-radius: 50%; border: 3px dashed var(--dim); display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); overflow: hidden; }
    .p-slot.active { border-style: solid; background: rgba(255,255,255,0.08); animation: pop 0.3s ease-out; }
    @keyframes pop { from { transform: scale(0.8); } to { transform: scale(1); } }
    
    .loader { width: 40px; height: 40px; border: 4px solid var(--dim); border-top-color: var(--gold); border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    
    .btn-cancel { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ff6b6b; padding: 12px 30px; border-radius: 15px; margin-top: 20px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div id="screen-login" class="screen active">
  <h1>מי משחק?</h1>
  <div class="user-grid">
    <button class="user-btn emma" onclick="selectUser('emma', 'אמה', '👧', '#FF5C7A')">
      <i>👧</i><span>אמה</span>
    </button>
    <button class="user-btn rif" onclick="selectUser('rif', 'ריף', '👦', '#4DB8FF')">
      <i>👦</i><span>ריף</span>
    </button>
    <button class="user-btn guest" style="grid-column: span 2; border-color: var(--guest)" onclick="selectUser('guest', 'אורח', '👤', '#3DD68C')">
      <i>👤</i><span>שחקן אורח</span>
    </button>
  </div>
</div>

<div id="screen-games" class="screen">
  <h2 id="greeting" style="margin-bottom: 25px; font-weight: 800;">היי, מה נשחק?</h2>
  <div class="game-grid">
    <div class="game-card" onclick="joinGame('xo')">
      <i>❌</i><span>איקס עיגול</span>
    </div>
    <div class="game-card" style="opacity: 0.5; cursor: default;">
      <i>🏎️</i><span>מרוץ (בקרוב)</span>
    </div>
  </div>
  <button class="btn-cancel" onclick="logout()" style="color: var(--dim); border: none; margin-top: 40px;">החלף משתמש</button>
</div>

<div id="screen-waiting" class="screen">
  <div class="waiting-box">
    <div id="wait-game-icon" style="font-size: 3rem; margin-bottom: 10px;"></div>
    <h3 id="wait-game-name"></h3>
    <div class="slots">
      <div id="slot-0" class="p-slot"></div>
      <div id="slot-1" class="p-slot"></div>
    </div>
    <div id="wait-status-msg" style="font-weight: 600;">מחכים לחבר שיצטרף...</div>
    <div class="loader"></div>
    <button class="btn-cancel" onclick="cancelWaiting()">ביטול</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myUser = null;
let currentGame = null;
let roomListener = null;

const games = {
    xo: { name: 'איקס עיגול', url: 'X_O.html', icon: '❌' }
};

// --- ניהול כניסה וחזרה ממשחקים ---
window.onload = () => {
    const saved = localStorage.getItem('myUser');
    const params = new URLSearchParams(window.location.search);
    const targetScreen = params.get('screen');

    if (saved) {
        myUser = JSON.parse(saved);
        // אם חזרנו ממשחק דרך כפתור "לבית"
        if (targetScreen === 'games') {
            showScreen('screen-games');
            document.getElementById('greeting').textContent = `היי ${myUser.name}, מה נשחק?`;
        }
    }
};

window.selectUser = (id, name, emoji, color) => {
    myUser = { id, name, emoji, color };
    localStorage.setItem('myUser', JSON.stringify(myUser));
    
    showScreen('screen-games');
    document.getElementById('greeting').textContent = `היי ${name}, מה נשחק?`;
};

window.logout = () => {
    localStorage.removeItem('myUser');
    showScreen('screen-login');
};

function showScreen(screenId) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(screenId).classList.add('active');
}

// --- לוגיקת חדר המתנה ---
window.joinGame = async (gameId) => {
    currentGame = { ...games[gameId], id: gameId };
    
    document.getElementById('wait-game-icon').textContent = currentGame.icon;
    document.getElementById('wait-game-name').textContent = currentGame.name;
    showScreen('screen-waiting');

    const roomRef = ref(db, `rooms_v3/${gameId}`);
    const myPlayerRef = ref(db, `rooms_v3/${gameId}/${myUser.id}`);
    
    // ניקוי חדר ישן אם עבר זמן רב (אופציונלי)
    await set(myPlayerRef, { 
        name: myUser.name, 
        emoji: myUser.emoji, 
        color: myUser.color,
        ts: Date.now() 
    });
    
    onDisconnect(myPlayerRef).remove();

    roomListener = onValue(roomRef, (snap) => {
        const data = snap.val() || {};
        const players = Object.entries(data).map(([id, val]) => ({ id, ...val }));
        
        // עדכון הסלוטים ב-UI
        [0, 1].forEach(i => {
            const slot = document.getElementById(`slot-${i}`);
            slot.className = 'p-slot';
            slot.innerHTML = '';
            slot.style.borderColor = '';
        });

        players.forEach((p, i) => {
            if(i > 1) return;
            const slot = document.getElementById(`slot-${i}`);
            slot.className = 'p-slot active';
            slot.style.borderColor = p.color;
            slot.innerHTML = `<div style="font-size:2rem">${p.emoji}</div><div style="font-size:0.7rem; font-weight:bold">${p.name}</div>`;
        });

        // אם יש 2 שחקנים - עוברים למשחק
        if (players.length >= 2) {
            document.getElementById('wait-status-msg').innerHTML = "🎮 מתחילים!";
            setTimeout(() => { 
                // מסירים את המאזין לפני המעבר
                if (roomListener) roomListener();
                window.location.href = `${currentGame.url}?player=${myUser.id}`; 
            }, 1200);
        }
    });
};

window.cancelWaiting = () => {
    if (roomListener) roomListener();
    remove(ref(db, `rooms_v3/${currentGame.id}/${myUser.id}`));
    showScreen('screen-games');
};
</script>
</body>
</html>
