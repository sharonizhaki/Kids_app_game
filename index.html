<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1320">
<title>משחקי אמה וריף</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    :root {
      --bg: #0F1320;
      --surface: rgba(24, 29, 46, 0.4);
      --surface2: rgba(33, 40, 64, 0.6);
      --border: rgba(255, 255, 255, 0.1);
      --emma: #FF5C7A;
      --rif: #4DB8FF;
      --guest: #3DD68C;
      --text: #EEF0FF;
      --dim: #6B7299;
      --gold: #F5C842;
    }
    html, body { height:100%; background: var(--bg); color: var(--text); font-family: 'Heebo', sans-serif; overflow:hidden; }
    
    body::before {
      content: ''; position: fixed; inset: 0;
      background: radial-gradient(circle at 15% 15%, rgba(255, 92, 122, 0.08) 0%, transparent 40%),
                  radial-gradient(circle at 85% 85%, rgba(77, 184, 255, 0.08) 0%, transparent 40%);
      animation: backgroundShift 8s infinite alternate ease-in-out;
      z-index: -1;
    }
    @keyframes backgroundShift { 0% { background-position: 0% 0%; } 100% { background-position: 100% 100%; } }

    .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1); }
    .screen.active { display:flex; animation: fadeIn 0.5s ease-out; }
    @keyframes fadeIn { from { opacity:0; transform: translateY(10px); } to { opacity:1; transform: translateY(0); } }

    h1 { font-family: 'Fredoka One', cursive; font-size: 2.8rem; margin-bottom: 25px; background: linear-gradient(135deg, #FF5C7A, #4DB8FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    .user-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 400px; }
    .user-btn { background: var(--surface); border: 2px solid var(--border); border-radius: 24px; padding: 25px 15px; cursor: pointer; transition: 0.3s; display: flex; flex-direction: column; align-items: center; gap: 10px; color: white; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .user-btn:active { transform: scale(0.95); }
    .user-btn.emma { border-color: var(--emma); }
    .user-btn.rif { border-color: var(--rif); }
    .user-btn i { font-size: 3.5rem; font-style: normal; }

    #guest-setup { display: none; background: var(--surface2); border: 2px solid var(--guest); border-radius: 24px; padding: 20px; width: 100%; max-width: 400px; margin-top: 20px; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }

    .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 12px; width: 100%; max-width: 500px; padding: 5px; }
    .game-card { background: var(--surface); border: 1px solid var(--border); border-radius: 20px; padding: 15px 10px; display: flex; flex-direction: column; align-items: center; gap: 8px; cursor: pointer; transition: 0.2s; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .game-card:active { transform: scale(0.95); }
    .game-card i { font-size: 2.2rem; font-style: normal; }
    .game-card span { font-weight: 700; font-size: 0.95rem; }

    .waiting-box { background: var(--surface2); border: 2px solid var(--border); border-radius: 30px; padding: 40px 20px; width: 100%; max-width: 400px; text-align: center; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); }
    .slots { display: flex; justify-content: center; gap: 20px; margin: 30px 0; }
    .p-slot { width: 85px; height: 85px; border-radius: 50%; border: 3px dashed var(--dim); display: flex; flex-direction: column; align-items: center; justify-content: center; background: rgba(255,255,255,0.03); }
    .p-slot.active { border-style: solid; background: rgba(255,255,255,0.08); }
    
    .loader { width: 16px; height: 16px; border: 2px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    .btn-main { background: var(--guest); color: #0F1320; padding: 12px 30px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; width: 100%; font-size: 1.1rem; }
    .btn-cancel { background: rgba(255,255,255,0.05); border: 1px solid var(--border); color: #ff6b6b; padding: 10px 25px; border-radius: 15px; margin-top: 20px; cursor: pointer; font-weight: bold; }
</style>
</head>
<body>

<div id="screen-login" class="screen active">
  <h1>מי משחק?</h1>
  <div class="user-grid" id="main-user-grid">
    <button class="user-btn emma" onclick="selectUser('emma', 'אמה', '👧', '#FF5C7A')">
      <i>👧</i><span>אמה</span>
    </button>
    <button class="user-btn rif" onclick="selectUser('rif', 'ריף', '👦', '#4DB8FF')">
      <i>👦</i><span>ריף</span>
    </button>
    <button class="user-btn guest" style="grid-column: span 2; border-color: var(--guest)" onclick="toggleGuestSetup()">
      <i>👤</i><span>שחקן אורח</span>
    </button>
  </div>

  <div id="guest-setup">
    <input type="text" id="guest-name-input" class="guest-input" style="width:100%; padding:12px; border-radius:12px; border:1px solid var(--border); background:rgba(0,0,0,0.2); color:white; margin-bottom:15px; text-align:center;" placeholder="איך קוראים לך?">
    <div id="emoji-picker" style="display:grid; grid-template-columns:repeat(4,1fr); gap:10px; margin-bottom:15px;"></div>
    <button class="btn-main" onclick="confirmGuest()">יאללה למשחקים!</button>
  </div>
</div>

<div id="screen-games" class="screen">
  <h2 id="greeting" style="margin-bottom: 20px; font-weight: 800;">היי, מה נשחק?</h2>
  <div class="game-grid" id="game-list-container">
    </div>
  <button class="btn-cancel" onclick="logout()" style="color: var(--dim); border: none; margin-top: 20px;">החלף משתמש</button>
</div>

<div id="screen-waiting" class="screen">
  <div class="waiting-box">
    <div id="wait-game-icon" style="font-size: 3.5rem; margin-bottom: 10px;"></div>
    <h3 id="wait-game-name"></h3>
    <div class="slots"><div id="slot-0" class="p-slot"></div><div id="slot-1" class="p-slot"></div></div>
    <div style="display:flex; align-items:center; justify-content:center; gap:10px;">
        <div class="loader"></div>
        <div id="wait-status-msg">מחכים לחבר שיצטרף...</div>
    </div>
    <button class="btn-cancel" onclick="cancelWaiting()">ביטול</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myUser = null;
let currentGame = null;
let roomListener = null;

const games = [
    { id: 'xo', name: 'איקס עיגול', url: 'X_O.html', icon: '❌️', guest: true },
    { id: 'draw', name: 'צייר ונחש', url: 'draw_game.html', icon: '🎨', guest: true },
    { id: 'race', name: 'מרוץ מכוניות', url: 'Race.html', icon: '🏎️', guest: true },
    { id: 'memory', name: 'משחק זיכרון', url: 'Memory.html', icon: '🧩', guest: true },
    { id: 'bingo', name: 'בינגו', url: 'Bingo.html', icon: '🎯', guest: true },
    { id: 'snakes', name: 'סולמות ונחשים', url: 'Snakes.html', icon: '🐍', guest: true },
    { id: 'tasks', name: 'פעילות בית', url: 'Tasks.html', icon: '🏠', guest: false } // חסום לאורחים
];

function renderGames() {
    const container = document.getElementById('game-list-container');
    container.innerHTML = '';
    
    // בדיקה אם המשתמש הוא אורח (מזהה לפי ה-ID שהגדרנו)
    const isGuest = myUser && myUser.id.startsWith('guest_');

    games.forEach(game => {
        if (isGuest && !game.guest) return; // הסתרת כפתור אם זה אורח והמשחק לא מיועד לאורחים
        
        const card = document.createElement('div');
        card.className = 'game-card';
        card.onclick = () => window.joinGame(game.id);
        card.innerHTML = `<i>${game.icon}</i><span>${game.name}</span>`;
        container.appendChild(card);
    });

    // כפתור ספייר "בקרוב" - תמיד מופיע אחרון
    const soon = document.createElement('div');
    soon.className = 'game-card';
    soon.style.opacity = '0.5';
    soon.style.cursor = 'default';
    soon.innerHTML = `<i>🚀</i><span>בקרוב...</span>`;
    container.appendChild(soon);
}

// לוגיקה של בחירת משתמש
window.selectUser = (id, name, emoji, color) => {
    myUser = { id: id + '_' + Math.floor(Math.random()*1000), name, emoji, color };
    localStorage.setItem('myUser', JSON.stringify(myUser));
    renderGames(); // רנדור הכפתורים בהתאם למשתמש
    showScreen('screen-games');
    document.getElementById('greeting').textContent = `היי ${name}, מה נשחק?`;
};

window.confirmGuest = () => {
    const name = document.getElementById('guest-name-input').value.trim() || "אורח";
    window.selectUser('guest', name, '👤', '#3DD68C');
};

window.joinGame = (gameId) => {
    const game = games.find(g => g.id === gameId);
    if(!game) return;
    currentGame = game;
    document.getElementById('wait-game-icon').textContent = game.icon;
    document.getElementById('wait-game-name').textContent = game.name;
    showScreen('screen-waiting');

    const roomRef = ref(db, `rooms_v3/${gameId}`);
    const myPlayerRef = ref(db, `rooms_v3/${gameId}/${myUser.id}`);
    
    set(myPlayerRef, { name: myUser.name, emoji: myUser.emoji, color: myUser.color });
    onDisconnect(myPlayerRef).remove();

    roomListener = onValue(roomRef, (snap) => {
        const players = Object.values(snap.val() || {});
        [0, 1].forEach(i => {
            const slot = document.getElementById(`slot-${i}`);
            if (players[i]) {
                slot.className = 'p-slot active';
                slot.style.borderColor = players[i].color;
                slot.innerHTML = `<div style="font-size:2rem">${players[i].emoji}</div><div style="font-size:0.7rem;font-weight:bold">${players[i].name}</div>`;
            } else {
                slot.className = 'p-slot';
                slot.style.borderColor = '';
                slot.innerHTML = '';
            }
        });

        if (players.length >= 2) {
            setTimeout(() => { 
                if (roomListener) roomListener();
                window.location.href = `${currentGame.url}?player=${myUser.id}`; 
            }, 1200);
        }
    });
};

window.cancelWaiting = () => {
    if (roomListener) roomListener();
    remove(ref(db, `rooms_v3/${currentGame.id}/${myUser.id}`));
    showScreen('screen-games');
};

window.logout = () => { localStorage.removeItem('myUser'); location.reload(); };
window.toggleGuestSetup = () => {
    document.getElementById('main-user-grid').style.display = 'none';
    document.getElementById('guest-setup').style.display = 'block';
};

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

window.onload = () => {
    const saved = localStorage.getItem('myUser');
    if (saved) {
        myUser = JSON.parse(saved);
        renderGames();
        showScreen('screen-games');
        document.getElementById('greeting').textContent = `היי ${myUser.name}, מה נשחק?`;
    }
    // אתחול אימוג'ים לאורח
    const picker = document.getElementById('emoji-picker');
    ['🦊', '🐯', '🐸', '🐼', '🤖', '👾', '🦄', '🐲'].forEach(e => {
        const d = document.createElement('div');
        d.style.fontSize = '2rem'; d.style.cursor = 'pointer'; d.style.textAlign = 'center';
        d.textContent = e;
        d.onclick = () => { myUserEmoji = e; d.style.background = 'rgba(255,255,255,0.1)'; };
        picker.appendChild(d);
    });
};
let myUserEmoji = '👤';
</script>
</body>
</html>
