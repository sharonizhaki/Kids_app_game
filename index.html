<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1320">
<title>משחקי אמה וריף</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
    /* איפוס והגדרות בסיס */
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
    
    :root {
      --bg: #0F1320;
      --surface: rgba(24, 29, 46, 0.45);
      --surface2: rgba(33, 40, 64, 0.7);
      --border: rgba(255, 255, 255, 0.1);
      --emma: #FF5C7A;
      --rif: #4DB8FF;
      --guest: #3DD68C;
      --text: #EEF0FF;
      --dim: #6B7299;
      --gold: #F5C842;
    }

    html, body { height:100%; width:100%; background: var(--bg); color: var(--text); font-family: 'Heebo', sans-serif; overflow:hidden; }

    /* רקע ואלמנטים צפים - גרסה מחוזקת */
    .background-elements { 
        position: fixed; 
        top: 0; left: 0; 
        width: 100%; height: 100%; 
        z-index: -1; 
        pointer-events: none; 
        overflow: hidden;
        background: var(--bg);
    }
    
    .stars {
        position: absolute; inset: 0;
        background-image: 
            radial-gradient(2px 2px at 20px 30px, #eee, rgba(0,0,0,0)),
            radial-gradient(1.5px 1.5px at 100px 150px, #fff, rgba(0,0,0,0)),
            radial-gradient(2.5px 2.5px at 200px 80px, #fff, rgba(0,0,0,0)),
            radial-gradient(1.5px 1.5px at 280px 250px, #eee, rgba(0,0,0,0));
        background-size: 250px 250px;
        opacity: 0.4; 
        animation: starsMove 80s linear infinite;
    }
    @keyframes starsMove { from { background-position: 0 0; } to { background-position: 0 1000px; } }

    .watermark { 
        position: absolute; 
        opacity: 0.25; 
        filter: grayscale(0.5) brightness(1.5); 
        font-size: 8rem; 
        animation: floatAround 25s infinite ease-in-out; 
    }
    .watermark:nth-child(2) { top: 15%; left: -5%; }
    .watermark:nth-child(3) { top: 45%; right: -10%; animation-delay: -7s; }
    .watermark:nth-child(4) { bottom: 10%; left: 10%; animation-delay: -12s; }
    
    @keyframes floatAround {
        0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
        33% { transform: translate(30px, -40px) rotate(15deg) scale(1.1); }
        66% { transform: translate(-20px, 20px) rotate(-10deg) scale(0.95); }
    }

    /* מבנה מסכים */
    .screen { position:absolute; inset:0; display:none; flex-direction:column; align-items:center; justify-content:center; padding:20px; }
    .screen.active { display:flex; animation: fadeIn 0.4s ease-out forwards; }
    @keyframes fadeIn { from { opacity:0; transform: scale(0.98); } to { opacity:1; transform: scale(1); } }

    h1 { font-family: 'Fredoka One', cursive; font-size: 3rem; margin-bottom: 30px; background: linear-gradient(135deg, #FF5C7A, #4DB8FF); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    
    /* כפתורי משתמשים - פרופורציות מוקטנות */
    .user-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 20px; width: 100%; max-width: 400px; }
    .user-btn { 
        background: var(--surface); border: 2px solid var(--border); border-top: 2px solid rgba(255, 255, 255, 0.3);
        border-radius: 28px; padding: 25px 15px;
        cursor: pointer; transition: 0.3s cubic-bezier(0.34, 1.56, 0.64, 1); 
        display: flex; flex-direction: column; align-items: center; gap: 12px; color: white; backdrop-filter: blur(15px); -webkit-backdrop-filter: blur(15px); 
    }
    .user-btn:active { animation: bounce 0.2s cubic-bezier(0.34, 1.56, 0.64, 1); }
    .user-btn.emma { border-color: var(--emma); } 
    .user-btn.rif { border-color: var(--rif); } 
    .user-btn i { font-size: 3.5rem; font-style: normal; }
    .user-btn span { font-weight: 800; font-size: 1.2rem; }

    @keyframes bounce { 0% { transform: scale(1); } 50% { transform: scale(0.92); } 100% { transform: scale(1); } }

    /* גריד משחקים - פרופורציות מוקטנות */
    .game-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; width: 100%; max-width: 500px; }
    .game-card { 
        background: var(--surface); border: 1px solid var(--border); border-top: 1px solid rgba(255, 255, 255, 0.2); 
        border-radius: 24px; padding: 18px 10px;
        display: flex; flex-direction: column; align-items: center; gap: 10px; cursor: pointer; 
        transition: 0.2s ease; backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px); opacity: 0; transform: translateY(20px); 
    }
    .game-card.animate { animation: cardSlideUp 0.5s cubic-bezier(0.22, 1, 0.36, 1) forwards; }
    @keyframes cardSlideUp { to { opacity: 1; transform: translateY(0); } }
    .game-card:active:not(.soon) { transform: scale(0.95); background: rgba(255,255,255,0.1); }
    .game-card.soon { opacity: 0.5; cursor: default; }
    .game-card i { font-size: 2.2rem; font-style: normal; }
    .game-card span { font-weight: 700; font-size: 1rem; }

    /* המתנה */
    .waiting-box { background: var(--surface2); border: 2px solid var(--border); border-radius: 32px; padding: 40px 20px; width: 100%; max-width: 380px; text-align: center; backdrop-filter: blur(20px); }
    .slots { display: flex; justify-content: center; gap: 25px; margin: 30px 0; }
    .p-slot { width: 90px; height: 90px; border-radius: 50%; border: 3px dashed var(--dim); display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .p-slot.active { border-style: solid; transform: scale(1.1); background: rgba(255,255,255,0.05); }
    .loader { width: 20px; height: 20px; border: 3px solid var(--gold); border-top-color: transparent; border-radius: 50%; animation: spin 0.8s linear infinite; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* כפתורים וטפסים */
    .btn-main { background: var(--guest); color: #0F1320; padding: 15px; border-radius: 18px; border: none; font-weight: 900; cursor: pointer; width: 100%; font-size: 1.1rem; }
    .btn-cancel { background: transparent; color: var(--dim); border: none; margin-top: 25px; cursor: pointer; font-size: 0.9rem; font-weight: 600; text-decoration: underline; }
    input { width:100%; padding:15px; border-radius:15px; border:1px solid var(--border); background:rgba(0,0,0,0.3); color:white; margin-bottom:15px; text-align:center; }
</style>
</head>
<body>

<div class="background-elements">
    <div class="stars"></div>
    <div class="watermark">🎮</div>
    <div class="watermark">🎲</div>
    <div class="watermark">🕹️</div>
</div>

<div id="screen-login" class="screen active">
  <h1>מי משחק?</h1>
  <div class="user-grid" id="main-user-grid">
    <button class="user-btn emma" onclick="selectUser('emma', 'אמה', '👧', '#FF5C7A')">
      <i>👧</i><span>אמה</span>
    </button>
    <button class="user-btn rif" onclick="selectUser('rif', 'ריף', '👦', '#4DB8FF')">
      <i>👦</i><span>ריף</span>
    </button>
    <button class="user-btn guest" style="grid-column: span 2; border-color: var(--guest)" onclick="toggleGuestSetup()">
      <i>👤</i><span>שחקן אורח</span>
    </button>
  </div>
  <div id="guest-setup" style="display:none; width:100%; max-width:400px;">
    <input type="text" id="guest-name-input" placeholder="איך קוראים לך?">
    <div id="emoji-picker" style="display:grid; grid-template-columns:repeat(4,1fr); gap:15px; margin-bottom:20px;"></div>
    <button class="btn-main" onclick="confirmGuest()">הצטרף</button>
    <button class="btn-cancel" onclick="location.reload()">חזור</button>
  </div>
</div>

<div id="screen-games" class="screen">
  <h2 id="greeting" style="margin-bottom: 25px; font-weight: 900;"></h2>
  <div class="game-grid" id="game-list-container"></div>
  <button class="btn-cancel" onclick="logout()">החלף משתמש</button>
</div>

<div id="screen-waiting" class="screen">
  <div class="waiting-box">
    <div id="wait-game-icon" style="font-size: 4rem; margin-bottom: 15px;"></div>
    <h3 id="wait-game-name" style="font-size: 1.5rem;"></h3>
    <div class="slots"><div id="slot-0" class="p-slot"></div><div id="slot-1" class="p-slot"></div></div>
    <div style="display:flex; align-items:center; justify-content:center; gap:12px;"><div class="loader"></div><div>מחפשים חבר...</div></div>
    <button class="btn-cancel" onclick="cancelWaiting()">ביטול</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, remove, onDisconnect } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

let myUser = null;
let currentGame = null;
let roomListener = null;
let myUserEmoji = '👤';

const games = [
    { id: 'xo', name: 'איקס עיגול', url: 'X_O.html', icon: '❌', guest: true },
    { id: 'draw', name: 'צייר ונחש', url: 'draw_game.html', icon: '🎨', guest: true },
    { id: 'race', name: 'מרוץ מכוניות', url: 'Race.html', icon: '🏎️', guest: true },
    { id: 'memory', name: 'משחק זיכרון', url: 'Memory.html', icon: '🧩', guest: true },
    { id: 'bingo', name: 'בינגו', url: 'Bingo.html', icon: '🔢', guest: true },
    { id: 'snakes', name: 'סולמות ונחשים', url: 'Snakes.html', icon: '🐍', guest: true },
    { id: 'tasks', name: 'פעילות בית', url: 'Tasks.html', icon: '🏠', guest: false }
];

function renderGames() {
    const container = document.getElementById('game-list-container');
    container.innerHTML = '';
    const isGuest = myUser && myUser.id.startsWith('guest_');
    let displayedCount = 0;

    games.forEach((game) => {
        if (isGuest && !game.guest) return; 
        const card = document.createElement('div');
        card.className = 'game-card animate';
        card.style.animationDelay = `${displayedCount * 0.1}s`;
        card.onclick = () => window.joinGame(game.id);
        card.innerHTML = `<i>${game.icon}</i><span>${game.name}</span>`;
        container.appendChild(card);
        displayedCount++;
    });

    const soonCard = document.createElement('div');
    soonCard.className = 'game-card animate soon';
    soonCard.style.animationDelay = `${displayedCount * 0.1}s`;
    soonCard.innerHTML = `<i>🚀</i><span>בקרוב...</span>`;
    container.appendChild(soonCard);
}

window.selectUser = (id, name, emoji, color) => {
    myUser = { id: id + '_' + Math.floor(Math.random()*1000), name, emoji, color };
    localStorage.setItem('myUser', JSON.stringify(myUser));
    startApp();
};

window.confirmGuest = () => {
    const name = document.getElementById('guest-name-input').value.trim() || "אורח";
    window.selectUser('guest', name, myUserEmoji, '#3DD68C');
};

window.toggleGuestSetup = () => {
    document.getElementById('main-user-grid').style.display = 'none';
    document.getElementById('guest-setup').style.display = 'block';
};

window.joinGame = (gameId) => {
    const game = games.find(g => g.id === gameId);
    currentGame = game;
    document.getElementById('wait-game-icon').textContent = game.icon;
    document.getElementById('wait-game-name').textContent = game.name;
    showScreen('screen-waiting');

    const roomRef = ref(db, `rooms_v3/${gameId}`);
    const myPlayerRef = ref(db, `rooms_v3/${gameId}/${myUser.id}`);
    set(myPlayerRef, { name: myUser.name, emoji: myUser.emoji, color: myUser.color });
    onDisconnect(myPlayerRef).remove();

    roomListener = onValue(roomRef, (snap) => {
        const players = Object.values(snap.val() || {});
        [0, 1].forEach(i => {
            const slot = document.getElementById(`slot-${i}`);
            if (players[i]) {
                slot.className = 'p-slot active';
                slot.style.borderColor = players[i].color;
                slot.innerHTML = `<div style="font-size:2.2rem">${players[i].emoji}</div><div style="font-size:0.8rem;font-weight:900">${players[i].name}</div>`;
            } else {
                slot.className = 'p-slot'; slot.style.borderColor = ''; slot.innerHTML = '';
            }
        });
        if (players.length >= 2) {
            setTimeout(() => { 
                if (roomListener) roomListener();
                window.location.href = `${currentGame.url}?player=${myUser.id}`; 
            }, 1000);
        }
    });
};

window.cancelWaiting = () => {
    if (roomListener) roomListener();
    remove(ref(db, `rooms_v3/${currentGame.id}/${myUser.id}`));
    showScreen('screen-games');
};

window.logout = () => { localStorage.removeItem('myUser'); location.reload(); };

function showScreen(id) {
    document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
    document.getElementById(id).classList.add('active');
}

function startApp() {
    renderGames();
    showScreen('screen-games');
    const greeting = document.getElementById('greeting');
    greeting.textContent = `היי ${myUser.name}, מה נשחק?`;

    if (myUser.id.includes('emma')) {
        greeting.style.background = 'linear-gradient(135deg, #FF5C7A, #FFB2C1)';
    } else if (myUser.id.includes('rif')) {
        greeting.style.background = 'linear-gradient(135deg, #4DB8FF, #B2E2FF)';
    } else {
        greeting.style.background = 'linear-gradient(135deg, #3DD68C, #A8F0D0)';
    }
    greeting.style.webkitBackgroundClip = 'text';
    greeting.style.webkitTextFillColor = 'transparent';
    greeting.style.display = 'block';
}

window.onload = () => {
    const saved = localStorage.getItem('myUser');
    if (saved) { myUser = JSON.parse(saved); startApp(); }
    const picker = document.getElementById('emoji-picker');
    ['🦊', '🐯', '🐸', '🐼', '🤖', '👾', '🦄', '🐲'].forEach(e => {
        const d = document.createElement('div');
        d.style.fontSize = '2rem'; d.style.cursor = 'pointer'; d.style.textAlign = 'center';
        d.textContent = e;
        d.onclick = () => { 
            myUserEmoji = e; 
            Array.from(picker.children).forEach(c => c.style.background = 'none');
            d.style.background = 'rgba(255,255,255,0.1)'; 
        };
        picker.appendChild(d);
    });
};
</script>
</body>
</html>
