<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>המשימות שלי</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/child.css">
  <link rel="stylesheet" href="css/child-onboarding.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
  <link rel="stylesheet" href="./css/bg-floaters.css">
</head>
<body>

<!-- ==================== SPLASH ==================== -->
<div id="screen-splash" class="screen active visible">
  <div class="splash">
    <div>
      <div style="font-size:3rem;margin-bottom:16px;">⭐</div>
      <div class="spinner-lg"></div>
      <p style="font-weight:700;color:var(--muted);">טוען...</p>
    </div>
  </div>
</div>

<!-- ==================== SCREEN: HOME ==================== -->
<div id="screen-child" class="screen has-nav">

  <!-- TOP BAR: אמוג'י + שם + ברכה -->
  <div class="child-topbar" id="child-hero">
    <div class="child-topbar-avatar" id="child-header-photo">
      <span id="child-header-emoji">⭐</span>
    </div>
    <div class="child-topbar-text">
      <div class="child-topbar-name" id="child-title"></div>
      <div class="child-topbar-greeting" id="greeting-text"></div>
    </div>
    <div class="child-topbar-total">
      <span class="child-topbar-total-num" id="cpc-total-val">0</span>
      <span class="child-topbar-total-icon">⭐</span>
    </div>
  </div>

  <!-- greeting-sub (hidden, kept for JS) -->
  <div id="greeting-sub" style="display:none;"></div>
  <!-- cpc-tasks-today (hidden, kept for JS) -->
  <div id="cpc-tasks-today" style="display:none;"></div>

  <!-- STATS ROW: שבוע · סה"כ · streak -->
  <div class="stats-row stats-row-3">
    <div class="stat-card">
      <div class="stat-val" id="pb-val" style="color:var(--child-color);">0</div>
      <div class="stat-label">השבוע ⭐</div>
    </div>
    <div class="stat-card stat-streak" id="streak-card">
      <div class="stat-val streak-val" id="streak-val">0</div>
      <div class="stat-label">ברצף 🔥</div>
    </div>
  </div>

  <!-- בר מתנה מסתובב -->
  <div class="prize-progress-card" id="prize-progress-card">
    <div class="ppcard-header">
      <span class="ppcard-label">המטרה הבאה שלי 🎯</span>
    </div>
    <div class="ppcard-prize-row" id="ppcard-prize-row">
      <div class="ppcard-prize-emoji" id="ppcard-emoji">🎁</div>
      <div class="ppcard-prize-info">
        <div class="ppcard-prize-name" id="ppcard-name">ממתין שההורים יצרו מתנות</div>
        <div class="ppcard-prize-remaining" id="ppcard-remaining"></div>
      </div>
    </div>
    <div class="ppcard-bar-wrap">
      <div class="ppcard-bar">
        <div class="ppcard-bar-fill" id="ppcard-bar-fill" style="width:0%"></div>
      </div>
      <span class="ppcard-bar-label" id="ppcard-bar-label"></span>
    </div>
  </div>

  <!-- ⏳ pending approvals section -->
  <div id="pending-section" style="display:none; max-width:480px; margin:0 auto 16px;">
    <div class="pending-section-title">⏳ ממתין לאישור הורה</div>
    <div id="pending-list"></div>
  </div>

  <!-- categories -->
  <div class="categories-grid" id="cats-grid"></div>

  <!-- history -->
  <div class="history-section">
    <h3>פעולות אחרונות 📋</h3>
    <div class="history-list" id="user-hist">
      <div class="empty-state">עדיין לא ביצעת משימות</div>
    </div>
  </div>
</div>

<!-- ==================== SCREEN: PRIZES ==================== -->
<div id="screen-prizes-child" class="screen has-nav">
  <div class="user-header">
    <h2>חנות הפרסים 🎁</h2>
  </div>
  <div class="prizes-stars-banner" id="prizes-stars-banner">
    <span class="psb-label">הכוכבים שלי</span>
    <span class="psb-val" id="prizes-stars-val">0 ⭐</span>
  </div>
  <div id="prizes-pending-section" style="display:none;">
    <div class="section-title">בקשות שלחתי ⏳</div>
    <div id="prizes-pending-list"></div>
  </div>
  <div class="prizes-grid" id="prizes-grid">
    <div class="empty-state">עדיין לא הוגדרו פרסים 🎁<br><small>ההורים יגדירו בקרוב</small></div>
  </div>
</div>

<!-- ==================== SCREEN: BADGES ==================== -->
<div id="screen-badges" class="screen has-nav">
  <div class="user-header">
    <h2>ההישגים שלי 🏆</h2>
  </div>
  <div class="badges-summary" id="badges-summary"></div>
  <div class="badges-grid"   id="badges-grid"></div>
</div>

<!-- ==================== SCREEN: PROFILE EDIT ==================== -->
<div id="screen-child-profile" class="screen" style="padding-top:20px;">
  <div class="user-header">
    <button class="back-btn" id="btn-profile-back">→</button>
    <h2>הפרופיל שלי ✏️</h2>
  </div>
  <div class="profile-card">
    <div class="profile-header">
      <div class="profile-name" id="profile-child-name"></div>
      <div class="profile-gender" id="profile-child-gender"></div>
    </div>

    <!-- שורת 3 אלמנטים -->
    <div class="profile-items-row">
      <!-- צבע -->
      <div class="profile-item-col">
        <div class="profile-item-label">צבע</div>
        <div id="profile-color-display" class="profile-color-circle" title="לחץ לעריכה"></div>
      </div>
      <!-- אימוג'י -->
      <div class="profile-item-col">
        <div class="profile-item-label">אימוג'י</div>
        <div id="profile-emoji-display" class="profile-emoji-btn" title="לחץ לעריכה"></div>
      </div>
      <!-- תמונה -->
      <div class="profile-item-col">
        <div class="profile-item-label">תמונה</div>
        <div class="profile-photo-upload" id="profile-photo-upload">
          <div id="profile-photo-placeholder" class="profile-photo-placeholder">
            <span>📷</span><small>בחר/י תמונה</small>
          </div>
          <img id="profile-photo-preview" class="profile-photo-preview" alt="">
          <input type="file" accept="image/*" id="profile-photo-input" class="profile-photo-input">
        </div>
        <button id="btn-profile-clear-photo" class="profile-clear-btn-sm" style="font-size:0.8rem;font-weight:700;width:100%;text-align:center;">🗑️ מחק</button>
      </div>
    </div>

    <div id="profile-error" class="profile-error"></div>
    <button id="btn-profile-save" class="profile-save-btn">שמור ✅</button>
  </div>
</div>

<!-- ==================== BOTTOM NAV ==================== -->
<nav class="bottom-nav" id="bottom-nav">
  <button class="nav-btn active" data-screen="screen-child" data-tab="home">
    <span class="nav-icon">🏠</span>
    <span class="nav-label">בית</span>
  </button>
  <button class="nav-btn" data-screen="screen-prizes-child" data-tab="prizes">
    <span class="nav-icon">🎁</span>
    <span class="nav-label">פרסים</span>
    <span class="nav-badge" id="nav-badge-prizes" style="display:none;"></span>
  </button>
  <button class="nav-btn" data-screen="screen-badges" data-tab="badges">
    <span class="nav-icon">🏆</span>
    <span class="nav-label">הישגים</span>
    <span class="nav-badge" id="nav-badge-badges" style="display:none;"></span>
  </button>
  <button class="nav-btn" data-screen="screen-child-profile" data-tab="profile">
    <div class="nav-icon nav-profile-icon-wrap" id="nav-profile-icon">👤</div>
    <span class="nav-label">פרופיל</span>
  </button>
</nav>

<!-- TOAST -->
<div class="success-toast" id="toast"></div>

<script type="module" src="js/main-child.js"></script>
<script src="./js/bg-floaters.js"></script>
</body>
</html>
