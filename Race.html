<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>מרוץ אקסטרים - אמה וריף</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@900&display=swap" rel="stylesheet">
    <style>
        :root {
            --emma: #FF5C7A;
            --rif: #4DB8FF;
            --bg: #0F1320;
        }
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Heebo', sans-serif;
            background: var(--bg);
            color: white;
            overflow: hidden;
            touch-action: none;
        }
        .game-container {
            display: flex;
            flex-direction: column;
            height: 100vh;
            padding: 20px;
        }
        .header {
            text-align: center;
            padding-bottom: 20px;
        }
        .track-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-around;
            background: rgba(255,255,255,0.03);
            border-radius: 20px;
            position: relative;
            padding: 20px 0;
            border: 1px solid rgba(255,255,255,0.1);
        }
        .track {
            height: 80px;
            width: 100%;
            position: relative;
            border-bottom: 2px dashed rgba(255,255,255,0.1);
            display: flex;
            align-items: center;
        }
        .car {
            position: absolute;
            font-size: 45px;
            transition: left 0.3s cubic-bezier(0.25, 0.46, 0.45, 0.94);
            filter: drop-shadow(0 0 10px rgba(0,0,0,0.5));
            z-index: 10;
        }
        .finish-line {
            position: absolute;
            right: 20px;
            top: 0;
            bottom: 0;
            width: 10px;
            background: repeating-linear-gradient(0deg, #fff 0, #fff 10px, #000 10px, #000 20px);
        }
        .controls {
            padding: 30px 0;
            display: flex;
            justify-content: center;
        }
        .push-button {
            width: 120px;
            height: 120px;
            border-radius: 50%;
            border: none;
            background: linear-gradient(135deg, #6e8efb, #a777e3);
            color: white;
            font-family: 'Fredoka One', cursive;
            font-size: 24px;
            font-weight: bold;
            box-shadow: 0 8px 0 #4a69bd, 0 15px 25px rgba(0,0,0,0.3);
            cursor: pointer;
            active: transform: translateY(4px);
            transition: 0.1s;
        }
        .push-button:active {
            transform: translateY(6px);
            box-shadow: 0 2px 0 #4a69bd;
        }
        .status-tag {
            position: absolute;
            top: -25px;
            font-size: 14px;
            font-weight: bold;
            white-space: nowrap;
        }
        #emma-car .status-tag { color: var(--emma); }
        #rif-car .status-tag { color: var(--rif); }
    </style>
</head>
<body>

<div class="game-container">
    <div class="header">
        <h1 style="font-family:'Fredoka One'; font-size: 32px; background: linear-gradient(to right, var(--emma), var(--rif)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;">RACING STAGE <span id="stage-num">1</span></h1>
    </div>

    <div class="track-container">
        <div class="finish-line"></div>
        
        <div class="track">
            <div id="emma-car" class="car" style="left: 0;">
                <span class="status-tag">אמה</span>
                🏎️
            </div>
        </div>

        <div class="track">
            <div id="rif-car" class="car" style="left: 0;">
                <span class="status-tag">ריף</span>
                🏎️
            </div>
        </div>
    </div>

    <div class="controls">
        <button class="push-button" id="gas-btn">GAS!</button>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

const params = new URLSearchParams(location.search);
const myId = params.get('player') || 'emma';
const otherId = myId === 'emma' ? 'rif' : 'emma';
const gameId = 'racing';
const gameRef = ref(db, `game/${gameId}`);

let hasLeft = false;
let leaveTimeout = null;
let currentPos = 0;
let currentStage = 1;

// --- 1. נוכחות ועזיבה ---
async function initPresence() {
    const myPresence = ref(db, `presence/${gameId}/${myId}`);
    set(myPresence, true);
    onDisconnect(myPresence).remove();

    onValue(ref(db, `presence/${gameId}/${otherId}`), (snap) => {
        if (!snap.val()) {
            if (!leaveTimeout && !hasLeft) {
                leaveTimeout = setTimeout(() => {
                    hasLeft = true;
                    alert("המתחרה השני יצא מהמרוץ. חוזרים ללובי.");
                    window.location.href = 'index.html';
                }, 2500);
            }
        } else {
            if (leaveTimeout) {
                clearTimeout(leaveTimeout);
                leaveTimeout = null;
            }
        }
    });
}

// --- 2. לוגיקת משחק ---
async function initGame() {
    // אתחול נתונים אם המשחק חדש
    const snap = await get(gameRef);
    if (!snap.val()) {
        set(gameRef, {
            emma: 0,
            rif: 0,
            stage: 1,
            ts: Date.now()
        });
    }

    onValue(gameRef, (snap) => {
        const data = snap.val();
        if (!data) return;

        // עדכון מיקומי מכוניות
        updateCarPos('emma', data.emma);
        updateCarPos('rif', data.rif);
        
        // עדכון שלב
        if (data.stage !== currentStage) {
            currentStage = data.stage;
            document.getElementById('stage-num').textContent = currentStage;
            currentPos = 0; // איפוס מקומי לשלב חדש
        }

        // בדיקת ניצחון בשלב
        if (data.emma >= 85 || data.rif >= 85) {
            handleStageWin(data.emma >= 85 ? 'אמה' : 'ריף');
        }
    });
}

function updateCarPos(id, pos) {
    const car = document.getElementById(`${id}-car`);
    car.style.left = pos + '%';
}

function handleGas() {
    if (hasLeft) return;
    currentPos += 2.5; // מהירות התקדמות
    update(gameRef, {
        [myId]: currentPos,
        ts: Date.now()
    });
}

function handleStageWin(winner) {
    // כאן אפשר להוסיף אפקטים של ניצחון שלב
    if (currentStage < 5) {
        if (myId === 'emma') { // רק שחקן אחד מעדכן את השלב הבא
            setTimeout(() => {
                update(gameRef, {
                    emma: 0,
                    rif: 0,
                    stage: currentStage + 1,
                    ts: Date.now()
                });
            }, 2000);
        }
    } else {
        alert(`סוף המרוץ! ${winner} ניצח/ה בכל השלבים!`);
        window.location.href = 'index.html';
    }
}

// אירועים
document.getElementById('gas-btn').addEventListener('touchstart', (e) => {
    e.preventDefault();
    handleGas();
});
document.getElementById('gas-btn').addEventListener('mousedown', handleGas);

// התחלה
initPresence();
initGame();
</script>
</body>
</html>
