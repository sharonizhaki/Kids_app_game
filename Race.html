<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>🏁 מרוץ מכוניות</title>
    <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Heebo', sans-serif; background: #0F1320; color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; touch-action: none; user-select: none; -webkit-user-select: none; }

        /* ========== בר עליון — צר יותר, בין אבני השפה ========== */
        .stats-bar {
            background: linear-gradient(180deg, #0F1320 0%, rgba(15,19,32,0.95) 100%);
            padding: 8px 10px 0;
            margin: 0 14px;
            z-index: 100; position: relative; flex-shrink: 0;
        }
        .stats-top { display: flex; align-items: center; gap: 0; margin-bottom: 6px; }
        .home-button { font-size: 20px; cursor: pointer; padding: 5px 9px; border-radius: 10px; background: rgba(255,255,255,0.05); border: 1.5px solid rgba(255,215,0,0.25); margin-left: 10px; flex-shrink: 0; }
        .stats-row { display: flex; flex: 1; justify-content: space-around; align-items: center; }
        .stat-item { text-align: center; }
        .stat-label { font-size: 9px; color: #F5C842; letter-spacing: 0.5px; margin-bottom: 2px; font-weight: 700; opacity: 0.7; }
        .stat-value { font-size: 20px; font-weight: bold; color: #4DB8FF; font-family: 'Fredoka One', cursive; transition: all 0.3s; min-width: 28px; }
        .stat-value.pop { animation: statPop 0.4s ease; }
        @keyframes statPop { 0% { transform: scale(1); } 40% { transform: scale(1.4); color: #F5C842; } 100% { transform: scale(1); } }
        .speed-indicator { display: flex; gap: 3px; justify-content: center; }
        .speed-level { font-size: 12px; filter: grayscale(100%); opacity: 0.3; transition: all 0.3s; }
        .speed-level.active { filter: grayscale(0%); opacity: 1; transform: scale(1.15); }
        .speed-level.just-gained { animation: speedGain 0.5s ease; }
        @keyframes speedGain { 0% { transform: scale(1); } 50% { transform: scale(1.6); } 100% { transform: scale(1.15); } }
        .lives-display { display: flex; gap: 3px; font-size: 15px; justify-content: center; }
        .wins-display { display: flex; gap: 2px; font-size: 13px; justify-content: center; }
        .trophy { transition: all 0.4s; }
        .trophy.dim { filter: grayscale(100%) brightness(0.4); opacity: 0.4; }
        .trophy.won { filter: none; opacity: 1; transform: scale(1.1); }
        .trophy.just-won { animation: trophyPop 0.6s ease; }
        @keyframes trophyPop { 0% { transform: scale(1); } 40% { transform: scale(1.5) rotate(-10deg); } 70% { transform: scale(1.2) rotate(5deg); } 100% { transform: scale(1.1); } }
        .heart { transition: all 0.3s; }
        .heart.lost { opacity: 0.15; filter: grayscale(100%); transform: scale(0.8); }
        .heart.just-lost { animation: heartLost 0.7s ease; }
        @keyframes heartLost {
            0% { transform: scale(1); opacity: 1; }
            15% { transform: scale(1.5) rotate(-10deg); filter: brightness(2); }
            30% { transform: scale(1.4) rotate(10deg); }
            50% { transform: scale(1.2) rotate(-5deg); filter: brightness(1.5); opacity: 0.7; }
            100% { transform: scale(0.8); opacity: 0.15; filter: grayscale(100%); }
        }

        /* ========== מד מסלול ========== */
        .track-progress {
            position: relative; height: 14px; margin: 0 4px 6px;
            background: rgba(255,255,255,0.08); border-radius: 7px; overflow: visible;
        }
        .track-progress-fill {
            position: absolute; inset: 0; border-radius: 7px;
            background: linear-gradient(90deg, rgba(255,255,255,0.05), rgba(255,255,255,0.02));
        }
        .track-marker-start { position: absolute; left: -2px; top: 50%; transform: translateY(-50%); font-size: 8px; }
        .track-marker-end { position: absolute; right: -2px; top: 50%; transform: translateY(-50%); font-size: 8px; }
        .track-dot {
            position: absolute; top: 50%; width: 10px; height: 10px;
            border-radius: 50%; border: 1.5px solid rgba(255,255,255,0.5);
            transform: translate(-50%, -50%); transition: right 0.3s ease; z-index: 5;
            box-shadow: 0 0 6px rgba(0,0,0,0.3);
        }

        /* ========== Countdown ========== */
        .countdown-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.4); display: flex; justify-content: center; align-items: center; z-index: 1000; backdrop-filter: blur(2px); }
        .countdown-modal.hidden { display: none; }
        .countdown-text { font-size: 70px; font-weight: bold; color: #FFD700; text-shadow: 0 0 40px rgba(255,215,0,0.9), 0 4px 20px rgba(0,0,0,0.5); animation: countPulse 0.8s ease; font-family: 'Fredoka One', cursive; }
        .countdown-text.go { color: #4DB8FF; text-shadow: 0 0 40px rgba(77,184,255,0.9), 0 4px 20px rgba(0,0,0,0.5); }
        @keyframes countPulse { 0% { transform: scale(0.3); opacity: 0; } 60% { transform: scale(1.15); } 100% { transform: scale(1); opacity: 1; } }

        /* ========== Result ========== */
        .result-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.55); display: none; justify-content: center; align-items: center; z-index: 1001; padding: 20px; }
        .result-modal.show { display: flex; }
        .result-box { background: linear-gradient(135deg, rgba(15,19,32,0.85), rgba(15,19,32,0.9)); border: 3px solid #F5C842; border-radius: 25px; padding: 35px 25px; text-align: center; max-width: 320px; width: 100%; backdrop-filter: blur(8px); animation: countPulse 0.5s ease; }
        .result-icon { font-size: 3.5rem; margin-bottom: 8px; }
        .result-title { font-family: 'Fredoka One', cursive; font-size: 1.6rem; color: #F5C842; margin-bottom: 8px; }
        .result-sub { font-size: 0.95rem; opacity: 0.8; margin-bottom: 18px; }
        .result-buttons { display: flex; gap: 10px; }
        .result-btn { flex: 1; padding: 12px 10px; border-radius: 15px; border: none; font-weight: 900; font-size: 0.9rem; cursor: pointer; }
        .result-btn.primary { background: linear-gradient(135deg, #F5C842, #FFB347); color: #0F1320; }
        .result-btn.secondary { background: rgba(255,255,255,0.1); color: white; border: 1.5px solid rgba(255,255,255,0.2); }

        /* ========== אזור משחק ========== */
        .game-area { flex: 1; position: relative; overflow: hidden; background: #4a5a7a; }
        .game-area.shake { animation: screenShake 0.3s ease; }
        @keyframes screenShake { 0%,100% { transform: translateX(0); } 20% { transform: translateX(-4px); } 40% { transform: translateX(4px); } 60% { transform: translateX(-3px); } 80% { transform: translateX(2px); } }
        
        /* Black flash — מעבר קטע */
        .segment-flash { position: absolute; inset: 0; background: black; z-index: 200; opacity: 0; pointer-events: none; }
        .segment-flash.active { animation: blackFlash 0.4s ease; }
        @keyframes blackFlash { 0% { opacity: 0; } 40% { opacity: 1; } 60% { opacity: 1; } 100% { opacity: 0; } }

        /* אבני שפה — זזות */
        .curb-left, .curb-right { position: fixed; top: 0; bottom: 0; width: 14px; z-index: 150; background-size: 14px 50px; }
        .curb-left { left: 0; background: repeating-linear-gradient(180deg, #FF0000 0, #FF0000 25px, #FFFFFF 25px, #FFFFFF 50px); }
        .curb-right { right: 0; background: repeating-linear-gradient(180deg, #FFFFFF 0, #FFFFFF 25px, #FF0000 25px, #FF0000 50px); }
        
        /* קווי הפרדה — זזים */
        .lane-divider { position: absolute; top: 0; bottom: 0; width: 3px; z-index: 10; background: repeating-linear-gradient(180deg, rgba(255,255,255,0.8) 0px, rgba(255,255,255,0.8) 20px, transparent 20px, transparent 35px); background-size: 3px 35px; }
        .race-line { position: absolute; left: 0; right: 0; height: 14px; z-index: 40; display: flex; flex-direction: column; }
        .race-line.hidden { display: none; }
        .race-line-row { display: flex; flex: 1; }
        .race-line-sq { flex: 1; max-width: 12px; }
        .race-line-sq.w { background: white; }
        .race-line-sq.b { background: black; }

        /* רכב — הטיה + קפיצה + שובל + נדנוד */
        .car {
            position: absolute; width: 42px; height: 65px; z-index: 30;
            transition: left 0.2s cubic-bezier(0.25, 0.46, 0.45, 0.94), bottom 0.05s linear, filter 0.2s ease;
            filter: drop-shadow(0 4px 8px rgba(0,0,0,0.5));
        }
        /* להבות + צל דינמי במהירות גבוהה */
        .car.speed-3 { filter: drop-shadow(0 6px 10px rgba(0,0,0,0.5)); }
        .car.speed-4 { filter: drop-shadow(0 8px 14px rgba(0,0,0,0.4)) drop-shadow(0 8px 12px rgba(255,160,0,0.4)); }
        .car.speed-5 { filter: drop-shadow(0 12px 20px rgba(0,0,0,0.3)) drop-shadow(0 10px 16px rgba(255,80,0,0.5)) drop-shadow(0 14px 20px rgba(255,0,0,0.3)); }
        .car.flash { animation: carFlash 0.15s ease 3; }
        .car.frozen { opacity: 0.5; filter: grayscale(50%) drop-shadow(0 0 10px rgba(100,150,255,0.8)); }
        @keyframes carFlash { 0%,100% { opacity: 1; } 50% { opacity: 0.2; } }

        /* להבות פליטה */
        .exhaust {
            position: absolute; bottom: -2px; left: 50%; transform: translateX(-50%);
            display: flex; gap: 1px; justify-content: center;
            opacity: 0; transition: opacity 0.3s; pointer-events: none; z-index: -1;
        }
        .exhaust.active { opacity: 1; }
        .exhaust-flame {
            width: 4px; height: 8px;
            border-radius: 50% 50% 30% 30%;
            animation: flicker 0.08s infinite alternate;
        }
        .exhaust.level-1 .exhaust-flame { height: 5px; width: 3px; }
        .exhaust.level-2 .exhaust-flame { height: 9px; width: 4px; }
        .exhaust.level-3 .exhaust-flame { height: 14px; width: 5px; }
        .exhaust.level-4 .exhaust-flame { height: 20px; width: 6px; }
        @keyframes flicker {
            0% { transform: scaleY(1) scaleX(1); opacity: 1; }
            100% { transform: scaleY(1.35) scaleX(0.75); opacity: 0.7; }
        }

        /* עשן סטארט */
        .tire-smoke {
            position: absolute; bottom: -4px; left: 50%; transform: translateX(-50%);
            width: 50px; height: 20px; pointer-events: none; z-index: -1;
        }

        /* אורות לטווח רחוק */
        .headlight-beam {
            position: absolute; top: -90px; left: 50%; transform: translateX(-50%);
            width: 30px; height: 90px; pointer-events: none; z-index: -1;
            opacity: 0; transition: opacity 0.4s;
            background: radial-gradient(ellipse 50% 100% at 50% 100%,
                rgba(255,255,200,0.12) 0%,
                rgba(255,255,200,0.06) 40%,
                transparent 100%);
            clip-path: polygon(30% 100%, 70% 100%, 100% 0%, 0% 0%);
        }
        .headlight-beam.level-1 { opacity: 0.3; height: 50px; top: -50px; width: 26px; }
        .headlight-beam.level-2 { opacity: 0.5; height: 70px; top: -70px; width: 30px; }
        .headlight-beam.level-3 { opacity: 0.7; height: 95px; top: -95px; width: 36px; }
        .headlight-beam.level-4 { opacity: 1; height: 120px; top: -120px; width: 42px; }
        .smoke-puff {
            position: absolute; bottom: 0;
            border-radius: 50%;
            background: radial-gradient(circle, rgba(200,200,200,0.6), rgba(150,150,150,0.2), transparent);
            animation: smokePuff 0.8s ease-out forwards;
        }
        @keyframes smokePuff {
            0% { opacity: 0.7; transform: scale(0.3) translateY(0); }
            50% { opacity: 0.5; }
            100% { opacity: 0; transform: scale(2.5) translateY(8px); }
        }

        /* ========== מצב גשם ========== */
        .game-area.rain-mode { background: #2e3a52; }
        .game-area.rain-mode .lane-divider {
            background: repeating-linear-gradient(180deg, rgba(255,255,255,0.45) 0px, rgba(255,255,255,0.45) 20px, transparent 20px, transparent 35px);
            background-size: 3px 35px;
        }
        /* כביש רטוב */
        .wet-overlay {
            display: none; position: absolute; inset: 0; z-index: 2; pointer-events: none;
            background: linear-gradient(180deg, rgba(0,0,0,0.15) 0%, rgba(40,60,100,0.08) 30%, rgba(60,80,120,0.12) 60%, rgba(0,0,0,0.2) 100%);
        }
        .puddles {
            display: none; position: absolute; inset: 0; z-index: 3; pointer-events: none;
            background:
                radial-gradient(ellipse 80px 15px at 25% 40%, rgba(100,140,200,0.08) 0%, transparent 100%),
                radial-gradient(ellipse 60px 10px at 65% 65%, rgba(100,140,200,0.06) 0%, transparent 100%),
                radial-gradient(ellipse 90px 12px at 40% 80%, rgba(100,140,200,0.07) 0%, transparent 100%);
            animation: puddleShimmer 3s ease-in-out infinite alternate;
        }
        @keyframes puddleShimmer { 0% { opacity: 0.6; } 100% { opacity: 1; } }
        .rain-container { display: none; position: absolute; inset: 0; z-index: 60; pointer-events: none; overflow: hidden; }
        .raindrop {
            position: absolute; width: 1.5px;
            background: linear-gradient(180deg, transparent, rgba(170,200,255,0.5), rgba(170,200,255,0.15));
            border-radius: 0 0 2px 2px;
            animation: rainFall linear infinite;
        }
        @keyframes rainFall {
            0% { transform: translateY(-100%) translateX(0); opacity: 1; }
            85% { opacity: 0.6; }
            100% { transform: translateY(calc(100vh + 20px)) translateX(-8px); opacity: 0; }
        }
        .rain-splash { display: none; position: absolute; bottom: 0; left: 0; right: 0; height: 60px; z-index: 4; pointer-events: none; overflow: hidden; }
        .splash-dot {
            position: absolute; width: 3px; height: 1.5px;
            background: rgba(150,180,220,0.4); border-radius: 50%;
            animation: splashPop 0.6s ease-out infinite;
        }
        @keyframes splashPop { 0% { transform: scale(0); opacity: 0.8; } 50% { transform: scale(2.5); opacity: 0.4; } 100% { transform: scale(0); opacity: 0; } }
        .road-mist { display: none; position: absolute; bottom: 0; left: 0; right: 0; height: 80px; background: linear-gradient(0deg, rgba(100,120,160,0.15), transparent); z-index: 5; pointer-events: none; }
        .lightning-flash { position: absolute; inset: 0; z-index: 200; background: rgba(200,210,255,0.15); pointer-events: none; opacity: 0; }
        .lightning-flash.active { animation: lightningAnim 0.3s ease-out; }
        @keyframes lightningAnim { 0% { opacity: 0.7; } 10% { opacity: 0; } 15% { opacity: 0.5; } 20% { opacity: 0; } 25% { opacity: 0.3; } 100% { opacity: 0; } }

        .game-area.rain-mode .wet-overlay,
        .game-area.rain-mode .puddles,
        .game-area.rain-mode .rain-container,
        .game-area.rain-mode .rain-splash,
        .game-area.rain-mode .road-mist { display: block; }

        /* השתקפות אורות על כביש רטוב */
        .headlight-reflect {
            display: none;
            position: absolute; top: -55px; left: 50%; transform: translateX(-50%);
            width: 60px; height: 55px; pointer-events: none; z-index: -1;
            background: radial-gradient(ellipse at 50% 100%, rgba(255,255,200,0.08) 0%, rgba(255,255,200,0.03) 50%, transparent 100%);
        }
        /* התזת מים מגלגלים */
        .wheel-spray {
            display: none;
            position: absolute; bottom: -6px; width: 18px; height: 14px; pointer-events: none; z-index: -1; overflow: hidden;
        }
        .wheel-spray.left { left: -2px; }
        .wheel-spray.right { right: -2px; }
        .spray-particle {
            position: absolute; bottom: 0; width: 2px; height: 2px;
            background: rgba(170,200,240,0.4); border-radius: 50%;
            animation: sprayUp 0.35s ease-out infinite;
        }
        @keyframes sprayUp { 0% { transform: translateY(0) scale(1); opacity: 0.7; } 100% { transform: translateY(-12px) translateX(var(--sx)) scale(0.3); opacity: 0; } }
        .game-area.rain-mode .headlight-reflect,
        .game-area.rain-mode .wheel-spray { display: block; }

        /* סימני חריקה */
        .skid-mark {
            position: absolute; z-index: 8; pointer-events: none;
            animation: skidFade 2s ease-out forwards;
        }
        .skid-line {
            position: absolute; bottom: 0;
            width: 3px; height: 28px;
            background: rgba(0,0,0,0.18);
            border-radius: 1px;
        }
        .skid-line.left { left: 0; }
        .skid-line.right { right: 0; }
        @keyframes skidFade {
            0% { opacity: 1; }
            60% { opacity: 0.7; }
            100% { opacity: 0; }
        }

        .item { position: absolute; font-size: 24px; z-index: 25; line-height: 1; text-align: center; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.5)); pointer-events: none; }
        .item.diamond { animation: diamondFloat 1.5s ease-in-out infinite; }
        .item.heart-item { animation: heartPulse 1s ease-in-out infinite; }
        @keyframes diamondFloat { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
        @keyframes heartPulse { 0%,100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .item.collected { animation: collectPop 0.3s ease forwards; }
        @keyframes collectPop { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(1.8); opacity: 0; } }

        .segment-bar { position: absolute; bottom: 0; left: 0; right: 0; height: 3px; background: rgba(255,255,255,0.15); z-index: 45; }
        .segment-fill { height: 100%; background: linear-gradient(90deg, #4DB8FF, #F5C842); width: 0%; transition: width 0.3s; }
        .segment-label { position: absolute; bottom: 8px; left: 50%; transform: translateX(-50%); font-size: 11px; font-weight: 900; color: rgba(255,255,255,0.5); z-index: 46; text-shadow: 0 1px 3px rgba(0,0,0,0.5); }

        .float-text { position: absolute; z-index: 60; font-weight: 900; font-size: 18px; pointer-events: none; animation: floatUp 0.8s ease forwards; text-shadow: 0 2px 4px rgba(0,0,0,0.5); }
        @keyframes floatUp { 0% { opacity: 1; transform: translateY(0) scale(1); } 100% { opacity: 0; transform: translateY(-50px) scale(1.3); } }
        .swipe-hint {
            position: absolute; top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            font-size: 20px; font-weight: 900;
            color: white;
            background: rgba(0,0,0,0.6);
            padding: 16px 28px;
            border-radius: 20px;
            border: 2px solid rgba(245,200,66,0.4);
            z-index: 55;
            animation: hintFade 1.5s ease forwards;
            pointer-events: none;
            text-align: center;
            backdrop-filter: blur(4px);
        }
        @keyframes hintFade { 0% { opacity: 0; transform: translate(-50%,-50%) scale(0.8); } 20% { opacity: 1; transform: translate(-50%,-50%) scale(1); } 60% { opacity: 0.9; } 100% { opacity: 0; transform: translate(-50%,-50%) scale(0.95); } }
    </style>
</head>
<body>

<div class="countdown-modal" id="countdownModal">
    <div id="countdownText" class="countdown-text">🏎️</div>
</div>

<div class="result-modal" id="resultModal">
    <div class="result-box">
        <div class="result-icon" id="resultIcon">🏆</div>
        <div class="result-title" id="resultTitle"></div>
        <div class="result-sub" id="resultSub"></div>
        <div class="result-waiting" id="resultWaiting" style="display:none; font-size:0.85rem; opacity:0.6; margin-bottom:14px;"></div>
        <div class="result-buttons">
            <button class="result-btn primary" id="btnPlayAgain" onclick="playAgain()">🔄 שחק שוב</button>
            <button class="result-btn secondary" onclick="goHome()">🏠 בית</button>
        </div>
    </div>
</div>

<!-- אבני שפה — על כל המסך -->
<div class="curb-left"></div>
<div class="curb-right"></div>

<div class="stats-bar">
    <div class="stats-top">
        <div class="home-button" id="homeBtn">🏠</div>
        <div class="stats-row">
            <div class="stat-item">
                <div class="stat-label">💎 נקודות</div>
                <div class="stat-value" id="points">0</div>
            </div>
            <div class="stat-item">
                <div class="stat-label">🏆 נצחונות</div>
                <div class="wins-display" id="winsDisplay">
                    <span class="trophy dim">🏆</span><span class="trophy dim">🏆</span><span class="trophy dim">🏆</span>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-label">⚡ מהירות</div>
                <div class="speed-indicator" id="speedInd">
                    <div class="speed-level active">🟢</div>
                    <div class="speed-level">🟡</div>
                    <div class="speed-level">🟠</div>
                    <div class="speed-level">🔴</div>
                    <div class="speed-level">🟣</div>
                </div>
            </div>
            <div class="stat-item">
                <div class="stat-label">❤️ חיים</div>
                <div class="lives-display" id="livesDisplay">
                    <span class="heart">❤️</span><span class="heart">❤️</span><span class="heart">❤️</span>
                </div>
            </div>
        </div>
    </div>
    <!-- מד מסלול -->
    <div class="track-progress" id="trackProgress">
        <div class="track-progress-fill"></div>
        <div class="track-marker-start">🏁</div>
        <div class="track-marker-end">🚦</div>
        <div class="track-dot" id="dotPlayer" style="right: 2%;"></div>
        <div class="track-dot" id="dotOpponent" style="right: 2%; display: none;"></div>
    </div>
</div>

<div class="game-area" id="gameArea">
    <div class="segment-flash" id="segFlash"></div>
    <div class="race-line" id="raceLine"></div>
    <div class="segment-bar"><div class="segment-fill" id="segFill"></div></div>
    <div class="segment-label" id="segLabel">קטע 1 / 3</div>
    <!-- Rain elements (hidden by default, shown in rain-mode) -->
    <div class="wet-overlay"></div>
    <div class="puddles"></div>
    <div class="rain-container" id="rainContainer"></div>
    <div class="rain-splash" id="rainSplash"></div>
    <div class="road-mist"></div>
    <div class="lightning-flash" id="lightningFlash"></div>
</div>

<script type="module">

// ========== Multiplayer status + wins ==========
let mpStatusUnsub = null;
let mpReadyUnsub = null;
let resetPending = false;
let oppName_display = '';
let oppEmoji_display = '';
let myWins = 0;
let oppWins = 0;
const WINS_TO_SERIES = 3;

async function mpSetStatus(status) {
    if (!multiGameId) return;
    const oppId = Object.keys(window._ls || {}).find(n => n !== myName);
    if (!oppId) return;
    
    // עדכן נצחונות אם סיימתי (לא התרסקתי)
    if (status === 'finished') {
        myWins++;
        await set(ref(db, `game/race/${multiGameId}/wins_${myName}`), myWins);
        updateWins();
    }
    
    await set(ref(db, `game/race/${multiGameId}/status_${myName}`), status);
    
    const waitingEl = document.getElementById('resultWaiting');
    waitingEl.style.display = 'block';
    waitingEl.textContent = `⏳ ממתין ל-${oppEmoji_display} ${oppName_display} לסיום המרוץ...`;
    
    if (mpStatusUnsub) mpStatusUnsub();
    mpStatusUnsub = onValue(ref(db, `game/race/${multiGameId}/status_${oppId}`), async snap => {
        const oppStatus = snap.val();
        if (!oppStatus || oppStatus === 'playing') return;
        
        // היריב סיים/התרסק — עדכן נצחונות יריב
        if (oppStatus === 'finished') {
            const winsSnap = await get(ref(db, `game/race/${multiGameId}/wins_${oppId}`));
            oppWins = winsSnap.val() || 0;
        }
        
        // בדוק אם מישהו הגיע ל-5 נצחונות
        if (myWins >= WINS_TO_SERIES || oppWins >= WINS_TO_SERIES) {
            // סדרה הסתיימה!
            if (mpStatusUnsub) { mpStatusUnsub(); mpStatusUnsub = null; }
            
            const seriesWinner = myWins >= WINS_TO_SERIES;
            const winnerName = seriesWinner ? displayName : oppName_display;
            const winnerEmoji = seriesWinner ? myEmoji : oppEmoji_display;
            
            document.getElementById('resultIcon').textContent = seriesWinner ? '🏆' : '😔';
            document.getElementById('resultTitle').textContent = seriesWinner ? '🎉 ניצחת במרוץ!' : `${winnerEmoji} ${winnerName} ניצח/ה במרוץ!`;
            document.getElementById('resultSub').textContent = seriesWinner ? `${myWins} - ${oppWins} | ${points} נקודות` : `${myWins} - ${oppWins}`;
            waitingEl.style.display = 'none';
            
            // הצג כפתור "שחק שוב" — דורש הסכמה משני השחקנים
            const btn = document.getElementById('btnPlayAgain');
            btn.style.display = 'block';
            btn.textContent = '🔄 התחל מרוץ חדש';
            btn.onclick = () => mpRequestPlayAgain(oppId);
            
            // האזן אם היריב כבר לחץ
            mpListenReady(oppId);
        } else {
            // סדרה ממשיכה — reset אוטומטי (עם guard נגד כפילות)
            if (resetPending) return;
            resetPending = true;
            waitingEl.textContent = `${oppEmoji_display} ${oppName_display} סיים! (${myWins}-${oppWins}) מתחילים מחדש...`;
            
            setTimeout(() => {
                if (mpStatusUnsub) { mpStatusUnsub(); mpStatusUnsub = null; }
                remove(ref(db, `game/race/${multiGameId}/status_${myName}`));
                remove(ref(db, `game/race/${multiGameId}/status_${oppId}`));
                
                resetPending = false;
                document.getElementById('resultModal').classList.remove('show');
                resetGameState();
                startCountdown(startGame);
            }, 3000);
        }
    });
}

function mpRequestPlayAgain(oppId) {
    set(ref(db, `game/race/${multiGameId}/ready_${myName}`), true);
    const btn = document.getElementById('btnPlayAgain');
    btn.textContent = '⏳ ממתין למשחק חדש...';
    btn.disabled = true;
    
    const waitingEl = document.getElementById('resultWaiting');
    waitingEl.style.display = 'block';
    waitingEl.textContent = `⏳ ממתין ל-${oppEmoji_display} ${oppName_display}...`;
    
    mpListenReady(oppId);
}

function mpListenReady(oppId) {
    if (mpReadyUnsub) mpReadyUnsub();
    
    // האזן ל-ready של היריב
    mpReadyUnsub = onValue(ref(db, `game/race/${multiGameId}/ready_${oppId}`), snap => {
        const oppReady = snap.val();
        
        if (oppReady) {
            const waitingEl = document.getElementById('resultWaiting');
            waitingEl.textContent = `${oppEmoji_display} ${oppName_display} מוכן!`;
            
            // בדוק אם גם אני מוכן
            get(ref(db, `game/race/${multiGameId}/ready_${myName}`)).then(mySnap => {
                if (mySnap.val() && !resetPending) {
                    resetPending = true;
                    // שניהם מוכנים — התחל סדרה חדשה
                    if (mpReadyUnsub) { mpReadyUnsub(); mpReadyUnsub = null; }
                    if (mpStatusUnsub) { mpStatusUnsub(); mpStatusUnsub = null; }
                    
                    // נקה הכל
                    remove(ref(db, `game/race/${multiGameId}/ready_${myName}`));
                    remove(ref(db, `game/race/${multiGameId}/ready_${oppId}`));
                    remove(ref(db, `game/race/${multiGameId}/status_${myName}`));
                    remove(ref(db, `game/race/${multiGameId}/status_${oppId}`));
                    remove(ref(db, `game/race/${multiGameId}/wins_${myName}`));
                    remove(ref(db, `game/race/${multiGameId}/wins_${oppId}`));
                    
                    myWins = 0; oppWins = 0;
                    points = 0; pointsAtRoundStart = 0;
                    updateWins();
                    
                    document.getElementById('resultModal').classList.remove('show');
                    resetPending = false;
                    resetGameState();
                    startCountdown(startGame);
                }
            });
        } else {
            // היריב עוד לא מוכן — אם אני כבר לחצתי, תעדכן
            const waitingEl = document.getElementById('resultWaiting');
            if (document.getElementById('btnPlayAgain').disabled) {
                waitingEl.textContent = `⏳ ממתין ל-${oppEmoji_display} ${oppName_display}...`;
            }
        }
    });
}
function spawnFloatText(x,y,text,color) { const el=document.createElement('div'); el.className='float-text'; el.textContent=text; el.style.left=`${x}px`; el.style.top=`${y}px`; el.style.color=color; gameArea.appendChild(el); setTimeout(()=>el.remove(),800); }

function updateCarSpeedClass() {
    playerCarEl.classList.remove('speed-3','speed-4','speed-5');
    if (playerSpeed >= 4) playerCarEl.classList.add('speed-5');

    else if (playerSpeed >= 2) playerCarEl.classList.add('speed-3');
    updateExhaust(playerCarEl, playerSpeed); updateHeadlights(playerCarEl, playerSpeed);
}

let wobbleFrame = 0;
function applyWobble(carEl, speed) {
    if (speed <= 0) { carEl.style.transform = ''; return; }
    wobbleFrame++;
    // נדנוד: ככל שמהר יותר → אמפליטודה + תדירות גבוהים יותר
    const amplitude = 0.3 + speed * 0.2; // 0.5px - 1.3px
    const frequency = 0.08 + speed * 0.02;
    const offsetX = Math.sin(wobbleFrame * frequency) * amplitude;
    const offsetR = Math.sin(wobbleFrame * frequency * 0.7) * (0.3 + speed * 0.15); // סיבוב קל
    carEl.style.transform = `translateX(${offsetX}px) rotate(${offsetR}deg)`;
}

// ========== אנימציות כביש ==========
let roadOffset = 0;
const curbLeft = document.querySelector('.curb-left');
const curbRight = document.querySelector('.curb-right');
let laneDividers = [];

function updateRoadAnimation(speed) {
    roadOffset += speed * 1.5;
    const offset = roadOffset % 50; // 50px = cycle of curb pattern
    curbLeft.style.backgroundPositionY = `${offset}px`;
    curbRight.style.backgroundPositionY = `${offset}px`;
    const divOffset = roadOffset % 35; // 35px = cycle of lane divider pattern
    laneDividers.forEach(d => { d.style.backgroundPositionY = `${divOffset}px`; });
}

    void flash.offsetHeight;
    flash.classList.add('active');

    setTimeout(callback, 160);

}

function animateScoreCount(finalScore) {
    const el = document.getElementById('resultSub');
    const fullText = el.textContent;
    // שמור prefix לפני המספר (למשל "3 - 0 | ")
    const ptsIdx = fullText.indexOf('נקודות');
    let prefix = '';
    if (ptsIdx > 0) {
        const beforePts = fullText.substring(0, ptsIdx).trim();
        const lastSpace = beforePts.lastIndexOf(' ');
        if (lastSpace > 0) prefix = beforePts.substring(0, lastSpace + 1);
    }
    let current = pointsAtRoundStart;
    const diff = finalScore - current;
    if (diff <= 0) { el.textContent = `${prefix}${finalScore} נקודות`; return; }
    const step = Math.max(1, Math.ceil(diff / 30));
    const iv = setInterval(() => {
        current += step;
        if (current >= finalScore) { current = finalScore; clearInterval(iv); }
        el.textContent = `${prefix}${current} נקודות`;
    }, 30);
}

function startPositionSync() {
    if (!multiGameId) return;
    const myPosRef = ref(db, `game/race/${multiGameId}/pos_${myName}`);
    
    // שלח מיקום כל 80ms
    positionSyncInterval = setInterval(() => {
        if (!gameRunning) {
            if (gameFinished) {
                // שלח מיקום אחרון עם קטע סיום
                set(myPosRef, { y: Math.round(playerY), seg: currentSegment, lane: playerLane, spd: playerSpeed, t: Date.now() });
                clearInterval(positionSyncInterval); positionSyncInterval = null;
            }
            return;
        }
        set(myPosRef, {
            y: Math.round(playerY),
            seg: currentSegment,
            lane: playerLane,
            spd: playerSpeed,
            t: Date.now()
        });
    }, 80);
    
    // האזן למיקום היריב
    const oppName = Object.keys(window._ls).find(n => n !== myName);
    if (!oppName) return;
    
    const oppPosRef = ref(db, `game/race/${multiGameId}/pos_${oppName}`);
    
    // Interpolation — לחלוקה חלקה
    let targetOppY = 0, targetOppLane = oppLane;
    let lastOppSegment = 1;
    
    oppPositionUnsub = onValue(oppPosRef, snap => {
        const d = snap.val();
        if (!d) return;
        
        const newSeg = d.seg || 1;
        // אם הקטע השתנה — snap מיידי למיקום החדש (בלי interpolation)
        if (newSeg !== lastOppSegment) {
            lastOppSegment = newSeg;
            oppY = d.y || 0;
        }
        oppSegment = newSeg;
        targetOppY = d.y || 0;
        targetOppLane = d.lane !== undefined ? d.lane : oppLane;
        oppSpeed = d.spd || 0;
        
        // בדוק אם היריב סיים/התרסק — סמן אבל תן לשחקן לסיים
        if (oppSegment > TOTAL_SEGMENTS && !oppFinishedFlag) {
            oppFinishedFlag = true; // היריב סיים — השחקן ימשיך עד שיסיים
        }
    });
    
    // Smooth interpolation loop — עדכן רכב יריב בכל פריים
    let interpRunning = true;
    let oppWasVisible = false;
    let oppShowDelay = 0;
    function interpolateOpp() {
        if (!interpRunning) return;
        if (!oppCarEl) { requestAnimationFrame(interpolateOpp); return; }
        
        const isVisible = (oppSegment === currentSegment);
        
        // אם הרכב הופך לנראה עכשיו — הצב בתחתית וחכה לנתוני Firebase אמיתיים
        if (isVisible && !oppWasVisible) {
            oppY = 0; // התחל מתחתית הקטע
            targetOppY = 0;
            oppShowDelay = 8; // חכה 8 פריימים (~130ms) לקבלת מיקום אמיתי
        }
        oppWasVisible = isVisible;
        
        if (oppShowDelay > 0) {
            oppShowDelay--;
            // בזמן ההשהיה — עדכן מיקום בשקט בלי להציג
            oppY = targetOppY;
            setCarY(oppCarEl, oppY);
            if (targetOppLane !== oppLane) {
                oppLane = targetOppLane;
                moveCarToLane(oppCarEl, oppLane, null);
            }
            oppCarEl.style.display = 'none';
            requestAnimationFrame(interpolateOpp);
            return;
        }
        
        // החלקת Y
        const diff = targetOppY - oppY;
        oppY += diff * 0.15;
        
        // עדכן נתיב
        if (targetOppLane !== oppLane) {
            oppLane = targetOppLane;
            moveCarToLane(oppCarEl, oppLane, null);
        }
        
        // עדכן מיקום ונראות
        setCarY(oppCarEl, oppY);
        oppCarEl.style.display = isVisible ? 'block' : 'none';
        
        requestAnimationFrame(interpolateOpp);
    }
    requestAnimationFrame(interpolateOpp);
    
    // שמור reference לעצירת interpolation
    window._stopInterp = () => { interpRunning = false; };
}

function stopPositionSync() {
    if (positionSyncInterval) { clearInterval(positionSyncInterval); positionSyncInterval = null; }
    if (oppPositionUnsub) { oppPositionUnsub(); oppPositionUnsub = null; }
    if (window._stopInterp) { window._stopInterp(); window._stopInterp = null; }
}

// יוצר גרסה כהה מ-hex color
function darkenHex(hex, factor=0.45) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return '#' + [r,g,b].map(c => Math.round(c*factor).toString(16).padStart(2,'0')).join('');
}
function lightenHex(hex, factor=0.4) {
    const r = parseInt(hex.slice(1,3),16), g = parseInt(hex.slice(3,5),16), b = parseInt(hex.slice(5,7),16);
    return '#' + [r,g,b].map(c => Math.min(255, Math.round(c + (255-c)*factor)).toString(16).padStart(2,'0')).join('');
}

    if (u === myName) return CAR_COLORS[userData?.rawId] || CAR_COLORS.guest;
    return CAR_COLORS[u] || CAR_COLORS.guest; 
}

const CAR_HEIGHT = 65;
const CAR_HALF_W = 21;
const START_LINE_BOTTOM_PCT = 0.22;

function getCarScreenCenterY(y) {
    // מחזיר את מרכז הרכב על המסך (מלמעלה) לפי y (התקדמות)
    const startLineY = gameH * START_LINE_BOTTOM_PCT;
    const bottomPx = (startLineY - CAR_HEIGHT) + (y / gameH) * (gameH - startLineY);
    return gameH - bottomPx - CAR_HEIGHT / 2;
} // קו זינוק ב-15% מלמטה

function createCar(userId, lane, id) {
    const car = document.createElement('div'); car.className = 'car'; car.id = id;
    car.innerHTML = carSVG(userId, id);
    // להבות פליטה
    const exh = document.createElement('div');
    exh.className = 'exhaust';
    exh.innerHTML = `<div class="exhaust-flame" style="background:linear-gradient(180deg,#FFD700,#FFA040,rgba(255,0,0,0.6));animation-delay:0s"></div><div class="exhaust-flame" style="background:linear-gradient(180deg,#FFA040,#FF4500,rgba(255,0,0,0.4));animation-delay:0.04s"></div><div class="exhaust-flame" style="background:linear-gradient(180deg,#FFD700,#FFA040,rgba(255,0,0,0.6));animation-delay:0.02s"></div>`;
    car.appendChild(exh);
    // אורות לטווח רחוק
    const beam = document.createElement('div');
    beam.className = 'headlight-beam';
    car.appendChild(beam);
    // השתקפות אורות על כביש רטוב (rain only)
    const reflect = document.createElement('div');
    reflect.className = 'headlight-reflect';
    car.appendChild(reflect);
    // התזת מים מגלגלים (rain only)
    function makeSpray(side) {
        const spray = document.createElement('div');
        spray.className = `wheel-spray ${side}`;
        for (let i = 0; i < 5; i++) {
            const p = document.createElement('div');
            p.className = 'spray-particle';
            p.style.left = `${2 + Math.random() * 12}px`;
            p.style.setProperty('--sx', `${(side === 'left' ? -1 : 1) * (3 + Math.random() * 6)}px`);
            p.style.animationDelay = `${i * 0.07}s`;
            p.style.animationDuration = `${0.25 + Math.random() * 0.15}s`;
            spray.appendChild(p);
        }
        return spray;
    }
    car.appendChild(makeSpray('left'));
    car.appendChild(makeSpray('right'));
    car.style.left = `${getLaneCenter(lane)-CAR_HALF_W}px`;
    const startLineY = gameH * START_LINE_BOTTOM_PCT;
    car.style.bottom = `${startLineY - CAR_HEIGHT}px`;
    gameArea.appendChild(car); return car;
}

function updateExhaust(carEl, speed) {
    const exh = carEl.querySelector('.exhaust');
    if (!exh) return;
    exh.classList.remove('active','level-1','level-2','level-3','level-4');
    if (speed >= 1) {
        exh.classList.add('active', `level-${Math.min(speed, 4)}`);
    }
}

function updateHeadlights(carEl, speed) {
    const beam = carEl.querySelector('.headlight-beam');
    if (!beam) return;
    beam.classList.remove('level-1','level-2','level-3','level-4');
    if (isRainMode) {
        // גשם — אור קבוע מקסימלי תמיד
        beam.classList.add('level-4');
    } else {
        // רגיל — אור קבוע level-2
        beam.classList.add('level-2');
    }
}

// ========== הגדרת מזג אוויר ==========
function setupWeather() {
    isRainMode = Math.random() < 0.5;
    if (isRainMode) {
        gameArea.classList.add('rain-mode');
        // יצירת טיפות גשם
        const rainContainer = document.getElementById('rainContainer');
        rainContainer.innerHTML = '';
        for (let i = 0; i < 120; i++) {
            const drop = document.createElement('div');
            drop.className = 'raindrop';
            drop.style.left = `${Math.random() * 100}%`;
            drop.style.height = `${14 + Math.random() * 22}px`;
            drop.style.animationDuration = `${0.3 + Math.random() * 0.35}s`;
            drop.style.animationDelay = `${Math.random() * 1}s`;
            drop.style.opacity = 0.3 + Math.random() * 0.4;
            rainContainer.appendChild(drop);
        }
        // התזות
        const rainSplash = document.getElementById('rainSplash');
        rainSplash.innerHTML = '';
        for (let i = 0; i < 30; i++) {
            const splash = document.createElement('div');
            splash.className = 'splash-dot';
            splash.style.left = `${14 + Math.random() * (gameW - 28)}px`;
            splash.style.bottom = `${Math.random() * 50}px`;
            splash.style.animationDelay = `${Math.random() * 0.6}s`;
            splash.style.animationDuration = `${0.4 + Math.random() * 0.3}s`;
            rainSplash.appendChild(splash);
        }
        // ברקים
        triggerLightning();
    } else {
        gameArea.classList.remove('rain-mode');
        if (lightningTimeout) { clearTimeout(lightningTimeout); lightningTimeout = null; }
    }
}

function triggerLightning() {
    if (!isRainMode) return;
    const flash = document.getElementById('lightningFlash');
    flash.classList.remove('active');
    void flash.offsetHeight;
    flash.classList.add('active');
    setTimeout(() => flash.classList.remove('active'), 400);
    lightningTimeout = setTimeout(triggerLightning, 4000 + Math.random() * 8000);
}
let tiltActive = false;
function moveCarToLane(carEl, lane, dir) {
    // סימני חריקה — לפני שהרכב זז
    if (dir && carEl === playerCarEl && gameRunning) {
        spawnSkidMark(carEl, dir);
    }
    carEl.style.left = `${getLaneCenter(lane)-CAR_HALF_W}px`;
    if (dir && carEl === playerCarEl) {
        tiltActive = true;
        const tiltDeg = dir < 0 ? -15 : 15;
        const tiltX = dir * 3;
        carEl.style.transform = `rotate(${tiltDeg}deg) translateX(${tiltX}px) translateY(-5px)`;
        carEl.style.transition = 'left 0.2s cubic-bezier(0.25,0.46,0.45,0.94), bottom 0.05s linear, transform 0.2s ease, filter 0.2s ease';
        if (tiltTimeout) clearTimeout(tiltTimeout);
        tiltTimeout = setTimeout(() => { tiltActive = false; }, 200);
    }
}

function spawnSkidMark(carEl, dir) {
    const mark = document.createElement('div');
    mark.className = 'skid-mark';
    // מיקום — מרכז הרכב הנוכחי
    const carLeft = parseFloat(carEl.style.left);
    const carBottom = parseFloat(carEl.style.bottom);
    const tiltDeg = dir < 0 ? -8 : 8;
    mark.style.left = `${carLeft + 8}px`;
    mark.style.bottom = `${carBottom - 2}px`;
    mark.style.width = '26px';
    mark.style.height = '28px';
    mark.style.transform = `rotate(${tiltDeg}deg)`;
    // שני פסים — גלגל שמאל וימין
    const lineL = document.createElement('div');
    lineL.className = 'skid-line left';
    const lineR = document.createElement('div');
    lineR.className = 'skid-line right';
    mark.appendChild(lineL);
    mark.appendChild(lineR);
    gameArea.appendChild(mark);
    setTimeout(() => mark.remove(), 2100);
}

function setCarY(carEl, y) {
    // y=0 = מתחת לקו זינוק, y עולה = רכב עולה
    const startLineY = gameH * START_LINE_BOTTOM_PCT;
    const bottomPx = (startLineY - CAR_HEIGHT) + (y / gameH) * (gameH - startLineY);
    carEl.style.bottom = `${bottomPx}px`;
}

// ========== אייטמים ==========
// ערבוב מערך (Fisher-Yates)
function shuffle(arr) {
    const a = [...arr];
    for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
    }
    return a;
}

function initHeartSegments() {
    // בחר 2 קטעים שונים מ-2,3,4 (לא קטע 1)
    const available = [];
    for (let s = 2; s <= TOTAL_SEGMENTS; s++) available.push(s);
    const shuffled = shuffle(available);
    heartSegments = shuffled.slice(0, MAX_HEARTS_TOTAL);
}

// יצירת נתוני אייטמים (בלי DOM)
function generateItemsData() {
    let minY, maxY;
    if (currentSegment === 1) { minY = gameH * 0.05; maxY = gameH * 0.72; }
    else if (currentSegment === TOTAL_SEGMENTS) { minY = gameH * 0.10; maxY = gameH * 0.65; }
    else { minY = gameH * 0.05; maxY = gameH * 0.68; }
    
    // יצור רשימה קבועה מעורבבת
    let itemList = shuffle(SEGMENT_ITEMS);
    
    // הוסף לב אם הקטע הנוכחי ברשימה
    if (heartSegments.includes(currentSegment)) {
        itemList.push({ type: 'heart', emoji: '❤️‍🔥' });
    }
    
    const MIN_DIST = 50;
    const placed = [];
    const data = [];
    
    for (let i = 0; i < itemList.length; i++) {
        const def = itemList[i];
        let lane, yPos, attempts = 0;
        do {
            lane = Math.floor(Math.random() * LANE_COUNT);
            yPos = Math.round(minY + Math.random() * (maxY - minY));
            attempts++;
        } while (attempts < 40 && placed.some(p => p.lane === lane && Math.abs(p.y - yPos) < MIN_DIST));
        placed.push({ lane, y: yPos });
        data.push({ lane, type: def.type, emoji: def.emoji, yPos, collected: false });
    }
    return data;
}

// רינדור אייטמים מנתונים
function renderItems(data) {
    items.forEach(it => it.el.remove());
    items = [];
    for (const d of data) {
        if (d.collected) continue;
        const el = document.createElement('div');
        let cls = 'item';
        if (d.type === 'diamond') cls += ' diamond';
        else if (d.type === 'heart') cls += ' heart-item';
        el.className = cls;
        el.textContent = d.emoji;
        el.style.left = `${getLaneCenter(d.lane) - 12}px`;
        el.style.top = `${d.yPos}px`;
        gameArea.appendChild(el);
        items.push({ el, lane: d.lane, type: d.type, yPos: d.yPos, collected: false });
    }
}

// AI/Solo: יצור + רינדור מקומי
function spawnSegmentItems() {
    const data = generateItemsData();
    renderItems(data);
}

// Multiplayer: שמירה/קריאה מ-Firebase
let multiGameId = null;
let multiAmFirst = false;
let itemsListenerUnsub = null;

async function mpSaveItems(segment) {
    const data = generateItemsData();
    await set(ref(db, `game/race/${multiGameId}/items_${segment}`), data);
    renderItems(data);
}

function mpListenItems(segment) {
    if (itemsListenerUnsub) itemsListenerUnsub();
    itemsListenerUnsub = onValue(ref(db, `game/race/${multiGameId}/items_${segment}`), snap => {
        const data = snap.val();
        if (!data) return;
        // אם עדיין אין אלמנטים (טעינה ראשונית) — רנדר
        // לא מסנכרנים collected — כל שחקן אוסף עצמאית
        if (items.length === 0 && data.length > 0) {
            renderItems(data);
        }
    });
}

async function mpCollectItem(index) {

    // כל שחקן מתמודד עם האייטמים שלו עצמאית
}

async function mpSpawnSegmentItems() {
    // בדוק אם כבר יש אייטמים לקטע הזה
    const snap = await get(ref(db, `game/race/${multiGameId}/items_${currentSegment}`));
    if (!snap.val()) {
        // אין — אני יוצר (מי שמגיע ראשון לקטע)

}

function freezePlayer(sec) { frozen=true; frozenUntil=Date.now()+sec*1000; playerCarEl.classList.add('frozen'); setTimeout(()=>{frozen=false;playerCarEl.classList.remove('frozen');},sec*1000); }
function freezeAI(sec) { aiFrozen=true; aiFrozenUntil=Date.now()+sec*1000; aiCarEl.classList.add('frozen'); setTimeout(()=>{aiFrozen=false;aiCarEl.classList.remove('frozen');},sec*1000); }

// ========== Game loop ==========
function gameLoop() {
    if (!gameRunning) return;
    const isFrozen = frozen && Date.now() < frozenUntil;
    const speed = isFrozen ? 0 : SPEEDS[playerSpeed];

    // אנימציית כביש
    updateRoadAnimation(speed);

    // קו זינוק — נע למטה ונעלם (רק בקטע 1)
    if (currentSegment === 1) {
        const line = document.getElementById('raceLine');
        const startBottom = gameH * START_LINE_BOTTOM_PCT;
        const lineBottom = startBottom - (playerY / gameH) * startBottom * 2.5;
        line.style.bottom = `${lineBottom}px`;
        if (lineBottom < -20) line.classList.add('hidden');
    }

    // קו סיום — יורד מלמעלה לכיוון הרכב (רק בקטע אחרון)
    let finishLineMet = false;
    if (currentSegment === TOTAL_SEGMENTS) {
        const line = document.getElementById('raceLine');
        const progress = Math.min(playerY / gameH, 1);
        const targetTop = gameH * 0.60;
        const lineTop = -20 + progress * (targetTop + 20);
        line.style.top = `${lineTop}px`;
        line.style.bottom = 'auto';
        
        // בדוק מפגש — הקצה העליון של הרכב פוגש את קו הסיום
        const carTopOnScreen = getCarScreenCenterY(playerY) - CAR_HEIGHT / 2;
        if (carTopOnScreen <= lineTop + 14 && playerY > 10) {
            finishLineMet = true;
        }
    }

    if (!isFrozen && !playerTransitioning) playerY += speed;
    setCarY(playerCarEl, playerY);
    
    // נדנוד רכב (רק אם לא בהטיה)
    if (!tiltActive && !isFrozen) applyWobble(playerCarEl, speed);

    // התנגשויות
    const carCX = getLaneCenter(playerLane);
    const carSY = getCarScreenCenterY(playerY);
    for (let i=0;i<items.length;i++) {
        const it=items[i]; if (it.collected) continue;
        const dx=carCX-getLaneCenter(it.lane); const dy=carSY-(it.yPos+13);
        if (Math.sqrt(dx*dx+dy*dy)<HIT_RADIUS) {
            if (it.type==='boost' && playerSpeed >= 4) continue;
            if (it.type==='heart' && lives >= 3) continue;
            it.collected=true;
            if (multiGameId) mpCollectItem(i);
            const fx=parseFloat(it.el.style.left)+12; const fy=it.yPos;
            if (it.type==='diamond') { points+=10; updatePoints(true); spawnFloatText(fx,fy,'+10 💎','#58D9F5'); }
            else if (it.type==='boost') { if (playerSpeed<4) { playerSpeed++; updateSpeed(true); updateCarSpeedClass(); } spawnFloatText(fx,fy,'⚡ מהירות!','#FFD700'); }
            else if (it.type==='heart') { lives++; updateLives(-1); spawnFloatText(fx,fy,'+❤️','#FF4444'); }
            else if (it.type==='bomb') { lives--; updateLives(lives); if (playerSpeed>0){playerSpeed=0;updateSpeed(false);updateCarSpeedClass();} else {freezePlayer(0.5);} playerCarEl.classList.add('flash');setTimeout(()=>playerCarEl.classList.remove('flash'),450); shakeScreen(); if(navigator.vibrate)navigator.vibrate(100); spawnFloatText(fx,fy,'💥 פצצה!','#FF4444'); if (lives<=0){stopGame();showResult('💥','התרסקת!',`${points} נקודות`);return;} }
            else if (it.type==='rock') { if (playerSpeed>0){playerSpeed--;updateSpeed(false);updateCarSpeedClass();} else {freezePlayer(0.5);} playerCarEl.classList.add('flash');setTimeout(()=>playerCarEl.classList.remove('flash'),450); shakeScreen(); if(navigator.vibrate)navigator.vibrate(50); spawnFloatText(fx,fy,'🪨 אבן!','#AAA'); }
            it.el.classList.add('collected'); setTimeout(()=>it.el.remove(),300);
        }
    }

    // סיום קטע
    if (finishLineMet && !playerTransitioning) {
        // קטע אחרון — הרכב חצה את קו הסיום!
        stopGame();
        if ((mode === 'ai' && aiFinished) || (multiGameId && oppFinishedFlag)) {
            showResult('😔', 'הפסדת', `${points} נקודות`);
        } else {
            showResult('🏆', `🏁 ${myEmoji} ${displayName} 🏆`, `${points} נקודות`);
        }
        return;
    }
    if (playerY>=gameH && !playerTransitioning) {
        if (currentSegment + 1 > TOTAL_SEGMENTS) {
            // fallback — אם בכל זאת הגענו לסוף בלי מפגש (לא אמור לקרות)
            stopGame();
            if ((mode === 'ai' && aiFinished) || (multiGameId && oppFinishedFlag)) {
                showResult('😔', 'הפסדת', `${points} נקודות`);
            } else {
                showResult('🏆', `🏁 ${myEmoji} ${displayName} 🏆`, `${points} נקודות`);
            }
            return;
        }
        // מעבר קטע עם הבזק — AI ממשיך לנוע
        playerTransitioning = true;
        flashSegmentTransition(() => {
            playerY = 0; currentSegment++;
            positionRaceLine();
            if (multiGameId) mpSpawnSegmentItems(); else spawnSegmentItems();
            setCarY(playerCarEl, 0);
            updateSegmentUI();
            playerTransitioning = false;
        });
    }
    updateSegmentUI();

    // AI
    if (mode==='ai' && aiCarEl) {
        const aiIsFrozen = aiFrozen && Date.now() < aiFrozenUntil;
        const aiSpd = aiIsFrozen ? 0 : SPEEDS[aiSpeed];
        
        if (!aiIsFrozen) aiY += aiSpd;
        setCarY(aiCarEl, aiY);
        
        // AI התנגשויות — רק אם באותו קטע כמו השחקן (אותם אייטמים)
        if (aiSegment === currentSegment && !aiIsFrozen) {
            const aiCX = getLaneCenter(aiLane);
            const aiSY = getCarScreenCenterY(aiY);
            
            for (let i = 0; i < items.length; i++) {
                const it = items[i];
                if (it.collected) continue;
                const dx = aiCX - getLaneCenter(it.lane);
                const dy = aiSY - (it.yPos + 13);
                if (Math.sqrt(dx*dx + dy*dy) < HIT_RADIUS) {
                    if (it.type === 'boost' && aiSpeed >= 4) continue; // מהירות מקסימלית — דלג
                    it.collected = true;
                    const fx = parseFloat(it.el.style.left) + 12;
                    const fy = it.yPos;
                    
                    if (it.type === 'diamond') {
                        // AI לא מקבל נקודות
                    } else if (it.type === 'heart') {
                        // AI אוסף לב — אין השפעה אבל נעלם
                    } else if (it.type === 'boost') {
                        if (aiSpeed < 4) aiSpeed++;
                        aiBoostCooldownUntil = Date.now() + 2000;
                        updateExhaust(aiCarEl, aiSpeed); updateHeadlights(aiCarEl, aiSpeed);
                        spawnFloatText(fx, fy, '⚡', '#FFD700');
                    } else if (it.type === 'bomb') {
                        if (aiSpeed > 0) { aiSpeed = 0; } else { freezeAI(0.5); }
                        updateExhaust(aiCarEl, aiSpeed); updateHeadlights(aiCarEl, aiSpeed);
                        aiCarEl.classList.add('flash');
                        setTimeout(() => aiCarEl.classList.remove('flash'), 450);
                        spawnFloatText(fx, fy, '💥', '#FF4444');
                    } else if (it.type === 'rock') {
                        if (aiSpeed > 0) { aiSpeed--; } else { freezeAI(0.5); }
                        updateExhaust(aiCarEl, aiSpeed); updateHeadlights(aiCarEl, aiSpeed);
                        aiCarEl.classList.add('flash');
                        setTimeout(() => aiCarEl.classList.remove('flash'), 450);
                        spawnFloatText(fx, fy, '🪨', '#AAA');
                    }
                    
                    it.el.classList.add('collected');
                    setTimeout(() => it.el.remove(), 300);
                }
            }
        }
        
        // AI חכם — ראייה קדימה: התחמקות ממכשולים + איסוף ברקים (50% סיכוי)
        if (!aiIsFrozen && aiMoveCooldown <= 0) {
            const aiScreenY = getCarScreenCenterY(aiY);
            const LOOK_AHEAD = 150;
            
            // סרוק נתיב — מחזיר {threat, hasBoost}
            function scanLane(lane) {
                let threat = null;
                let hasBoost = false;
                for (const it of items) {
                    if (it.collected || it.lane !== lane) continue;
                    const dy = aiScreenY - (it.yPos + 13);
                    if (dy > 0 && dy < LOOK_AHEAD) {
                        if (it.type === 'bomb') threat = 'bomb';
                        else if (it.type === 'rock' && threat !== 'bomb') threat = 'rock';
                        else if (it.type === 'boost') hasBoost = true;
                    }
                }
                return { threat, hasBoost };
            }
            
            const current = scanLane(aiLane);
            let moved = false;
            
            if (current.threat) {
                // יש מכשול — התחמק
                const leftLane = aiLane - 1;
                const rightLane = aiLane + 1;
                const left = leftLane >= 0 ? scanLane(leftLane) : { threat: 'wall', hasBoost: false };
                const right = rightLane < LANE_COUNT ? scanLane(rightLane) : { threat: 'wall', hasBoost: false };
                
                function dangerScore(t) { if (!t) return 0; if (t==='rock') return 1; if (t==='bomb') return 2; return 3; }
                
                const stayD = dangerScore(current.threat);
                const leftD = dangerScore(left.threat);
                const rightD = dangerScore(right.threat);
                
                let bestLane = aiLane;
                let bestScore = stayD * 10;
                
                if (leftLane >= 0) {
                    let ls = leftD * 10 - (left.hasBoost ? 3 : 0);
                    if (ls < bestScore) { bestScore = ls; bestLane = leftLane; }
                }
                if (rightLane < LANE_COUNT) {
                    let rs = rightD * 10 - (right.hasBoost ? 3 : 0);
                    if (rs < bestScore) { bestScore = rs; bestLane = rightLane; }
                }
                
                if (bestLane !== aiLane) { aiLane = bestLane; moveCarToLane(aiCarEl, aiLane, null); moved = true; }
                
            } else if (Math.random() < 0.2 && Date.now() > aiBoostCooldownUntil) {
                // אין מכשול — חפש ברק בנתיב צמוד (20% סיכוי, לא בזמן cooldown)
                let bestBoostLane = -1;
                let bestBoostDist = 999;
                
                for (let offset = -2; offset <= 2; offset++) {
                    if (offset === 0) continue;
                    const checkLane = aiLane + offset;
                    if (checkLane < 0 || checkLane >= LANE_COUNT) continue;
                    const scan = scanLane(checkLane);
                    if (scan.hasBoost && !scan.threat && Math.abs(offset) < bestBoostDist) {
                        bestBoostDist = Math.abs(offset);
                        bestBoostLane = checkLane;
                    }
                }
                
                if (bestBoostLane >= 0) {
                    const step = bestBoostLane > aiLane ? 1 : -1;
                    const nextLane = aiLane + step;
                    if (nextLane >= 0 && nextLane < LANE_COUNT && !scanLane(nextLane).threat) {
                        aiLane = nextLane;
                        moveCarToLane(aiCarEl, aiLane, null);
                        moved = true;
                    }
                }
            }
            
            // cooldown אחרי תזוזה — 10 פריימים (~170ms)
            if (moved) aiMoveCooldown = 10;
        }
        if (aiMoveCooldown > 0) aiMoveCooldown--;
        
        // סיום קטע AI
        if (aiY >= gameH) {
            aiY = 0; aiSegment++;
            if (aiSegment > TOTAL_SEGMENTS && !aiFinished) {
                aiFinished = true;
                // AI סיים — לא עוצר את המשחק, ממתין לשחקן
            }
        }
        
        // נראות — רק אם באותו קטע
        aiCarEl.style.display = (aiSegment === currentSegment) ? 'block' : 'none';
    }

    updateTrackDots();
    animFrameId = requestAnimationFrame(gameLoop);
}

function stopGame() { 
    gameRunning=false; 
    if (animFrameId){cancelAnimationFrame(animFrameId);animFrameId=null;} 
    // המשך אנימציית רקע — כביש וניענוע רכב במהירות מקסימלית
    startBgAnimation();
}

let bgAnimId = null;
let bgWobble = 0;
function startBgAnimation() {
    if (bgAnimId) return;
    const maxSpeed = SPEEDS[SPEEDS.length - 1]; // מהירות מקסימלית תמיד
    // הפעל להבות מקסימליות
    if (playerCarEl) {
        updateExhaust(playerCarEl, 4);
        updateHeadlights(playerCarEl, 4);
    }
    function bgLoop() {
        bgWobble++;
        updateRoadAnimation(maxSpeed);
        // ניענוע רכב
        if (playerCarEl) {
            const ox = Math.sin(bgWobble * 0.07) * 0.5;
            const or = Math.sin(bgWobble * 0.05) * 0.4;
            playerCarEl.style.transform = `translateX(${ox}px) rotate(${or}deg)`;
        }
        bgAnimId = requestAnimationFrame(bgLoop);
    }
    bgLoop();
}

function stopBgAnimation() {
    if (bgAnimId) { cancelAnimationFrame(bgAnimId); bgAnimId = null; }
}

// ========== Countdown ==========
function startCountdown(cb) {
    const modal=document.getElementById('countdownModal'); const text=document.getElementById('countdownText');
    modal.classList.remove('hidden'); text.textContent='🏎️ מוכנים?'; text.className='countdown-text';
    let count=2;
    const iv=setInterval(()=>{
        if (count>0){text.textContent=count;text.className='countdown-text';text.style.animation='none';text.offsetHeight;text.style.animation='';count--;}
        else if (count===0){text.textContent='🏁 סעו!';text.className='countdown-text go';count--;}
        else{clearInterval(iv);modal.classList.add('hidden');cb();}
    },1000);
}
function startGame() {
    stopBgAnimation();
    gameRunning=true; positionRaceLine(); updateSegmentUI(); updateTrackDots(); updateWins();
    // הדלק אורות
    updateHeadlights(playerCarEl, 0);
    if (aiCarEl) updateHeadlights(aiCarEl, 0);
    if (oppCarEl) updateHeadlights(oppCarEl, 0);
    // עשן סטארט
    spawnTireSmoke(playerCarEl);
    if (aiCarEl) spawnTireSmoke(aiCarEl);
    if (oppCarEl) spawnTireSmoke(oppCarEl);
    const hint=document.createElement('div'); hint.className='swipe-hint'; hint.innerHTML='👆 החליקו ימינה ושמאלה<br>כדי להזיז את הרכב';
    gameArea.appendChild(hint); setTimeout(()=>hint.remove(),1500);
    gameLoop();
}

function spawnTireSmoke(carEl) {
    if (!carEl) return;
    const smoke = document.createElement('div');
    smoke.className = 'tire-smoke';
    // יצירת 6 עיגולי עשן בפיזור
    for (let i = 0; i < 6; i++) {
        const puff = document.createElement('div');
        puff.className = 'smoke-puff';
        const size = 10 + Math.random() * 14;
        puff.style.width = `${size}px`;
        puff.style.height = `${size}px`;
        puff.style.left = `${5 + Math.random() * 35}px`;
        puff.style.animationDelay = `${i * 0.08}s`;
        puff.style.animationDuration = `${0.6 + Math.random() * 0.4}s`;
        smoke.appendChild(puff);
    }
    carEl.appendChild(smoke);
    setTimeout(() => smoke.remove(), 1200);
}

// ========== Swipe ==========
let touchStartX=0, touchStartTime=0;
gameArea.addEventListener('touchstart', e=>{touchStartX=e.touches[0].clientX;touchStartTime=Date.now();},{passive:true});
gameArea.addEventListener('touchend', e=>{
    if (!gameRunning||frozen) return;
    const diff=e.changedTouches[0].clientX-touchStartX;
    if (Date.now()-touchStartTime<300&&Math.abs(diff)>25) {
        const dir = diff < 0 ? -1 : 1;
        if (dir<0&&playerLane>0){playerLane--;moveCarToLane(playerCarEl,playerLane,dir);}
        else if (dir>0&&playerLane<LANE_COUNT-1){playerLane++;moveCarToLane(playerCarEl,playerLane,dir);}
    }
},{passive:true});

// ========== Init ==========
async function init() {
    calcDimensions(); buildLaneDividers(); buildRaceLine(); setupTrackDots(); initHeartSegments();
    setupWeather();
    const existingSnap=await get(ref(db,roomPath)); const existingData=existingSnap?.val();
    myJoinedAt=existingData?.joinedAt||Date.now();
    await set(ref(db,roomPath),{name:displayName,color:myColor,emoji:myEmoji,joinedAt:myJoinedAt,timestamp:Date.now(),active:true});
    startHeartbeat();

    if (mode==='ai') {
        playerLane=3; aiLane=1;
        playerCarEl=createCar(myName,playerLane,'playerCar');
        aiCarEl=createCar('ai',aiLane,'aiCar');
        positionRaceLine(); spawnSegmentItems();
        startCountdown(startGame);
    } else {
        playerLane=3; playerCarEl=createCar(myName,playerLane,'playerCar');
        window._ls={}; let lastCount=0;
        roomListenerUnsubscribe=onValue(roomRef, async snap=>{
            const players=snap.val()||{}; const names=Object.keys(players).sort((a,b)=>(players[a].joinedAt||0)-(players[b].joinedAt||0));
            if (lastCount===2&&names.length<2){let n='',e='';for(const[id,p]of Object.entries(window._ls)){if(!players[id]){n=p.name||'';e=p.emoji||'';break;}}handleOpponentLeft(n,e);return;}
            window._ls=players; lastCount=names.length;
            if (names.length===2&&!gameRunning&&!gameFinished) {
                // מנע הפעלה כפולה — countdown כבר רץ
                if (window._mpStarted) return;
                window._mpStarted = true;
                
                multiAmFirst = names[0]===myName;
                playerLane = multiAmFirst ? 3 : 1;
                oppLane = multiAmFirst ? 1 : 3;
                multiGameId = `${names[0]}_${names[1]}`;
                
                // נקה נתונים ישנים מ-Firebase (reconnect / משחק קודם)
                if (multiAmFirst) {
                    const cleanups = [];
                    for (let s = 1; s <= TOTAL_SEGMENTS; s++) {
                        cleanups.push(remove(ref(db, `game/race/${multiGameId}/items_${s}`)));
                    }
                    cleanups.push(remove(ref(db, `game/race/${multiGameId}/status_${names[0]}`)));
                    cleanups.push(remove(ref(db, `game/race/${multiGameId}/status_${names[1]}`)));
                    cleanups.push(remove(ref(db, `game/race/${multiGameId}/ready_${names[0]}`)));
                    cleanups.push(remove(ref(db, `game/race/${multiGameId}/ready_${names[1]}`)));
                    cleanups.push(remove(ref(db, `game/race/${multiGameId}/pos_${names[0]}`)));
                    cleanups.push(remove(ref(db, `game/race/${multiGameId}/pos_${names[1]}`)));
                    await Promise.all(cleanups);
                } else {
                    // שחקן 2 — חכה שהמחיקה תסתיים (נותן לשחקן 1 רגע)
                    await new Promise(r => setTimeout(r, 300));
                }
                
                moveCarToLane(playerCarEl,playerLane,null);
                
                // יצור רכב יריב — עם הצבע של היריב
                const oppId = names.find(n=>n!==myName);
                if (oppId && players[oppId]) {
                    oppName_display = players[oppId].name || oppId;
                    oppEmoji_display = players[oppId].emoji || '🏎️';
                    const oppColor = players[oppId].color || '#4DB8FF';
                    
                    dotOpponent.style.display='block';
                    dotOpponent.style.background = oppColor;
                    dotOpponent.style.borderColor = oppColor;
                    
                    if (!oppCarEl) {
                        oppCarEl = createCar(oppColor, oppLane, 'oppCar');
                    } else {
                        moveCarToLane(oppCarEl, oppLane, null);
                    }
                    setCarY(oppCarEl, 0); // מקם את רכב היריב בקו הזינוק
                }
                
                startOpponentCheck();
                
                // הצג קו זינוק ואלמנטים לפני הספירה
                positionRaceLine();
                await mpSpawnSegmentItems();
                
                // התחל סנכרון מיקום
                startPositionSync();
                
                startCountdown(startGame);
            }
        });
    }
}
init();
</script>

</html>
