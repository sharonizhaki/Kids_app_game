<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>סטטיסטיקות</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./css/styles.css?v=8">
  <link rel="stylesheet" href="./css/bg-floaters.css?v=8">
</head>
<body>

<div id="screen-splash" class="screen active visible" style="justify-content:center;min-height:100vh;">
  <div style="text-align:center;">
    <div style="font-size:3.5rem;margin-bottom:16px;">📊</div>
    <div class="spinner-lg" style="width:40px;height:40px;border:4px solid var(--border);border-top-color:var(--primary);border-radius:50%;animation:spin 0.8s linear infinite;margin:0 auto 14px;"></div>
    <p style="font-weight:700;color:var(--muted);">טוען...</p>
  </div>
</div>
<script>if(sessionStorage.getItem('parentNav')==='1'){sessionStorage.removeItem('parentNav');document.getElementById('screen-splash').style.display='none';}</script>

<div id="screen-stats" class="screen">
  <div class="screen-header">
    <button class="back-btn" id="btn-back-stats">→</button>
    <h2>סטטיסטיקות 📊</h2>
  </div>

  <div class="filter-scroll" style="max-width:480px;width:100%;margin-bottom:16px;">
    <span class="filter-chip stats-period-chip active" data-period="week">📅 השבוע</span>
    <span class="filter-chip stats-period-chip" data-period="month">🗓️ החודש</span>
    <span class="filter-chip stats-period-chip" data-period="all">📋 הכל</span>
  </div>

  <div id="stats-content" style="width:100%;max-width:480px;"></div>
</div>

<div class="toast" id="toast"></div>
<script type="module" src="./js/main-stats.js?v=8"></script>
<script src="./js/bg-floaters.js?v=8"></script>
</body>
</html>
