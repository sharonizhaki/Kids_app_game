// ========== סוף סיבוב ==========
function endRound(winner) {
  if (!gameState || gameState.gameOver) return;
  gameState.gameOver = true; gameState.winner = winner;
  gameRunning = false;

  if (isSoloMode) {
    // סולו - ישר למודאל
    if (winner === 'p1') {
      // ניצחון שלב/סופי
      launchConfetti(p1Color);
    }
    setTimeout(() => showMatchModal(winner), 800);
    return;
  }

  if (winner === 'p1') p1Wins++; else p2Wins++;
  roundNum++;
  gameState.p1Wins = p1Wins; gameState.p2Wins = p2Wins; gameState.roundNum = roundNum;
  gameState.rematchP1 = false; gameState.rematchP2 = false;
  if (isAIMode) saveProgress();
  syncFullState();
  handleRoundEnd(winner, true);
}

function handleRoundEnd(winner, isLocal) {
  gameRunning = false;
  // כל שחקן רואה את עצמו ב-card-p1
  document.getElementById('wins-p1').textContent = isP1 ? p1Wins : p2Wins;
  document.getElementById('wins-p2').textContent = isP1 ? p2Wins : p1Wins;

  const winnerName = winner === 'p1' ? p1DisplayName : p2DisplayName;
  const winnerColor = winner === 'p1' ? p1Color : p2Color;
  const winnerEmoji = winner === 'p1' ? p1Emoji : p2Emoji;

  // Check if match is over (best of 3)
  const matchOver = p1Wins >= WINS_NEEDED || p2Wins >= WINS_NEEDED;

  if (matchOver) {
    // Show match winner modal after a brief delay
    if (isLocal || true) launchConfetti(winnerColor);
    setTimeout(() => showMatchModal(winner), 800);
  } else {
    // בין סיבובים - מודאל עם כפתור המשך + בית
    if (isAIMode) {
      showRoundEndModal(winnerName, winnerEmoji, winnerColor);
    } else {
      // מולטי - באנר ישן + אוטומטי
      showRoundBanner(winnerName, winnerEmoji, winnerColor);
      if (isP1) {
        setTimeout(() => startNextRound(), 2500);
      }
    }
  }
}

function showRoundBanner(name, emoji, color) {
  const banner = document.getElementById('round-banner');
  banner.style.display = 'block';
  banner.style.color = color;
  banner.style.borderColor = color;

}

function startNextRound() {
  if (!gameState) return;
  dyingBricks = []; particles = []; ballTrail = [];

  effects.p2 = { magnet: 0, meteor: 0, shrunk: 0, reversed: 0, shields: [], frozen: 0, fog: 0 };
  effects.shared = { ghost: 0 };
  effects.shieldHitAnim = { p1: [], p2: [] };

  const bottomBricks = generateBricks(BRICK_ROWS, FIELD_H - 30, false);

    // Multiplayer - need mutual consent
    btnsDiv.innerHTML = `
      <button class="mbtn mbtn-primary" id="btn-rematch">🔄 שחק שוב</button>
      <button class="mbtn mbtn-secondary" onclick="goHome()">🏠 חזרה לתפריט</button>
    `;
    document.getElementById('match-modal').style.display = 'flex';

    document.getElementById('btn-rematch').onclick = () => {
      // Signal my rematch wish
      const key = isP1 ? 'rematchP1' : 'rematchP2';
      update(gameStateRef, { [key]: true });

      // Check if opponent already agreed
      const otherKey = isP1 ? 'rematchP2' : 'rematchP1';
      if (gameState && gameState[otherKey]) {
        // Both ready
        document.getElementById('match-modal').style.display = 'none';
        if (isP1) startNewMatch();
      } else {
        // Wait for opponent
        const btn = document.getElementById('btn-rematch');
        btn.className = 'mbtn mbtn-waiting';
        btn.textContent = '⏳ ממתין להסכמה...';
        btn.onclick = null;
      }
    };
  }
}

function startNewMatch() {
  p1Wins = 0; p2Wins = 0; roundNum = 0;
  dyingBricks = []; particles = []; ballTrail = [];
  effects.p1 = { magnet: 0, meteor: 0, shrunk: 0, reversed: 0, shields: [], frozen: 0, fog: 0 };
  effects.p2 = { magnet: 0, meteor: 0, shrunk: 0, reversed: 0, shields: [], frozen: 0, fog: 0 };
  effects.shared = { ghost: 0 };
  effects.shieldHitAnim = { p1: [], p2: [] };

  if (isSoloMode) {
    soloLives = 3;
    gameState = createSoloState(soloLevel);
    if (gameStateRef) set(gameStateRef, gameState);
    document.getElementById('match-modal').style.display = 'none';
    updateLevelDisplay();
    updateLivesDisplay();
    resetSoloTimers();
  } else {
    gameState = createInitialState();
    if (gameStateRef) set(gameStateRef, gameState);
    document.getElementById('match-modal').style.display = 'none';
    document.getElementById('wins-p1').textContent = '0';
    document.getElementById('wins-p2').textContent = '0';
  }

  myPadTarget = 210 - PAD_W / 2;
  if (gameState) gameState.p1PadX = 210 - PAD_W / 2;
  lastSpeedUpTime = Date.now();
  gameRunning = true; lastTime = performance.now();
  gameState.paused = true;
  requestAnimationFrame(gameLoop);
  showCountdown(() => {
    if (gameState) gameState.paused = false;
    lastSpeedUpTime = Date.now();
  });
}

// ========== HUD ==========
function updateHUD(p1Name, p1Col, p1Em, p2Name, p2Col, p2Em) {
  p1DisplayName = p1Name; p2DisplayName = p2Name;
  p1Color = p1Col; p2Color = p2Col;
  p1Emoji = p1Em; p2Emoji = p2Em;
  document.getElementById('name-p1').textContent = `${p1Em} ${p1Name}`;
  document.getElementById('name-p2').textContent = `${p2Em} ${p2Name}`;
  document.getElementById('card-p1').style.borderColor = p1Col;
  document.getElementById('card-p2').style.borderColor = p2Col;
  document.getElementById('wins-p1').style.color = p1Col;
  document.getElementById('wins-p2').style.color = p2Col;
  document.querySelector('#card-p1 .wins-label').textContent = '⭐';
  document.querySelector('#card-p2 .wins-label').textContent = '⭐';
}

function startGamePlay() {
  document.getElementById('match-modal').style.display = 'none';
  gameState = isSoloMode ? createSoloState(soloLevel) : createInitialState();
  gameState.paused = true;
  myPadTarget = 210 - PAD_W / 2;
  if (gameState) gameState.p1PadX = 210 - PAD_W / 2;
  if (isSoloMode) resetSoloTimers();
  if (isP1 || isAIMode || isSoloMode) {
    if (gameStateRef) set(gameStateRef, gameState);
  }
  startGameStateListener();
  lastSpeedUpTime = Date.now();
  gameRunning = true; lastTime = performance.now();
  resizeCanvas();
  requestAnimationFrame(gameLoop);
  showCountdown(() => {
    if (gameState) gameState.paused = false;
    lastSpeedUpTime = Date.now();
  });
}

function showCountdown(onDone) {
  const banner = document.getElementById('round-banner');
  let count = 3;
  const userColor = myColor || 'var(--gold)';
  banner.style.display = 'block';
  banner.style.color = userColor;
  banner.style.borderColor = userColor;
  banner.style.boxShadow = `0 0 40px ${userColor}40`;
  banner.style.fontSize = '2.5rem';
  banner.textContent = count;

  const interval = setInterval(() => {
    count--;
    if (count > 0) {
      banner.textContent = count;
      banner.style.animation = 'none';
      banner.offsetHeight; // reflow
      banner.style.animation = 'bannerIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
    } else {
      banner.textContent = '!';
      banner.style.color = userColor;
      banner.style.borderColor = userColor;
      banner.style.boxShadow = `0 0 40px ${userColor}40`;
      banner.style.animation = 'none';
      banner.offsetHeight;
      banner.style.animation = 'bannerIn 0.4s cubic-bezier(0.34, 1.56, 0.64, 1)';
      setTimeout(() => {
        banner.style.display = 'none';
        banner.style.fontSize = '';
        if (onDone) onDone();
      }, 500);
      clearInterval(interval);
    }
  }, 800);
}

// ========== initSession ==========
async function initSession() {
  try {
    document.title = `init: AI=${isAIMode} Solo=${isSoloMode}`;
    const roomPath = (isAIMode || isSoloMode) ? `rooms_v3/${GAME_ID}_ai/${myName}` : `rooms_v3/${GAME_ID}/${myName}`;
    const myJoinedAt = Date.now();

    if (isAIMode || isSoloMode) {
      // כפתור בית בהדר → חזרה למסך בחירה
      document.getElementById('btn-home-header').onclick = goToModeSelect;
      document.getElementById('btn-home-header').style.display = 'block';
      document.title = 'firebase set...';
      await set(ref(db, roomPath), { name: displayName, color: myColor, emoji: myEmoji, joinedAt: myJoinedAt, timestamp: myJoinedAt, active: true });
      document.title = 'heartbeat...';
      startHeartbeat(roomPath, myJoinedAt);
      isP1 = true;
      if (isSoloMode) {
        soloLevel = 0;
        soloLives = 3;
        document.querySelector('.vs-box').style.display = 'none';
        updateHUD(displayName, myColor, myEmoji, '', '#EF4444', '');
        document.getElementById('name-p2').textContent = '❤️ חיים';
        document.getElementById('wins-p2').textContent = '❤️❤️❤️';
        document.getElementById('wins-p2').style.color = '#EF4444';
        document.getElementById('card-p2').style.borderColor = '#EF4444';
        const level = SOLO_LEVELS[soloLevel];
        document.querySelector('#card-p1 .wins-label').textContent = `${level.emoji} ${level.name}`;
        document.querySelector('#card-p2 .wins-label').textContent = '';
      } else {
        updateHUD(displayName, myColor, myEmoji, 'מחשב', '#FFB347', '🤖');
      }
      document.title = 'startGamePlay...';
      startGamePlay();
      document.title = 'RUNNING!';
    } else {
      // כפתור בית בהדר → חזרה לאינדקס (מולטי)
      document.getElementById('btn-home-header').onclick = goHome;
      document.getElementById('btn-home-header').style.display = 'block';
      const existingSnap = await get(ref(db, roomPath));
      const existingData = existingSnap.val();
      const myJoinedAtFinal = existingData?.joinedAt || myJoinedAt;

      await set(ref(db, roomPath), { name: displayName, color: myColor, emoji: myEmoji, joinedAt: myJoinedAtFinal, timestamp: Date.now(), active: true });
      startHeartbeat(roomPath, myJoinedAtFinal);

      const snapAfter = await get(roomRef);
      const playersAfter = snapAfter.val() || {};
      const playerIds = Object.keys(playersAfter).sort((a, b) => (playersAfter[a].joinedAt || 0) - (playersAfter[b].joinedAt || 0));

      if (playerIds.length <= 2) {
        if (playerIds.length === 1) {
          isP1 = true; currentGameId = null;
          gameStateRef = ref(db, `game/${GAME_ID}/pending`);
          // p1 ממתין - HUD עם השם שלי
          updateHUD(displayName, myColor, myEmoji, 'ממתין...', '#888', '⏳');
        } else {
          const first = playerIds[0], second = playerIds[1];
          isP1 = myName === first;
          currentGameId = `${first}_${second}`;
          gameStateRef = ref(db, `game/${GAME_ID}/${currentGameId}`);
          remove(ref(db, `game/${GAME_ID}/pending`));
          // כל שחקן רואה את עצמו ב-card-p1
          const meData = playersAfter[myName];
          const oppId = isP1 ? second : first;
          const oppData = playersAfter[oppId];
          updateHUD(meData.name, meData.color, meData.emoji, oppData.name, oppData.color, oppData.emoji);
          if (isP1) {
            startGamePlay();
          } else {
            // p2 ממתין ל-state מ-p1 דרך listener
            // DEBUG
            let dbg = document.getElementById('p2-debug');
            if (!dbg) { dbg = document.createElement('div'); dbg.id = 'p2-debug'; dbg.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;font-size:11px;z-index:9999;text-align:center;padding:4px;direction:ltr;'; document.body.appendChild(dbg); }
            dbg.textContent = `P2 INIT | isP1=${isP1} | ref=${gameStateRef ? gameStateRef.toString() : 'NULL'} | gameRunning=${gameRunning}`;
            startGameStateListener();
            gameRunning = true; lastTime = performance.now();
            resizeCanvas();
            requestAnimationFrame(gameLoop);
            showCountdown(() => {});
          }
        }
      } else {
        stopHeartbeat(); await remove(ref(db, roomPath));
        document.getElementById('alert-modal').style.display = 'flex';
        document.getElementById('alert-modal').querySelector('.alert-icon').textContent = '🚫';
        document.getElementById('modal-msg').textContent = 'המשחק מלא! כבר משחקים כאן שני שחקנים';
        return;
      }

      roomListenerUnsubscribe = onValue(roomRef, (snap) => {
        const players = snap.val() || {};
        const names = Object.keys(players).sort((a, b) => (players[a].joinedAt || 0) - (players[b].joinedAt || 0));
        if (names.length === 0 && gameStateRef && currentGameId) set(gameStateRef, null);
        if (lastPlayerCount === 2 && names.length < 2) {
          let ln = '', le = '';
          if (window.lastPlayersSnapshot) { for (const [id, p] of Object.entries(window.lastPlayersSnapshot)) { if (!players[id]) { ln = p.name; le = p.emoji; break; } } }
          handleOpponentLeft(ln, le);
        }
        if (!currentGameId && names.length === 2) {
          const first = names[0], second = names[1];
          isP1 = myName === first;
          currentGameId = `${first}_${second}`;
          gameStateRef = ref(db, `game/${GAME_ID}/${currentGameId}`);
          remove(ref(db, `game/${GAME_ID}/pending`));
          // כל שחקן רואה את עצמו ב-card-p1
          const oppId = isP1 ? second : first;
          updateHUD(displayName, myColor, myEmoji, players[oppId].name, players[oppId].color, players[oppId].emoji);
          if (isP1) {
            startGamePlay();
          } else {
            // p2 ממתין ל-state מ-p1
            let dbg = document.getElementById('p2-debug');
            if (!dbg) { dbg = document.createElement('div'); dbg.id = 'p2-debug'; dbg.style.cssText = 'position:fixed;top:0;left:0;right:0;background:orange;color:black;font-size:11px;z-index:9999;text-align:center;padding:4px;direction:ltr;'; document.body.appendChild(dbg); }
            dbg.textContent = `P2 ROOM | isP1=${isP1} | gameId=${currentGameId} | ref=${gameStateRef ? 'OK' : 'NULL'}`;
            startGameStateListener();
            gameRunning = true; lastTime = performance.now();
            resizeCanvas();
            requestAnimationFrame(gameLoop);
            showCountdown(() => {});
          }
          startOpponentCheck();
        }
        window.lastPlayersSnapshot = players;
        lastPlayerCount = names.length;
      });
      startOpponentCheck();
    }
  } catch (e) { document.title = 'ERROR: ' + e.message; }
}

try {

if (modeFromURL === 'ai') {
  // הגיע מכפתור "שחק לבד" באינדקס - הצג בחירה בין מול מחשב למשחק לבד
  const modeEl = document.getElementById('mode-select');
  modeEl.style.display = 'flex';
  document.getElementById('mode-greeting').textContent = `${myEmoji} ${displayName}`;
  document.querySelector('.header').style.display = 'none';
  document.getElementById('gameCanvas').style.display = 'none';
} else {
  // מולטיפלייר - מגיע מחדר המתנה
  initSession();
}

} catch(startErr) {
  document.title = 'START ERR: ' + startErr.message;
  document.body.innerHTML = '<div style="color:red;padding:20px;font-size:1.2em;direction:rtl;text-align:center;">' + 
    '<h2>שגיאה</h2><p>' + startErr.message + '</p><p>' + startErr.stack + '</p></div>';
}
</script>
