<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1320">
<title>שובר לבנים - משחקי אמה וריף</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --emma: #FF5C7A;
    --rif: #4DB8FF;
    --gold: #F5C842;
    --green: #3DD68C;
    --bg: #0F1320;
    --bg-mid: #1a2942;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; width: 100%; overflow: hidden; }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg-mid) 100%);
    font-family: 'Heebo', sans-serif;
    touch-action: none;
    height: 100dvh;
    width: 100vw;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    position: relative;
    color: white;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255, 92, 122, 0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(77, 184, 255, 0.1) 0%, transparent 50%);
  }

  .stars {
    position: fixed; inset: 0; z-index: -1;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.08; pointer-events: none;
  }

  #gameCanvas {
    display: block;
    background: rgba(15, 19, 32, 0.6);
    border-radius: 12px;
    box-shadow: 0 0 40px rgba(77, 184, 255, 0.15), 0 0 40px rgba(255, 92, 122, 0.15);
    z-index: 1;
  }

  #hud {
    position: absolute; top: 8px; left: 50%; transform: translateX(-50%);
    display: none; gap: 16px; z-index: 50;
    font-weight: 700; font-size: 0.9em; pointer-events: none;
  }
  .hud-score { padding: 5px 14px; border-radius: 8px; background: rgba(0,0,0,0.6); backdrop-filter: blur(6px); }

  #gameOver {
    position: absolute; inset: 0; display: none;
    flex-direction: column; align-items: center; justify-content: center;
    background: rgba(0,0,0,0.85); z-index: 200; gap: 16px; padding: 20px;
  }
  #gameOver h2 { font-size: 2.2em; font-weight: 900; font-family: 'Fredoka One', cursive; }
  #gameOver .score-summary { color: #ccc; font-size: 1.05em; }

  .go-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .go-btn {
    padding: 12px 28px; border: none; border-radius: 12px;
    font-family: 'Heebo', sans-serif; font-size: 1em; font-weight: 700;
    cursor: pointer; transition: transform 0.2s;
  }
  .go-btn:active { transform: scale(0.95); }
  #restartBtn { background: linear-gradient(135deg, var(--emma), var(--rif)); color: white; }
  #homeBtn { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); }

  .powerup-toast {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 10px 20px; border-radius: 10px; font-weight: 700; font-size: 1.1em;
    color: white; z-index: 150; pointer-events: none;
    animation: toastAnim 1.4s ease-out forwards;
  }
  @keyframes toastAnim {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    70% { opacity: 1; transform: translate(-50%, -70%) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.8); }
  }

  #backBtn {
    position: absolute; top: 10px; right: 10px; z-index: 60;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
    color: white; width: 36px; height: 36px; border-radius: 50%;
    font-size: 1.2em; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px);
  }
  #backBtn:active { transform: scale(0.9); }

  #alert-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .alert-box {
    background: linear-gradient(135deg, #1a2942 0%, #0F1320 100%);
    color: white; padding: 40px 30px; border-radius: 30px;
    text-align: center; width: 100%; max-width: 320px;
    border: 2px solid rgba(255,255,255,0.1);
  }
  .alert-box .alert-icon { font-size: 3rem; margin-bottom: 10px; }
  .alert-box .alert-msg { font-size: 1.1rem; font-weight: 600; margin: 0; }
  .alert-box .btn-reset {
    margin-top: 20px;
    background: linear-gradient(135deg, var(--emma), var(--rif));
    color: white; padding: 11px 24px; border-radius: 12px; border: none;
    font-weight: 900; cursor: pointer; width: 100%; font-size: 0.9rem;
    font-family: 'Heebo', sans-serif;
  }
  .btn-reset:active { transform: scale(0.97); }
</style>
</head>
<body>

<div class="stars"></div>

<div id="hud">
  <div class="hud-score" id="hud-p1"><span id="p1Name">שחקן 1</span>: <span id="p1Score">0</span></div>
  <div class="hud-score" id="hud-p2"><span id="p2Name">שחקן 2</span>: <span id="p2Score">0</span></div>
</div>

<button id="backBtn" onclick="goHome()">🏠</button>

<canvas id="gameCanvas"></canvas>

<div id="gameOver">
  <h2 id="winnerText"></h2>
  <p class="score-summary" id="scoreSummary"></p>
  <div class="go-buttons">
    <button class="go-btn" id="restartBtn">🔄 משחק חדש</button>
    <button class="go-btn" id="homeBtn" onclick="goHome()">🏠 חזרה</button>
  </div>
</div>

<div id="alert-modal">
  <div class="alert-box">
    <div class="alert-icon">⚠️</div>
    <p class="alert-msg" id="modal-msg">השחקן השני עזב/ה את המשחק</p>
    <button class="btn-reset" onclick="goHome()">חזרה לתפריט</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ─── Player Identity ───
const params = new URLSearchParams(window.location.search);
const isAIMode = params.get('mode') === 'ai';

let userData = null;
try { const saved = sessionStorage.getItem('myUser'); if (saved) userData = JSON.parse(saved); } catch (e) {}

if (!userData) { window.location.href = 'index.html'; throw new Error('No user data'); }

const myName = userData.id;
const displayName = userData.name;
const myColor = userData.color;
const myEmoji = userData.emoji;

// ─── Room & Game refs ───
const roomRef = ref(db, isAIMode ? 'rooms_v3/breakout_ai' : 'rooms_v3/breakout');
let gameStateRef = isAIMode ? ref(db, `game/breakout_ai/${myName}`) : null;
let currentGameId = null;

// ─── Game variables ───
let isP1 = false;
let p1Color = '#FF5C7A', p2Color = '#4DB8FF';
let p1DisplayName = '', p2DisplayName = '';
let lastPlayerCount = 0;

// ─── Canvas ───
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const maxW = Math.min(window.innerWidth - 12, 420);
  const maxH = Math.min(window.innerHeight - 12, 720);
  const ratio = Math.min(maxW / 420, maxH / 720);
  canvas.width = Math.floor(420 * ratio);
  canvas.height = Math.floor(720 * ratio);
}
resizeCanvas();
window.addEventListener('resize', resizeCanvas);

function S(val) { return val * (canvas.width / 420); }

// ─── Constants ───
const BRICK_ROWS = 1, BRICK_COLS = 7, BRICK_H = 18, BRICK_GAP = 4, BRICK_PAD_X = 20;
const PAD_W = 80, PAD_H = 14, BALL_R = 7, BALL_SPEED = 4;
const P1_PAD_Y = 720 - 30 - BRICK_ROWS * (BRICK_H + BRICK_GAP) - 20;
const P2_PAD_Y = 30 + BRICK_ROWS * (BRICK_H + BRICK_GAP) + 6;

let gameState = null, gameRunning = false, lastTime = 0;
let myPadTarget = 210 - PAD_W / 2, powerupIdCounter = 0;

// ═══════ Heartbeat & Opponent Check (כמו xo.html) ═══════

let opponentCheckInterval = null;
let roomListenerUnsubscribe = null;
let gameStateUnsubscribe = null;

function startHeartbeat(roomPath, joinedAt) {
  window.heartbeatInterval = setInterval(() => {
    set(ref(db, roomPath), {
      name: displayName, color: myColor, emoji: myEmoji,
      joinedAt: joinedAt, timestamp: Date.now(), active: true
    });
  }, 1000);
}

function stopHeartbeat() {
  if (window.heartbeatInterval) { clearInterval(window.heartbeatInterval); window.heartbeatInterval = null; }
}

function startOpponentCheck() {
  if (isAIMode || opponentCheckInterval) return;
  opponentCheckInterval = setInterval(async () => {
    try {
      const snap = await get(roomRef);
      const players = snap.val() || {};
      const names = Object.keys(players);

      if (names.length === 1 && names[0] === myName && currentGameId) {
        let leftName = '', leftEmoji = '';
        if (window.lastPlayersSnapshot) {
          for (const [id, player] of Object.entries(window.lastPlayersSnapshot)) {
            if (id !== myName) { leftName = player.name; leftEmoji = player.emoji; break; }
          }
        }
        handleOpponentLeft(leftName, leftEmoji);
        return;
      }

      if (names.length === 2 && currentGameId) {
        const opponentId = names.find(n => n !== myName);
        if (opponentId && players[opponentId]) {
          const timeSinceLastBeat = Date.now() - (players[opponentId].timestamp || 0);
          if (timeSinceLastBeat > 5000) {
            await remove(ref(db, `rooms_v3/breakout/${opponentId}`));
            handleOpponentLeft(players[opponentId].name || '', players[opponentId].emoji || '');
          }
        }
      }
    } catch (error) { console.error('Error in opponent check:', error); }
  }, 3000);
}

function stopOpponentCheck() {
  if (opponentCheckInterval) { clearInterval(opponentCheckInterval); opponentCheckInterval = null; }
}

function handleOpponentLeft(leftPlayerName, leftPlayerEmoji) {
  gameRunning = false;
  stopHeartbeat();
  stopOpponentCheck();
  if (roomListenerUnsubscribe) { roomListenerUnsubscribe(); roomListenerUnsubscribe = null; }
  if (gameStateUnsubscribe) { gameStateUnsubscribe(); gameStateUnsubscribe = null; }
  remove(ref(db, `rooms_v3/breakout/${myName}`));
  if (gameStateRef && currentGameId) set(gameStateRef, null);

  const msg = (leftPlayerName && leftPlayerEmoji)
    ? `${leftPlayerEmoji} ${leftPlayerName} עזב/ה את המשחק`
    : 'השחקן השני עזב/ה את המשחק';
  document.getElementById('alert-modal').style.display = 'flex';
  document.getElementById('modal-msg').innerHTML = msg;
}

// ═══════ Navigation & Cleanup ═══════

window.goHome = async () => {
  try {
    stopHeartbeat();
    stopOpponentCheck();
    gameRunning = false;
    if (!isAIMode) {
      await remove(ref(db, `rooms_v3/breakout/${myName}`));
      if (currentGameId) await remove(ref(db, `game/breakout/${currentGameId}`));
    } else if (myName) {
      await remove(ref(db, `rooms_v3/breakout_ai/${myName}`));
    }
  } catch (error) { console.error('Error in goHome:', error); }
  setTimeout(() => { window.location.href = 'index.html'; }, 200);
};

window.addEventListener('beforeunload', () => {
  stopHeartbeat();
  stopOpponentCheck();
  if (!isAIMode) remove(ref(db, `rooms_v3/breakout/${myName}`));
  else remove(ref(db, `rooms_v3/breakout_ai/${myName}`));
});

// ═══════ Game State ═══════

function createInitialState() {
  const topBricks = [], bottomBricks = [];
  const brickW = (420 - 2 * BRICK_PAD_X - (BRICK_COLS - 1) * BRICK_GAP) / BRICK_COLS;
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const x = BRICK_PAD_X + c * (brickW + BRICK_GAP);
      topBricks.push({ x, y: 30 + r * (BRICK_H + BRICK_GAP), w: brickW, h: BRICK_H, alive: true, hp: 1 });
      bottomBricks.push({ x, y: 720 - 30 - (BRICK_ROWS - r) * (BRICK_H + BRICK_GAP), w: brickW, h: BRICK_H, alive: true, hp: 1 });
    }
  }
  return {
    ball: { x: 210, y: 360, dx: BALL_SPEED * 0.7, dy: -BALL_SPEED * 0.7 },
    p1PadX: 210 - PAD_W / 2, p2PadX: 210 - PAD_W / 2,
    topBricks, bottomBricks,
    p1Score: 0, p2Score: 0, p1PadW: PAD_W, p2PadW: PAD_W,
    powerups: [], balls: [],
    gameOver: false, winner: null, started: true, timestamp: Date.now()
  };
}

// ═══════ Power-ups ═══════

const POWERUP_TYPES = [
  { type: 'wider', label: '🔲 פד רחב', color: '#3DD68C' },
  { type: 'extra_ball', label: '⚾ כדור נוסף', color: '#F5C842' },
  { type: 'slow', label: '🐢 האטה', color: '#9b59b6' },
];

function maybeSpawnPowerup(x, y, goingUp) {
  if (Math.random() < 0.3) {
    const pt = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    gameState.powerups.push({ x, y, dy: goingUp ? -2 : 2, type: pt.type, id: ++powerupIdCounter, color: pt.color, label: pt.label, w: 28, h: 16 });
  }
}

function applyPowerup(type, catcher) {
  const info = POWERUP_TYPES.find(p => p.type === type);
  const toast = document.createElement('div');
  toast.className = 'powerup-toast';
  toast.textContent = info ? info.label : type;
  toast.style.background = info ? info.color : '#333';
  document.body.appendChild(toast);
  setTimeout(() => toast.remove(), 1500);

  if (type === 'wider') {
    if (catcher === 'p1') gameState.p1PadW = Math.min(PAD_W * 1.8, gameState.p1PadW + 25);
    else gameState.p2PadW = Math.min(PAD_W * 1.8, gameState.p2PadW + 25);
  } else if (type === 'extra_ball') {
    gameState.balls.push({ x: gameState.ball.x, y: gameState.ball.y, dx: -gameState.ball.dx, dy: gameState.ball.dy });
  } else if (type === 'slow') {
    gameState.ball.dx *= 0.65; gameState.ball.dy *= 0.65;
    setTimeout(() => {
      if (!gameState) return;
      const speed = Math.sqrt(gameState.ball.dx ** 2 + gameState.ball.dy ** 2);
      if (speed < BALL_SPEED * 0.8) { const f = (BALL_SPEED * 0.9) / speed; gameState.ball.dx *= f; gameState.ball.dy *= f; }
    }, 3000);
  }
}

// ═══════ Input ═══════

canvas.addEventListener('touchstart', (e) => e.preventDefault(), { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault();
  if (!gameState) return;
  const rect = canvas.getBoundingClientRect();
  const gameX = (e.touches[0].clientX - rect.left) / (canvas.width / 420);
  const padW = isP1 ? gameState.p1PadW : gameState.p2PadW;
  myPadTarget = Math.max(0, Math.min(420 - padW, gameX - padW / 2));
}, { passive: false });

canvas.addEventListener('mousemove', (e) => {
  if (!gameState) return;
  const rect = canvas.getBoundingClientRect();
  const gameX = (e.clientX - rect.left) / (canvas.width / 420);
  const padW = isP1 ? gameState.p1PadW : gameState.p2PadW;
  myPadTarget = Math.max(0, Math.min(420 - padW, gameX - padW / 2));
});

// ═══════ Firebase Sync ═══════

function syncFullState() {
  if (isAIMode || !isP1 || !gameState || !gameStateRef) return;
  set(gameStateRef, gameState);
}

function syncMyPad() {
  if (isAIMode || !gameStateRef) return;
  update(gameStateRef, { [isP1 ? 'p1PadX' : 'p2PadX']: myPadTarget }).catch(() => {});
}

function startGameStateListener() {
  if (gameStateUnsubscribe) { gameStateUnsubscribe(); gameStateUnsubscribe = null; }
  if (!gameStateRef) return;
  gameStateUnsubscribe = onValue(gameStateRef, (snap) => {
    const val = snap.val();
    if (!val || !val.started) return;
    if (!isP1) {
      const myPad = val.p2PadX;
      gameState = val;
      gameState.p2PadX = myPad;
    } else {
      if (val.p2PadX !== undefined && gameState) gameState.p2PadX = val.p2PadX;
    }
    if (val.gameOver && !gameRunning) showGameOver(val.winner);
  });
}

// ═══════ Physics ═══════

function ballHitsBrick(ball, brick) {
  return ball.x + BALL_R > brick.x && ball.x - BALL_R < brick.x + brick.w &&
         ball.y + BALL_R > brick.y && ball.y - BALL_R < brick.y + brick.h;
}

function padBounce(ball, padX, padW, goUp) {
  const hitPos = (ball.x - padX) / padW;
  const angle = (hitPos - 0.5) * Math.PI * 0.7;
  const speed = Math.max(BALL_SPEED, Math.sqrt(ball.dx ** 2 + ball.dy ** 2));
  ball.dx = speed * Math.sin(angle);
  ball.dy = goUp ? -speed * Math.cos(angle) : speed * Math.cos(angle);
  if (Math.abs(ball.dy) < 2) ball.dy = goUp ? -2 : 2;
}

function aiUpdate(dt) {
  if (!gameState) return;
  const targetX = gameState.ball.x - gameState.p2PadW / 2;
  const ease = gameState.ball.dy < 0 ? 0.08 : 0.03;
  gameState.p2PadX += (targetX - gameState.p2PadX) * ease * dt;
  gameState.p2PadX = Math.max(0, Math.min(420 - gameState.p2PadW, gameState.p2PadX));
}

function updatePhysics(dt) {
  if (!gameState || gameState.gameOver) return;
  const ball = gameState.ball;
  ball.x += ball.dx * dt; ball.y += ball.dy * dt;

  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); }
  if (ball.x + BALL_R >= 420) { ball.x = 420 - BALL_R; ball.dx = -Math.abs(ball.dx); }

  // P1 pad (bottom)
  if (ball.dy > 0 && ball.y + BALL_R >= P1_PAD_Y && ball.y + BALL_R <= P1_PAD_Y + PAD_H + 6) {
    if (ball.x >= gameState.p1PadX - 6 && ball.x <= gameState.p1PadX + gameState.p1PadW + 6) {
      ball.y = P1_PAD_Y - BALL_R; padBounce(ball, gameState.p1PadX, gameState.p1PadW, true);
    }
  }
  // P2 pad (top)
  if (ball.dy < 0 && ball.y - BALL_R <= P2_PAD_Y + PAD_H && ball.y - BALL_R >= P2_PAD_Y - 6) {
    if (ball.x >= gameState.p2PadX - 6 && ball.x <= gameState.p2PadX + gameState.p2PadW + 6) {
      ball.y = P2_PAD_Y + PAD_H + BALL_R; padBounce(ball, gameState.p2PadX, gameState.p2PadW, false);
    }
  }

  // Bricks
  for (const brick of gameState.topBricks) {
    if (!brick.alive) continue;
    if (ballHitsBrick(ball, brick)) {
      brick.hp--; if (brick.hp <= 0) { brick.alive = false; gameState.p1Score += 10; maybeSpawnPowerup(brick.x + brick.w / 2, brick.y + brick.h, false); }
      ball.dy = Math.abs(ball.dy); break;
    }
  }
  for (const brick of gameState.bottomBricks) {
    if (!brick.alive) continue;
    if (ballHitsBrick(ball, brick)) {
      brick.hp--; if (brick.hp <= 0) { brick.alive = false; gameState.p2Score += 10; maybeSpawnPowerup(brick.x + brick.w / 2, brick.y - 10, true); }
      ball.dy = -Math.abs(ball.dy); break;
    }
  }

  // Extra balls
  for (let i = gameState.balls.length - 1; i >= 0; i--) {
    const eb = gameState.balls[i];
    eb.x += eb.dx * dt; eb.y += eb.dy * dt;
    if (eb.x - BALL_R <= 0) { eb.x = BALL_R; eb.dx = Math.abs(eb.dx); }
    if (eb.x + BALL_R >= 420) { eb.x = 420 - BALL_R; eb.dx = -Math.abs(eb.dx); }
    if (eb.y < -20 || eb.y > 740) { gameState.balls.splice(i, 1); continue; }
    if (eb.dy > 0 && eb.y + BALL_R >= P1_PAD_Y && eb.y + BALL_R <= P1_PAD_Y + PAD_H + 4)
      if (eb.x >= gameState.p1PadX - 4 && eb.x <= gameState.p1PadX + gameState.p1PadW + 4) eb.dy = -Math.abs(eb.dy);
    if (eb.dy < 0 && eb.y - BALL_R <= P2_PAD_Y + PAD_H && eb.y - BALL_R >= P2_PAD_Y - 4)
      if (eb.x >= gameState.p2PadX - 4 && eb.x <= gameState.p2PadX + gameState.p2PadW + 4) eb.dy = Math.abs(eb.dy);
    for (const brick of gameState.topBricks) { if (!brick.alive) continue; if (ballHitsBrick(eb, brick)) { brick.hp--; if (brick.hp <= 0) { brick.alive = false; gameState.p1Score += 10; } eb.dy = Math.abs(eb.dy); break; } }
    for (const brick of gameState.bottomBricks) { if (!brick.alive) continue; if (ballHitsBrick(eb, brick)) { brick.hp--; if (brick.hp <= 0) { brick.alive = false; gameState.p2Score += 10; } eb.dy = -Math.abs(eb.dy); break; } }
  }

  // Power-ups
  for (let i = gameState.powerups.length - 1; i >= 0; i--) {
    const pu = gameState.powerups[i];
    pu.y += pu.dy * dt;
    if (pu.dy > 0 && pu.y >= P1_PAD_Y && pu.y <= P1_PAD_Y + PAD_H + 10)
      if (pu.x >= gameState.p1PadX && pu.x <= gameState.p1PadX + gameState.p1PadW) { applyPowerup(pu.type, 'p1'); gameState.powerups.splice(i, 1); continue; }
    if (pu.dy < 0 && pu.y <= P2_PAD_Y + PAD_H && pu.y >= P2_PAD_Y - 5)
      if (pu.x >= gameState.p2PadX && pu.x <= gameState.p2PadX + gameState.p2PadW) { applyPowerup(pu.type, 'p2'); gameState.powerups.splice(i, 1); continue; }
    if (pu.y > 740 || pu.y < -20) gameState.powerups.splice(i, 1);
  }

  // Game over
  if (ball.y - BALL_R < -10) endGame('p1');
  else if (ball.y + BALL_R > 730) endGame('p2');
  if (gameState && !gameState.gameOver && gameState.topBricks.every(b => !b.alive)) endGame('p1');
  if (gameState && !gameState.gameOver && gameState.bottomBricks.every(b => !b.alive)) endGame('p2');
}

// ═══════ Game Loop ═══════

function gameLoop(time) {
  if (!gameRunning) return;
  const dt = Math.min((time - lastTime) / 16.67, 3);
  lastTime = time;
  if (!gameState || gameState.gameOver) { drawGame(); return; }

  if (isP1) gameState.p1PadX += (myPadTarget - gameState.p1PadX) * 0.3 * dt;
  else gameState.p2PadX += (myPadTarget - gameState.p2PadX) * 0.3 * dt;

  if (isP1 || isAIMode) {
    if (isAIMode) aiUpdate(dt);
    updatePhysics(dt);
    document.getElementById('p1Score').textContent = gameState.p1Score;
    document.getElementById('p2Score').textContent = gameState.p2Score;
    if (!isAIMode && Math.random() < 0.15) syncFullState();
  }
  syncMyPad();
  drawGame();
  requestAnimationFrame(gameLoop);
}

// ═══════ Drawing ═══════

function drawGame() {
  if (!gameState) return;
  const w = canvas.width, h = canvas.height;
  ctx.clearRect(0, 0, w, h);
  const flip = !isP1 && !isAIMode;
  ctx.save();
  if (flip) { ctx.translate(w, h); ctx.rotate(Math.PI); }

  ctx.fillStyle = 'rgba(15, 19, 32, 0.6)'; ctx.fillRect(0, 0, w, h);

  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = S(1);
  ctx.setLineDash([S(8), S(8)]);
  ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke();
  ctx.setLineDash([]);

  for (const b of gameState.topBricks) if (b.alive) drawBrick(b, p2Color);
  for (const b of gameState.bottomBricks) if (b.alive) drawBrick(b, p1Color);
  drawPad(gameState.p2PadX, P2_PAD_Y, gameState.p2PadW, p2Color);
  drawPad(gameState.p1PadX, P1_PAD_Y, gameState.p1PadW, p1Color);
  drawBall(gameState.ball);
  for (const eb of gameState.balls) drawBall(eb);

  for (const pu of gameState.powerups) {
    ctx.fillStyle = pu.color || '#F5C842';
    ctx.shadowColor = pu.color || '#F5C842'; ctx.shadowBlur = S(8);
    ctx.beginPath(); ctx.roundRect(S(pu.x - pu.w / 2), S(pu.y - pu.h / 2), S(pu.w), S(pu.h), S(4)); ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.restore();
}

function drawBrick(brick, color) {
  const x = S(brick.x), y = S(brick.y), w = S(brick.w), h = S(brick.h);
  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = S(6);
  ctx.beginPath(); ctx.roundRect(x, y, w, h, S(4)); ctx.fill(); ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.2)';
  ctx.beginPath(); ctx.roundRect(x + S(2), y + S(1), w - S(4), h / 2 - S(1), S(2)); ctx.fill();
}

function drawPad(px, py, pw, color) {
  const x = S(px), y = S(py), w = S(pw), h = S(PAD_H);
  ctx.shadowColor = color; ctx.shadowBlur = S(12); ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, S(7)); ctx.fill(); ctx.shadowBlur = 0;
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, 'rgba(255,255,255,0.35)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(x + S(2), y + S(1), w - S(4), h / 2, S(5)); ctx.fill();
}

function drawBall(ball) {
  const x = S(ball.x), y = S(ball.y), r = S(BALL_R);
  ctx.shadowColor = '#fff'; ctx.shadowBlur = S(10); ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  grad.addColorStop(0, 'rgba(255,255,255,0.9)'); grad.addColorStop(1, 'rgba(255,255,255,0.3)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

// ═══════ Game Over ═══════

function endGame(winner) {
  if (!gameState || gameState.gameOver) return;
  gameState.gameOver = true; gameState.winner = winner;
  gameRunning = false;
  syncFullState();
  showGameOver(winner);
}

function showGameOver(winner) {
  const el = document.getElementById('winnerText');
  const name = winner === 'p1' ? p1DisplayName : p2DisplayName;
  const color = winner === 'p1' ? p1Color : p2Color;
  el.textContent = `🎉 ${name} ניצח/ה!`;
  el.style.color = color;
  document.getElementById('scoreSummary').textContent =
    `${p1DisplayName}: ${gameState?.p1Score || 0} | ${p2DisplayName}: ${gameState?.p2Score || 0}`;
  document.getElementById('gameOver').style.display = 'flex';
}

document.getElementById('restartBtn').addEventListener('click', () => {
  gameState = createInitialState();
  myPadTarget = 210 - PAD_W / 2;
  if (gameStateRef) set(gameStateRef, gameState);
  document.getElementById('gameOver').style.display = 'none';
  gameRunning = true; lastTime = performance.now();
  requestAnimationFrame(gameLoop);
});

// ═══════ HUD setup ═══════

function setupHUD() {
  document.getElementById('p1Name').textContent = p1DisplayName;
  document.getElementById('p2Name').textContent = p2DisplayName;
  document.getElementById('hud-p1').style.color = p1Color;
  document.getElementById('hud-p2').style.color = p2Color;
  document.getElementById('hud').style.display = 'flex';
}

// ═══════ Start Game ═══════

function startGamePlay() {
  setupHUD();
  document.getElementById('gameOver').style.display = 'none';
  gameState = createInitialState();
  if (gameStateRef) set(gameStateRef, gameState);
  startGameStateListener();
  gameRunning = true; lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// ═══════ Init Session (same pattern as xo.html) ═══════

async function initSession() {
  try {
    console.log('🧱 initSession started, myName:', myName, 'AI Mode:', isAIMode);
    const roomPath = isAIMode ? `rooms_v3/breakout_ai/${myName}` : `rooms_v3/breakout/${myName}`;
    const myJoinedAt = Date.now();

    if (isAIMode) {
      await set(ref(db, roomPath), {
        name: displayName, color: myColor, emoji: myEmoji,
        joinedAt: myJoinedAt, timestamp: myJoinedAt, active: true
      });
      startHeartbeat(roomPath, myJoinedAt);

      isP1 = true;
      p1Color = myColor; p2Color = '#FFB347';
      p1DisplayName = displayName; p2DisplayName = '🤖 מחשב';

      startGamePlay();
    } else {
      // שחקן רגיל - בדוק אם כבר רשום ב-room (מגיע מ-index waiting)
      const existingSnap = await get(ref(db, roomPath));
      const existingData = existingSnap.val();
      const myJoinedAtFinal = existingData?.joinedAt || myJoinedAt;

      await set(ref(db, roomPath), {
        name: displayName, color: myColor, emoji: myEmoji,
        joinedAt: myJoinedAtFinal, timestamp: Date.now(), active: true
      });
      startHeartbeat(roomPath, myJoinedAtFinal);

      const snapAfter = await get(roomRef);
      const playersAfter = snapAfter.val() || {};
      const playerIds = Object.keys(playersAfter)
        .sort((a, b) => (playersAfter[a].joinedAt || playersAfter[a].timestamp || 0) -
                         (playersAfter[b].joinedAt || playersAfter[b].timestamp || 0));

      if (playerIds.length <= 2) {
        if (playerIds.length === 2) {
          const first = playerIds[0], second = playerIds[1];
          currentGameId = `${first}_${second}`;
          gameStateRef = ref(db, `game/breakout/${currentGameId}`);
          isP1 = myName === first;

          p1Color = playersAfter[first].color; p2Color = playersAfter[second].color;
          p1DisplayName = playersAfter[first].name; p2DisplayName = playersAfter[second].name;

          const gameSnap = await get(gameStateRef);
          if (!gameSnap.val()) startGamePlay();
          else { gameState = gameSnap.val(); setupHUD(); startGameStateListener(); gameRunning = true; lastTime = performance.now(); requestAnimationFrame(gameLoop); }
          startOpponentCheck();
        }
        // else: length 1 - ממתין לשחקן שני, room listener יטפל
      } else {
        stopHeartbeat();
        await remove(ref(db, roomPath));
        document.getElementById('alert-modal').style.display = 'flex';
        document.getElementById('modal-msg').textContent = 'המשחק מלא! כבר משחקים כאן שני שחקנים';
        return;
      }

      // Room listener
      roomListenerUnsubscribe = onValue(roomRef, (snap) => {
        const players = snap.val() || {};
        const names = Object.keys(players)
          .sort((a, b) => (players[a].joinedAt || players[a].timestamp || 0) -
                           (players[b].joinedAt || players[b].timestamp || 0));

        if (!isAIMode && lastPlayerCount === 2 && names.length < 2 && currentGameId) {
          let leftName = '', leftEmoji = '';
          if (window.lastPlayersSnapshot) {
            for (const [id, player] of Object.entries(window.lastPlayersSnapshot)) {
              if (!players[id]) { leftName = player.name; leftEmoji = player.emoji; break; }
            }
          }
          handleOpponentLeft(leftName, leftEmoji);
        }

        window.lastPlayersSnapshot = players;

        if (names.length === 2 && !currentGameId) {
          const first = names[0], second = names[1];
          currentGameId = `${first}_${second}`;
          gameStateRef = ref(db, `game/breakout/${currentGameId}`);
          isP1 = myName === first;

          p1Color = players[first].color; p2Color = players[second].color;
          p1DisplayName = players[first].name; p2DisplayName = players[second].name;

          startGamePlay();
          startOpponentCheck();
        }

        lastPlayerCount = names.length;
      });
    }
  } catch (error) {
    console.error('Error in initSession:', error);
  }
}

initSession();
