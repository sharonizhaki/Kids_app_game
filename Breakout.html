<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1320">
<title>שובר לבנים - משחקי אמה וריף</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --emma: #FF5C7A; --rif: #4DB8FF; --gold: #F5C842; --green: #3DD68C;
    --bg: #0F1320; --bg-mid: #1a2942;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg-mid) 100%);
    font-family: 'Heebo', sans-serif;
    overflow: hidden; touch-action: none;
    height: 100dvh; width: 100vw;
    display: flex; flex-direction: column; align-items: center;
    position: relative; color: white;
  }

  body::before {
    content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255,92,122,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(77,184,255,0.1) 0%, transparent 50%);
  }
  .stars {
    position: fixed; inset: 0; z-index: -1;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.08; pointer-events: none;
  }

  /* ========== HEADER / SCORE BAR ========== */
  .header {
    display: flex; justify-content: space-around; align-items: stretch;
    width: 100%; max-width: 400px; padding: 10px 12px 6px; gap: 8px;
    flex-shrink: 0; z-index: 10;
  }

  .score-box {
    flex: 1;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
    padding: 10px 8px 8px; border-radius: 18px; text-align: center;
    border: 2px solid transparent; transition: all 0.3s ease;
    backdrop-filter: blur(10px); position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }

  .score-box::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .score-box .name {
    font-weight: 900; font-size: 0.8rem; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; width: 100%;
  }

  .score-box .wins {
    font-family: 'Fredoka One', cursive; font-size: 2rem; font-weight: 900; line-height: 1;
  }

  .score-box .wins-label {
    font-size: 0.6rem; color: rgba(255,255,255,0.5); font-weight: 700;
  }

  .vs-box {
    display: flex; align-items: center; justify-content: center;
    min-width: 36px; font-family: 'Fredoka One', cursive;
    font-size: 0.9rem; color: var(--gold); flex-shrink: 0;
  }

  /* ========== CANVAS ========== */
  #gameCanvas {
    display: block;
    background: rgba(15, 19, 32, 0.6);
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 30px rgba(77,184,255,0.1), 0 0 30px rgba(255,92,122,0.1);
    flex-shrink: 1;
  }

  /* ========== ROUND BANNER ========== */
  #round-banner {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 16px 28px; border-radius: 20px; font-weight: 900; font-size: 1.4rem;
    z-index: 300; pointer-events: none; text-align: center;
    border: 2.5px solid var(--gold);
    background: linear-gradient(135deg, rgba(15,19,32,0.95) 0%, rgba(26,41,66,0.95) 100%);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(245,200,66,0.3);
    animation: bannerIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: none;
  }
  @keyframes bannerIn {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* ========== MATCH END MODAL ========== */
  #match-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 500;
    align-items: center; justify-content: center; padding: 20px;
  }

  .match-box {
    background: linear-gradient(135deg, #1a2942 0%, #0F1320 100%);
    color: white; padding: 32px 24px; border-radius: 28px; text-align: center;
    width: 100%; max-width: 320px; border: 2px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }

  .match-box .match-icon { font-size: 3.5rem; margin-bottom: 8px; }
  .match-box .match-title { font-family: 'Fredoka One', cursive; font-size: 1.6rem; margin-bottom: 4px; }
  .match-box .match-sub { font-size: 0.95rem; color: #aaa; margin-bottom: 18px; }

  .match-btns { display: flex; flex-direction: column; gap: 10px; }

  .mbtn {
    padding: 14px 20px; border: none; border-radius: 16px;
    font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .mbtn:active { transform: scale(0.95); }

  .mbtn-primary {
    background: linear-gradient(135deg, var(--emma), var(--rif));
    color: white; box-shadow: 0 4px 15px rgba(255,92,122,0.3);
  }
  .mbtn-secondary {
    background: rgba(255,255,255,0.08); color: white;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .mbtn-waiting {
    background: rgba(245,200,66,0.15); color: var(--gold);
    border: 1.5px solid rgba(245,200,66,0.3);
    animation: waitPulse 1.5s ease-in-out infinite;
  }
  @keyframes waitPulse {
    0%, 100% { box-shadow: 0 0 0 rgba(245,200,66,0); }
    50% { box-shadow: 0 0 20px rgba(245,200,66,0.3); }
  }

  /* ========== ALERT MODAL ========== */
  #alert-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .alert-box {
    background: linear-gradient(135deg, #1a2942 0%, #0F1320 100%);
    color: white; padding: 36px 28px; border-radius: 28px; text-align: center;
    width: 100%; max-width: 320px; border: 2px solid rgba(255,255,255,0.1);
  }
  .alert-box .alert-icon { font-size: 3rem; margin-bottom: 10px; }
  .alert-box .alert-msg { font-size: 1.05rem; font-weight: 600; line-height: 1.6; }
  .alert-box .btn-reset {
    margin-top: 18px; padding: 12px 24px; border-radius: 14px; border: none;
    background: white; color: #0F1320; font-weight: 900; font-size: 0.95rem;
    cursor: pointer; font-family: 'Heebo', sans-serif;
  }
  .alert-box .btn-reset:active { transform: scale(0.96); }

  /* ========== POWER-UP TOAST ========== */
  .powerup-toast {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 1.05em;
    color: white; z-index: 150; pointer-events: none;
    animation: toastAnim 1.4s ease-out forwards;
  }
  @keyframes toastAnim {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    70% { opacity: 1; transform: translate(-50%, -70%) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.8); }
  }

  /* ========== HOME BUTTON ========== */
  .btn-home {
    position: absolute; top: 10px; right: 10px; z-index: 60;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
    color: white; width: 38px; height: 38px; border-radius: 50%;
    font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px); user-select: none;
  }
  .btn-home:active { transform: scale(0.9); }

  /* ========== CONFETTI ========== */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 1002; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; top: -10px; border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }
</style>
</head>
<body>

<div class="stars"></div>
<button class="btn-home" onclick="goHome()">🏠</button>

<!-- HEADER SCORE BAR -->
<div class="header">
  <div class="score-box" id="card-p1">
    <div class="name" id="name-p1">שחקן 1</div>
    <div class="wins" id="wins-p1">0</div>
    <div class="wins-label">ניצחונות</div>
  </div>
  <div class="vs-box">VS</div>
  <div class="score-box" id="card-p2">
    <div class="name" id="name-p2">שחקן 2</div>
    <div class="wins" id="wins-p2">0</div>
    <div class="wins-label">ניצחונות</div>
  </div>
</div>

<!-- CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- ROUND BANNER (win/loss per round) -->
<div id="round-banner"></div>

<!-- MATCH END MODAL -->
<div id="match-modal">
  <div class="match-box">
    <div class="match-icon" id="mm-icon">🏆</div>
    <div class="match-title" id="mm-title">ניצחון!</div>
    <div class="match-sub" id="mm-sub">2-1</div>
    <div class="match-btns" id="mm-btns"></div>
  </div>
</div>

<!-- ALERT MODAL (opponent left / full) -->
<div id="alert-modal">
  <div class="alert-box">
    <div class="alert-icon">⚠️</div>
    <p class="alert-msg" id="modal-msg">השחקן השני עזב/ה את המשחק</p>
    <button class="btn-reset" onclick="goHome()">חזרה לתפריט</button>
  </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ========== זיהוי שחקן ==========
const params = new URLSearchParams(location.search);
const displayName = params.get('player') || "משתמש";
const userDataStr = sessionStorage.getItem('myUser');
const userData = userDataStr ? JSON.parse(userDataStr) : null;
if (!userData) { window.location.href = 'index.html'; throw new Error('No user data'); }

const myName = userData.id;
const myColor = userData.color;
const myEmoji = userData.emoji;
const isAIMode = params.get('mode') === 'ai';

const GAME_ID = 'breakout';
const roomRef = ref(db, isAIMode ? `rooms_v3/${GAME_ID}_ai` : `rooms_v3/${GAME_ID}`);
let gameStateRef = isAIMode ? ref(db, `game/${GAME_ID}_ai/${myName}`) : null;
let currentGameId = null;

// ========== משתנים ==========
let isP1 = false;
let p1Color = '#FF5C7A', p2Color = '#4DB8FF';
let p1DisplayName = '', p2DisplayName = '';
let p1Emoji = '', p2Emoji = '';
let lastPlayerCount = 0;

// Match state (best of 3)
let p1Wins = 0, p2Wins = 0, roundNum = 0;
const WINS_NEEDED = 2;

// ========== Canvas ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const headerH = document.querySelector('.header').offsetHeight || 80;
  const availH = window.innerHeight - headerH - 12;
  const maxW = Math.min(window.innerWidth - 12, 420);
  const maxH = Math.min(availH, 700);
  const ratio = Math.min(maxW / 420, maxH / 700);
  canvas.width = Math.floor(420 * ratio);
  canvas.height = Math.floor(700 * ratio);
}
// Delay first resize to let header render
setTimeout(resizeCanvas, 50);
window.addEventListener('resize', resizeCanvas);

function S(v) { return v * (canvas.width / 420); }

// ========== קבועים ==========
const BRICK_ROWS = 1, BRICK_COLS = 7, BRICK_H = 18, BRICK_GAP = 4, BRICK_PAD_X = 20;
const PAD_W = 80, PAD_H = 14, BALL_R = 7, BALL_SPEED = 4;
const FIELD_H = 700;
const P1_PAD_Y = FIELD_H - 30 - BRICK_ROWS * (BRICK_H + BRICK_GAP) - 20;
const P2_PAD_Y = 30 + BRICK_ROWS * (BRICK_H + BRICK_GAP) + 6;

let gameState = null, gameRunning = false, lastTime = 0;
let myPadTarget = 210 - PAD_W / 2, powerupIdCounter = 0;

// ========== Heartbeat ==========
let heartbeatInterval = null, opponentCheckInterval = null;
let roomListenerUnsubscribe = null, gameStateUnsubscribe = null;

function startHeartbeat(roomPath, joinedAt) {
  heartbeatInterval = setInterval(() => {
    set(ref(db, roomPath), { name: displayName, color: myColor, emoji: myEmoji, joinedAt, timestamp: Date.now(), active: true });
  }, 1000);
}
function stopHeartbeat() { if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; } }

function startOpponentCheck() {
  if (isAIMode || opponentCheckInterval) return;
  opponentCheckInterval = setInterval(async () => {
    try {
      const snap = await get(roomRef);
      const players = snap.val() || {};
      const names = Object.keys(players);
      if (names.length === 1 && names[0] === myName && currentGameId) {
        let ln = '', le = '';
        if (window.lastPlayersSnapshot) { for (const [id, p] of Object.entries(window.lastPlayersSnapshot)) { if (id !== myName) { ln = p.name; le = p.emoji; break; } } }
        handleOpponentLeft(ln, le); return;
      }
      if (names.length === 2 && currentGameId) {
        const oid = names.find(n => n !== myName);
        if (oid && players[oid] && Date.now() - (players[oid].timestamp || 0) > 5000) {
          await remove(ref(db, `rooms_v3/${GAME_ID}/${oid}`));
          handleOpponentLeft(players[oid].name || '', players[oid].emoji || '');
        }
      }
    } catch (e) { console.error('opponent check err:', e); }
  }, 3000);
}
function stopOpponentCheck() { if (opponentCheckInterval) { clearInterval(opponentCheckInterval); opponentCheckInterval = null; } }

function handleOpponentLeft(leftName, leftEmoji) {
  gameRunning = false; stopHeartbeat(); stopOpponentCheck();
  if (roomListenerUnsubscribe) { roomListenerUnsubscribe(); roomListenerUnsubscribe = null; }
  if (gameStateUnsubscribe) { gameStateUnsubscribe(); gameStateUnsubscribe = null; }
  remove(ref(db, `rooms_v3/${GAME_ID}/${myName}`));
  if (gameStateRef && currentGameId) set(gameStateRef, null);
  const msg = (leftName && leftEmoji) ? `${leftEmoji} ${leftName} עזב/ה את המשחק` : 'השחקן השני עזב/ה את המשחק';
  document.getElementById('alert-modal').style.display = 'flex';
  document.getElementById('modal-msg').innerHTML = msg;
}

// ========== ניווט ==========
window.goHome = async () => {
  try {
    stopHeartbeat(); stopOpponentCheck(); gameRunning = false;
    if (!isAIMode) {
      await remove(ref(db, `rooms_v3/${GAME_ID}/${myName}`));
      if (currentGameId) await remove(ref(db, `game/${GAME_ID}/${currentGameId}`));
      remove(ref(db, `game/${GAME_ID}/pending`));
    } else if (myName) { await remove(ref(db, `rooms_v3/${GAME_ID}_ai/${myName}`)); }
  } catch (e) { console.error('goHome err:', e); }
  setTimeout(() => { window.location.href = 'index.html'; }, 200);
};

window.addEventListener('beforeunload', () => {
  stopHeartbeat(); stopOpponentCheck();
  if (!isAIMode) remove(ref(db, `rooms_v3/${GAME_ID}/${myName}`));
  else remove(ref(db, `rooms_v3/${GAME_ID}_ai/${myName}`));
});

// ========== יצירת מצב ==========
function createInitialState() {
  const topBricks = [], bottomBricks = [];
  const brickW = (420 - 2 * BRICK_PAD_X - (BRICK_COLS - 1) * BRICK_GAP) / BRICK_COLS;
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const x = BRICK_PAD_X + c * (brickW + BRICK_GAP);
      topBricks.push({ x, y: 30 + r * (BRICK_H + BRICK_GAP), w: brickW, h: BRICK_H, alive: true, hp: 1 });
      bottomBricks.push({ x, y: FIELD_H - 30 - (BRICK_ROWS - r) * (BRICK_H + BRICK_GAP), w: brickW, h: BRICK_H, alive: true, hp: 1 });
    }
  }
  return {
    ball: { x: 210, y: FIELD_H / 2, dx: BALL_SPEED * 0.7, dy: -BALL_SPEED * 0.7 },
    p1PadX: 210 - PAD_W / 2, p2PadX: 210 - PAD_W / 2,
    topBricks, bottomBricks,
    p1Score: 0, p2Score: 0,
    p1PadW: PAD_W, p2PadW: PAD_W,
    powerups: [], balls: [],
    gameOver: false, winner: null,
    p1Wins: 0, p2Wins: 0, roundNum: 0,
    rematchP1: false, rematchP2: false,
    started: true, timestamp: Date.now()
  };
}

// ========== פאוור-אפים ==========
const POWERUP_TYPES = [
  { type: 'wider', label: '🔲 פד רחב', color: '#3DD68C' },
  { type: 'extra_ball', label: '⚾ כדור נוסף', color: '#F5C842' },
  { type: 'slow', label: '🐢 האטה', color: '#9b59b6' },
];

function maybeSpawnPowerup(x, y, goingUp) {
  if (Math.random() < 0.3) {
    const pt = POWERUP_TYPES[Math.floor(Math.random() * POWERUP_TYPES.length)];
    gameState.powerups.push({ x, y, dy: goingUp ? -2 : 2, type: pt.type, id: ++powerupIdCounter, color: pt.color, label: pt.label, w: 28, h: 16 });
  }
}

function showToast(text, color) {
  const t = document.createElement('div'); t.className = 'powerup-toast'; t.textContent = text; t.style.background = color || '#333';
  document.body.appendChild(t); setTimeout(() => t.remove(), 1500);
}

function applyPowerup(type, catcher) {
  const info = POWERUP_TYPES.find(p => p.type === type);
  showToast(info ? info.label : type, info ? info.color : '#333');
  if (type === 'wider') {
    if (catcher === 'p1') gameState.p1PadW = Math.min(PAD_W * 1.8, gameState.p1PadW + 25);
    else gameState.p2PadW = Math.min(PAD_W * 1.8, gameState.p2PadW + 25);
  } else if (type === 'extra_ball') {
    gameState.balls.push({ x: gameState.ball.x, y: gameState.ball.y, dx: -gameState.ball.dx, dy: gameState.ball.dy });
  } else if (type === 'slow') {
    gameState.ball.dx *= 0.65; gameState.ball.dy *= 0.65;
    setTimeout(() => {
      if (!gameState) return;
      const spd = Math.sqrt(gameState.ball.dx ** 2 + gameState.ball.dy ** 2);
      if (spd < BALL_SPEED * 0.8) { const f = (BALL_SPEED * 0.9) / spd; gameState.ball.dx *= f; gameState.ball.dy *= f; }
    }, 3000);
  }
}

// ========== קלט ==========
let lastTouchX = null;
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); lastTouchX = e.touches[0].clientX; }, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault(); if (!gameState || lastTouchX === null) return;
  const cur = e.touches[0].clientX;
  const dx = (cur - lastTouchX) / (canvas.width / 420);
  lastTouchX = cur;
  const padW = isP1 ? gameState.p1PadW : gameState.p2PadW;
  myPadTarget = Math.max(0, Math.min(420 - padW, myPadTarget + dx));
}, { passive: false });
canvas.addEventListener('touchend', () => { lastTouchX = null; });
canvas.addEventListener('touchcancel', () => { lastTouchX = null; });
canvas.addEventListener('mousemove', (e) => {
  if (!gameState) return;
  const rect = canvas.getBoundingClientRect();
  const gx = (e.clientX - rect.left) / (canvas.width / 420);
  const padW = isP1 ? gameState.p1PadW : gameState.p2PadW;
  myPadTarget = Math.max(0, Math.min(420 - padW, gx - padW / 2));
});

// ========== Firebase ==========
function syncFullState() {
  if (isAIMode || !isP1 || !gameState || !gameStateRef) return;
  set(gameStateRef, gameState);
}
function syncMyPad() {
  if (isAIMode || !gameStateRef) return;
  update(gameStateRef, { [isP1 ? 'p1PadX' : 'p2PadX']: myPadTarget }).catch(() => {});
}

function startGameStateListener() {
  if (gameStateUnsubscribe) { gameStateUnsubscribe(); gameStateUnsubscribe = null; }
  if (!gameStateRef) return;
  gameStateUnsubscribe = onValue(gameStateRef, (snap) => {
    const val = snap.val();
    if (!val || !val.started) return;
    if (!isP1) {
      const myPad = val.p2PadX;
      gameState = val;
      gameState.p2PadX = myPad;
    } else {
      if (val.p2PadX !== undefined && gameState) gameState.p2PadX = val.p2PadX;
      // Pick up rematch signals
      if (val.rematchP2 !== undefined && gameState) gameState.rematchP2 = val.rematchP2;
    }
    // Sync match wins
    if (val.p1Wins !== undefined) { p1Wins = val.p1Wins; document.getElementById('wins-p1').textContent = p1Wins; }
    if (val.p2Wins !== undefined) { p2Wins = val.p2Wins; document.getElementById('wins-p2').textContent = p2Wins; }
    if (val.rematchP1 && val.rematchP2 && val.gameOver) {
      // Both agreed to rematch
      document.getElementById('match-modal').style.display = 'none';
      if (isP1) startNewMatch();
    }
    if (val.gameOver && val.winner && !gameRunning) {
      handleRoundEnd(val.winner, false);
    }
  });
}

// ========== פיזיקה ==========
function ballHitsBrick(b, brick) {
  return b.x + BALL_R > brick.x && b.x - BALL_R < brick.x + brick.w && b.y + BALL_R > brick.y && b.y - BALL_R < brick.y + brick.h;
}
function padBounce(ball, padX, padW, goUp) {
  const angle = ((ball.x - padX) / padW - 0.5) * Math.PI * 0.7;
  const spd = Math.max(BALL_SPEED, Math.sqrt(ball.dx ** 2 + ball.dy ** 2));
  ball.dx = spd * Math.sin(angle);
  ball.dy = goUp ? -spd * Math.cos(angle) : spd * Math.cos(angle);
  if (Math.abs(ball.dy) < 2) ball.dy = goUp ? -2 : 2;
}
function aiUpdate(dt) {
  if (!gameState) return;
  const targetX = gameState.ball.x - gameState.p2PadW / 2;
  const ease = gameState.ball.dy < 0 ? 0.08 : 0.03;
  gameState.p2PadX += (targetX - gameState.p2PadX) * ease * dt;
  gameState.p2PadX = Math.max(0, Math.min(420 - gameState.p2PadW, gameState.p2PadX));
}

function updatePhysics(dt) {
  if (!gameState || gameState.gameOver) return;
  const ball = gameState.ball;
  ball.x += ball.dx * dt; ball.y += ball.dy * dt;

  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); }
  if (ball.x + BALL_R >= 420) { ball.x = 420 - BALL_R; ball.dx = -Math.abs(ball.dx); }

  if (ball.dy > 0 && ball.y + BALL_R >= P1_PAD_Y && ball.y + BALL_R <= P1_PAD_Y + PAD_H + 6) {
    if (ball.x >= gameState.p1PadX - 6 && ball.x <= gameState.p1PadX + gameState.p1PadW + 6) {
      ball.y = P1_PAD_Y - BALL_R; padBounce(ball, gameState.p1PadX, gameState.p1PadW, true);
    }
  }
  if (ball.dy < 0 && ball.y - BALL_R <= P2_PAD_Y + PAD_H && ball.y - BALL_R >= P2_PAD_Y - 6) {
    if (ball.x >= gameState.p2PadX - 6 && ball.x <= gameState.p2PadX + gameState.p2PadW + 6) {
      ball.y = P2_PAD_Y + PAD_H + BALL_R; padBounce(ball, gameState.p2PadX, gameState.p2PadW, false);
    }
  }

  for (const brick of gameState.topBricks) {
    if (!brick.alive) continue;
    if (ballHitsBrick(ball, brick)) { brick.hp--; if (brick.hp <= 0) { brick.alive = false; gameState.p1Score += 10; maybeSpawnPowerup(brick.x + brick.w / 2, brick.y + brick.h, false); } ball.dy = Math.abs(ball.dy); break; }
  }
  for (const brick of gameState.bottomBricks) {
    if (!brick.alive) continue;
    if (ballHitsBrick(ball, brick)) { brick.hp--; if (brick.hp <= 0) { brick.alive = false; gameState.p2Score += 10; maybeSpawnPowerup(brick.x + brick.w / 2, brick.y - 10, true); } ball.dy = -Math.abs(ball.dy); break; }
  }

  for (let i = gameState.balls.length - 1; i >= 0; i--) {
    const eb = gameState.balls[i];
    eb.x += eb.dx * dt; eb.y += eb.dy * dt;
    if (eb.x - BALL_R <= 0) { eb.x = BALL_R; eb.dx = Math.abs(eb.dx); }
    if (eb.x + BALL_R >= 420) { eb.x = 420 - BALL_R; eb.dx = -Math.abs(eb.dx); }
    if (eb.y < -20 || eb.y > FIELD_H + 20) { gameState.balls.splice(i, 1); continue; }
    if (eb.dy > 0 && eb.y + BALL_R >= P1_PAD_Y && eb.y + BALL_R <= P1_PAD_Y + PAD_H + 4) {
      if (eb.x >= gameState.p1PadX - 4 && eb.x <= gameState.p1PadX + gameState.p1PadW + 4) eb.dy = -Math.abs(eb.dy);
    }
    if (eb.dy < 0 && eb.y - BALL_R <= P2_PAD_Y + PAD_H && eb.y - BALL_R >= P2_PAD_Y - 4) {
      if (eb.x >= gameState.p2PadX - 4 && eb.x <= gameState.p2PadX + gameState.p2PadW + 4) eb.dy = Math.abs(eb.dy);
    }
    for (const brick of gameState.topBricks) { if (!brick.alive) continue; if (ballHitsBrick(eb, brick)) { brick.hp--; if (brick.hp <= 0) { brick.alive = false; gameState.p1Score += 10; } eb.dy = Math.abs(eb.dy); break; } }
    for (const brick of gameState.bottomBricks) { if (!brick.alive) continue; if (ballHitsBrick(eb, brick)) { brick.hp--; if (brick.hp <= 0) { brick.alive = false; gameState.p2Score += 10; } eb.dy = -Math.abs(eb.dy); break; } }
  }

  for (let i = gameState.powerups.length - 1; i >= 0; i--) {
    const pu = gameState.powerups[i]; pu.y += pu.dy * dt;
    if (pu.dy > 0 && pu.y >= P1_PAD_Y && pu.y <= P1_PAD_Y + PAD_H + 10) {
      if (pu.x >= gameState.p1PadX && pu.x <= gameState.p1PadX + gameState.p1PadW) { applyPowerup(pu.type, 'p1'); gameState.powerups.splice(i, 1); continue; }
    }
    if (pu.dy < 0 && pu.y <= P2_PAD_Y + PAD_H && pu.y >= P2_PAD_Y - 5) {
      if (pu.x >= gameState.p2PadX && pu.x <= gameState.p2PadX + gameState.p2PadW) { applyPowerup(pu.type, 'p2'); gameState.powerups.splice(i, 1); continue; }
    }
    if (pu.y > FIELD_H + 20 || pu.y < -20) gameState.powerups.splice(i, 1);
  }

  if (ball.y - BALL_R < -10) endRound('p1');
  else if (ball.y + BALL_R > FIELD_H + 10) endRound('p2');
  if (gameState && !gameState.gameOver && gameState.topBricks.every(b => !b.alive)) endRound('p1');
  if (gameState && !gameState.gameOver && gameState.bottomBricks.every(b => !b.alive)) endRound('p2');
}

// ========== לולאה ==========
function gameLoop(time) {
  if (!gameRunning) return;
  const dt = Math.min((time - lastTime) / 16.67, 3); lastTime = time;
  if (!gameState || gameState.gameOver) { drawGame(); return; }

  if (isP1) gameState.p1PadX += (myPadTarget - gameState.p1PadX) * 0.3 * dt;
  else gameState.p2PadX += (myPadTarget - gameState.p2PadX) * 0.3 * dt;

  if (isP1 || isAIMode) {
    if (isAIMode) aiUpdate(dt);
    updatePhysics(dt);
    document.getElementById('wins-p1').textContent = p1Wins;
    document.getElementById('wins-p2').textContent = p2Wins;
    if (!isAIMode && Math.random() < 0.15) syncFullState();
  }
  syncMyPad();
  drawGame();
  requestAnimationFrame(gameLoop);
}

// ========== ציור ==========
function drawGame() {
  if (!gameState) return;
  const w = canvas.width, h = canvas.height; ctx.clearRect(0, 0, w, h);
  const flip = !isP1 && !isAIMode;
  ctx.save();
  if (flip) { ctx.translate(w, h); ctx.rotate(Math.PI); }

  ctx.fillStyle = 'rgba(15, 19, 32, 0.6)'; ctx.fillRect(0, 0, w, h);
  ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = S(1);
  ctx.setLineDash([S(8), S(8)]); ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke(); ctx.setLineDash([]);

  for (const b of gameState.topBricks) { if (b.alive) drawBrick(b, p2Color); }
  for (const b of gameState.bottomBricks) { if (b.alive) drawBrick(b, p1Color); }
  drawPad(gameState.p2PadX, P2_PAD_Y, gameState.p2PadW, p2Color);
  drawPad(gameState.p1PadX, P1_PAD_Y, gameState.p1PadW, p1Color);
  drawBall(gameState.ball);
  for (const eb of gameState.balls) drawBall(eb);
  for (const pu of gameState.powerups) {
    ctx.fillStyle = pu.color || '#F5C842'; ctx.shadowColor = pu.color || '#F5C842'; ctx.shadowBlur = S(8);
    ctx.beginPath(); ctx.roundRect(S(pu.x - pu.w / 2), S(pu.y - pu.h / 2), S(pu.w), S(pu.h), S(4)); ctx.fill(); ctx.shadowBlur = 0;
  }
  ctx.restore();
}
function drawBrick(brick, color) {
  const x = S(brick.x), y = S(brick.y), w = S(brick.w), h = S(brick.h);
  ctx.fillStyle = color; ctx.shadowColor = color; ctx.shadowBlur = S(6);
  ctx.beginPath(); ctx.roundRect(x, y, w, h, S(4)); ctx.fill(); ctx.shadowBlur = 0;
  ctx.fillStyle = 'rgba(255,255,255,0.2)'; ctx.beginPath(); ctx.roundRect(x + S(2), y + S(1), w - S(4), h / 2 - S(1), S(2)); ctx.fill();
}
function drawPad(px, py, pw, color) {
  const x = S(px), y = S(py), w = S(pw), h = S(PAD_H);
  ctx.shadowColor = color; ctx.shadowBlur = S(12); ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(x, y, w, h, S(7)); ctx.fill(); ctx.shadowBlur = 0;
  const grad = ctx.createLinearGradient(x, y, x, y + h);
  grad.addColorStop(0, 'rgba(255,255,255,0.35)'); grad.addColorStop(1, 'rgba(255,255,255,0)');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.roundRect(x + S(2), y + S(1), w - S(4), h / 2, S(5)); ctx.fill();
}
function drawBall(ball) {
  const x = S(ball.x), y = S(ball.y), r = S(BALL_R);
  ctx.shadowColor = '#fff'; ctx.shadowBlur = S(10); ctx.fillStyle = '#fff';
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.1, x, y, r);
  grad.addColorStop(0, 'rgba(255,255,255,0.9)'); grad.addColorStop(1, 'rgba(255,255,255,0.3)');
  ctx.fillStyle = grad; ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();
}

// ========== Confetti ==========
function launchConfetti(color) {
  const c = document.createElement('div'); c.className = 'confetti-container'; document.body.appendChild(c);
  const colors = [color, '#F5C842', '#3DD68C', '#FF5C7A', '#4DB8FF', '#FFB347', '#E879F9'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = `${Math.random() * 100}%`;
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
    p.style.animationDuration = `${1.5 + Math.random() * 2}s`;
    p.style.animationDelay = `${Math.random() * 0.5}s`;
    p.style.width = `${6 + Math.random() * 8}px`; p.style.height = `${6 + Math.random() * 8}px`;
    p.style.borderRadius = Math.random() > 0.5 ? '50%' : '2px';
    c.appendChild(p);
  }
  setTimeout(() => c.remove(), 4000);
}

// ========== סוף סיבוב ==========
function endRound(winner) {
  if (!gameState || gameState.gameOver) return;
  gameState.gameOver = true; gameState.winner = winner;
  gameRunning = false;

  if (winner === 'p1') p1Wins++; else p2Wins++;
  roundNum++;
  gameState.p1Wins = p1Wins; gameState.p2Wins = p2Wins; gameState.roundNum = roundNum;
  gameState.rematchP1 = false; gameState.rematchP2 = false;
  syncFullState();
  handleRoundEnd(winner, true);
}

function handleRoundEnd(winner, isLocal) {
  gameRunning = false;
  document.getElementById('wins-p1').textContent = p1Wins;
  document.getElementById('wins-p2').textContent = p2Wins;

  const winnerName = winner === 'p1' ? p1DisplayName : p2DisplayName;
  const winnerColor = winner === 'p1' ? p1Color : p2Color;
  const winnerEmoji = winner === 'p1' ? p1Emoji : p2Emoji;

  // Check if match is over (best of 3)
  const matchOver = p1Wins >= WINS_NEEDED || p2Wins >= WINS_NEEDED;

  if (matchOver) {
    // Show match winner modal after a brief delay
    if (isLocal || true) launchConfetti(winnerColor);
    setTimeout(() => showMatchModal(winner), 800);
  } else {
    // Show round banner, then auto-start next round
    showRoundBanner(winnerName, winnerEmoji, winnerColor);
    if (isP1 || isAIMode) {
      setTimeout(() => startNextRound(), 2500);
    }
  }
}

function showRoundBanner(name, emoji, color) {
  const banner = document.getElementById('round-banner');
  banner.style.display = 'block';
  banner.style.color = color;
  banner.style.borderColor = color;
  banner.style.boxShadow = `0 0 40px ${color}40`;
  banner.innerHTML = `🏅 ${emoji} ${name} ניצח/ה סיבוב!`;
  setTimeout(() => { banner.style.display = 'none'; }, 2200);
}

function startNextRound() {
  if (!gameState) return;
  const topBricks = [], bottomBricks = [];
  const brickW = (420 - 2 * BRICK_PAD_X - (BRICK_COLS - 1) * BRICK_GAP) / BRICK_COLS;
  for (let r = 0; r < BRICK_ROWS; r++) {
    for (let c = 0; c < BRICK_COLS; c++) {
      const x = BRICK_PAD_X + c * (brickW + BRICK_GAP);
      topBricks.push({ x, y: 30 + r * (BRICK_H + BRICK_GAP), w: brickW, h: BRICK_H, alive: true, hp: 1 });
      bottomBricks.push({ x, y: FIELD_H - 30 - (BRICK_ROWS - r) * (BRICK_H + BRICK_GAP), w: brickW, h: BRICK_H, alive: true, hp: 1 });
    }
  }
  gameState.ball = { x: 210, y: FIELD_H / 2, dx: BALL_SPEED * 0.7, dy: (roundNum % 2 === 0 ? -1 : 1) * BALL_SPEED * 0.7 };
  gameState.p1PadX = 210 - PAD_W / 2; gameState.p2PadX = 210 - PAD_W / 2;
  gameState.p1PadW = PAD_W; gameState.p2PadW = PAD_W;
  gameState.topBricks = topBricks; gameState.bottomBricks = bottomBricks;
  gameState.powerups = []; gameState.balls = [];
  gameState.p1Score = 0; gameState.p2Score = 0;
  gameState.gameOver = false; gameState.winner = null;
  gameState.p1Wins = p1Wins; gameState.p2Wins = p2Wins; gameState.roundNum = roundNum;
  gameState.timestamp = Date.now();
  myPadTarget = 210 - PAD_W / 2;
  if (gameStateRef) set(gameStateRef, gameState);
  gameRunning = true; lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// ========== Match Modal ==========
function showMatchModal(winner) {
  const isWinner = (winner === 'p1' && isP1) || (winner === 'p2' && !isP1);
  const winnerName = winner === 'p1' ? p1DisplayName : p2DisplayName;
  const winnerColor = winner === 'p1' ? p1Color : p2Color;
  const winnerEmoji = winner === 'p1' ? p1Emoji : p2Emoji;

  document.getElementById('mm-icon').textContent = isWinner || isAIMode ? '🏆' : '😢';
  const titleEl = document.getElementById('mm-title');
  titleEl.textContent = `${winnerEmoji} ${winnerName} ניצח/ה!`;
  titleEl.style.color = winnerColor;
  document.getElementById('mm-sub').textContent = `${p1Wins} - ${p2Wins}`;

  const btnsDiv = document.getElementById('mm-btns');
  btnsDiv.innerHTML = '';

  if (isAIMode) {
    btnsDiv.innerHTML = `
      <button class="mbtn mbtn-primary" id="btn-rematch-ai">🔄 שחק שוב</button>
      <button class="mbtn mbtn-secondary" onclick="goHome()">🏠 חזרה לתפריט</button>
    `;
    document.getElementById('match-modal').style.display = 'flex';
    document.getElementById('btn-rematch-ai').onclick = () => {
      document.getElementById('match-modal').style.display = 'none';
      startNewMatch();
    };
  } else {
    // Multiplayer - need mutual consent
    btnsDiv.innerHTML = `
      <button class="mbtn mbtn-primary" id="btn-rematch">🔄 שחק שוב</button>
      <button class="mbtn mbtn-secondary" onclick="goHome()">🏠 חזרה לתפריט</button>
    `;
    document.getElementById('match-modal').style.display = 'flex';

    document.getElementById('btn-rematch').onclick = () => {
      // Signal my rematch wish
      const key = isP1 ? 'rematchP1' : 'rematchP2';
      update(gameStateRef, { [key]: true });

      // Check if opponent already agreed
      const otherKey = isP1 ? 'rematchP2' : 'rematchP1';
      if (gameState && gameState[otherKey]) {
        // Both ready
        document.getElementById('match-modal').style.display = 'none';
        if (isP1) startNewMatch();
      } else {
        // Wait for opponent
        const btn = document.getElementById('btn-rematch');
        btn.className = 'mbtn mbtn-waiting';
        btn.textContent = '⏳ ממתין להסכמה...';
        btn.onclick = null;
      }
    };
  }
}

function startNewMatch() {
  p1Wins = 0; p2Wins = 0; roundNum = 0;
  gameState = createInitialState();
  if (gameStateRef) set(gameStateRef, gameState);
  document.getElementById('match-modal').style.display = 'none';
  document.getElementById('wins-p1').textContent = '0';
  document.getElementById('wins-p2').textContent = '0';
  myPadTarget = 210 - PAD_W / 2;
  gameRunning = true; lastTime = performance.now();
  requestAnimationFrame(gameLoop);
}

// ========== HUD ==========
function updateHUD(p1Name, p1Col, p1Em, p2Name, p2Col, p2Em) {
  p1DisplayName = p1Name; p2DisplayName = p2Name;
  p1Color = p1Col; p2Color = p2Col;
  p1Emoji = p1Em; p2Emoji = p2Em;
  document.getElementById('name-p1').textContent = `${p1Em} ${p1Name}`;
  document.getElementById('name-p2').textContent = `${p2Em} ${p2Name}`;
  document.getElementById('card-p1').style.borderColor = p1Col;
  document.getElementById('card-p2').style.borderColor = p2Col;
  document.getElementById('wins-p1').style.color = p1Col;
  document.getElementById('wins-p2').style.color = p2Col;
}

function startGamePlay() {
  document.getElementById('match-modal').style.display = 'none';
  gameState = createInitialState();
  if (gameStateRef) set(gameStateRef, gameState);
  startGameStateListener();
  gameRunning = true; lastTime = performance.now();
  resizeCanvas();
  requestAnimationFrame(gameLoop);
}

// ========== initSession ==========
async function initSession() {
  try {
    const roomPath = isAIMode ? `rooms_v3/${GAME_ID}_ai/${myName}` : `rooms_v3/${GAME_ID}/${myName}`;
    const myJoinedAt = Date.now();

    if (isAIMode) {
      await set(ref(db, roomPath), { name: displayName, color: myColor, emoji: myEmoji, joinedAt: myJoinedAt, timestamp: myJoinedAt, active: true });
      startHeartbeat(roomPath, myJoinedAt);
      isP1 = true;
      updateHUD(displayName, myColor, myEmoji, '🤖 מחשב', '#FFB347', '🤖');
      startGamePlay();
    } else {
      const existingSnap = await get(ref(db, roomPath));
      const existingData = existingSnap.val();
      const myJoinedAtFinal = existingData?.joinedAt || myJoinedAt;

      await set(ref(db, roomPath), { name: displayName, color: myColor, emoji: myEmoji, joinedAt: myJoinedAtFinal, timestamp: Date.now(), active: true });
      startHeartbeat(roomPath, myJoinedAtFinal);

      const snapAfter = await get(roomRef);
      const playersAfter = snapAfter.val() || {};
      const playerIds = Object.keys(playersAfter).sort((a, b) => (playersAfter[a].joinedAt || 0) - (playersAfter[b].joinedAt || 0));

      if (playerIds.length <= 2) {
        if (playerIds.length === 1) {
          isP1 = true; currentGameId = null;
          gameStateRef = ref(db, `game/${GAME_ID}/pending`);
        } else {
          const first = playerIds[0], second = playerIds[1];
          isP1 = myName === first;
          currentGameId = `${first}_${second}`;
          gameStateRef = ref(db, `game/${GAME_ID}/${currentGameId}`);
          remove(ref(db, `game/${GAME_ID}/pending`));
          const p1D = playersAfter[first], p2D = playersAfter[second];
          updateHUD(p1D.name, p1D.color, p1D.emoji, p2D.name, p2D.color, p2D.emoji);
          startGamePlay();
        }
      } else {
        stopHeartbeat(); await remove(ref(db, roomPath));
        document.getElementById('alert-modal').style.display = 'flex';
        document.getElementById('alert-modal').querySelector('.alert-icon').textContent = '🚫';
        document.getElementById('modal-msg').textContent = 'המשחק מלא! כבר משחקים כאן שני שחקנים';
        return;
      }

      roomListenerUnsubscribe = onValue(roomRef, (snap) => {
        const players = snap.val() || {};
        const names = Object.keys(players).sort((a, b) => (players[a].joinedAt || 0) - (players[b].joinedAt || 0));
        if (names.length === 0 && gameStateRef && currentGameId) set(gameStateRef, null);
        if (lastPlayerCount === 2 && names.length < 2) {
          let ln = '', le = '';
          if (window.lastPlayersSnapshot) { for (const [id, p] of Object.entries(window.lastPlayersSnapshot)) { if (!players[id]) { ln = p.name; le = p.emoji; break; } } }
          handleOpponentLeft(ln, le);
        }
        if (!currentGameId && names.length === 2) {
          const first = names[0], second = names[1];
          isP1 = myName === first;
          currentGameId = `${first}_${second}`;
          gameStateRef = ref(db, `game/${GAME_ID}/${currentGameId}`);
          remove(ref(db, `game/${GAME_ID}/pending`));
          updateHUD(players[first].name, players[first].color, players[first].emoji, players[second].name, players[second].color, players[second].emoji);
          get(gameStateRef).then(snap => { if (!snap.val()) startGamePlay(); });
          startOpponentCheck();
        }
        window.lastPlayersSnapshot = players;
        lastPlayerCount = names.length;
      });
      startOpponentCheck();
    }
  } catch (e) { console.error('initSession err:', e); }
}

initSession();
</script>
