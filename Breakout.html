<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0F1320">
<title>שובר לבנים - משחקי אמה וריף</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --emma: #FF5C7A; --rif: #4DB8FF; --gold: #F5C842; --green: #3DD68C;
    --bg: #0F1320; --bg-mid: #1a2942;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

  body {
    background: linear-gradient(135deg, var(--bg) 0%, var(--bg-mid) 100%);
    font-family: 'Heebo', sans-serif;
    overflow: hidden; touch-action: none;
    height: 100dvh; width: 100vw;
    display: flex; flex-direction: column; align-items: center;
    position: relative; color: white;
  }

  body::before {
    content: ''; position: fixed; inset: 0; z-index: -2; pointer-events: none;
    background:
      radial-gradient(ellipse at 20% 30%, rgba(255,92,122,0.15) 0%, transparent 50%),
      radial-gradient(ellipse at 80% 70%, rgba(77,184,255,0.1) 0%, transparent 50%);
  }
  .stars {
    position: fixed; inset: 0; z-index: -1;
    background-image: radial-gradient(white 1px, transparent 1px);
    background-size: 60px 60px; opacity: 0.08; pointer-events: none;
  }

  .floating-emoji {
    position: fixed; font-size: 4.5rem; opacity: 0.12;
    pointer-events: none; z-index: 601; filter: blur(2px);
    user-select: none; -webkit-user-select: none;
    animation: floatEmoji 26s infinite ease-in-out;
  }
  @keyframes floatEmoji {
    0%, 100% { transform: translate(0, 0) rotate(0deg) scale(1); }
    12.5% { transform: translate(110px, -95px) rotate(35deg) scale(1.05); }
    25% { transform: translate(85px, 75px) rotate(15deg) scale(0.98); }
    37.5% { transform: translate(-95px, 110px) rotate(-30deg) scale(0.95); }
    50% { transform: translate(-110px, -80px) rotate(-20deg) scale(1.02); }
    62.5% { transform: translate(-70px, -120px) rotate(40deg) scale(1.08); }
    75% { transform: translate(100px, -65px) rotate(-10deg) scale(0.97); }
    87.5% { transform: translate(75px, 90px) rotate(25deg) scale(1.03); }
  }

  /* ========== HEADER / SCORE BAR ========== */
  .header {
    display: flex; justify-content: space-around; align-items: stretch;
    width: 100%; max-width: 400px; padding: 10px 12px 6px; gap: 8px;
    flex-shrink: 0; z-index: 10;
  }

  .score-box {
    flex: 1;
    background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
    padding: 10px 8px 8px; border-radius: 18px; text-align: center;
    border: 2px solid transparent; transition: all 0.3s ease;
    backdrop-filter: blur(10px); position: relative; overflow: hidden;
    display: flex; flex-direction: column; align-items: center; gap: 2px;
  }

  .score-box::before {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
    pointer-events: none;
  }

  .score-box .name {
    font-weight: 900; font-size: 0.8rem; white-space: nowrap;
    overflow: hidden; text-overflow: ellipsis; width: 100%;
  }

  .score-box .wins {
    font-family: 'Fredoka One', cursive; font-size: 2rem; font-weight: 900; line-height: 1;
  }

  .score-box .wins-label {
    font-size: 0.6rem; color: rgba(255,255,255,0.5); font-weight: 700;
  }

  .vs-box {
    display: flex; align-items: center; justify-content: center;
    min-width: 36px; font-family: 'Fredoka One', cursive;
    font-size: 0.9rem; color: var(--gold); flex-shrink: 0;
  }

  /* ========== CANVAS ========== */
  #gameCanvas {
    display: block;
    background: rgba(15, 19, 32, 0.6);
    border-radius: 14px;
    border: 1.5px solid rgba(255,255,255,0.08);
    box-shadow: 0 0 30px rgba(77,184,255,0.1), 0 0 30px rgba(255,92,122,0.1);
    flex-shrink: 1;
  }

  /* ========== ROUND BANNER ========== */
  #round-banner {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 16px 28px; border-radius: 20px; font-weight: 900; font-size: 1.4rem;
    z-index: 300; pointer-events: none; text-align: center;
    border: 2.5px solid var(--gold);
    background: linear-gradient(135deg, rgba(15,19,32,0.95) 0%, rgba(26,41,66,0.95) 100%);
    backdrop-filter: blur(12px);
    box-shadow: 0 0 40px rgba(245,200,66,0.3);
    animation: bannerIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    display: none;
  }
  @keyframes bannerIn {
    0% { transform: translate(-50%, -50%) scale(0.5); opacity: 0; }
    100% { transform: translate(-50%, -50%) scale(1); opacity: 1; }
  }

  /* ========== MATCH END MODAL ========== */
  #match-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.88); z-index: 500;
    align-items: center; justify-content: center; padding: 20px;
  }

  .match-box {
    background: linear-gradient(135deg, #1a2942 0%, #0F1320 100%);
    color: white; padding: 32px 24px; border-radius: 28px; text-align: center;
    width: 100%; max-width: 320px; border: 2px solid rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
  }

  .match-box .match-icon { font-size: 3.5rem; margin-bottom: 8px; }
  .match-box .match-title { font-family: 'Fredoka One', cursive; font-size: 1.6rem; margin-bottom: 4px; }
  .match-box .match-sub { font-size: 0.95rem; color: #aaa; margin-bottom: 18px; }

  .match-btns { display: flex; flex-direction: column; gap: 10px; }

  .mbtn {
    padding: 14px 20px; border: none; border-radius: 16px;
    font-family: 'Heebo', sans-serif; font-size: 1rem; font-weight: 700;
    cursor: pointer; transition: all 0.2s; user-select: none;
  }
  .mbtn:active { transform: scale(0.95); }

  .mbtn-primary {
    background: linear-gradient(135deg, var(--emma), var(--rif));
    color: white; box-shadow: 0 4px 15px rgba(255,92,122,0.3);
  }
  .mbtn-secondary {
    background: rgba(255,255,255,0.08); color: white;
    border: 1px solid rgba(255,255,255,0.15);
  }
  .mbtn-waiting {
    background: rgba(245,200,66,0.15); color: var(--gold);
    border: 1.5px solid rgba(245,200,66,0.3);
    animation: waitPulse 1.5s ease-in-out infinite;
  }
  @keyframes waitPulse {
    0%, 100% { box-shadow: 0 0 0 rgba(245,200,66,0); }
    50% { box-shadow: 0 0 20px rgba(245,200,66,0.3); }
  }

  /* ========== ALERT MODAL ========== */
  #alert-modal {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.85); z-index: 1000;
    align-items: center; justify-content: center; padding: 20px;
  }
  .alert-box {
    background: linear-gradient(135deg, #1a2942 0%, #0F1320 100%);
    color: white; padding: 36px 28px; border-radius: 28px; text-align: center;
    width: 100%; max-width: 320px; border: 2px solid rgba(255,255,255,0.1);
  }
  .alert-box .alert-icon { font-size: 3rem; margin-bottom: 10px; }
  .alert-box .alert-msg { font-size: 1.05rem; font-weight: 600; line-height: 1.6; }
  .alert-box .btn-reset {
    margin-top: 18px; padding: 12px 24px; border-radius: 14px; border: none;
    background: white; color: #0F1320; font-weight: 900; font-size: 0.95rem;
    cursor: pointer; font-family: 'Heebo', sans-serif;
  }
  .alert-box .btn-reset:active { transform: scale(0.96); }

  /* ========== POWER-UP TOAST ========== */
  .powerup-toast {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
    padding: 10px 18px; border-radius: 10px; font-weight: 700; font-size: 1.05em;
    color: white; z-index: 150; pointer-events: none;
    animation: toastAnim 1.4s ease-out forwards;
  }
  @keyframes toastAnim {
    0% { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    70% { opacity: 1; transform: translate(-50%, -70%) scale(1.1); }
    100% { opacity: 0; transform: translate(-50%, -90%) scale(0.8); }
  }

  /* ========== HOME BUTTON ========== */
  .btn-home {
    position: absolute; top: 10px; right: 10px; z-index: 60;
    background: rgba(0,0,0,0.4); border: 1px solid rgba(255,255,255,0.15);
    color: white; width: 38px; height: 38px; border-radius: 50%;
    font-size: 1.1em; cursor: pointer; display: flex; align-items: center; justify-content: center;
    backdrop-filter: blur(6px); user-select: none;
  }
  .btn-home:active { transform: scale(0.9); }

  .btn-home-inline {
    position: absolute; top: 5px; left: 5px; z-index: 5;
    background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.15);
    color: white; width: 26px; height: 26px; border-radius: 50%;
    font-size: 0.75em; cursor: pointer; display: flex; align-items: center; justify-content: center;
    padding: 0; user-select: none;
  }
  .btn-home-inline:active { transform: scale(0.9); }

  .btn-home-card {
    position: absolute; top: 50%; right: 6px; z-index: 5;
    transform: translateY(-50%);
    background: none; border: none;
    color: white; cursor: pointer; user-select: none;
    font-size: 1.6rem; line-height: 1; padding: 0;
  }
  .btn-home-card:active { transform: translateY(-50%) scale(0.9); }

  /* Mode select */
  .mode-btn {
    width: 100%; max-width: 280px;
    padding: 18px 16px; border: 2px solid rgba(255,255,255,0.12);
    border-radius: 20px; background: rgba(255,255,255,0.04);
    color: white; cursor: pointer; display: flex; flex-direction: column;
    align-items: center; gap: 4px; transition: all 0.2s;
    font-family: 'Heebo', sans-serif; backdrop-filter: blur(8px);
  }
  .mode-btn:active { transform: scale(0.96); }
  .mode-btn:hover { background: rgba(255,255,255,0.08); border-color: rgba(245,200,66,0.4); box-shadow: 0 4px 20px rgba(245,200,66,0.15); }

  /* ========== CONFETTI ========== */
  .confetti-container { position: fixed; inset: 0; pointer-events: none; z-index: 1002; overflow: hidden; }
  .confetti-piece {
    position: absolute; width: 10px; height: 10px; top: -10px; border-radius: 2px;
    animation: confettiFall linear forwards;
  }
  @keyframes confettiFall {
    0% { transform: translateY(0) rotate(0deg); opacity: 1; }
    80% { opacity: 1; }
    100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
  }

  /* אנימציית +10/+1 שעולה ונעלמת */
  .pickup-float {
    position: fixed; z-index: 800; pointer-events: none;
    font-family: 'Fredoka One', cursive; font-weight: 900;
    animation: pickupFloat 0.9s ease-out forwards;
  }
  @keyframes pickupFloat {
    0% { opacity: 1; transform: translateY(0) scale(1); }
    50% { opacity: 1; transform: translateY(-30px) scale(1.3); }
    100% { opacity: 0; transform: translateY(-60px) scale(0.8); }
  }

  /* אנימציית פעימה לניקוד */
  @keyframes scorePulse {
    0% { transform: scale(1); }
    50% { transform: scale(1.3); }
    100% { transform: scale(1); }
  }
  .score-pulse {
    animation: scorePulse 0.3s ease-out;
  }

  /* אנימציית מילוי לב */
  @keyframes heartFill {
    0% { transform: scale(0.5); opacity: 0.5; }
    50% { transform: scale(1.4); }
    100% { transform: scale(1); opacity: 1; }
  }
  .heart-fill {
    display: inline-block;
    animation: heartFill 0.5s ease-out;
  }
</style>
</head>
<body>

<div class="stars"></div>
<div class="floating-emoji" style="top: 12%; left: 5%; animation-delay: 0s;">🧱</div>
<div class="floating-emoji" style="top: 55%; right: 6%; animation-delay: -8.5s;">☄️</div>
<div class="floating-emoji" style="bottom: 18%; left: 8%; animation-delay: -17s;">⚾</div>

<!-- HEADER SCORE BAR -->
<div class="header">
  <div class="score-box" id="card-p1" style="position:relative;">
    <div class="name" id="name-p1">שחקן 1</div>
    <div class="wins" id="wins-p1">0</div>
    <div class="wins-label">⭐</div>
    <button class="btn-home-card" id="btn-home-header" onclick="goToModeSelect()" style="display:none;">🏠</button>
  </div>
  <div class="vs-box">VS</div>
  <div class="score-box" id="card-p2">
    <div class="name" id="name-p2">שחקן 2</div>
    <div class="wins" id="wins-p2">0</div>
    <div class="wins-label">⭐</div>
  </div>
</div>

<!-- CANVAS -->
<canvas id="gameCanvas"></canvas>

<!-- ROUND BANNER (win/loss per round) -->
<div id="round-banner"></div>

<!-- MATCH END MODAL -->
<div id="match-modal">
  <div class="match-box">
    <div class="match-icon" id="mm-icon">🏆</div>
    <div class="match-title" id="mm-title">🏆</div>
    <div class="match-sub" id="mm-sub">2-1</div>
    <div class="match-btns" id="mm-btns"></div>
  </div>
</div>

<!-- MODE SELECT (shown when mode=ai from index) -->
<div id="mode-select" style="display:none; position:fixed; inset:0; z-index:600; background:rgba(15,19,32,0.85); align-items:center; justify-content:center; flex-direction:column; gap:20px; padding:20px;">
  <div style="font-size:3rem; margin-bottom:4px;">🧱</div>
  <div style="font-family:'Fredoka One',cursive; font-size:1.6rem; background:linear-gradient(135deg,var(--emma),var(--rif)); -webkit-background-clip:text; -webkit-text-fill-color:transparent;">שובר לבנים</div>
  <div style="color:#aaa; font-size:0.9rem; margin-bottom:10px;" id="mode-greeting"></div>
  <button class="mode-btn" id="btn-vs-ai" onclick="chooseMode('ai')">
    <span style="font-size:1.8rem;">🤖</span>
    <span style="font-weight:900; font-size:1rem;">מול מחשב</span>
    <span style="font-size:0.75rem; color:#aaa;">הטוב מ-3 סיבובים</span>
  </button>
  <button class="mode-btn" id="btn-solo" onclick="chooseMode('solo')">
    <span style="font-size:1.8rem;">🎮</span>
    <span style="font-weight:900; font-size:1rem;">משחק קלאסי</span>
    <span style="font-size:0.75rem; color:#aaa;">שבור את כל הלבנים • 3 חיים</span>
  </button>
  <button style="background:none; border:none; color:#888; font-size:0.85rem; cursor:pointer; margin-top:8px; text-decoration:underline; font-family:Heebo,sans-serif;" onclick="goHome()">🏠 חזרה</button>
</div>

<!-- ALERT MODAL (opponent left / full) -->
<div id="alert-modal">
  <div class="alert-box">
    <div class="alert-icon">⚠️</div>
    <p class="alert-msg" id="modal-msg">השחקן השני עזב/ה את המשחק</p>
    <button class="btn-reset" onclick="goHome()">חזרה לתפריט</button>
  </div>
</div>

<script>
// דיבוג - ירוץ תמיד גם אם ה-module נכשל
document.title = 'SCRIPT OK - URL: ' + location.search;
</script>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, onValue, update, remove, get }
  from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};

const app = initializeApp(firebaseConfig);
const db = getDatabase(app);

// ========== זיהוי שחקן ==========
const params = new URLSearchParams(location.search);
const displayName = params.get('player') || "משתמש";
const userDataStr = sessionStorage.getItem('myUser');
const userData = userDataStr ? JSON.parse(userDataStr) : null;
if (!userData) { window.location.href = 'index.html'; throw new Error('No user data'); }

const myName = userData.id;
const myColor = userData.color;
const myEmoji = userData.emoji;
const isGuest = userData.rawId === 'guest';
const modeFromURL = params.get('mode'); // 'ai' from index means "show choice screen"
let isAIMode = false;
let isSoloMode = false;
let isMultiplayer = !modeFromURL; // no mode = multiplayer from waiting room

const GAME_ID = 'breakout';
let roomRef = isMultiplayer ? ref(db, `rooms_v3/${GAME_ID}`) : ref(db, `rooms_v3/${GAME_ID}_ai`);
let gameStateRef = isMultiplayer ? null : ref(db, `game/${GAME_ID}_ai/${myName}`);
let progressRef = ref(db, `progress/${GAME_ID}/${myName}`);
let currentGameId = null;

// מסך בחירת מצב
window.chooseMode = (mode) => {
  document.title = 'בחירה: ' + mode;
  document.getElementById('mode-select').style.display = 'none';
  document.querySelector('.header').style.display = 'flex';
  document.getElementById('gameCanvas').style.display = 'block';
  if (mode === 'ai') {
    isAIMode = true; isSoloMode = false;
  } else {
    isAIMode = false; isSoloMode = true;
  }
  roomRef = ref(db, `rooms_v3/${GAME_ID}_ai`);
  gameStateRef = ref(db, `game/${GAME_ID}_ai/${myName}`);
  setTimeout(async () => {
    resizeCanvas();
    // טעינת התקדמות שמורה
    const saved = await loadProgress(mode === 'ai' ? 'ai' : 'solo');
    if (saved) {
      if (mode === 'solo') {
        soloLevel = saved.soloLevel || 0;
        soloLives = saved.soloLives || 3;
      } else {
        p1Wins = saved.p1Wins || 0;
        p2Wins = saved.p2Wins || 0;
        roundNum = saved.roundNum || 0;
      }
    }
    initSession();
  }, 100);
};

// ========== משתנים ==========
let isP1 = false;
let p1Color = '#FF5C7A', p2Color = '#4DB8FF';
let p1DisplayName = '', p2DisplayName = '';
let p1Emoji = '', p2Emoji = '';
let lastPlayerCount = 0;

// Match state (best of 3)
let p1Wins = 0, p2Wins = 0, roundNum = 0;
const WINS_NEEDED = 2;
let soloLives = 3;

// ========== Canvas ==========
const canvas = document.getElementById('gameCanvas');
const ctx = canvas.getContext('2d');

function resizeCanvas() {
  const headerH = document.querySelector('.header').offsetHeight || 80;
  const availH = window.innerHeight - headerH - 12;
  const maxW = Math.min(window.innerWidth - 12, 420);
  const maxH = Math.min(availH, 700);
  const ratio = Math.min(maxW / 420, maxH / 700);
  canvas.width = Math.floor(420 * ratio);
  canvas.height = Math.floor(700 * ratio);
}
// Delay first resize to let header render (only if visible)
setTimeout(() => { if (canvas.style.display !== 'none') resizeCanvas(); }, 50);
window.addEventListener('resize', resizeCanvas);

function S(v) { return v * (canvas.width / 420); }

// ========== קבועים ==========
const BRICK_COLS = 7, BRICK_H = 13, BRICK_GAP = 2, BRICK_PAD_X = 20;
const PAD_W = 80, PAD_H = 18, BALL_R = 7, BALL_SPEED = 4;
const FIELD_H = 700;

// שלבים למצב סולו
const SOLO_LEVELS = [
  { rows: 5,  name: 'שלב 1', emoji: '🐣', title: 'חימום',  speedMult: 0.9  },
  { rows: 9,  name: 'שלב 2', emoji: '💪', title: 'אתגר',   speedMult: 1.0  },
  { rows: 15, name: 'שלב 3', emoji: '👑', title: 'אגדה',   speedMult: 1.1  },
];

// ברירת מחדל למצבים אחרים (מול מחשב / מולטי)
const BRICK_ROWS = 5;
const P1_PAD_Y = FIELD_H - 30 - BRICK_ROWS * (BRICK_H + BRICK_GAP) - 20;
const P2_PAD_Y = 30 + BRICK_ROWS * (BRICK_H + BRICK_GAP) + 6;

// מצב סולו - שלב נוכחי
let soloLevel = 0; // 0-based index into SOLO_LEVELS
let soloStageStartTime = 0; // זמן תחילת שלב (לטיימר לבבות)
let soloHeartsSpawned = 0; // כמה לבבות יצאו בשלב הנוכחי (מקסימום 2)

// מיקום פד דינמי - במצב סולו מגיע מ-gameState
function getP1PadY() {
  if (isSoloMode && gameState && gameState.p1PadY !== undefined) return gameState.p1PadY;
  return P1_PAD_Y;
}

let gameState = null, gameRunning = false, lastTime = 0;
let myPadTarget = 210 - PAD_W / 2, powerupIdCounter = 0;
let lastSpeedUpTime = 0;
const SPEED_UP_INTERVAL = 5000;
const SPEED_UP_FACTOR = 1.08;

// אנימציית לבנים מתות
let dyingBricks = [];

// חלקיקים
let particles = []; // { x, y, dx, dy, color, life, maxLife, size }

// אנימציית פגיעת כדור בפד
let padHits = { p1: 0, p2: 0 }; // timestamp of last hit

// אנימציות פגיעה בקירות
let wallHits = []; // { x, y, time, color }

// trail כדור
let ballTrail = []; // { x, y, time }
const TRAIL_MAX = 12;

// אפקטים זמניים
let effects = {
  p1: { magnet: 0, meteor: 0, shrunk: 0, reversed: 0, shields: [], frozen: 0, fog: 0 },
  p2: { magnet: 0, meteor: 0, shrunk: 0, reversed: 0, shields: [], frozen: 0, fog: 0 },
  shared: { ghost: 0 },
  shieldHitAnim: { p1: [], p2: [] },
  // animation start timestamps
  animStart: {

function saveProgress() {

  try {
    if (isSoloMode) {
      set(progressRef, {
        mode: 'solo', soloLevel, soloLives,
        p1Score: gameState ? gameState.p1Score : 0,
        timestamp: Date.now()
      });
    } else if (isAIMode) {
      set(progressRef, {
        mode: 'ai', p1Wins, p2Wins, roundNum,
        timestamp: Date.now()
      });
    }
  } catch (e) { console.error('saveProgress err:', e); }
}

async function loadProgress(mode) {
  if (!progressRef) return null;
  try {
    const snap = await get(progressRef);
    const val = snap.val();
    if (val && val.mode === mode && Date.now() - val.timestamp < 24 * 60 * 60 * 1000) {
      return val; // תקף ל-24 שעות
    }
    return null;
  } catch (e) { console.error('loadProgress err:', e); return null; }
}

function clearProgress() {
  if (progressRef) remove(progressRef).catch(() => {});
}

  heartbeatInterval = setInterval(() => {

  }, 1000);
}
function stopHeartbeat() { if (heartbeatInterval) { clearInterval(heartbeatInterval); heartbeatInterval = null; } }

function startOpponentCheck() {
  if (isAIMode || opponentCheckInterval) return;
  opponentCheckInterval = setInterval(async () => {
    try {
      const snap = await get(roomRef);
      const players = snap.val() || {};
      const names = Object.keys(players);
      if (names.length === 1 && names[0] === myName && currentGameId) {
        let ln = '', le = '';
        if (window.lastPlayersSnapshot) { for (const [id, p] of Object.entries(window.lastPlayersSnapshot)) { if (id !== myName) { ln = p.name; le = p.emoji; break; } } }
        handleOpponentLeft(ln, le); return;
      }
      if (names.length === 2 && currentGameId) {
        const oid = names.find(n => n !== myName);
        if (oid && players[oid] && Date.now() - (players[oid].timestamp || 0) > 5000) {
          await remove(ref(db, `rooms_v3/${GAME_ID}/${oid}`));
          handleOpponentLeft(players[oid].name || '', players[oid].emoji || '');
        }
      }
    } catch (e) { console.error('opponent check err:', e); }
  }, 3000);
}
function stopOpponentCheck() { if (opponentCheckInterval) { clearInterval(opponentCheckInterval); opponentCheckInterval = null; } }

  if (roomListenerUnsubscribe) { roomListenerUnsubscribe(); roomListenerUnsubscribe = null; }

}

// יצירת לבנים בסגנון קיר - שורות זוגיות מוזזות חצי לבנה
function generateBricks(rows, startY, goingDown) {
  const bricks = [];
  const fullW = (420 - 2 * BRICK_PAD_X - (BRICK_COLS - 1) * BRICK_GAP) / BRICK_COLS;
  const halfShift = (fullW + BRICK_GAP) / 2;

  for (let r = 0; r < rows; r++) {
    const isOffset = r % 2 === 1; // שורות אי-זוגיות מוזזות
    const y = goingDown
      ? startY + r * (BRICK_H + BRICK_GAP)
      : startY - (rows - r) * (BRICK_H + BRICK_GAP);

    if (isOffset) {
      // שורה מוזזת - חצי לבנה בהתחלה, לבנים מלאות, חצי בסוף
      // חצי לבנה שמאלית
      const halfW = halfShift - BRICK_GAP;
      bricks.push({ x: BRICK_PAD_X, y, w: halfW, h: BRICK_H, alive: true, hp: 1, row: r });
      // לבנים מלאות
      for (let c = 0; c < BRICK_COLS - 1; c++) {
        const x = BRICK_PAD_X + halfShift + c * (fullW + BRICK_GAP);
        bricks.push({ x, y, w: fullW, h: BRICK_H, alive: true, hp: 1, row: r });
      }
      // חצי לבנה ימנית
      const lastX = BRICK_PAD_X + halfShift + (BRICK_COLS - 1) * (fullW + BRICK_GAP);
      const rightHalfW = 420 - BRICK_PAD_X - lastX;
      if (rightHalfW > 2) {
        bricks.push({ x: lastX, y, w: rightHalfW, h: BRICK_H, alive: true, hp: 1, row: r });
      }
    } else {
      // שורה רגילה
      for (let c = 0; c < BRICK_COLS; c++) {
        const x = BRICK_PAD_X + c * (fullW + BRICK_GAP);
        bricks.push({ x, y, w: fullW, h: BRICK_H, alive: true, hp: 1, row: r });
      }
    }
  }
  return bricks;
}

function createInitialState() {
  const topBricks = generateBricks(BRICK_ROWS, 30, true);
  const bottomBricks = generateBricks(BRICK_ROWS, FIELD_H - 30, false);
  return {

}

function weightedRandom(items) {
  const total = items.reduce((s, i) => s + i.weight, 0);
  let r = Math.random() * total;
  for (const item of items) {
    r -= item.weight;
    if (r <= 0) return item;
  }
  return items[items.length - 1];
}

function maybeSpawnPowerup(x, y, goingUp) {
  if (Math.random() < 0.35) {
    const catcher = goingUp ? 'p2' : 'p1';
    let available = POWERUP_TYPES.slice();
    if (gameState[catcher + 'ShieldUsed'] >= 2) {
      available = available.filter(p => p.type !== 'shield');
    }
    if (available.length === 0) return false;
    const pt = weightedRandom(available);
    gameState.powerups.push({
      x, y, dy: goingUp ? -2 : 2,
      type: pt.type, id: ++powerupIdCounter,
      emoji: pt.emoji, category: pt.category,
      danger: pt.danger || false,
      w: 28, h: 16,
    });
    return true;
  }
  return false;
}

function maybeSpawnDiamond(x, y) {
  if (Math.random() < 0.4) {
    gameState.powerups.push({
      x, y, dy: 2,
      type: 'diamond', id: ++powerupIdCounter,

function maybeSpawnHeart(x, y) {
  if (!isSoloMode || soloHeartsSpawned >= 2) return false;
  const elapsed = Date.now() - soloStageStartTime;

}

function spawnParticles(x, y, color, count) {
  for (let i = 0; i < count; i++) {
    const angle = Math.random() * Math.PI * 2;
    const speed = 1 + Math.random() * 3;
    particles.push({
      x, y,
      dx: Math.cos(angle) * speed,
      dy: Math.sin(angle) * speed,
      color,
      life: 0,
      maxLife: 300 + Math.random() * 300,
      size: 1.5 + Math.random() * 2.5,
    });
  }
}

// פיצוץ סביב לבנה - שובר שכנות
function splashBreak(brick, bricksArray, scorerKey, colorForDying) {
  const cx = brick.x + brick.w / 2;
  const cy = brick.y + brick.h / 2;
  const splashR = brick.w * 1.1; // רדיוס פיצוץ מצומצם
  for (const nb of bricksArray) {
    if (!nb.alive || nb === brick) continue;
    const nx = nb.x + nb.w / 2, ny = nb.y + nb.h / 2;
    if (Math.sqrt((cx - nx) ** 2 + (cy - ny) ** 2) < splashR) {
      nb.hp--;
      if (nb.hp <= 0) {
        nb.alive = false;
        if (!isSoloMode) { /* ניקוד בוטל */ }
        dyingBricks.push({ x: nb.x, y: nb.y, w: nb.w, h: nb.h, color: colorForDying, startTime: Date.now(), duration: 400 });
        spawnParticles(nb.x + nb.w / 2, nb.y + nb.h / 2, colorForDying, 6);
      }
    }
  }
}

function applyPowerup(type, catcher) {
  const info = POWERUP_TYPES.find(p => p.type === type);
  // בסולו: מסוכנים משפיעים על השחקן עצמו (p1), טובים על p1
  const opponent = isSoloMode ? 'p1' : (catcher === 'p1' ? 'p2' : 'p1');
  const now = Date.now();
  const EFFECT_DURATION = 3000;

  switch (type) {
    case 'wider':
      if (catcher === 'p1') { gameState.p1PadW = Math.min(PAD_W * 1.8, gameState.p1PadW + 25); effects.animStart.p1Wider = now; }
      else { gameState.p2PadW = Math.min(PAD_W * 1.8, gameState.p2PadW + 25); effects.animStart.p2Wider = now; }
      break;

    case 'shield': {
      const usedKey = catcher + 'ShieldUsed';
      if (gameState[usedKey] >= 2) break;
      gameState[usedKey]++;
      effects[catcher].shields.push({ active: true, startTime: now });
      break;
    }

    case 'magnet':
      effects[catcher].magnet = now + EFFECT_DURATION;
      effects.animStart[catcher + 'Magnet'] = now;
      break;

    case 'shrink':
      effects.animStart[opponent + 'Shrunk'] = now;
      if (opponent === 'p1') gameState.p1PadW = Math.max(50, gameState.p1PadW - 30);
      else gameState.p2PadW = Math.max(50, gameState.p2PadW - 30);
      break;

    case 'reverse':
      effects[opponent].reversed = now + EFFECT_DURATION;
      effects.animStart[opponent + 'Reversed'] = now;
      break;

    case 'bomb': {
      const enemyBricks = catcher === 'p1' ? gameState.topBricks : gameState.bottomBricks;
      const enemyColor = catcher === 'p1' ? p1Color : p2Color;
      const alive = enemyBricks.filter(b => b.alive);
      const count = Math.min(3, alive.length);
      for (let i = 0; i < count; i++) {
        const idx = Math.floor(Math.random() * alive.length);
        const pick = alive.splice(idx, 1)[0];
        pick.alive = false; pick.hp = 0;
        dyingBricks.push({ x: pick.x, y: pick.y, w: pick.w, h: pick.h, color: enemyColor, startTime: Date.now(), duration: 400 });
        spawnParticles(pick.x + pick.w / 2, pick.y + pick.h / 2, enemyColor, 10);
      }
      lastBombTime = Date.now();
      break;
    }

    case 'freeze':
      effects[opponent].frozen = now + EFFECT_DURATION;
      effects.animStart[opponent + 'Frozen'] = now;
      break;

    case 'extra_ball': {
      const spd = Math.sqrt(gameState.ball.dx ** 2 + gameState.ball.dy ** 2);
      const dirY = Math.sign(gameState.ball.dy) || -1;
      const angle = (Math.random() * 0.8 - 0.4) * Math.PI;
      gameState.balls.push({
        x: gameState.ball.x, y: gameState.ball.y,
        dx: spd * Math.sin(angle),
        dy: dirY * spd * Math.abs(Math.cos(angle))
      });
      break;
    }

    case 'triple_ball': {
      const spd = Math.sqrt(gameState.ball.dx ** 2 + gameState.ball.dy ** 2);
      const dirY = Math.sign(gameState.ball.dy) || -1;
      for (let i = 0; i < 3; i++) {
        const angle = (Math.random() * 0.8 - 0.4) * Math.PI;
        gameState.balls.push({
          x: gameState.ball.x, y: gameState.ball.y,
          dx: spd * Math.sin(angle),
          dy: dirY * spd * Math.abs(Math.cos(angle))
        });
      }
      break;
    }

    case 'meteor':
      effects.p1.meteor = now + 5000;
      effects.p2.meteor = now + 5000;
      effects.animStart.meteor = now;
      break;

    case 'fog':
      effects[opponent].fog = now + EFFECT_DURATION;
      effects.animStart[opponent + 'Fog'] = now;
      break;

    case 'ghost':
      effects.shared.ghost = now + EFFECT_DURATION;
      effects.animStart.ghost = now;
      break;

    case 'diamond':
      gameState.p1Score += 10;
      showPickupFloat('+10 💎', '#F5C842', gameState.ball.x, getP1PadY() - 20);
      pulseScore();
      break;

    case 'heart':
      if (isSoloMode && soloLives < 3) {
        soloLives++;
        gameState.soloLives = soloLives;
        showPickupFloat('+1 ❤️', '#EF4444', gameState.ball.x, getP1PadY() - 20);
        animateHeartFill();
      }
      break;
  }
}

// ========== קלט ==========
let lastTouchX = null;
canvas.addEventListener('touchstart', (e) => { e.preventDefault(); lastTouchX = e.touches[0].clientX; }, { passive: false });
canvas.addEventListener('touchmove', (e) => {
  e.preventDefault(); if (!gameState || lastTouchX === null) return;
  const myKey = isP1 ? 'p1' : 'p2';
  const now = Date.now();
  // הקפאה - פד לא זז
  if (effects[myKey].frozen > now) { lastTouchX = e.touches[0].clientX; return; }
  const cur = e.touches[0].clientX;
  let dx = (cur - lastTouchX) / (canvas.width / 420);
  lastTouchX = cur;
  if (effects[myKey].reversed > now) dx = -dx;
  const padW = isP1 ? gameState.p1PadW : gameState.p2PadW;
  myPadTarget = Math.max(0, Math.min(420 - padW, myPadTarget + dx));
}, { passive: false });
canvas.addEventListener('touchend', () => { lastTouchX = null; });
canvas.addEventListener('touchcancel', () => { lastTouchX = null; });
canvas.addEventListener('mousemove', (e) => {
  if (!gameState) return;
  const myKey = isP1 ? 'p1' : 'p2';
  if (effects[myKey].frozen > Date.now()) return;
  const rect = canvas.getBoundingClientRect();
  let gx = (e.clientX - rect.left) / (canvas.width / 420);
  if (effects[myKey].reversed > Date.now()) gx = 420 - gx;
  const padW = isP1 ? gameState.p1PadW : gameState.p2PadW;
  myPadTarget = Math.max(0, Math.min(420 - padW, gx - padW / 2));
});

// ========== Firebase ==========
function syncFullState() {
  if (isAIMode || isSoloMode || !isP1 || !gameState || !gameStateRef) return;
  set(gameStateRef, gameState);
}
function syncMyPad() {
  if (isAIMode || isSoloMode || !gameStateRef) return;
  if (!window._lastPadSync || Date.now() - window._lastPadSync > 80) {
    window._lastPadSync = Date.now();
    update(gameStateRef, { [isP1 ? 'p1PadX' : 'p2PadX']: myPadTarget }).catch(() => {});
  }
}

function startGameStateListener() {
  if (gameStateUnsubscribe) { gameStateUnsubscribe(); gameStateUnsubscribe = null; }
  if (!gameStateRef) return;
  gameStateUnsubscribe = onValue(gameStateRef, (snap) => {
    const val = snap.val();
    if (!val || !val.started) return;
    if (!isP1) {
      // p2: קבל state מ-p1 אבל שמור פד מקומי
      const myPadLocal = gameState ? gameState.p2PadX : myPadTarget;
      const myPadWLocal = gameState ? gameState.p2PadW : PAD_W;
      gameState = val;
      gameState.p2PadX = myPadLocal;
      gameState.p2PadW = myPadWLocal;
      document.title = `p2: ball=${val.ball?'Y':'N'} paused=${val.paused} pad=${Math.round(myPadLocal)}`;
      // debug ויזואלי על המסך
      let dbg = document.getElementById('p2-debug');
      if (!dbg) { dbg = document.createElement('div'); dbg.id = 'p2-debug'; dbg.style.cssText = 'position:fixed;top:0;left:0;right:0;background:red;color:white;font-size:12px;z-index:9999;text-align:center;padding:2px;'; document.body.appendChild(dbg); }
      dbg.textContent = `ball=${val.ball?'Y':'N'} dx=${val.ball?.dx?.toFixed(1)} dy=${val.ball?.dy?.toFixed(1)} paused=${val.paused} go=${gameState.gameOver}`;
    } else {
      if (val.p2PadX !== undefined && gameState) gameState.p2PadX = val.p2PadX;
      if (val.p2PadW !== undefined && gameState) gameState.p2PadW = val.p2PadW;
      if (val.rematchP2 !== undefined && gameState) gameState.rematchP2 = val.rematchP2;
    }
    // Sync match wins - כל שחקן רואה את עצמו ב-card-p1
    if (val.p1Wins !== undefined && !isSoloMode) {
      p1Wins = val.p1Wins;
      document.getElementById(isP1 ? 'wins-p1' : 'wins-p2').textContent = p1Wins;
    }
    if (val.p2Wins !== undefined && !isSoloMode) {
      p2Wins = val.p2Wins;
      document.getElementById(isP1 ? 'wins-p2' : 'wins-p1').textContent = p2Wins;
    }
    if (val.rematchP1 && val.rematchP2 && val.gameOver) {
      // Both agreed to rematch
      document.getElementById('match-modal').style.display = 'none';
      if (isP1) startNewMatch();
    }
    if (val.gameOver && val.winner && !gameRunning) {
      handleRoundEnd(val.winner, false);
    }
  });
}

// ========== פיזיקה ==========
function ballHitsBrick(b, brick) {
  return b.x + BALL_R > brick.x && b.x - BALL_R < brick.x + brick.w && b.y + BALL_R > brick.y && b.y - BALL_R < brick.y + brick.h;
}
// חישוב צד פגיעה והחזרת כדור בזווית נכונה
function brickBounce(ball, brick) {
  const bCx = ball.x, bCy = ball.y;
  const rCx = brick.x + brick.w / 2, rCy = brick.y + brick.h / 2;
  // חישוב חדירה מכל צד
  const overlapLeft = (bCx + BALL_R) - brick.x;
  const overlapRight = (brick.x + brick.w) - (bCx - BALL_R);
  const overlapTop = (bCy + BALL_R) - brick.y;
  const overlapBottom = (brick.y + brick.h) - (bCy - BALL_R);
  // הצד עם החדירה הקטנה ביותר = הצד שנפגע
  const minOverlap = Math.min(overlapLeft, overlapRight, overlapTop, overlapBottom);
  if (minOverlap === overlapTop || minOverlap === overlapBottom) {
    ball.dy = -ball.dy;
  } else {
    ball.dx = -ball.dx;
  }
}
function padBounce(ball, padX, padW, goUp) {
  const angle = ((ball.x - padX) / padW - 0.5) * Math.PI * 0.7;
  const spd = Math.max(BALL_SPEED, Math.sqrt(ball.dx ** 2 + ball.dy ** 2));
  ball.dx = spd * Math.sin(angle);
  ball.dy = goUp ? -spd * Math.cos(angle) : spd * Math.cos(angle);
  if (Math.abs(ball.dy) < 2) ball.dy = goUp ? -2 : 2;
}
function aiUpdate(dt) {
  if (!gameState) return;
  if (effects.p2.frozen > Date.now()) return; // הקפאה - AI לא זז
  const ball = gameState.ball;
  const padW = gameState.p2PadW;
  const padX = gameState.p2PadX;
  const padCenter = padX + padW / 2;

  // בדוק אם יש פאוור-אפ שעולה לכיווני ואפשר לתפוס בבטחה
  let targetX = ball.x; // ברירת מחדל - עקוב אחרי הכדור
  let chasingPowerup = false;

  if (gameState.powerups.length > 0) {
    // AI רודף פאוור-אפים שעולים אליו - מעדיף טובים
    let bestPU = null;
    let bestScore = -Infinity;
    for (const pu of gameState.powerups) {
      if (pu.dy >= 0) continue; // רק אלה שעולים לכיווני
      if (pu.y > P2_PAD_Y + PAD_H + 80) continue;
      const dist = Math.abs(pu.x - padCenter);
      // העדפה לפאוור-אפים טובים (לא danger), קרובים יותר
      const goodBonus = pu.danger ? 0 : 60;
      const score = goodBonus - dist;
      if (score > bestScore) { bestScore = score; bestPU = pu; }
    }
    if (bestPU && Math.abs(bestPU.x - padCenter) < 180) {
      targetX = bestPU.x;
      chasingPowerup = true;
    }
  }

  // מהירות מעקב
  let ease;
  if (chasingPowerup) {
    ease = 0.12; // מהיר יותר לתפיסת פאוור-אפים
  } else if (ball.dy < 0) {
    ease = 0.055; // כדור בא אלי
  } else {
    ease = 0.03; // כדור הולך, חזור לאמצע
    targetX = ball.x * 0.6 + 210 * 0.4; // מעקב חלקי + חזרה למרכז
  }

  const target = targetX - padW / 2;
  gameState.p2PadX += (target - gameState.p2PadX) * ease * dt;
  gameState.p2PadX = Math.max(0, Math.min(420 - padW, gameState.p2PadX));
}

function updatePhysics(dt) {
  if (!gameState || gameState.gameOver || gameState.paused) return;
  const ball = gameState.ball;
  const p1PadY = getP1PadY();
  ball.x += ball.dx * dt; ball.y += ball.dy * dt;

  if (ball.x - BALL_R <= 0) { ball.x = BALL_R; ball.dx = Math.abs(ball.dx); wallHits.push({ x: 0, y: ball.y, time: Date.now() }); }
  if (ball.x + BALL_R >= 420) { ball.x = 420 - BALL_R; ball.dx = -Math.abs(ball.dx); wallHits.push({ x: 420, y: ball.y, time: Date.now() }); }
  // קיר עליון - בסולו ובכל המצבים
  if (isSoloMode && ball.y - BALL_R <= 0) { wallHits.push({ x: ball.x, y: 0, time: Date.now() }); }

  if (ball.dy > 0 && ball.y + BALL_R >= p1PadY && ball.y + BALL_R <= p1PadY + PAD_H + 6) {
    if (ball.x >= gameState.p1PadX - 6 && ball.x <= gameState.p1PadX + gameState.p1PadW + 6) {
      ball.y = p1PadY - BALL_R; padBounce(ball, gameState.p1PadX, gameState.p1PadW, true);
      padHits.p1 = Date.now();
    }
  }
  if (!isSoloMode && ball.dy < 0 && ball.y - BALL_R <= P2_PAD_Y + PAD_H && ball.y - BALL_R >= P2_PAD_Y - 6) {
    if (ball.x >= gameState.p2PadX - 6 && ball.x <= gameState.p2PadX + gameState.p2PadW + 6) {
      ball.y = P2_PAD_Y + PAD_H + BALL_R; padBounce(ball, gameState.p2PadX, gameState.p2PadW, false);
      padHits.p2 = Date.now();
    }
  }

  const now2 = Date.now();
  const meteorActive = effects.p1.meteor > now2 || effects.p2.meteor > now2;

  // קו הגנה מגנים (P1 = למטה, P2 = למעלה) - כל מגן בשכבה נפרדת
  // P1 shields
  if (ball.dy > 0) {
    for (let si = effects.p1.shields.length - 1; si >= 0; si--) {
      const sh = effects.p1.shields[si];
      if (!sh.active) continue;
      // בסולו: מגן מתחת לפד. במולטי: מתחת ללבנים התחתונות
      const baseShieldY = isSoloMode ? getP1PadY() + PAD_H + 6 : FIELD_H - 30 + 6;
      const shieldY = baseShieldY + si * 10;
      if (ball.y + BALL_R >= shieldY && ball.y + BALL_R <= shieldY + 14) {
        ball.y = shieldY - BALL_R;
        ball.dy = -Math.abs(ball.dy);
        sh.hitTime = Date.now();
        sh.active = false; // מגן נפגע - ייעלם אחרי אנימציה
        break; // רק מגן אחד נפגע בכל פעם
      }
    }
  }
  // P2 shields (לא בסולו)
  if (!isSoloMode && ball.dy < 0) {
    for (let si = effects.p2.shields.length - 1; si >= 0; si--) {
      const sh = effects.p2.shields[si];
      if (!sh.active) continue;
      const shieldY = 30 - 6 - si * 10;
      if (ball.y - BALL_R <= shieldY && ball.y - BALL_R >= shieldY - 14) {
        ball.y = shieldY + BALL_R;
        ball.dy = Math.abs(ball.dy);
        sh.hitTime = Date.now();
        sh.active = false;
        break;
      }
    }
  }
  // ניקוי מגנים שנפגעו (אחרי 300ms אנימציה)
  for (const pk of ['p1', 'p2']) {
    effects[pk].shields = effects[pk].shields.filter(sh => {
      if (sh.active) return true;
      return sh.hitTime && (Date.now() - sh.hitTime < 300);
    });
  }

  let bouncedTop = false;
  for (const brick of gameState.topBricks) {
    if (!brick.alive) continue;
    if (ballHitsBrick(ball, brick)) {
      brick.hp--;
      if (brick.hp <= 0) {
        brick.alive = false;
        lastBrickBreakTime = Date.now();
        dyingBricks.push({ x: brick.x, y: brick.y, w: brick.w, h: brick.h, color: p1Color, startTime: Date.now(), duration: 350 });
        spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, p1Color, 8);
        // סולו: לב (לפי זמן) > פאוור-אפ > יהלום. רק אחד יוצא.
        const spawnedHeart = isSoloMode && maybeSpawnHeart(brick.x + brick.w / 2, brick.y + brick.h);
        const spawnedPowerup = !spawnedHeart && maybeSpawnPowerup(brick.x + brick.w / 2, brick.y + brick.h, false);
        if (!spawnedHeart && !spawnedPowerup && isSoloMode) maybeSpawnDiamond(brick.x + brick.w / 2, brick.y + brick.h);
        if (meteorActive) splashBreak(brick, gameState.topBricks, 'p1', p1Color);
      }
      if (!bouncedTop) { brickBounce(ball, brick); bouncedTop = true; }
    }
  }
  let bouncedBottom = false;
  for (const brick of gameState.bottomBricks) {
    if (!brick.alive) continue;
    if (ballHitsBrick(ball, brick)) {
      brick.hp--;
      if (brick.hp <= 0) {
        brick.alive = false;
        lastBrickBreakTime = Date.now();
        dyingBricks.push({ x: brick.x, y: brick.y, w: brick.w, h: brick.h, color: p2Color, startTime: Date.now(), duration: 350 });
        spawnParticles(brick.x + brick.w / 2, brick.y + brick.h / 2, p2Color, 8);
        maybeSpawnPowerup(brick.x + brick.w / 2, brick.y - 10, true);
        if (meteorActive) splashBreak(brick, gameState.bottomBricks, 'p2', p2Color);
      }
      if (!bouncedBottom) { brickBounce(ball, brick); bouncedBottom = true; }
    }
  }

  for (let i = gameState.balls.length - 1; i >= 0; i--) {
    const eb = gameState.balls[i];
    eb.x += eb.dx * dt; eb.y += eb.dy * dt;
    if (eb.x - BALL_R <= 0) { eb.x = BALL_R; eb.dx = Math.abs(eb.dx); }
    if (eb.x + BALL_R >= 420) { eb.x = 420 - BALL_R; eb.dx = -Math.abs(eb.dx); }
    if (isSoloMode) {
      // סולו: הקפצה מלמעלה, נפילה למטה = רק מחיקה
      if (eb.y - BALL_R < 0) { eb.y = BALL_R; eb.dy = Math.abs(eb.dy); }
      if (eb.y > FIELD_H + 20) { gameState.balls.splice(i, 1); continue; }
    } else {
      if (eb.y < -20 || eb.y > FIELD_H + 20) { gameState.balls.splice(i, 1); continue; }
    }
    if (eb.dy > 0 && eb.y + BALL_R >= p1PadY && eb.y + BALL_R <= p1PadY + PAD_H + 4) {
      if (eb.x >= gameState.p1PadX - 4 && eb.x <= gameState.p1PadX + gameState.p1PadW + 4) eb.dy = -Math.abs(eb.dy);
    }
    if (eb.dy < 0 && eb.y - BALL_R <= P2_PAD_Y + PAD_H && eb.y - BALL_R >= P2_PAD_Y - 4) {
      if (eb.x >= gameState.p2PadX - 4 && eb.x <= gameState.p2PadX + gameState.p2PadW + 4) eb.dy = Math.abs(eb.dy);
    }
    for (const brick of gameState.topBricks) { if (!brick.alive) continue; if (ballHitsBrick(eb, brick)) { brick.hp--; if (brick.hp <= 0) { brick.alive = false; } brickBounce(eb, brick); break; } }
    for (const brick of gameState.bottomBricks) { if (!brick.alive) continue; if (ballHitsBrick(eb, brick)) { brick.hp--; if (brick.hp <= 0) { brick.alive = false; } brickBounce(eb, brick); break; } }
  }

  for (let i = gameState.powerups.length - 1; i >= 0; i--) {
    const pu = gameState.powerups[i]; pu.y += pu.dy * dt;
    if (pu.dy > 0 && pu.y >= p1PadY && pu.y <= p1PadY + PAD_H + 10) {
      if (pu.x >= gameState.p1PadX && pu.x <= gameState.p1PadX + gameState.p1PadW) { applyPowerup(pu.type, 'p1'); gameState.powerups.splice(i, 1); continue; }
    }
    if (pu.dy < 0 && pu.y <= P2_PAD_Y + PAD_H && pu.y >= P2_PAD_Y - 5) {
      if (pu.x >= gameState.p2PadX && pu.x <= gameState.p2PadX + gameState.p2PadW) { applyPowerup(pu.type, 'p2'); gameState.powerups.splice(i, 1); continue; }
    }
    if (pu.y > FIELD_H + 20 || pu.y < -20) gameState.powerups.splice(i, 1);
  }

  // האצה הדרגתית כל 3 שניות
  const now = Date.now();
  if (now - lastSpeedUpTime >= SPEED_UP_INTERVAL) {
    lastSpeedUpTime = now;
    const curSpd = Math.sqrt(gameState.ball.dx ** 2 + gameState.ball.dy ** 2);
    const MAX_SPEED = 10;
    if (curSpd < MAX_SPEED) {
      const factor = Math.min(SPEED_UP_FACTOR, MAX_SPEED / curSpd);
      gameState.ball.dx *= factor;
      gameState.ball.dy *= factor;
      for (const eb of gameState.balls) {
        eb.dx *= factor;
        eb.dy *= factor;
      }
    }
  }

  if (isSoloMode) {
    // סולו: כדור חוזר מלמעלה, נופל למטה = חיים
    if (ball.y - BALL_R < 0) { ball.y = BALL_R; ball.dy = Math.abs(ball.dy); }
    if (ball.y + BALL_R > FIELD_H + 10) {
      if (gameState.balls.length > 0) {
        // יש עוד כדורים - הכדור הראשי מוחלף באחד מהם
        const replacement = gameState.balls.shift();
        ball.x = replacement.x; ball.y = replacement.y;
        ball.dx = replacement.dx; ball.dy = replacement.dy;
      } else {
        // אין עוד כדורים - איבוד חיים
        vibrateShort();
        gameState.soloLives = (gameState.soloLives || 3) - 1;
        soloLives = gameState.soloLives;
        updateLivesDisplay();
        saveProgress();
        if (soloLives <= 0) {
          endRound('p2'); // הפסד
        } else {
          // אתחול כדור מחדש - ממתין ללחיצת שחקן
          const level = SOLO_LEVELS[soloLevel] || SOLO_LEVELS[0];
          ball.x = 210; ball.y = p1PadY - 40;
          ball.dx = BALL_SPEED * level.speedMult * (Math.random() > 0.5 ? 1 : -1);
          ball.dy = -BALL_SPEED * level.speedMult;
          gameState.balls = [];
          gameState.powerups = [];
          gameState.paused = true;
          showLifeLostModal(soloLives);
        }
      }
    }
    // כל הלבנים נשברו = סיום שלב (עיכוב לאנימציה)
    const winCheckReady = Date.now() - lastBombTime > 500 && Date.now() - lastBrickBreakTime > 350;
    if (winCheckReady && gameState && !gameState.gameOver && gameState.topBricks.every(b => !b.alive)) {
      if (soloLevel < SOLO_LEVELS.length - 1) {
        // מעבר לשלב הבא
        advanceToNextLevel();
      } else {
        // שלב 3 הושלם = ניצחון סופי!
        endRound('p1');
      }
    }
  } else {
    const winCheckReady2 = Date.now() - lastBombTime > 500 && Date.now() - lastBrickBreakTime > 350;
    // כדור ראשי נפל למטה
    if (ball.y + BALL_R > FIELD_H + 10) {
      if (gameState.balls.length > 0) {
        const replacement = gameState.balls.shift();
        ball.x = replacement.x; ball.y = replacement.y;
        ball.dx = replacement.dx; ball.dy = replacement.dy;
      } else {
        vibrateShort(); endRound('p2');
      }
    }
    // כדור ראשי יצא למעלה
    if (ball.y - BALL_R < -10) {
      if (gameState.balls.length > 0) {
        const replacement = gameState.balls.shift();
        ball.x = replacement.x; ball.y = replacement.y;
        ball.dx = replacement.dx; ball.dy = replacement.dy;
      } else {
        endRound('p1');
      }
    }
    if (winCheckReady2 && gameState && !gameState.gameOver && gameState.topBricks.every(b => !b.alive)) endRound('p1');
    if (winCheckReady2 && gameState && !gameState.gameOver && gameState.bottomBricks.every(b => !b.alive)) endRound('p2');
  }
}

// ========== מעבר שלב (סולו) ==========

  if (!gameState) return;
  gameRunning = false;
  soloLevel++;
  gameState.soloLevel = soloLevel;
  saveProgress();

  const level = SOLO_LEVELS[soloLevel];
  // הצג באנר מעבר שלב
  const banner = document.getElementById('round-banner');
  banner.style.display = 'block';
  banner.style.color = '#F5C842';
  banner.style.borderColor = '#F5C842';
  banner.style.boxShadow = '0 0 60px rgba(245,200,66,0.5)';
  banner.style.fontSize = '1.5rem';
  banner.innerHTML = `🎉 ${level.emoji} ${level.name}<br><span style="font-size:0.9rem;color:#aaa;">${level.title}</span>`;

  // קונפטי כפול
  launchConfetti('#F5C842');
  setTimeout(() => launchConfetti(myColor || '#4DB8FF'), 300);

  // רטט חגיגי
  if (navigator.vibrate) navigator.vibrate([50, 80, 50]);

  setTimeout(() => {
    banner.style.display = 'none';
    banner.style.fontSize = '';

    // ניקוי אפקטים
    dyingBricks = []; particles = []; ballTrail = [];
    effects.p1 = { magnet: 0, meteor: 0, shrunk: 0, reversed: 0, shields: [], frozen: 0, fog: 0 };
    effects.p2 = { magnet: 0, meteor: 0, shrunk: 0, reversed: 0, shields: [], frozen: 0, fog: 0 };
    effects.shared = { ghost: 0 };
    effects.shieldHitAnim = { p1: [], p2: [] };

    // שמור ניקוד וחיים
    const savedScore = gameState.p1Score;
    const savedLives = soloLives;

    // צור שלב חדש
    gameState = createSoloState(soloLevel);
    gameState.p1Score = savedScore;
    gameState.soloLives = savedLives;

    // עדכון תצוגה
    updateLevelDisplay();
    updateLivesDisplay();

    myPadTarget = 210 - PAD_W / 2;
  if (gameState) gameState.p1PadX = 210 - PAD_W / 2;
    lastSpeedUpTime = Date.now();
    resetSoloTimers();
    if (gameStateRef) set(gameStateRef, gameState);
    gameRunning = true; lastTime = performance.now();
    gameState.paused = true;
    requestAnimationFrame(gameLoop);
    showCountdown(() => {
      if (gameState) gameState.paused = false;
      lastSpeedUpTime = Date.now();
    });
  }, 2500);
}

// ========== הודעת איבוד חיים (סולו) ==========
function showLifeLostModal(livesLeft) {
  const hearts = [];
  for (let i = 0; i < 3; i++) {
    hearts.push(i < livesLeft ? '❤️' : '🖤');
  }

  const modal = document.getElementById('match-modal');
  const titleEl = document.getElementById('mm-title');
  const subEl = document.getElementById('mm-sub');
  const iconEl = document.getElementById('mm-icon');
  const btnsDiv = document.getElementById('mm-btns');

  iconEl.textContent = '💔';
  titleEl.textContent = 'אופס!';
  titleEl.style.color = '#EF4444';
  subEl.textContent = `נשארו ${hearts.join('')}`;
  btnsDiv.innerHTML = `
    <button class="mbtn mbtn-primary" id="btn-continue-solo">▶️ המשך</button>
    <button class="mbtn mbtn-secondary" onclick="goToModeSelect()">🏠 מסך בית</button>
  `;
  modal.style.display = 'flex';

  function closeLostModalAndContinue() {
    modal.style.display = 'none';
    myPadTarget = 210 - PAD_W / 2;
  if (gameState) gameState.p1PadX = 210 - PAD_W / 2;
    if (gameState) gameState.p1PadX = 210 - PAD_W / 2;
    showCountdown(() => {
      if (gameState) gameState.paused = false;
      lastSpeedUpTime = Date.now();
    });
  }

  document.getElementById('btn-continue-solo').onclick = () => {
    closeLostModalAndContinue();
  };
}

// ========== לולאה ==========
function gameLoop(time) {
  if (!gameRunning) return;
  const dt = Math.min((time - lastTime) / 16.67, 3); lastTime = time;
  if (!gameState || gameState.gameOver) { drawGame(); requestAnimationFrame(gameLoop); return; }

  if (isP1) gameState.p1PadX += (myPadTarget - gameState.p1PadX) * 0.3 * dt;

  // מגנט - פד נצמד לכדור (חזק מספיק להגיע מכל מקום)
  const nowEff = Date.now();
  if (effects.p1.magnet > nowEff && gameState.ball.dy > 0) {
    const target = gameState.ball.x - gameState.p1PadW / 2;
    const diff = target - gameState.p1PadX;
    const maxSpeed = 20 * dt; // מהירות מקסימלית
    const move = Math.abs(diff) > maxSpeed ? Math.sign(diff) * maxSpeed : diff;
    gameState.p1PadX += move;
    gameState.p1PadX = Math.max(0, Math.min(420 - gameState.p1PadW, gameState.p1PadX));
  }
  if (effects.p2.magnet > nowEff && gameState.ball.dy < 0) {
    const target = gameState.ball.x - gameState.p2PadW / 2;
    const diff = target - gameState.p2PadX;
    const maxSpeed = 20 * dt;
    const move = Math.abs(diff) > maxSpeed ? Math.sign(diff) * maxSpeed : diff;
    gameState.p2PadX += move;
    gameState.p2PadX = Math.max(0, Math.min(420 - gameState.p2PadW, gameState.p2PadX));
  }

  if (isP1 || isAIMode || isSoloMode) {
    if (isAIMode && !isSoloMode) aiUpdate(dt);
    updatePhysics(dt);
    if (isSoloMode) {
      document.getElementById('wins-p1').innerHTML = `${gameState.p1Score}<span style="font-size:0.6em;margin-right:2px;">💎</span>`;
    } else {
      document.getElementById('wins-p1').textContent = isP1 ? p1Wins : p2Wins;
      document.getElementById('wins-p2').textContent = isP1 ? p2Wins : p1Wins;
    }
    if (!isAIMode && !isSoloMode) {
      if (!window._lastSync || Date.now() - window._lastSync > 100) {
        window._lastSync = Date.now();
        syncFullState();
      }
    }
  } else {
    // p2: אינטרפולציה מקומית - כדור זז חלק בין עדכוני Firebase
    // p2 מתעלם מ-paused - p1 שולט בזה
    if (gameState.ball && !gameState.gameOver) {
      gameState.ball.x += gameState.ball.dx * dt;
      gameState.ball.y += gameState.ball.dy * dt;
      if (gameState.ball.x - BALL_R <= 0) { gameState.ball.x = BALL_R; gameState.ball.dx = Math.abs(gameState.ball.dx); }
      if (gameState.ball.x + BALL_R >= 420) { gameState.ball.x = 420 - BALL_R; gameState.ball.dx = -Math.abs(gameState.ball.dx); }
    }
    if (gameState.balls && !gameState.gameOver) {
      for (const eb of gameState.balls) {
        eb.x += eb.dx * dt; eb.y += eb.dy * dt;
        if (eb.x - BALL_R <= 0) { eb.x = BALL_R; eb.dx = Math.abs(eb.dx); }
        if (eb.x + BALL_R >= 420) { eb.x = 420 - BALL_R; eb.dx = -Math.abs(eb.dx); }
      }
    }
    // p2 פד: תמיד מ-myPadTarget (לא מ-Firebase)
    gameState.p2PadX += (myPadTarget - gameState.p2PadX) * 0.3 * dt;
    document.getElementById('wins-p1').textContent = isP1 ? p1Wins : p2Wins;
    document.getElementById('wins-p2').textContent = isP1 ? p2Wins : p1Wins;
  }
  // שמירת trail כדור
  if (gameState && !gameState.paused && !gameState.gameOver) {
    ballTrail.push({ x: gameState.ball.x, y: gameState.ball.y, time: Date.now() });
    if (ballTrail.length > TRAIL_MAX) ballTrail.shift();
  }
  syncMyPad();
  drawGame();
  requestAnimationFrame(gameLoop);
}

// ========== ציור ==========
function drawGame() {
  if (!gameState) return;
  const w = canvas.width, h = canvas.height; ctx.clearRect(0, 0, w, h);
  const flip = !isP1 && !isAIMode && !isSoloMode;
  ctx.save();
  if (flip) { ctx.translate(w, h); ctx.rotate(Math.PI); }

  ctx.fillStyle = 'rgba(15, 19, 32, 0.6)'; ctx.fillRect(0, 0, w, h);

  // מסגרת מגרש זוהרת
  const brd = S(2);
  const cornerR = S(10);
  ctx.strokeStyle = 'rgba(255,255,255,0.12)';
  ctx.lineWidth = brd;
  ctx.shadowColor = 'rgba(255,255,255,0.06)';
  ctx.shadowBlur = S(8);
  ctx.beginPath();
  ctx.roundRect(brd / 2, brd / 2, w - brd, h - brd, cornerR);
  ctx.stroke();
  ctx.shadowBlur = 0;

  // פינות מודגשות
  const cLen = S(18);
  ctx.strokeStyle = 'rgba(255,255,255,0.25)';
  ctx.lineWidth = S(2.5);
  ctx.lineCap = 'round';
  // top-left
  ctx.beginPath(); ctx.moveTo(S(4), S(4) + cLen); ctx.lineTo(S(4), S(4)); ctx.lineTo(S(4) + cLen, S(4)); ctx.stroke();
  // top-right
  ctx.beginPath(); ctx.moveTo(w - S(4) - cLen, S(4)); ctx.lineTo(w - S(4), S(4)); ctx.lineTo(w - S(4), S(4) + cLen); ctx.stroke();
  // bottom-left
  ctx.beginPath(); ctx.moveTo(S(4), h - S(4) - cLen); ctx.lineTo(S(4), h - S(4)); ctx.lineTo(S(4) + cLen, h - S(4)); ctx.stroke();
  // bottom-right
  ctx.beginPath(); ctx.moveTo(w - S(4) - cLen, h - S(4)); ctx.lineTo(w - S(4), h - S(4)); ctx.lineTo(w - S(4), h - S(4) - cLen); ctx.stroke();

  // קו מרכזי (לא בסולו)
  if (!isSoloMode) {
    ctx.strokeStyle = 'rgba(255,255,255,0.08)'; ctx.lineWidth = S(1);
    ctx.setLineDash([S(8), S(8)]); ctx.beginPath(); ctx.moveTo(0, h / 2); ctx.lineTo(w, h / 2); ctx.stroke(); ctx.setLineDash([]);
  }

  // בflip (p2), top=שלי ו-bottom=יריב, אז צבעים הפוכים
  const topBrickColor = flip ? p1Color : p2Color;
  const bottomBrickColor = flip ? p2Color : p1Color;
  for (const b of gameState.topBricks) { if (b.alive) drawBrick(b, topBrickColor, true); }
  if (!isSoloMode) { for (const b of gameState.bottomBricks) { if (b.alive) drawBrick(b, bottomBrickColor, false); } }

  // לבנים מתות - רסיסים קטנים מתנפצים
  const now = Date.now();
  for (let i = dyingBricks.length - 1; i >= 0; i--) {
    const db = dyingBricks[i];
    const elapsed = now - db.startTime;
    const progress = Math.min(elapsed / db.duration, 1);
    if (progress >= 1) { dyingBricks.splice(i, 1); continue; }
    const alpha = 1 - progress;
    const cx = S(db.x + db.w / 2), cy = S(db.y + db.h / 2);

    ctx.save();
    // הבזק לבן קצר ברגע הפגיעה
    if (progress < 0.1) {
      ctx.globalAlpha = (1 - progress / 0.1) * 0.7;
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.roundRect(S(db.x) - S(1), S(db.y) - S(1), S(db.w) + S(2), S(db.h) + S(2), S(4));
      ctx.fill();
    }

    // 8 רסיסים קטנים מתפזרים עם כבידה
    ctx.globalAlpha = alpha;
    ctx.fillStyle = db.color;
    ctx.shadowColor = db.color;
    ctx.shadowBlur = S(3) * alpha;
    // seed פסאודו-רנדומלי קבוע לכל לבנה
    const seed = (db.x * 7 + db.y * 13) | 0;
    for (let q = 0; q < 8; q++) {
      const ang = ((seed + q * 47) % 100) / 100 * Math.PI * 2;
      const spd = 0.6 + ((seed + q * 31) % 100) / 100 * 0.8;
      const ox = Math.cos(ang) * spd * progress * S(22);
      const oy = Math.sin(ang) * spd * progress * S(18) + progress * progress * S(12); // כבידה
      const sz = S(1.5 + ((seed + q * 19) % 100) / 100 * 2) * (1 - progress * 0.5);
      ctx.beginPath();
      ctx.arc(cx + ox, cy + oy, sz, 0, Math.PI * 2);
      ctx.fill();
    }
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // חלקיקים
  const pNow = Date.now();
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.life += 16; // ~60fps
    if (p.life >= p.maxLife) { particles.splice(i, 1); continue; }
    p.x += p.dx; p.y += p.dy;
    p.dy += 0.05; // gravity
    p.dx *= 0.98; // friction
    const progress = p.life / p.maxLife;
    const alpha = 1 - progress;
    const size = S(p.size * (1 - progress * 0.5));
    ctx.globalAlpha = alpha;
    ctx.fillStyle = p.color;
    ctx.shadowColor = p.color;
    ctx.shadowBlur = S(3);
    ctx.beginPath();
    ctx.arc(S(p.x), S(p.y), size, 0, Math.PI * 2);
    ctx.fill();
    ctx.shadowBlur = 0;
  }
  ctx.globalAlpha = 1;

  // בflip, p2 pad נראה למטה (שלי) ו-p1 pad למעלה (יריב)
  const p2PadColor = flip ? p1Color : p2Color;
  const p1PadColor = flip ? p2Color : p1Color;
  if (!isSoloMode) drawPadWithEffects(gameState.p2PadX, P2_PAD_Y, gameState.p2PadW, p2PadColor, 'p2');
  drawPadWithEffects(gameState.p1PadX, getP1PadY(), gameState.p1PadW, p1PadColor, 'p1');

  // trail כדור - זנב אור
  const isGhostNow = effects.shared.ghost > Date.now();
  if (!isGhostNow && ballTrail.length > 1) {
    for (let i = 0; i < ballTrail.length; i++) {
      const t = ballTrail[i];
      const alpha = (i / ballTrail.length) * 0.3;
      const sz = S(BALL_R) * (i / ballTrail.length) * 0.8;
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#fff';
      ctx.shadowColor = '#fff';
      ctx.shadowBlur = S(4);
      ctx.beginPath();
      ctx.arc(S(t.x), S(t.y), sz, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
    }
    ctx.globalAlpha = 1;
  }

  drawBall(gameState.ball);
  for (const eb of gameState.balls) drawBall(eb);

  // פאוור-אפים
  const puNow = Date.now();
  for (const pu of gameState.powerups) {
    const sx = S(pu.x), sy = S(pu.y);

    if (pu.type === 'diamond') {
      // יהלום - הילה זהובה נוצצת
      const sparkle = 0.5 + Math.sin(puNow / 150) * 0.3;
      ctx.fillStyle = '#F5C842';
      ctx.shadowColor = '#F5C842';
      ctx.shadowBlur = S(12 + Math.sin(puNow / 100) * 4);
      ctx.globalAlpha = sparkle;
      ctx.beginPath();
      ctx.arc(sx, sy, S(14), 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    } else if (pu.type === 'heart') {
      // לב - הילה בצבע שחקן + אנימציית פעימה
      const beat = 1 + Math.sin(puNow / 200) * 0.15; // פעימה 0.85-1.15
      const haloColor = p1Color;
      ctx.fillStyle = haloColor;
      ctx.shadowColor = haloColor;
      ctx.shadowBlur = S(12);
      ctx.globalAlpha = 0.5;
      ctx.beginPath();
      ctx.arc(sx, sy, S(15 * beat), 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
    } else if (pu.danger) {
      if (isSoloMode) {
        // סולו - הילה אדומה מהבהבת (רע לי)
        const blink = 0.4 + Math.sin(puNow / 120) * 0.35;
        ctx.fillStyle = '#EF4444';
        ctx.shadowColor = '#EF4444';
        ctx.shadowBlur = S(14 + Math.sin(puNow / 100) * 4);
        ctx.globalAlpha = blink;
        ctx.beginPath();
        ctx.arc(sx, sy, S(16), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      } else if (pu.type === 'ghost') {
        // רפאים במולטי/מחשב - אדומה קבועה (בלי הבהוב)
        ctx.fillStyle = '#EF4444';
        ctx.shadowColor = '#EF4444';
        ctx.shadowBlur = S(10);
        ctx.globalAlpha = 0.5;
        ctx.beginPath();
        ctx.arc(sx, sy, S(15), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      } else {
        // מסוכנים במולטי/מחשב - הילה בצבע שחקן (טוב לי, רע ליריב)
        ctx.fillStyle = 'rgba(255,255,255,0.3)';
        ctx.beginPath();
        ctx.arc(sx, sy, S(15), 0, Math.PI * 2);
        ctx.fill();
        const haloColor = flip ? (pu.dy > 0 ? p2Color : p1Color) : (pu.dy > 0 ? p1Color : p2Color);
        ctx.fillStyle = haloColor;
        ctx.shadowColor = haloColor;
        ctx.shadowBlur = S(10);
        ctx.globalAlpha = 0.45;
        ctx.beginPath();
        ctx.arc(sx, sy, S(15), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    } else {
      // רקע בהיר לנראות - עיגול לבן חצי-שקוף
      ctx.fillStyle = 'rgba(255,255,255,0.3)';
      ctx.beginPath();
      ctx.arc(sx, sy, S(15), 0, Math.PI * 2);
      ctx.fill();

      if (pu.category === 'personal') {
        const haloColor = flip ? (pu.dy > 0 ? p2Color : p1Color) : (pu.dy > 0 ? p1Color : p2Color);
        ctx.fillStyle = haloColor;
        ctx.shadowColor = haloColor;
        ctx.shadowBlur = S(10);
        ctx.globalAlpha = 0.45;
        ctx.beginPath();
        ctx.arc(sx, sy, S(15), 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.globalAlpha = 1;
      }
    }

    const emojiSize = pu.type === 'heart' ? S(24 * (1 + Math.sin(puNow / 200) * 0.15)) : S(24);
    ctx.font = `${emojiSize}px sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.shadowColor = pu.type === 'diamond' ? 'rgba(245,200,66,0.9)' : ((pu.danger && isSoloMode) ? 'rgba(255,100,100,0.8)' : 'rgba(255,255,255,0.8)');
    ctx.shadowBlur = S(6);
    ctx.fillText(pu.emoji || '⭐', sx, sy);
    ctx.shadowBlur = 0;
    // תגיות - ימין למטה של האימוג'י
    const tagX = S(pu.x + 16), tagY = S(pu.y + 16);
    ctx.font = `bold ${S(10)}px Heebo, sans-serif`;
    ctx.fillStyle = '#F5C842';
    ctx.textAlign = 'center';
    if (pu.type === 'extra_ball') {
      ctx.fillText('1+', tagX, tagY);
    } else if (pu.type === 'triple_ball') {
      ctx.fillText('3×', tagX, tagY);
    } else if (pu.type === 'bomb') {
      ctx.fillText('3×', tagX, tagY);
    } else if (pu.type === 'meteor') {
      ctx.fillText('5s+', tagX, tagY);
    } else if (['magnet', 'reverse', 'freeze', 'fog', 'ghost'].includes(pu.type)) {
      ctx.fillText('3s+', tagX, tagY);
    }
  }

  const nowDraw = Date.now();

  // אנימציות פגיעה בקירות
  for (let i = wallHits.length - 1; i >= 0; i--) {
    const wh = wallHits[i];
    const age = nowDraw - wh.time;
    if (age > 350) { wallHits.splice(i, 1); continue; }
    const progress = age / 350;
    const alpha = (1 - progress) * 0.6;
    const spread = S(8 + progress * 20);
    ctx.save();
    ctx.globalAlpha = alpha;
    const gx = S(wh.x), gy = S(wh.y);
    const grad = ctx.createRadialGradient(gx, gy, 0, gx, gy, spread);
    grad.addColorStop(0, 'rgba(255,255,255,0.8)');
    grad.addColorStop(0.5, 'rgba(200,220,255,0.3)');
    grad.addColorStop(1, 'rgba(200,220,255,0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(gx, gy, spread, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
    ctx.restore();
  }

  // ערפל - מסתיר את הפד של מי שחטף
  for (const fogKey of ['p1', 'p2']) {
    if (effects[fogKey].fog > nowDraw) {
      const fogAnimKey = fogKey + 'Fog';
      const fogAge = nowDraw - (effects.animStart[fogAnimKey] || 0);
      const fadeIn = Math.min(fogAge / 300, 1);
      const remaining = effects[fogKey].fog - nowDraw;
      const fadeOut = remaining < 300 ? remaining / 300 : 1;
      const fogStr = fadeIn * fadeOut;
      const t = nowDraw / 1500;
      const fogH = S(PAD_H + 35);

      ctx.save();
      const fogPadY = fogKey === 'p1' ? getP1PadY() : P2_PAD_Y;
      const fogCy = S(fogPadY + PAD_H / 2);
      const fogGrad = ctx.createRadialGradient(canvas.width / 2, fogCy, S(15), canvas.width / 2, fogCy, canvas.width * 0.6);
      fogGrad.addColorStop(0, `rgba(20, 25, 45, ${0.95 * fogStr})`);
      fogGrad.addColorStop(0.5, `rgba(20, 25, 45, ${0.9 * fogStr})`);
      fogGrad.addColorStop(1, 'rgba(20, 25, 45, 0)');
      ctx.fillStyle = fogGrad;
      ctx.fillRect(0, fogCy - fogH / 2, canvas.width, fogH);

      // עננים זזים
      ctx.globalAlpha = fogStr * 0.35;
      for (let i = 0; i < 4; i++) {
        const cx = (Math.sin(t * 0.25 + i * 1.8) * 0.4 + 0.5) * canvas.width;
        const cr = S(18 + i * 5);
        const cg = ctx.createRadialGradient(cx, fogCy, 0, cx, fogCy, cr);
        cg.addColorStop(0, 'rgba(70, 90, 130, 0.5)'); cg.addColorStop(1, 'rgba(70, 90, 130, 0)');
        ctx.fillStyle = cg; ctx.beginPath(); ctx.arc(cx, fogCy, cr, 0, Math.PI * 2); ctx.fill();
      }
      ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // הקפאה - שכבת קרח מנצנצת
  for (const pk of ['p1', 'p2']) {
    if (effects[pk].frozen > nowDraw) {
      const padX = pk === 'p1' ? gameState.p1PadX : gameState.p2PadX;
      const padY = pk === 'p1' ? getP1PadY() : P2_PAD_Y;
      const padW = pk === 'p1' ? gameState.p1PadW : gameState.p2PadW;
      const age = nowDraw - effects.animStart[pk + 'Frozen'];
      const fadeIn = Math.min(age / 200, 1);
      const fx = S(padX), fy = S(padY), fw = S(padW), fh = S(PAD_H);
      ctx.save();
      ctx.globalAlpha = fadeIn * 0.5;
      ctx.fillStyle = 'rgba(100, 200, 255, 0.5)';
      ctx.shadowColor = '#64C8FF'; ctx.shadowBlur = S(14);
      ctx.beginPath(); ctx.roundRect(fx - S(3), fy - S(3), fw + S(6), fh + S(6), S(9)); ctx.fill();
      ctx.shadowBlur = 0;
      // קריסטלים
      ctx.globalAlpha = fadeIn * 0.7;
      ctx.font = `${S(10)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText('❄️', fx + fw * 0.25, fy + fh / 2);
      ctx.fillText('❄️', fx + fw * 0.75, fy + fh / 2);
      ctx.restore();
    }
  }

  // מגנים - קו זוהר לכל מגן + אנימציית היווצרות + פולס בפגיעה
  for (const pk of ['p1', 'p2']) {
    if (isSoloMode && pk === 'p2') continue; // בסולו אין מגן ליריב
    const isBottom = pk === 'p1';
    const color = pk === 'p1' ? p1Color : p2Color;
    const totalW = S(420 - 2 * BRICK_PAD_X);
    const cx = canvas.width / 2;

    for (let si = 0; si < effects[pk].shields.length; si++) {
      const sh = effects[pk].shields[si];
      let sy;
      if (isBottom) {
        const baseY = isSoloMode ? getP1PadY() + PAD_H + 6 : FIELD_H - 30 + 6;
        sy = S(baseY + si * 10);
      } else {
        sy = S(30 - 6 - si * 10);
      }

      const age = nowDraw - sh.startTime;
      const scaleIn = Math.min(age / 400, 1);
      const drawW = totalW * scaleIn;

      let hitGlow = 0;
      let alpha = 0.8;
      if (!sh.active && sh.hitTime) {
        const hitAge = nowDraw - sh.hitTime;
        hitGlow = hitAge < 300 ? (1 - hitAge / 300) : 0;
        alpha = hitGlow * 0.8; // נעלם בהדרגה
      }

      if (alpha <= 0) continue;

      ctx.save();
      ctx.strokeStyle = color;
      ctx.shadowColor = color;
      ctx.shadowBlur = S(8 + hitGlow * 20);
      ctx.lineWidth = S(3 + hitGlow * 4);
      ctx.globalAlpha = alpha;
      ctx.beginPath();
      ctx.moveTo(cx - drawW / 2, sy);
      ctx.lineTo(cx + drawW / 2, sy);
      ctx.stroke();
      if (hitGlow > 0) {
        ctx.globalAlpha = hitGlow * 0.5;
        ctx.fillStyle = color;
        ctx.fillRect(cx - drawW / 2, sy - S(4), drawW, S(8));

      ctx.shadowBlur = 0; ctx.globalAlpha = 1;
      ctx.restore();
    }
  }

  // מטאור - זוהר כתום עם אנימציית התעוררות
  if (effects.p1.meteor > nowDraw || effects.p2.meteor > nowDraw) {
    const mAge = nowDraw - effects.animStart.meteor;
    const mFadeIn = Math.min(mAge / 300, 1);
    const pulse = 0.5 + Math.sin(nowDraw / 150) * 0.15;
    const allBalls = [gameState.ball, ...gameState.balls];
    for (const b of allBalls) {
      ctx.save();
      ctx.globalAlpha = (pulse + 0.1) * mFadeIn;
      ctx.fillStyle = '#FF6B35';
      ctx.shadowColor = '#FF4500';
      ctx.shadowBlur = S(18 * mFadeIn);
      ctx.beginPath();
      ctx.arc(S(b.x), S(b.y), S(BALL_R + 4 + mFadeIn * 2), 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;
      ctx.restore();

}
function drawBrick(brick, baseColor, isTop = false) {
  const x = S(brick.x), y = S(brick.y), w = S(brick.w), h = S(brick.h);
  const row = brick.row || 0;

  // כהה יותר ככל שקרוב לקיר - מנורמל לפי מספר שורות
  const maxRows = isSoloMode ? (SOLO_LEVELS[soloLevel]?.rows || 5) : BRICK_ROWS;
  const normalizedRow = isTop ? (maxRows - 1 - row) : row; // top: הפוך (קרוב לקיר = כהה)
  const darken = (normalizedRow / Math.max(maxRows - 1, 1)) * 0.5;

  // צבע עם הכהייה
  ctx.save();
  ctx.fillStyle = baseColor;
  ctx.shadowColor = baseColor;
  ctx.shadowBlur = S(4);
  ctx.beginPath();
  ctx.roundRect(x, y, w, h, S(3));
  ctx.fill();
  ctx.shadowBlur = 0;

  // שכבת הכהייה
  if (darken > 0) {
    ctx.fillStyle = `rgba(0, 0, 0, ${darken})`;
    ctx.beginPath();
    ctx.roundRect(x, y, w, h, S(3));
    ctx.fill();
  }

  // אפקט לבנה - קו עליון בהיר (אור)
  ctx.fillStyle = `rgba(255, 255, 255, ${0.25 - darken * 0.3})`;
  ctx.beginPath();
  ctx.roundRect(x + S(1.5), y + S(1), w - S(3), S(3), S(1.5));
  ctx.fill();

  // אפקט לבנה - קו תחתון כהה (צל)
  ctx.fillStyle = `rgba(0, 0, 0, ${0.15 + darken * 0.1})`;
  ctx.beginPath();
  ctx.roundRect(x + S(1.5), y + h - S(3.5), w - S(3), S(2.5), S(1.5));
  ctx.fill();

  // מרקם עדין - קו אמצעי
  ctx.fillStyle = `rgba(0, 0, 0, 0.08)`;
  ctx.fillRect(x + S(2), y + h * 0.45, w - S(4), S(0.8));

  ctx.restore();
}

// פד עם אנימציות אפקטים
function drawPadWithEffects(px, py, pw, color, playerKey) {
  const x = S(px), y = S(py), w = S(pw), h = S(PAD_H);
  const now = Date.now();

  ctx.save();

  // רטט בהיפוך
  let offsetX = 0;
  if (effects[playerKey].reversed > now) {
    offsetX = Math.sin(now / 40) * S(2.5);
  }

  // אנימציית הגדלה - פולס קצר
  const widerAge = now - effects.animStart[playerKey + 'Wider'];
  let scaleX = 1;
  if (widerAge < 300) {
    scaleX = 1 + Math.sin((widerAge / 300) * Math.PI) * 0.12;
  }

  // אנימציית הקטנה - רטט + כיווץ
  const shrunkAge = now - effects.animStart[playerKey + 'Shrunk'];
  if (shrunkAge < 300) {
    scaleX *= 1 - Math.sin((shrunkAge / 300) * Math.PI) * 0.1;
    offsetX += Math.sin(now / 30) * S(1.5);
  }

  const drawW = w * scaleX;
  const drawX = x + offsetX - (drawW - w) / 2; // מרכוז - גדל משני הצדדים

  // מגנט - הילה סגולה
  if (effects[playerKey].magnet > now) {
    const mAge = now - effects.animStart[playerKey + 'Magnet'];
    const mIn = Math.min(mAge / 250, 1);
    ctx.globalAlpha = 0.25 * mIn;
    ctx.fillStyle = '#B088F9';
    ctx.shadowColor = '#B088F9';
    ctx.shadowBlur = S(15);
    ctx.beginPath(); ctx.roundRect(drawX - S(4), y - S(4), drawW + S(8), h + S(8), S(10)); ctx.fill();
    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // פד עצמו - עם עומק
  ctx.shadowColor = color; ctx.shadowBlur = S(10); ctx.fillStyle = color;
  ctx.beginPath(); ctx.roundRect(drawX, y, drawW, h, S(7)); ctx.fill(); ctx.shadowBlur = 0;

  // צל תחתון (עומק)
  ctx.fillStyle = 'rgba(0, 0, 0, 0.25)';
  ctx.beginPath(); ctx.roundRect(drawX + S(1), y + h - S(4), drawW - S(2), S(4), [0, 0, S(6), S(6)]); ctx.fill();

  // הייליט עליון (אור)
  const grad = ctx.createLinearGradient(drawX, y, drawX, y + h);
  grad.addColorStop(0, 'rgba(255,255,255,0.4)'); grad.addColorStop(0.4, 'rgba(255,255,255,0.1)'); grad.addColorStop(1, 'rgba(0,0,0,0)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.roundRect(drawX, y, drawW, h, S(7)); ctx.fill();

  // קו בהיר למעלה
  ctx.strokeStyle = 'rgba(255,255,255,0.3)';
  ctx.lineWidth = S(1);
  ctx.beginPath(); ctx.roundRect(drawX + S(2), y + S(1), drawW - S(4), h - S(2), S(6)); ctx.stroke();

  // היפוך - אייקון
  if (effects[playerKey].reversed > now) {
    ctx.globalAlpha = 0.6;
    ctx.font = `${S(10)}px sans-serif`; ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText('🔄', drawX + drawW / 2, y + h / 2);
    ctx.globalAlpha = 1;
  }

  // אנימציית פגיעת כדור - הבהוב פד + גלים + ניצוצות
  const hitAge = now - (padHits[playerKey] || 0);
  if (hitAge < 400) {
    const hitProgress = hitAge / 400;

    // הבהוב הפד עצמו
    if (hitProgress < 0.15) {
      ctx.globalAlpha = 0.5;
      ctx.fillStyle = '#fff';
      ctx.beginPath(); ctx.roundRect(drawX, y, drawW, h, S(7)); ctx.fill();
      ctx.globalAlpha = 1;
    }

    // גל אור מתפשט
    const waveR = S(10 + hitProgress * 50);
    const waveAlpha = (1 - hitProgress) * 0.5;
    ctx.globalAlpha = waveAlpha;
    ctx.strokeStyle = color;
    ctx.shadowColor = color;
    ctx.shadowBlur = S(10);
    ctx.lineWidth = S(2.5 * (1 - hitProgress));
    ctx.beginPath();
    ctx.arc(drawX + drawW / 2, y + h / 2, waveR, 0, Math.PI * 2);
    ctx.stroke();
    // גל שני
    if (hitProgress > 0.08) {
      const wave2R = S(5 + (hitProgress - 0.08) * 35);
      ctx.globalAlpha = waveAlpha * 0.4;
      ctx.beginPath();
      ctx.arc(drawX + drawW / 2, y + h / 2, wave2R, 0, Math.PI * 2);
      ctx.stroke();
    }
    // קו זוהר על הפד
    ctx.globalAlpha = (1 - hitProgress) * 0.6;
    ctx.fillStyle = '#fff';
    ctx.shadowColor = '#fff';
    ctx.shadowBlur = S(6);
    ctx.beginPath();
    ctx.roundRect(drawX + S(3), y + S(2), drawW - S(6), S(3), S(2));
    ctx.fill();

    ctx.shadowBlur = 0;
    ctx.globalAlpha = 1;
  }

  // טיימרים ויזואליים מעל הפד - אפקטים פעילים
  const EFFECT_DURATION = 3000;
  const activeEffects = [];
  // אפקטים על השחקן הזה
  if (effects[playerKey].magnet > now) activeEffects.push({ emoji: '🧲', remaining: (effects[playerKey].magnet - now) / EFFECT_DURATION, color: '#B088F9' });
  if (effects[playerKey].reversed > now) activeEffects.push({ emoji: '🔄', remaining: (effects[playerKey].reversed - now) / EFFECT_DURATION, color: '#EF4444' });
  if (effects[playerKey].frozen > now) activeEffects.push({ emoji: '❄️', remaining: (effects[playerKey].frozen - now) / EFFECT_DURATION, color: '#64C8FF' });
  if (effects[playerKey].fog > now) activeEffects.push({ emoji: '🌫️', remaining: (effects[playerKey].fog - now) / EFFECT_DURATION, color: '#8899AA' });
  // אפקטים משותפים
  if (effects.p1.meteor > now) activeEffects.push({ emoji: '☄️', remaining: (effects.p1.meteor - now) / 5000, color: '#FF6B35' });
  if (effects.shared.ghost > now) activeEffects.push({ emoji: '👻', remaining: (effects.shared.ghost - now) / EFFECT_DURATION, color: '#AABBCC' });

  if (activeEffects.length > 0) {
    const barW = S(22);
    const barH = S(4);
    const gap = S(4);
    const totalW = activeEffects.length * (barW + gap) - gap;
    let startX = drawX + drawW / 2 - totalW / 2;
    const isP2Pad = playerKey === 'p2';
    const barY = isP2Pad ? y + h + S(6) : y - S(14);
    const emojiBaseline = isP2Pad ? 'top' : 'bottom';
    const emojiY = isP2Pad ? barY + barH + S(1) : barY - S(1);

    for (const eff of activeEffects) {
      // אייקון
      ctx.font = `${S(9)}px sans-serif`;
      ctx.textAlign = 'center';
      ctx.textBaseline = emojiBaseline;
      ctx.fillText(eff.emoji, startX + barW / 2, emojiY);

      // פס רקע
      ctx.fillStyle = 'rgba(255,255,255,0.15)';
      ctx.beginPath();
      ctx.roundRect(startX, barY, barW, barH, S(2));
      ctx.fill();

      // פס מילוי
      const fillW = barW * Math.min(eff.remaining, 1);
      ctx.fillStyle = eff.color;
      ctx.shadowColor = eff.color;
      ctx.shadowBlur = S(3);
      ctx.globalAlpha = 0.8;
      ctx.beginPath();
      ctx.roundRect(startX, barY, fillW, barH, S(2));
      ctx.fill();
      ctx.shadowBlur = 0;
      ctx.globalAlpha = 1;

      startX += barW + gap;
    }
  }

  ctx.restore();
}

function drawBall(ball) {
  const x = S(ball.x), y = S(ball.y), r = S(BALL_R);
  const now = Date.now();
  const isGhost = effects.shared.ghost > now;

  ctx.save();

  // רפאים - כמעט נעלם לגמרי
  if (isGhost) {
    const ghostAge = now - effects.animStart.ghost;
    const remaining = effects.shared.ghost - now;
    const fadeIn = Math.min(ghostAge / 300, 1);
    const fadeOut = remaining < 300 ? remaining / 300 : 1;
    const vanish = fadeIn * fadeOut;
    ctx.globalAlpha = 0.03 + (1 - vanish) * 0.97; // 3% opacity at peak
  }

  // קרניים מפוזרות
  const rayCount = 6;
  const time = now / 600;
  ctx.strokeStyle = isGhost ? 'rgba(255,255,255,0.08)' : 'rgba(255,255,255,0.25)';
  ctx.lineWidth = S(1.5);
  for (let i = 0; i < rayCount; i++) {
    const angle = (i / rayCount) * Math.PI * 2 + time;
    const innerR = r * 1.1;
    const outerR = r * 2.2 + Math.sin(time * 2 + i) * r * 0.5;
    ctx.beginPath();
    ctx.moveTo(x + Math.cos(angle) * innerR, y + Math.sin(angle) * innerR);
    ctx.lineTo(x + Math.cos(angle) * outerR, y + Math.sin(angle) * outerR);
    ctx.stroke();
  }

  // הילה חיצונית
  ctx.shadowColor = '#fff'; ctx.shadowBlur = S(12);
  ctx.fillStyle = 'rgba(255,255,255,0.15)';
  ctx.beginPath(); ctx.arc(x, y, r * 1.6, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;

  // כדור מוצק
  ctx.fillStyle = '#fff'; ctx.shadowColor = '#fff'; ctx.shadowBlur = S(6);
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill(); ctx.shadowBlur = 0;

  // ברק פנימי
  const grad = ctx.createRadialGradient(x - r * 0.3, y - r * 0.3, r * 0.05, x, y, r);
  grad.addColorStop(0, 'rgba(255,255,255,1)');
  grad.addColorStop(0.4, 'rgba(255,255,255,0.7)');
  grad.addColorStop(1, 'rgba(200,210,255,0.3)');
  ctx.fillStyle = grad;
  ctx.beginPath(); ctx.arc(x, y, r, 0, Math.PI * 2); ctx.fill();

  ctx.restore();
}

// ========== Confetti ==========
function launchConfetti(color) {
  const c = document.createElement('div'); c.className = 'confetti-container'; document.body.appendChild(c);
  const colors = [color, '#F5C842', '#3DD68C', '#FF5C7A', '#4DB8FF', '#FFB347', '#E879F9'];
  for (let i = 0; i < 50; i++) {
    const p = document.createElement('div'); p.className = 'confetti-piece';
    p.style.left = `${Math.random() * 100}%`;
    p.style.backgroundColor = colors[Math.floor(Math.random() * colors.length)];
