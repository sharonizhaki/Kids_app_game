<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<h1 id="msg">טוען...</h1>

  ' | session=' + (user ? 'YES' : 'NO');
