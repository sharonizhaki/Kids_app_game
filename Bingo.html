<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>🎉 BINGO — משחק אימוג'י</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Fredoka+One&family=Heebo:wght@400;600;700;900&display=swap');

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --p1: #a855f7;
      --p1-light: #e9d5ff;
      --p1-glow: #c084fc;
      --p2: #f97316;
      --p2-light: #fed7aa;
      --p2-glow: #fb923c;
      --bg: #0f0b1e;
      --surface: #1a1232;
      --surface2: #241a44;
      --text: #f1e6ff;
      --text-muted: #9ca3af;
      --gold: #ffd700;
      --gold-glow: #ffb300;
    }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Heebo', sans-serif;
      overflow-x: hidden;
    }

    body {
      background-image:
        radial-gradient(ellipse at 20% 10%, rgba(168, 85, 247, 0.15) 0%, transparent 50%),
        radial-gradient(ellipse at 80% 90%, rgba(249, 115, 22, 0.12) 0%, transparent 50%),
        radial-gradient(ellipse at 50% 50%, rgba(99, 57, 180, 0.1) 0%, transparent 70%);
    }

    /* HEADER */
    .header {
      text-align: center;
      padding: 28px 20px 16px;
      position: relative;
    }

    .header h1 {
      font-family: 'Fredoka One', cursive;
      font-size: clamp(2.5rem, 6vw, 4rem);
      background: linear-gradient(135deg, var(--p1-glow), var(--gold), var(--p2-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      filter: drop-shadow(0 0 20px rgba(168,85,247,0.5));
      letter-spacing: 3px;
      animation: titlePulse 3s ease-in-out infinite;
    }

    @keyframes titlePulse {
      0%, 100% { filter: drop-shadow(0 0 15px rgba(168,85,247,0.5)); }
      50% { filter: drop-shadow(0 0 35px rgba(249,115,22,0.7)); }
    }

    .header-sub {
      font-size: 0.95rem;
      color: var(--text-muted);
      margin-top: 6px;
      font-weight: 600;
    }

    /* SCORE HEADER כמו xo */
    .score-header {
      display: flex;
      justify-content: space-around;
      align-items: stretch;
      width: 100%;
      max-width: 420px;
      padding: 10px 12px 6px;
      gap: 8px;
      margin: 0 auto;
    }

    .score-box {
      flex: 1;
      background: linear-gradient(135deg, rgba(255,255,255,0.08) 0%, rgba(255,255,255,0.02) 100%);
      padding: 10px 8px 8px;
      border-radius: 18px;
      text-align: center;
      border: 2.5px solid transparent;
      transition: all 0.3s ease;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 2px;
    }

    .score-box::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.1) 0%, transparent 50%);
      pointer-events: none;
    }

    .score-box.active {
      transform: scale(1.05);
      animation: borderGlow 0.8s ease-in-out infinite;
    }

    #card-p1.active { border-color: var(--p1-glow); box-shadow: 0 0 25px rgba(168,85,247,0.4); }
    #card-p2.active { border-color: var(--p2-glow); box-shadow: 0 0 25px rgba(249,115,22,0.4); }

    @keyframes borderGlow {
      0%, 100% { box-shadow: 0 0 15px rgba(245,200,66,0.3); }
      50% { box-shadow: 0 0 40px rgba(245,200,66,0.8); }
    }

    .vs-box {
      max-width: 60px;
      min-width: 50px;
    }

    .score-box .player-name {
      font-weight: 900;
      font-size: 0.8rem;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      width: 100%;
    }

    .score-box .player-score {
      font-family: 'Fredoka One', cursive;
      font-size: 2rem;
      font-weight: 900;
      line-height: 1;
    }

    #card-p1 .player-score { color: var(--p1-glow); }
    #card-p2 .player-score { color: var(--p2-glow); }

    .score-box .player-sub {
      font-size: 0.6rem;
      color: var(--text-muted);
      font-weight: 700;
    }

    .my-grid-section {
      padding: 4px 16px;
      max-width: 420px;
      margin: 0 auto;
    }

    /* CURRENT EMOJI DISPLAY */
    .current-zone {
      text-align: center;
      padding: 8px 20px 4px;
    }
    .current-emoji-display {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: var(--surface2);
      border: 3px solid rgba(255,215,0,0.3);
      box-shadow: 0 0 20px rgba(255,215,0,0.15);
      margin: 0 auto;
    }
    .current-emoji {
      font-size: 3rem;
      display: inline-block;
    }
    .current-emoji-display.searching {
      border-color: var(--gold);
      box-shadow: 0 0 30px rgba(255,215,0,0.4);
      animation: searchPulse 0.6s ease-in-out infinite;
    }
    @keyframes searchPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
      50% { box-shadow: 0 0 40px rgba(255,215,0,0.6); }
    }

    /* CONTROLS כמו xo */
    .controls {
      display: flex;
      gap: 12px;
      margin: 16px auto;
      width: 90vw;
      max-width: 350px;
    }
    .ctrl-btn {
      flex: 1;
      padding: 14px;
      border-radius: 20px;
      border: 1.5px solid rgba(255,255,255,0.2);
      background: linear-gradient(135deg, rgba(255,255,255,0.12) 0%, rgba(255,255,255,0.05) 100%);
      color: white;
      font-weight: 900;
      font-size: 0.95rem;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      font-family: 'Heebo', sans-serif;
      box-shadow: 0 5px 20px rgba(0,0,0,0.3);
    }
    .ctrl-btn:active { transform: scale(0.95); }
    .ctrl-reset {
      background: linear-gradient(135deg, rgba(255,215,0,0.12) 0%, rgba(255,215,0,0.05) 100%);
      border-color: rgba(255,215,0,0.3);
    }

    /* DRAWN HISTORY */
    .drawn-history {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      padding: 10px 20px;
      min-height: 60px;
      flex-wrap: wrap;
    }

    .history-label {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-weight: 700;
      white-space: nowrap;
    }

    .history-emojis {
      display: flex;
      gap: 5px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .history-chip {
      font-size: 1.3rem;
      background: var(--surface2);
      border-radius: 10px;
      padding: 3px 6px;
      border: 1px solid rgba(255,255,255,0.08);
      animation: chipPop 0.3s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes chipPop {
      from { transform: scale(0) rotate(-20deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    /* LOTTERY ZONE */
    .lottery-zone {
      display: flex;
      flex-direction: row;
      align-items: center;
      justify-content: center;
      gap: 28px;
      padding: 20px;
      flex-wrap: wrap;
    }

    .lottery-controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }

    .machine {
      position: relative;
      width: 180px;
      height: 180px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .machine-ring {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      border: 3px solid transparent;
      background: linear-gradient(var(--surface2), var(--surface2)) padding-box,
                  linear-gradient(135deg, var(--p1), var(--gold), var(--p2)) border-box;
      animation: ringRotate 3s linear infinite;
    }

    .machine-ring::before {
      content: '';
      position: absolute;
      inset: -8px;
      border-radius: 50%;
      background: conic-gradient(from 0deg, var(--p1), var(--gold), var(--p2), var(--p1));
      filter: blur(12px);
      opacity: 0.4;
      animation: ringRotate 2s linear infinite reverse;
    }

    @keyframes ringRotate {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }

    .machine-inner {
      position: relative;
      z-index: 2;
      width: 140px;
      height: 140px;
      background: var(--surface2);
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 4.5rem;
      box-shadow: 0 0 30px rgba(168,85,247,0.3), inset 0 0 20px rgba(0,0,0,0.4);
      border: 2px solid rgba(255,255,255,0.08);
      overflow: hidden;
    }

    .machine-emoji {
      display: inline-block;
      transition: none;
    }

    .machine-emoji.spinning {
      animation: emojiSpin 0.08s linear infinite;
    }

    .machine-emoji.landing {
      animation: emojiLand 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    @keyframes emojiSpin {
      0% { transform: translateY(-60px) scale(0.3); opacity: 0; }
      50% { transform: translateY(0) scale(1.1); opacity: 1; }
      100% { transform: translateY(60px) scale(0.3); opacity: 0; }
    }

    @keyframes emojiLand {
      0% { transform: scale(0.2) rotate(-180deg); opacity: 0; }
      60% { transform: scale(1.3) rotate(10deg); opacity: 1; }
      80% { transform: scale(0.95) rotate(-5deg); }
      100% { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .draw-btn {
      position: relative;
      padding: 14px 48px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Fredoka One', cursive;
      font-size: 1.3rem;
      letter-spacing: 1px;
      background: linear-gradient(135deg, var(--p1), #7c3aed);
      color: white;
      box-shadow: 0 4px 20px rgba(168,85,247,0.5), 0 2px 0 rgba(0,0,0,0.3);
      transition: transform 0.15s, box-shadow 0.15s;
      overflow: hidden;
    }

    .draw-btn::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.15), transparent);
      border-radius: inherit;
    }

    .draw-btn:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(168,85,247,0.6), 0 2px 0 rgba(0,0,0,0.3);
    }

    .draw-btn:active:not(:disabled) {
      transform: translateY(1px);
      box-shadow: 0 2px 10px rgba(168,85,247,0.4), 0 1px 0 rgba(0,0,0,0.3);
    }

    .draw-btn:disabled {
      opacity: 0.5;
      cursor: not-allowed;
    }

    .draw-btn.drawing {
      background: linear-gradient(135deg, var(--p2), #ea580c);
      box-shadow: 0 4px 20px rgba(249,115,22,0.5), 0 2px 0 rgba(0,0,0,0.3);
    }

    .draw-count {
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
      white-space: nowrap;
    }

    /* GAME AREA */
    .game-area {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      padding: 10px 20px 30px;
      max-width: 1000px;
      margin: 0 auto;
    }

    @media (max-width: 640px) {
      .game-area {
        grid-template-columns: 1fr;
        gap: 30px;
      }
    }

    /* PLAYER CARD */
    .player-card {
      background: var(--surface);
      border-radius: 24px;
      padding: 20px;
      border: 1px solid rgba(255,255,255,0.06);
      position: relative;
      overflow: hidden;
    }

    .player-card::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1.5px;
      background: linear-gradient(135deg, var(--p1-glow), transparent 60%);
      -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .player-card.p2::before {
      background: linear-gradient(135deg, var(--p2-glow), transparent 60%);
    }

    .player-card.winner {
      animation: winnerCard 0.6s ease-out forwards, winnerPulse 1s ease-in-out 0.6s infinite;
    }

    @keyframes winnerCard {
      0% { transform: scale(1); }
      50% { transform: scale(1.05); }
      100% { transform: scale(1); }
    }

    @keyframes winnerPulse {
      0%, 100% { box-shadow: 0 0 20px rgba(255,215,0,0.3); }
      50% { box-shadow: 0 0 50px rgba(255,215,0,0.7); }
    }

    .player-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
      gap: 8px;
    }

    .player-name {
      font-family: 'Fredoka One', cursive;
      font-size: 1.5rem;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .p1 .player-name { color: var(--p1-glow); }
    .p2 .player-name { color: var(--p2-glow); }

    .player-badge {
      font-size: 0.7rem;
      font-weight: 700;
      padding: 3px 10px;
      border-radius: 20px;
      letter-spacing: 1px;
    }

    .p1 .player-badge { background: rgba(168,85,247,0.2); color: var(--p1-glow); border: 1px solid rgba(168,85,247,0.3); }
    .p2 .player-badge { background: rgba(249,115,22,0.2); color: var(--p2-glow); border: 1px solid rgba(249,115,22,0.3); }

    /* EMOJI GRID */
    .emoji-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      margin-bottom: 18px;
    }

    .emoji-cell {
      aspect-ratio: 1;
      background: var(--surface2);
      border-radius: 12px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: clamp(1.3rem, 3.5vw, 1.8rem);
      border: 1.5px solid rgba(255,255,255,0.06);
      position: relative;
      transition: background 0.3s, border-color 0.3s;
      overflow: hidden;
      user-select: none;
    }

    .emoji-cell.matched {
      animation: cellMatch 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    }

    .p1 .emoji-cell.matched {
      background: rgba(168,85,247,0.25);
      border-color: var(--p1-glow);
      box-shadow: 0 0 12px rgba(168,85,247,0.4), inset 0 0 8px rgba(168,85,247,0.15);
    }

    .p2 .emoji-cell.matched {
      background: rgba(249,115,22,0.25);
      border-color: var(--p2-glow);
      box-shadow: 0 0 12px rgba(249,115,22,0.4), inset 0 0 8px rgba(249,115,22,0.15);
    }

    @keyframes cellMatch {
      0% { transform: scale(1); }
      30% { transform: scale(1.35) rotate(-8deg); }
      60% { transform: scale(0.9) rotate(4deg); }
      80% { transform: scale(1.1) rotate(-2deg); }
      100% { transform: scale(1) rotate(0deg); }
    }

    .emoji-cell .check-overlay {
      position: absolute;
      inset: 0;
      border-radius: inherit;
      display: flex;
      align-items: flex-end;
      justify-content: flex-end;
      padding: 2px;
      opacity: 0;
      transition: opacity 0.3s;
      pointer-events: none;
    }

    .emoji-cell.matched .check-overlay {
      opacity: 1;
    }

    .check-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      font-size: 7px;
      display: flex;
      align-items: center;
      justify-content: center;
      color: white;
      font-weight: 900;
    }

    .p1 .check-dot { background: var(--p1); }
    .p2 .check-dot { background: var(--p2); }

    /* SPARKLE burst effect */
    .sparkle-burst {
      position: absolute;
      inset: 0;
      pointer-events: none;
      border-radius: inherit;
    }

    .sparkle-burst::before,
    .sparkle-burst::after {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: inherit;
      opacity: 0;
    }

    .emoji-cell.matching-now .sparkle-burst::before {
      background: radial-gradient(circle, rgba(255,255,255,0.8) 0%, transparent 70%);
      animation: burst 0.4s ease-out forwards;
    }

    @keyframes burst {
      0% { opacity: 0.8; transform: scale(0.5); }
      100% { opacity: 0; transform: scale(1.8); }
    }

    /* PROGRESS SECTION */
    .progress-section {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .progress-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .progress-label {
      font-size: 0.8rem;
      font-weight: 700;
      color: var(--text-muted);
    }

    .progress-count {
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
    }

    .p1 .progress-count { color: var(--p1-glow); }
    .p2 .progress-count { color: var(--p2-glow); }

    .progress-track {
      height: 14px;
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
      border: 1px solid rgba(255,255,255,0.06);
    }

    .progress-fill {
      height: 100%;
      border-radius: inherit;
      position: relative;
      transition: width 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
      min-width: 0;
    }

    .p1 .progress-fill {
      background: linear-gradient(90deg, var(--p1), var(--p1-glow), #e879f9);
      box-shadow: 0 0 12px rgba(168,85,247,0.6);
    }

    .p2 .progress-fill {
      background: linear-gradient(90deg, var(--p2), var(--p2-glow), #fbbf24);
      box-shadow: 0 0 12px rgba(249,115,22,0.6);
    }

    .progress-fill::after {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 50%;
      background: rgba(255,255,255,0.25);
      border-radius: 100px 100px 0 0;
    }

    .progress-milestones {
      display: flex;
      justify-content: space-between;
      padding: 0 2px;
    }

    .milestone-dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: rgba(255,255,255,0.15);
      margin-top: -3px;
      transition: background 0.3s, transform 0.3s;
    }

    .milestone-dot.passed {
      transform: scale(1.3);
    }

    .p1 .milestone-dot.passed { background: var(--p1-glow); }
    .p2 .milestone-dot.passed { background: var(--p2-glow); }

    .progress-steps {
      display: flex;
      justify-content: space-between;
      padding: 0 1px;
    }

    .step-num {
      font-size: 0.6rem;
      color: rgba(255,255,255,0.2);
      font-weight: 700;
      width: 12px;
      text-align: center;
    }

    .step-num.active {
      color: var(--text-muted);
    }

    /* WIN OVERLAY */
    .win-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 1000;
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.4s;
      backdrop-filter: blur(8px);
    }

    .win-overlay.show {
      opacity: 1;
      pointer-events: all;
    }

    .win-box {
      text-align: center;
      padding: 50px 60px;
      background: var(--surface);
      border-radius: 32px;
      max-width: 420px;
      width: 90%;
      border: 2px solid var(--gold);
      box-shadow: 0 0 60px rgba(255,215,0,0.3), 0 20px 60px rgba(0,0,0,0.5);
      animation: winBoxIn 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) both;
    }

    @keyframes winBoxIn {
      from { transform: scale(0.5) rotate(-5deg); opacity: 0; }
      to { transform: scale(1) rotate(0deg); opacity: 1; }
    }

    .win-trophy {
      font-size: 5rem;
      display: block;
      animation: trophyFloat 1s ease-in-out infinite alternate;
      margin-bottom: 16px;
    }

    @keyframes trophyFloat {
      from { transform: translateY(0) rotate(-5deg); }
      to { transform: translateY(-12px) rotate(5deg); }
    }

    .win-title {
      font-family: 'Fredoka One', cursive;
      font-size: 2.5rem;
      background: linear-gradient(135deg, var(--gold), #fff, var(--gold-glow));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      margin-bottom: 8px;
    }

    .win-player-name {
      font-size: 1.2rem;
      font-weight: 700;
      margin-bottom: 30px;
    }

    .p1-win { color: var(--p1-glow); }
    .p2-win { color: var(--p2-glow); }

    .restart-btn {
      padding: 14px 40px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      font-family: 'Fredoka One', cursive;
      font-size: 1.2rem;
      background: linear-gradient(135deg, var(--gold), var(--gold-glow));
      color: #1a0a00;
      box-shadow: 0 4px 20px rgba(255,215,0,0.4);
      transition: transform 0.15s, box-shadow 0.15s;
    }

    .restart-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(255,215,0,0.5);
    }

    .restart-btn:active {
      transform: translateY(1px);
    }

    /* CONFETTI */
    .confetti-container {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 999;
      overflow: hidden;
    }

    .confetti-piece {
      position: absolute;
      width: 10px;
      height: 14px;
      top: -20px;
      border-radius: 2px;
      animation: confettiFall linear forwards;
    }

    @keyframes confettiFall {
      0% {
        transform: translateY(0) rotate(0deg) scaleX(1);
        opacity: 1;
      }
      80% { opacity: 1; }
      100% {
        transform: translateY(110vh) rotate(720deg) scaleX(-1);
        opacity: 0;
      }
    }

    /* RIPPLE on matched cells */
    @keyframes rippleOut {
      0% { box-shadow: 0 0 0 0 rgba(168,85,247,0.6); }
      100% { box-shadow: 0 0 0 20px rgba(168,85,247,0); }
    }

    .p1 .emoji-cell.ripple {
      animation: cellMatch 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 rippleOut 0.6s ease-out 0.1s forwards;
    }

    @keyframes rippleOut2 {
      0% { box-shadow: 0 0 0 0 rgba(249,115,22,0.6); }
      100% { box-shadow: 0 0 0 20px rgba(249,115,22,0); }
    }

    .p2 .emoji-cell.ripple {
      animation: cellMatch 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards,
                 rippleOut2 0.6s ease-out 0.1s forwards;
    }

    /* MACHINE FLASH */
    .machine.flash .machine-inner {
      animation: machineFlash 0.4s ease-out;
    }

    @keyframes machineFlash {
      0%, 100% { background: var(--surface2); }
      50% { background: rgba(255,215,0,0.3); box-shadow: 0 0 60px rgba(255,215,0,0.5), inset 0 0 30px rgba(255,215,0,0.2); }
    }

    /* SCORE ANIMATION */
    .score-bump {
      animation: scoreBump 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }

    @keyframes scoreBump {
      0% { transform: scale(1); }
      50% { transform: scale(1.4); }
      100% { transform: scale(1); }
    }

    /* NONE FOUND indicator */
    .no-match-flash {
      animation: noMatchFlash 0.3s ease-out;
    }

    @keyframes noMatchFlash {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }

    /* STATUS BAR */
    .status-bar {
      text-align: center;
      padding: 6px 20px;
      font-size: 0.85rem;
      color: var(--text-muted);
      font-weight: 600;
      min-height: 32px;
    }

    .status-bar span {
      display: inline-block;
      animation: statusIn 0.3s ease-out;
    }

    @keyframes statusIn {
      from { transform: translateY(-8px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    /* GLOW DOTS decoration */
    .glow-dot {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: -1;
    }

    .glow-dot-1 {
      width: 300px; height: 300px;
      background: rgba(168,85,247,0.12);
      top: -100px; left: -100px;
    }

    .glow-dot-2 {
      width: 250px; height: 250px;
      background: rgba(249,115,22,0.10);
      bottom: -80px; right: -80px;
    }

    /* MAIN emoji shimmer */
    .machine-inner .machine-emoji:not(.spinning):not(.landing) {
      animation: idleFloat 2s ease-in-out infinite;
    }

    @keyframes idleFloat {
      0%, 100% { transform: translateY(0) scale(1); }
      50% { transform: translateY(-4px) scale(1.05); }
    }

    /* Responsive */
    @media (max-width: 480px) {
      .machine { width: 140px; height: 140px; }
      .machine-inner { width: 108px; height: 108px; font-size: 3.5rem; }
      .draw-btn { padding: 12px 36px; font-size: 1.1rem; }
      .emoji-grid { gap: 4px; }
      .player-card { padding: 14px; }
      .win-box { padding: 36px 28px; }
    }
  </style>
</head>
<body>

  <!-- WAITING OVERLAY -->


  <!-- Background glow dots -->
  <div class="glow-dot glow-dot-1"></div>
  <div class="glow-dot glow-dot-2"></div>

  <!-- SCORE HEADER למעלה -->
  <div class="score-header">
    <div class="score-box" id="card-p1">
      <div class="player-name" id="name-p1">שחקן 1</div>
      <div class="player-score" id="score-p1">0</div>
      <div class="player-sub" id="found-p1">מצא: 0</div>
    </div>
    <div class="score-box vs-box">
      <div class="player-name">סיבוב</div>
      <div class="player-score" id="round-num">0</div>
      <div class="player-sub" id="round-total">מתוך 10</div>
    </div>
    <div class="score-box" id="card-p2">
      <div class="player-name" id="name-p2">🤖 מחשב</div>
      <div class="player-score" id="score-p2">0</div>
      <div class="player-sub" id="found-p2">מצא: 0</div>
    </div>
  </div>

  <!-- CURRENT EMOJI + STATUS -->
  <div class="current-zone">
    <div class="current-emoji-display" id="currentEmojiDisplay">
      <span class="current-emoji" id="currentEmoji">❓</span>
    </div>
    <div class="status-bar" id="statusBar">
      <span>לחץ על "הגרל!" כדי להתחיל</span>
    </div>
  </div>

  <!-- MY GRID -->
  <div class="my-grid-section">
    <div class="emoji-grid" id="grid-p1"></div>
  </div>

  <!-- DRAW BUTTON -->
  <div style="text-align:center; padding: 8px;">
    <button class="draw-btn" id="drawBtn" onclick="drawEmoji()">הגרל!</button>
  </div>

  <!-- DRAWN HISTORY -->
  <div class="drawn-history">
    <span class="history-label">הוגרלו:</span>
    <div class="history-emojis" id="historyEmojis"></div>
    <span class="history-label" id="historyEmpty" style="color:rgba(255,255,255,0.2)">אין עדיין...</span>
  </div>

  <!-- CONTROLS -->
  <div class="controls">
    <button class="ctrl-btn" onclick="goHome()">🏠 בית</button>
    <button class="ctrl-btn ctrl-reset" onclick="restartGame()">🔄 איפוס</button>
  </div>

  <!-- WIN OVERLAY -->
  <div class="win-overlay" id="winOverlay">
    <div class="win-box">
      <span class="win-trophy">🏆</span>
      <div class="win-title">BINGO!</div>
      <div class="win-player-name" id="winPlayerName"></div>
      <button class="restart-btn" onclick="restartGame()">🔄 משחק חדש</button>
      <button class="restart-btn" onclick="goHome()" style="background:rgba(255,255,255,0.08);box-shadow:none;margin-top:8px;">🏠 דף הבית</button>
    </div>
  </div>

  <!-- CONFETTI CONTAINER -->
  <div class="confetti-container" id="confettiContainer"></div>

  <script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get, update, onValue, remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDC0GADxe3qv6uv6s6fGR3O7_lL9iHl4ag",
  authDomain: "kidssapp-izhaki.firebaseapp.com",
  databaseURL: "https://kidssapp-izhaki-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "kidssapp-izhaki",
  storageBucket: "kidssapp-izhaki.firebasestorage.app",
  messagingSenderId: "663906163746",
  appId: "1:663906163746:web:a4f66772a2ae0dedc47e7b"
};
const fbApp   = initializeApp(firebaseConfig);
const db      = getDatabase(fbApp);
let gameRef = ref(db, 'game/bingo'); // יעודכן אחרי זיהוי שחקן

// ========== זיהוי שחקן ==========
const params = new URLSearchParams(location.search);
const displayName = params.get('player') || 'משתמש';
const userDataStr = sessionStorage.getItem('myUser');
const userData = userDataStr ? JSON.parse(userDataStr) : null;
if (!userData) { window.location.href = 'index.html'; throw new Error('No user data'); }

const myName = userData.id;
const myColor = userData.color;
const myEmoji = userData.emoji;
const modeFromURL = params.get('mode'); // 'ai' from index
const solo = modeFromURL === 'ai'; // מצב AI = סולו
const myKey = 'p1'; // תמיד p1 (אני)
const oppKey = 'p2';
const canDraw = true; // תמיד אני מגריל
let lastTs = null;

// עדכן שמות לפי userData
try {
  document.getElementById('name-p1').textContent = `${myEmoji} ${displayName}`;
  document.getElementById('name-p2').textContent = solo ? '🤖 מחשב' : 'יריב';
} catch(e) { document.title = 'ERR1: ' + e.message; }

// gameRef לפי מצב
if (solo) {
  gameRef = ref(db, `game/bingo_ai/${myName}`);
} else {
  gameRef = ref(db, 'game/bingo');
}
document.title = `OK: ${displayName} solo=${solo}`;

    // ─── EMOJI POOL (50 unique emojis) ───────────────────────────────────────
    const EMOJI_POOL = [
      '🦊','🐼','🦁','🐯','🦋','🦄','🐉','🦅','🐬','🦜',
      '🌈','🌟','⭐','🌙','☀️','🌸','🌺','🌻','🌵','🍄',
      '🎯','🎨','🎭','🎸','🎲','🎮','🏆','🎃','🚀','💎',
      '🍎','🍊','🍋','🍇','🍓','🍕','🍔','🌮','🍦','🍩',
      '🌊','🏔️','🔥','💫','🎪','🎠','🌍','🦝','🍣','🎂'
    ];

    // ─── GAME STATE ───────────────────────────────────────────────────────────
    let pool = [];
    let boards = { p1: [], p2: [] };
    let matched = { p1: new Set(), p2: new Set() };
    let scores = { p1: 0, p2: 0 };
    let isDrawing = false;
    let gameOver = false;
    let currentDrawn = null;
    let roundTimer = null;
    let roundStartTime = 0;
    let canClick = false;
    let roundCount = 0;
    let drawer = 'p1';
    let isP1 = true;
    let p2Name = '', p2Emoji = '', p2Color = '';
    const MAX_ROUNDS = 10;
    const ROUND_TIME = 5000;

    function shuffle(arr) {
      const a = [...arr];
      for (let i = a.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [a[i], a[j]] = [a[j], a[i]];
      }
      return a;
    }

    function initGame() {
      const shared20 = shuffle(EMOJI_POOL).slice(0, 20);
      boards.p1 = shuffle([...shared20]);
      boards.p2 = shuffle([...shared20]);
      pool = shuffle([...shared20]);
      matched = { p1: new Set(), p2: new Set() };
      scores = { p1: 0, p2: 0 };
      gameOver = false; isDrawing = false; currentDrawn = null; canClick = false;
      roundCount = 0; drawer = 'p1';
      if (roundTimer) clearInterval(roundTimer);

      renderGrid();
      updateScore('p1'); updateScore('p2');
      document.getElementById('round-num').textContent = '0';
      document.getElementById('round-total').textContent = `מתוך ${MAX_ROUNDS}`;
      setActivePlayer(null);
      if (solo) { document.getElementById('card-p2').style.display = 'none'; }
      else { document.getElementById('card-p2').style.display = ''; }
      document.getElementById('historyEmojis').innerHTML = '';
      document.getElementById('historyEmpty').style.display = '';
      document.getElementById('currentEmoji').textContent = '❓';
      document.getElementById('currentEmojiDisplay').classList.remove('searching');
      document.getElementById('drawBtn').disabled = false;
      document.getElementById('drawBtn').textContent = 'הגרל!';
      document.getElementById('card-p1').classList.remove('winner');
      document.getElementById('card-p2').classList.remove('winner');
      document.getElementById('winOverlay').classList.remove('show');
      document.getElementById('confettiContainer').innerHTML = '';
      updateDrawButton();
      setStatus('לחץ על "הגרל!" כדי להתחיל');
      if (!solo && isP1) {
        set(gameRef, { boards, pool, scores:{p1:0,p2:0}, roundNum:0, drawer:'p1', state:'waiting', currentDrawn:null, found:{p1:false,p2:false}, gameOver:false,
          players:{ p1:{name:displayName,emoji:myEmoji,color:myColor}, p2:{name:p2Name,emoji:p2Emoji,color:p2Color} }
        });
      }
    }

    function renderGrid() {
      const myBoard = isP1 ? 'p1' : 'p2';
      const grid = document.getElementById('grid-p1');
      if (!grid) return;
      grid.innerHTML = '';
      boards[myBoard].forEach((emoji, i) => {
        const cell = document.createElement('div');
        cell.className = 'emoji-cell';
        cell.id = `cell-${myBoard}-${i}`;
        cell.innerHTML = `<span>${emoji}</span><div class="check-overlay"><div class="check-dot">✓</div></div><div class="sparkle-burst"></div>`;
        cell.onclick = () => onCellClick(myBoard, i, emoji);
        grid.appendChild(cell);
      });
    }

    function updateScore(player) {
      const el = document.getElementById(`score-${player}`);
      const foundEl = document.getElementById(`found-${player}`);
      if (!el) return;
      el.textContent = scores[player] || 0;
      if (foundEl) foundEl.textContent = `מצא: ${matched[player] ? matched[player].size : 0}`;
      el.classList.remove('score-bump'); void el.offsetWidth; el.classList.add('score-bump');
    }

    function updateRoundNum() { roundCount++; document.getElementById('round-num').textContent = roundCount; }

    function setActivePlayer(player) {
      document.getElementById('card-p1').classList.toggle('active', player === 'p1');
      document.getElementById('card-p2').classList.toggle('active', player === 'p2');
    }

    function setStatus(text) { document.getElementById('statusBar').innerHTML = `<span>${text}</span>`; }

    function updateDrawButton() {
      if (solo) return;
      const myKey = isP1 ? 'p1' : 'p2';
      const isMyTurn = drawer === myKey;
      document.getElementById('drawBtn').disabled = !isMyTurn || isDrawing || gameOver;
      document.getElementById('drawBtn').textContent = isMyTurn ? 'הגרל!' : '⏳ תור היריב...';
    }

    function onCellClick(player, index, emoji) {
      if (!canClick || !currentDrawn || gameOver) return;
      const myKey = isP1 ? 'p1' : 'p2';
      if (matched[myKey].has(emoji)) return;
      if (emoji === currentDrawn) {
        canClick = false;
        matched[myKey].add(emoji);
        const elapsed = Date.now() - roundStartTime;
        const secsLeft = Math.ceil(Math.max(0, ROUND_TIME - elapsed) / 1000);
        const points = Math.max(1, secsLeft);
        scores[myKey] += points;
        markCell(myKey, emoji);
        updateScore(myKey);
        setStatus(`✅ מצאת! +${points} נקודות`);
        if (navigator.vibrate) navigator.vibrate(30);
        if (solo) { setTimeout(() => endSearchRound(true), 2000); }
        else { update(gameRef, { [`found.${myKey}`]:true, [`found.${myKey}_time`]:elapsed, [`scores.${myKey}`]:scores[myKey] }); }
      } else {
        const cell = document.getElementById(`cell-${player}-${index}`);
        if (cell) { cell.classList.add('no-match-flash'); setTimeout(() => cell.classList.remove('no-match-flash'), 400); }
        if (navigator.vibrate) navigator.vibrate([30, 50, 30]);
      }
    }

    function startSearchRound(drawn) {
      currentDrawn = drawn; canClick = true; isDrawing = false; roundStartTime = Date.now();
      setStatus(`🔍 חפש את ${drawn}! (5s)`);
      const timerStart = roundStartTime;
      if (roundTimer) clearInterval(roundTimer);
      roundTimer = setInterval(() => {
        const left = Math.max(0, ROUND_TIME - (Date.now() - timerStart));
        if (left <= 0) { clearInterval(roundTimer); endSearchRound(false); }
        else { setStatus(`🔍 חפש את ${drawn}! (${Math.ceil(left/1000)}s)`); }
      }, 200);
    }

    function endSearchRound(found) {
      canClick = false; currentDrawn = null; setActivePlayer(null);
      document.getElementById('currentEmojiDisplay').classList.remove('searching');
      if (roundTimer) { clearInterval(roundTimer); roundTimer = null; }
      if (!found && !gameOver) setStatus('⏰ נגמר הזמן!');
      if (roundCount >= MAX_ROUNDS) {
        gameOver = true;
        setTimeout(() => solo ? triggerEndSolo() : triggerEndMulti(), 1500);
        return;
      }
      if (!gameOver) {
        if (!solo) { drawer = drawer === 'p1' ? 'p2' : 'p1'; if (isP1) update(gameRef, { drawer, state:'waiting', found:{p1:false,p2:false} }); }
        setTimeout(() => {
          if (gameOver) return;
          if (solo) { document.getElementById('drawBtn').disabled = false; document.getElementById('drawBtn').textContent = 'הגרל!'; }
          else updateDrawButton();
          const myKey = isP1 ? 'p1' : 'p2';
          setStatus(solo ? 'לחץ על "הגרל!" להמשיך' : (drawer === myKey ? 'תורך להגריל!' : '⏳ תור היריב...'));
        }, 2000);
      }
    }

    async function drawEmoji() {
      if (isDrawing || gameOver || roundCount >= MAX_ROUNDS) return;
      if (!solo) { const myKey = isP1 ? 'p1' : 'p2'; if (drawer !== myKey) return; }
      isDrawing = true;
      document.getElementById('drawBtn').disabled = true;
      document.getElementById('drawBtn').textContent = '🎰 מגריל...';
      const drawn = pool.pop();
      if (!solo) await update(gameRef, { currentDrawn:drawn, state:'searching', pool, roundNum:roundCount+1, found:{p1:false,p2:false} });
      const emojiEl = document.getElementById('currentEmoji');
      const displayEl = document.getElementById('currentEmojiDisplay');
      const myBoard = isP1 ? 'p1' : 'p2';
      let spins = 0;
      await new Promise(resolve => {
        const doSpin = () => {
          spins++;
          emojiEl.textContent = boards[myBoard][Math.floor(Math.random() * boards[myBoard].length)];
          emojiEl.style.transform = `scale(${0.7+Math.random()*0.4}) rotate(${(Math.random()-0.5)*15}deg)`;
          if (spins < 12) setTimeout(doSpin, 50+spins*15);
          else { emojiEl.textContent = drawn; emojiEl.style.transform = 'scale(1.2)'; setTimeout(() => { emojiEl.style.transform = ''; resolve(); }, 300); }
        };
        doSpin();
      });
      addToHistory(drawn); updateRoundNum(); displayEl.classList.add('searching');
      startSearchRound(drawn);
    }

    function listenToState() {
      if (solo) return;
      onValue(gameRef, snap => {
        const s = snap.val(); if (!s) return;
        if (s.boards) { boards.p1 = s.boards.p1||[]; boards.p2 = s.boards.p2||[]; }
        if (s.pool) pool = s.pool;
        if (s.scores) { scores.p1 = s.scores.p1||0; scores.p2 = s.scores.p2||0; updateScore('p1'); updateScore('p2'); }
        if (s.roundNum !== undefined) { roundCount = s.roundNum; document.getElementById('round-num').textContent = roundCount; }
        if (s.drawer) { drawer = s.drawer; updateDrawButton(); }
        if (s.players) {
          if (s.players.p1) document.getElementById('name-p1').textContent = isP1 ? `${myEmoji} ${displayName}` : `${s.players.p1.emoji} ${s.players.p1.name}`;
          if (s.players.p2) document.getElementById('name-p2').textContent = isP1 ? `${s.players.p2.emoji} ${s.players.p2.name}` : `${myEmoji} ${displayName}`;
        }
        const myKey = isP1 ? 'p1' : 'p2';
        if (s.state === 'searching' && s.currentDrawn && !isDrawing && currentDrawn !== s.currentDrawn) {
          currentDrawn = s.currentDrawn;
          document.getElementById('currentEmoji').textContent = s.currentDrawn;
          document.getElementById('currentEmojiDisplay').classList.add('searching');
          addToHistory(s.currentDrawn);
          roundCount = s.roundNum || roundCount;
          document.getElementById('round-num').textContent = roundCount;
          startSearchRound(s.currentDrawn);
        }
        if (s.found && s.found.p1 && s.found.p2 && s.state === 'searching') {
          if (canClick) endSearchRound(true);
        }
        if (s.gameOver) gameOver = true;
      });
    }

    function addToHistory(emoji) {
      const c = document.getElementById('historyEmojis');
      document.getElementById('historyEmpty').style.display = 'none';
      const chip = document.createElement('span'); chip.className = 'history-chip'; chip.textContent = emoji;
      c.insertBefore(chip, c.firstChild);
      while (c.children.length > 20) c.removeChild(c.lastChild);
    }

    function markCell(player, emoji) {
      const idx = boards[player].indexOf(emoji); if (idx === -1) return;
      const cell = document.getElementById(`cell-${player}-${idx}`); if (!cell) return;
      cell.classList.add('matched', 'ripple', 'matching-now');
      setTimeout(() => cell.classList.remove('matching-now'), 500);
    }

    function triggerEndSolo() {
      gameOver = true;
      const found = matched.p1 ? matched.p1.size : 0;
      const score = scores.p1 || 0;
      const maxScore = MAX_ROUNDS * 5;
      const emoji = score >= maxScore*0.7 ? '🌟' : score >= maxScore*0.4 ? '👏' : '💪';
      document.querySelector('.win-trophy').textContent = emoji;
      document.querySelector('.win-title').textContent = '🏁 סיום!';
      document.getElementById('winPlayerName').innerHTML = `${myEmoji} ${displayName}<br><span style="font-size:1rem;color:var(--gold);font-weight:900;">${score} נקודות</span><br><span style="font-size:0.85rem;color:var(--text-muted);">מצאת ${found} מתוך ${MAX_ROUNDS}</span>`;
      document.getElementById('drawBtn').disabled = true;
      if (score >= maxScore*0.7) launchConfetti();
      setTimeout(() => document.getElementById('winOverlay').classList.add('show'), 500);
    }

    function triggerEndMulti() {
      gameOver = true;
      const myKey = isP1 ? 'p1' : 'p2';
      const oppK = isP1 ? 'p2' : 'p1';
      const my = scores[myKey]||0, opp = scores[oppK]||0;
      let trophy, title, msg;
      if (my > opp) { trophy='🏆'; title='ניצחת!'; msg=`${myEmoji} ${displayName} 🏆`; launchConfetti(); }
      else if (my < opp) { trophy='😢'; title='הפסדת'; msg='היריב ניצח!'; }
      else { trophy='🤝'; title='תיקו!'; msg='תיקו מדהים!'; launchConfetti(); }
      document.querySelector('.win-trophy').textContent = trophy;
      document.querySelector('.win-title').textContent = title;
      document.getElementById('winPlayerName').innerHTML = `${msg}<br><span style="font-size:1rem;color:var(--gold);">${my} - ${opp}</span>`;
      document.getElementById('drawBtn').disabled = true;
      if (isP1) update(gameRef, { gameOver: true });
      setTimeout(() => document.getElementById('winOverlay').classList.add('show'), 500);
    }

    function launchConfetti() {
      const colors = ['#a855f7','#f97316','#ffd700','#ec4899','#3b82f6','#10b981','#f59e0b','#ef4444'];
      const c = document.getElementById('confettiContainer'); c.innerHTML = '';
      for (let i = 0; i < 80; i++) {
        setTimeout(() => {
          const p = document.createElement('div'); p.className = 'confetti-piece';
          p.style.left = Math.random()*100+'vw'; p.style.background = colors[Math.floor(Math.random()*colors.length)];
          p.style.width = (6+Math.random()*10)+'px'; p.style.height = (8+Math.random()*16)+'px';
          p.style.borderRadius = Math.random()>0.5?'50%':'2px';
          const d = 2+Math.random()*3; p.style.animationDuration = d+'s'; p.style.animationDelay = Math.random()+'s';
          c.appendChild(p); setTimeout(() => p.remove(), (d+2)*1000);
        }, i*12);
      }
    }

    function restartGame() {
      document.getElementById('winOverlay').classList.remove('show');
      if (!solo) remove(gameRef);
      setTimeout(initGame, 300);
    }

    window.goHome = function() { if (!solo) remove(gameRef); window.location.href='index.html'; };
    window.drawEmoji = drawEmoji;
    window.restartGame = restartGame;

    function initWaiting() {
      if (solo) { initGame(); return; }
      const roomRef2 = ref(db, 'rooms_v3/bingo');
      set(ref(db, `rooms_v3/bingo/${myName}`), { name:displayName, emoji:myEmoji, color:myColor, timestamp:Date.now(), active:true });
      onValue(roomRef2, snap => {
        const players = snap.val(); if (!players) return;
        const ids = Object.keys(players);
        if (ids.length >= 2) {
          isP1 = ids[0] === myName;
          const oppId = ids.find(id => id !== myName);
          const opp = players[oppId];
          p2Name = opp.name; p2Emoji = opp.emoji; p2Color = opp.color;
          document.getElementById('name-p1').textContent = isP1 ? `${myEmoji} ${displayName}` : `${opp.emoji} ${opp.name}`;
          document.getElementById('name-p2').textContent = isP1 ? `${opp.emoji} ${opp.name}` : `${myEmoji} ${displayName}`;
          if (isP1) initGame();
          listenToState();
          if (!isP1) renderGrid();
        }
      });
    }

    try { initWaiting(); } catch(e) { document.title = 'ERR: ' + e.message; }
  </script>
</body>
</html>
