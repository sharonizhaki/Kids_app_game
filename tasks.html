<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>המשימות שלי</title>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;600;700;900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="css/child.css">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/canvas-confetti/1.9.2/confetti.browser.min.js"></script>
</head>
<body>

<!-- ==================== SPLASH ==================== -->
<div id="screen-splash" class="screen active visible">
  <div class="splash">
    <div>
      <div style="font-size:3rem;margin-bottom:16px;">⭐</div>
      <div class="spinner-lg"></div>
      <p style="font-weight:700;color:var(--muted);">טוען...</p>
    </div>
  </div>
</div>

<!-- ==================== MAIN CHILD SCREEN ==================== -->
<div id="screen-child" class="screen">
  <div class="user-header">
    <div class="header-photo" id="child-header-photo">
      <span id="child-header-emoji">⭐</span>
    </div>
    <h2 id="child-title">שלום!</h2>
    <button class="logout-btn" id="btn-child-logout" title="יציאה">🚪</button>
  </div>

  <div class="greeting-card" id="greeting-card">
    <div class="greeting-text" id="greeting-text"></div>
    <div class="greeting-sub" id="greeting-sub"></div>
  </div>

  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-val" id="pb-val" style="color:var(--child-color);">0</div>
      <div class="stat-label">כוכבים השבוע ⭐</div>
    </div>
    <div class="stat-card">
      <div class="stat-val" id="monthly-val" style="color:var(--child-color);">0</div>
      <div class="stat-label">כוכבים החודש 🌙</div>
    </div>
  </div>

  <div class="progress-card">
    <div class="progress-header">
      <span>התקדמות שבועית 🎯</span>
      <span id="progress-text">0 / 100 כוכבים</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progress-fill" style="width:0%">
        <span class="progress-pts-label" id="progress-pts-label"></span>
      </div>
    </div>
  </div>

  <div class="categories-grid" id="cats-grid"></div>

  <div class="history-section">
    <h3>פעולות אחרונות 📋</h3>
    <div class="history-list" id="user-hist">
      <div class="empty-state">עדיין לא ביצעת משימות</div>
    </div>
  </div>
</div>

<!-- ==================== SCREEN: CHILD PROFILE EDIT ==================== -->
<div id="screen-child-profile" class="screen" style="padding-top:20px;">
  <div class="user-header">
    <button class="back-btn" id="btn-profile-back">→</button>
    <h2>הפרופיל שלי ✏️</h2>
  </div>
  <div class="profile-card">
    <div class="profile-header">
      <div class="profile-name" id="profile-child-name"></div>
      <div class="profile-gender" id="profile-child-gender"></div>
    </div>

    <label class="profile-label">צבע 🎨</label>
    <div id="profile-color-display" class="profile-color-circle" title="לחץ לעריכה"></div>

    <label class="profile-label">אימוג'י</label>
    <div id="profile-emoji-display" class="profile-emoji-btn" title="לחץ לעריכה"></div>

    <label class="profile-label">תמונה</label>
    <div class="profile-photo-row">
      <div class="profile-photo-upload" id="profile-photo-upload">
        <div id="profile-photo-placeholder" class="profile-photo-placeholder">
          <span>📷</span>
          <small>בחר תמונה</small>
        </div>
        <img id="profile-photo-preview" class="profile-photo-preview" alt="">
        <input type="file" accept="image/*" id="profile-photo-input" class="profile-photo-input">
      </div>
      <button id="btn-profile-clear-photo" class="profile-clear-btn">🗑️ נקה</button>
    </div>

    <div id="profile-error" class="profile-error"></div>
    <button id="btn-profile-save" class="profile-save-btn">שמור ✅</button>
  </div>
</div>

<div class="success-toast" id="toast"></div>

<script type="module" src="js/child.js"></script>
</body>
</html>
